<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Жёлтый шар — закреплён в мире, луч к пальцу</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            font-weight: 500;
        }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffcc00;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .instruction {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #ffdd88;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            font-weight: bold;
        }
        .fallback-message {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #ffaa66;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div id="info">
        🔆 Жёлтый шар зафиксирован в 1 метре перед вами | Нажмите на экран → луч от шара к пальцу
    </div>
    <div id="status">
        📱 Ожидание AR
    </div>
    <div class="instruction">
        👆 Нажми и держи → жёлтый луч | Веди пальцем → луч следует | Отпусти → луч исчезает
    </div>
    <div class="fallback-message" id="fallbackMsg" style="display: none;">
        ⚠️ Ваш браузер не поддерживает WebXR для AR. Попробуйте в Safari на iOS с HTTPS.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

        // --- Сцена, камера, рендерер ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        // Камера будет управляться WebXR
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(2, 3, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.5);
        fillLight.position.set(1, 1, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x6688ff, 0.4);
        backLight.position.set(-1, 1, -2);
        scene.add(backLight);

        // --- Жёлтый шар (будет добавлен при старте сессии) ---
        let yellowBall = null;
        let glowLight = null;
        let aura = null;
        let particles = null;

        function createBallAtPosition(x, y, z) {
            const sphereGeometry = new THREE.SphereGeometry(0.12, 64, 64);
            const sphereMaterial = new THREE.MeshStandardMaterial({
                color: 0xffcc33,
                emissive: 0x442200,
                emissiveIntensity: 0.3,
                metalness: 0.7,
                roughness: 0.3
            });
            const ball = new THREE.Mesh(sphereGeometry, sphereMaterial);
            ball.position.set(x, y, z);
            ball.castShadow = true;
            return ball;
        }

        function createGlowAtPosition(x, y, z) {
            const light = new THREE.PointLight(0xffaa44, 0.8, 2.5);
            light.position.set(x, y, z);
            return light;
        }

        function createAuraAtPosition(x, y, z) {
            const geo = new THREE.SphereGeometry(0.145, 32, 32);
            const mat = new THREE.MeshBasicMaterial({
                color: 0xffaa55,
                transparent: true,
                opacity: 0.2,
                side: THREE.BackSide
            });
            const auraMesh = new THREE.Mesh(geo, mat);
            auraMesh.position.set(x, y, z);
            return auraMesh;
        }

        function createParticlesAround(position) {
            const count = 300;
            const geometry = new THREE.BufferGeometry();
            const positionsArray = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const radius = 0.2 + Math.random() * 0.4;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                positionsArray[i*3] = position.x + radius * Math.sin(phi) * Math.cos(theta);
                positionsArray[i*3+1] = position.y + radius * Math.sin(phi) * Math.sin(theta);
                positionsArray[i*3+2] = position.z + radius * Math.cos(phi);
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positionsArray, 3));
            const material = new THREE.PointsMaterial({
                color: 0xffaa55,
                size: 0.008,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            });
            return new THREE.Points(geometry, material);
        }

        // --- Луч ---
        let currentBeam = null;
        let isDragging = false;

        function createCylBetween(p1, p2, radius = 0.022, color = 0xffaa44) {
            const start = new THREE.Vector3(p1.x, p1.y, p1.z);
            const end = new THREE.Vector3(p2.x, p2.y, p2.z);
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            if (length < 0.005) return null;
            
            const geometry = new THREE.CylinderGeometry(radius, radius, length, 12);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: 0xaa4400,
                emissiveIntensity: 0.5,
                metalness: 0.2,
                roughness: 0.3
            });
            const cylinder = new THREE.Mesh(geometry, material);
            const center = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            cylinder.position.copy(center);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), direction.clone().normalize());
            return cylinder;
        }

        function updateBeam(p1, p2) {
            if (currentBeam) {
                scene.remove(currentBeam);
                if (currentBeam.geometry) currentBeam.geometry.dispose();
                if (currentBeam.material) currentBeam.material.dispose();
                currentBeam = null;
            }
            if (p1 && p2 && p1.distanceTo(p2) > 0.01) {
                const newBeam = createCylBetween(p1, p2, 0.022, 0xffcc55);
                if (newBeam) {
                    currentBeam = newBeam;
                    scene.add(currentBeam);
                }
            }
        }

        function removeBeam() {
            if (currentBeam) {
                scene.remove(currentBeam);
                if (currentBeam.geometry) currentBeam.geometry.dispose();
                if (currentBeam.material) currentBeam.material.dispose();
                currentBeam = null;
            }
        }

        // --- Получение точки касания в мировых координатах (hit-test) ---
        // Для простоты используем луч на фиксированное расстояние, но можно добавить hit-test.
        // Используем метод getTouchPointInWorld.
        function getTouchPointInWorld(clientX, clientY, distance = 2.0) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
            const point = raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(distance));
            return point;
        }

        // --- Обработчики касаний (работают только в AR-сессии) ---
        function onPointerStart(event) {
            if (!renderer.xr.isPresenting) return;
            event.preventDefault();
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            const touchPoint = getTouchPointInWorld(clientX, clientY, 2.2);
            if (touchPoint && yellowBall) {
                isDragging = true;
                updateBeam(yellowBall.position, touchPoint);
            }
        }

        function onPointerMove(event) {
            if (!isDragging || !renderer.xr.isPresenting) return;
            event.preventDefault();
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            const touchPoint = getTouchPointInWorld(clientX, clientY, 2.2);
            if (touchPoint && yellowBall) {
                updateBeam(yellowBall.position, touchPoint);
            } else {
                removeBeam();
            }
        }

        function onPointerEnd(event) {
            if (!renderer.xr.isPresenting) return;
            event.preventDefault();
            isDragging = false;
            removeBeam();
        }

        // Добавляем слушатели
        const canvasEl = renderer.domElement;
        canvasEl.addEventListener('touchstart', onPointerStart, { passive: false });
        canvasEl.addEventListener('touchmove', onPointerMove, { passive: false });
        canvasEl.addEventListener('touchend', onPointerEnd);
        canvasEl.addEventListener('touchcancel', onPointerEnd);
        canvasEl.addEventListener('mousedown', onPointerStart);
        window.addEventListener('mousemove', (e) => {
            if (isDragging && renderer.xr.isPresenting) onPointerMove(e);
        });
        window.addEventListener('mouseup', onPointerEnd);
        canvasEl.addEventListener('contextmenu', (e) => e.preventDefault());

        // --- Создание и размещение шара при старте AR-сессии ---
        // Мы хотим разместить шар в 1 метре перед камерой в момент старта.
        // Для этого в обработчике sessionstart получаем позицию камеры и смещаем.
        let ballPlaced = false;

        renderer.xr.addEventListener('sessionstart', () => {
            // Получаем текущее положение камеры и направление взгляда
            const cameraPosition = new THREE.Vector3();
            const cameraDirection = new THREE.Vector3();
            camera.getWorldPosition(cameraPosition);
            camera.getWorldDirection(cameraDirection);
            
            // Шар на расстоянии 1 метр от камеры
            const ballPos = cameraPosition.clone().add(cameraDirection.multiplyScalar(1.0));
            
            if (yellowBall) {
                scene.remove(yellowBall);
                if (glowLight) scene.remove(glowLight);
                if (aura) scene.remove(aura);
                if (particles) scene.remove(particles);
            }
            
            yellowBall = createBallAtPosition(ballPos.x, ballPos.y, ballPos.z);
            glowLight = createGlowAtPosition(ballPos.x, ballPos.y, ballPos.z);
            aura = createAuraAtPosition(ballPos.x, ballPos.y, ballPos.z);
            particles = createParticlesAround(ballPos);
            
            scene.add(yellowBall);
            scene.add(glowLight);
            scene.add(aura);
            scene.add(particles);
            
            ballPlaced = true;
            document.getElementById('status').innerHTML = '🌟 AR активен | Шар в 1 метре перед вами';
        });

        renderer.xr.addEventListener('sessionend', () => {
            ballPlaced = false;
            removeBeam();
            isDragging = false;
            document.getElementById('status').innerHTML = '⏸ AR завершён';
        });

        // --- Анимация (пульсация, частицы) ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            if (yellowBall && glowLight) {
                glowLight.intensity = 0.7 + Math.sin(time * 3) * 0.2;
                if (aura) aura.scale.setScalar(1 + Math.sin(time * 4) * 0.02);
                if (particles) {
                    particles.rotation.y = time * 0.15;
                    particles.rotation.x = Math.sin(time * 0.4) * 0.1;
                }
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // --- WebXR кнопка ---
        const arButton = ARButton.createButton(renderer, {
            requiredFeatures: ['hit-test'],
            optionalFeatures: ['dom-overlay'],
            domOverlay: { root: document.body }
        });
        
        // Стилизуем и добавляем кнопку на страницу
        const customContainer = document.createElement('div');
        customContainer.style.position = 'absolute';
        customContainer.style.bottom = '30px';
        customContainer.style.left = '0';
        customContainer.style.right = '0';
        customContainer.style.display = 'flex';
        customContainer.style.justifyContent = 'center';
        customContainer.style.zIndex = '20';
        document.body.appendChild(customContainer);
        customContainer.appendChild(arButton);
        
        // Стилизуем кнопку
        arButton.style.backgroundColor = '#ffaa33';
        arButton.style.color = '#1e2a2e';
        arButton.style.border = 'none';
        arButton.style.padding = '12px 24px';
        arButton.style.borderRadius = '40px';
        arButton.style.fontSize = '18px';
        arButton.style.fontWeight = 'bold';
        arButton.style.cursor = 'pointer';
        arButton.style.fontFamily = 'inherit';
        arButton.style.boxShadow = '0 2px 20px rgba(0,0,0,0.3)';
        
        // Обработка отсутствия поддержки WebXR
        if (!navigator.xr) {
            document.getElementById('fallbackMsg').style.display = 'block';
            arButton.disabled = true;
            arButton.style.opacity = '0.5';
            document.getElementById('status').innerHTML = '❌ WebXR не поддерживается';
        } else {
            console.log('WebXR доступен');
        }
        
        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('AR приложение готово. Для работы необходим HTTPS и разрешение на камеру.');
    </script>
</body>
</html>
