<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Жёлтый шар - обойди и луч к пальцу (iOS/Android)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            font-weight: 500;
        }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffcc00;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .instruction {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #ffdd88;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            font-weight: bold;
        }
        .control-btn {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffaa33;
            color: #1e2a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            font-family: inherit;
            transition: transform 0.1s ease;
            white-space: nowrap;
        }
        .control-btn:active {
            transform: scale(0.97);
        }
        .hidden {
            display: none;
        }
        @media (max-width: 600px) {
            .control-btn { font-size: 14px; padding: 10px 20px; bottom: 70px; }
        }
    </style>
</head>
<body>
    <div id="info">
        🔆 Жёлтый шар в центре | Поворачивайте телефон, чтобы обойти его | Нажмите на экран → луч от шара к пальцу
    </div>
    <div id="status">
        📷 Ожидание камеры и гироскопа
    </div>
    <div class="instruction">
        👆 Нажми и держи → жёлтый луч | Веди пальцем → луч следует | Отпусти → луч исчезает
    </div>
    <button id="enable-gyro" class="control-btn">🧭 Разрешить движение телефона</button>
    <button id="enable-camera" class="control-btn hidden">📷 Включить камеру (AR фон)</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Инициализация сцены, камеры, рендерера ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x102030); // временный фон

        // Камера: будет вращаться вокруг шара (0,0,0)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
        camera.position.set(0, 0, 2.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(2, 3, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.5);
        fillLight.position.set(1, 1, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x6688ff, 0.4);
        backLight.position.set(-1, 1, -2);
        scene.add(backLight);
        
        // --- Жёлтый шар (в центре) ---
        const sphereGeometry = new THREE.SphereGeometry(0.22, 64, 64);
        const sphereMaterial = new THREE.MeshStandardMaterial({
            color: 0xffcc33,
            emissive: 0x442200,
            emissiveIntensity: 0.3,
            metalness: 0.7,
            roughness: 0.3
        });
        const yellowBall = new THREE.Mesh(sphereGeometry, sphereMaterial);
        yellowBall.position.set(0, 0, 0);
        yellowBall.castShadow = true;
        scene.add(yellowBall);
        
        // Свечение шара
        const glowLight = new THREE.PointLight(0xffaa44, 0.8, 2.5);
        glowLight.position.set(0, 0, 0);
        scene.add(glowLight);
        
        // Аура
        const auraGeo = new THREE.SphereGeometry(0.28, 32, 32);
        const auraMat = new THREE.MeshBasicMaterial({
            color: 0xffaa55,
            transparent: true,
            opacity: 0.2,
            side: THREE.BackSide
        });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        scene.add(aura);
        
        // Декоративные частицы
        const particleCount = 400;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radius = 0.3 + Math.random() * 0.6;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i*3+2] = radius * Math.cos(phi);
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0xffaa55,
            size: 0.012,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particlesGeo, particleMat);
        scene.add(particles);
        
        // --- Луч (цилиндр) ---
        let currentBeam = null;
        let isDragging = false;
        
        function createCylBetween(p1, p2, radius = 0.022, color = 0xffaa44) {
            const start = new THREE.Vector3(p1.x, p1.y, p1.z);
            const end = new THREE.Vector3(p2.x, p2.y, p2.z);
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            if (length < 0.005) return null;
            
            const geometry = new THREE.CylinderGeometry(radius, radius, length, 12);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: 0xaa4400,
                emissiveIntensity: 0.5,
                metalness: 0.2,
                roughness: 0.3
            });
            const cylinder = new THREE.Mesh(geometry, material);
            const center = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            cylinder.position.copy(center);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), direction.clone().normalize());
            return cylinder;
        }
        
        function updateBeam(p1, p2) {
            if (currentBeam) {
                scene.remove(currentBeam);
                if (currentBeam.geometry) currentBeam.geometry.dispose();
                if (currentBeam.material) currentBeam.material.dispose();
                currentBeam = null;
            }
            if (p1 && p2 && p1.distanceTo(p2) > 0.01) {
                const newBeam = createCylBetween(p1, p2, 0.025, 0xffcc55);
                if (newBeam) {
                    currentBeam = newBeam;
                    scene.add(currentBeam);
                }
            }
        }
        
        function removeBeam() {
            if (currentBeam) {
                scene.remove(currentBeam);
                if (currentBeam.geometry) currentBeam.geometry.dispose();
                if (currentBeam.material) currentBeam.material.dispose();
                currentBeam = null;
            }
        }
        
        // --- Получение точки в пространстве по касанию (луч из камеры, фиксированная дистанция) ---
        function getTouchPointInWorld(clientX, clientY, distanceFromCamera = 2.5) {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
            const point = raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(distanceFromCamera));
            return point;
        }
        
        // --- Обработчики касаний ---
        function onPointerStart(event) {
            event.preventDefault();
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            const touchPoint = getTouchPointInWorld(clientX, clientY, 2.2);
            if (touchPoint) {
                isDragging = true;
                updateBeam(yellowBall.position, touchPoint);
            }
        }
        
        function onPointerMove(event) {
            if (!isDragging) return;
            event.preventDefault();
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            const touchPoint = getTouchPointInWorld(clientX, clientY, 2.2);
            if (touchPoint) {
                updateBeam(yellowBall.position, touchPoint);
            } else {
                removeBeam();
            }
        }
        
        function onPointerEnd(event) {
            event.preventDefault();
            isDragging = false;
            removeBeam();
        }
        
        // Слушатели событий
        const canvasEl = renderer.domElement;
        canvasEl.addEventListener('touchstart', onPointerStart, { passive: false });
        canvasEl.addEventListener('touchmove', onPointerMove, { passive: false });
        canvasEl.addEventListener('touchend', onPointerEnd);
        canvasEl.addEventListener('touchcancel', onPointerEnd);
        
        canvasEl.addEventListener('mousedown', onPointerStart);
        window.addEventListener('mousemove', (e) => {
            if (isDragging) onPointerMove(e);
        });
        window.addEventListener('mouseup', onPointerEnd);
        canvasEl.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // --- Управление камерой через гироскоп (обход шара) ---
        let orientationEnabled = false;
        let targetRotationX = 0; // горизонталь (yaw)
        let targetRotationY = 0; // вертикаль (pitch)
        let currentRotationX = 0;
        let currentRotationY = 0;
        const radius = 2.5; // расстояние от шара
        
        function updateCameraFromOrientation() {
            // Плавное сглаживание
            currentRotationX += (targetRotationX - currentRotationX) * 0.1;
            currentRotationY += (targetRotationY - currentRotationY) * 0.1;
            
            const x = radius * Math.sin(currentRotationX) * Math.cos(currentRotationY);
            const y = radius * Math.sin(currentRotationY);
            const z = radius * Math.cos(currentRotationX) * Math.cos(currentRotationY);
            camera.position.set(x, y, z);
            camera.lookAt(0, 0, 0);
        }
        
        function handleOrientation(event) {
            if (!orientationEnabled) return;
            // Альфа (компас), бета (вперед-назад), гамма (влево-вправо)
            let alpha = event.alpha;    // 0-360
            let beta = event.beta;      // -180..180
            let gamma = event.gamma;    // -90..90
            
            if (beta === null || gamma === null) return;
            
            // Преобразуем в радианы
            let yaw = (gamma || 0) * Math.PI / 180;   // поворот влево-вправо
            let pitch = (beta || 0) * Math.PI / 180;   // наклон вперед-назад
            
            // Ограничиваем pitch, чтобы не уходить за пределы
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
            
            targetRotationX = yaw;
            targetRotationY = pitch;
        }
        
        // Кнопка разрешения гироскопа (для iOS)
        const gyroBtn = document.getElementById('enable-gyro');
        const cameraBtn = document.getElementById('enable-camera');
        const statusDiv = document.getElementById('status');
        
        gyroBtn.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            orientationEnabled = true;
                            gyroBtn.style.display = 'none';
                            statusDiv.innerHTML = "🧭 Движение телефона активно | Теперь включите камеру";
                            cameraBtn.classList.remove('hidden');
                        } else {
                            alert("Не удалось получить доступ к движению телефона.");
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        alert("Ошибка запроса разрешения.");
                    });
            } else {
                // Android и другие
                window.addEventListener('deviceorientation', handleOrientation);
                orientationEnabled = true;
                gyroBtn.style.display = 'none';
                statusDiv.innerHTML = "🧭 Движение телефона активно | Теперь включите камеру";
                cameraBtn.classList.remove('hidden');
            }
        });
        
        // --- Видео фон (камера) ---
        let videoTexture = null;
        let videoElement = null;
        
        cameraBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } },
                    audio: false
                });
                videoElement = document.createElement('video');
                videoElement.srcObject = stream;
                videoElement.playsInline = true;
                videoElement.autoplay = true;
                videoElement.muted = true;
                await videoElement.play();
                
                videoTexture = new THREE.VideoTexture(videoElement);
                videoTexture.minFilter = THREE.LinearFilter;
                videoTexture.magFilter = THREE.LinearFilter;
                scene.background = videoTexture;
                
                cameraBtn.style.display = 'none';
                statusDiv.innerHTML = "📹 AR фон активен | Поворачивайте телефон, чтобы обойти шар";
            } catch (err) {
                console.warn("Камера не доступна:", err);
                statusDiv.innerHTML = "⚠️ Камера недоступна, но гироскоп работает";
                cameraBtn.style.display = 'none';
                // Добавим сетку и оси для ориентира
                const gridHelper = new THREE.GridHelper(4, 20, 0x88aaff, 0x335588);
                gridHelper.position.y = -0.6;
                scene.add(gridHelper);
                const axesHelper = new THREE.AxesHelper(2);
                axesHelper.material.transparent = true;
                axesHelper.material.opacity = 0.2;
                scene.add(axesHelper);
            }
        });
        
        // --- Анимация и обновление камеры ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            glowLight.intensity = 0.7 + Math.sin(time * 3) * 0.2;
            aura.scale.setScalar(1 + Math.sin(time * 4) * 0.02);
            particles.rotation.y = time * 0.15;
            particles.rotation.x = Math.sin(time * 0.4) * 0.1;
            
            if (videoTexture && videoElement && videoElement.readyState >= videoElement.HAVE_CURRENT_DATA) {
                videoTexture.needsUpdate = true;
            }
            
            updateCameraFromOrientation();
            renderer.render(scene, camera);
        }
        animate();
        
        // --- Обработка изменения размера окна ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Проверка поддержки DeviceOrientation
        if (!window.DeviceOrientationEvent) {
            statusDiv.innerHTML = "❌ Гироскоп не поддерживается браузером";
            gyroBtn.disabled = true;
            gyroBtn.style.opacity = '0.5';
        } else {
            console.log("DeviceOrientation доступен");
        }
        
        console.log("AR-подобное приложение запущено. Используйте гироскоп для обхода шара.");
    </script>
</body>
</html>
