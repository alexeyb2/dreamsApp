<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
  <meta name="telegram-webapp-theme-color" content="#f5f5f7">
  <link rel="apple-touch-icon" href="icon.png">
  <title>Редактор символов</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #f5f5f7;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 10px 12px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      z-index: 20;
      flex-shrink: 0;
    }
    .result-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f0f0f5;
      border-radius: 20px;
      padding: 6px 12px;
      gap: 8px;
      min-width: 0;
    }
    .result-label {
      font-size: 12px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
    }
    .result-string {
      flex: 1;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-buttons {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    button {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: #1d1d1f;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
      white-space: nowrap;
    }
    button:active { transform: scale(0.94); background: #f0f0f5; }
    button.primary { background: #007aff; color: #fff; border-color: transparent; }
    button.primary:active { background: #0066d6; }
    button.danger { background: #ff3b30; color: #fff; border-color: transparent; }

    .blocks-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 10px;
      overflow-y: auto;
      min-height: 0;
    }
    .block {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1 1 auto;
      min-height: 100px;
    }
    .block-header {
      display: flex;
      align-items: center;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .symbols-grid {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      justify-content: flex-start;
      padding: 4px;
      gap: 4px;
      overflow: hidden;
    }
    .symbol-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      cursor: grab;
      touch-action: none;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
      position: relative;
      width: var(--card-size);
      height: var(--card-size);
      font-size: var(--font-size);
    }
    .symbol-card:active { cursor: grabbing; }
    .symbol-card.dragging { opacity: 0.4; transform: scale(0.95); border-style: dashed; }
    .symbol-card .char {
      font-size: var(--emoji-size);
      line-height: 1;
      transition: font-size 0.2s;
    }
    .symbol-card .meta {
      display: none;
      text-align: center;
      width: 100%;
      font-size: calc(var(--font-size) * 0.65);
      color: #1d1d1f;
      line-height: 1.3;
      margin-top: 2px;
      word-break: break-word;
      overflow: hidden;
      white-space: pre-wrap;
    }
    .symbol-card .settings-info {
      display: none;
      margin-top: 2px;
      font-size: calc(var(--font-size) * 0.55);
      color: #555;
      background: #f9f9fb;
      border-radius: 6px;
      padding: 2px 4px;
      word-break: break-word;
      white-space: pre-wrap;
      max-width: 100%;
    }
    body.detailed-mode .symbol-card {
      height: auto !important;
      min-height: var(--card-size);
    }
    body.detailed-mode .symbol-card .meta {
      display: block;
    }
    body.detailed-mode .symbol-card .settings-info {
      display: block;
    }
    body.detailed-mode .symbols-grid {
      align-items: flex-start;
    }

    .remove-symbol {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ff3b30;
      color: #fff;
      border: none;
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transform: scale(0.8);
      transition: 0.2s;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .symbol-card:hover .remove-symbol {
      opacity: 1;
      transform: scale(1);
    }

    .drag-ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.9;
      transform: scale(1.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      border-radius: 12px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 2px solid #007aff;
    }
    .block.drop-target {
      border: 2px solid #007aff;
      box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: #fff;
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .modal h3 { font-size: 18px; font-weight: 700; }
    .modal textarea, .modal input {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 14px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      -webkit-user-select: text;
      user-select: text;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="result-box">
      <span class="result-label">Итог</span>
      <span class="result-string" id="resultString"></span>
    </div>
    <div class="header-buttons">
      <button id="copyBtn">📋</button>
      <button id="saveBtn">💾</button>
      <button id="toggleModeBtn">▤</button>
    </div>
  </header>
  <main id="blocksContainer" class="blocks-container"></main>
  <div style="padding:4px 10px 8px; display:flex; gap:6px; flex-shrink:0;">
    <button id="addBlockBtn" class="primary" style="flex:1;">+ Блок</button>
    <button id="addSymbolBtn" style="flex:1;">+ Символ</button>
    <button id="importBtn" style="flex:1;">📥 Импорт</button>
    <button id="exportBtn" style="flex:1;">📤 Экспорт</button>
    <button id="clearBtn" class="danger">🗑</button>
  </div>

  <div id="addModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>Новый символ</h3>
      <input id="newCharInput" placeholder="Символ (эмодзи)" maxlength="2">
      <input id="newTextInput" placeholder="Текст">
      <input id="newSettingsInput" placeholder="Settings JSON (необяз.)">
      <div class="modal-actions">
        <button id="cancelAddModalBtn">Отмена</button>
        <button id="saveAddModalBtn" class="primary">Добавить</button>
      </div>
    </div>
  </div>

  <div id="importModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>📥 Импорт</h3>
      <p style="font-size:13px;color:#86868b;">Каждая строка — блок. Символы: <code>символтекст</code> или <code>символтекст{"key":"val"}</code></p>
      <textarea id="importTextarea" placeholder="👁️Я ❤️люблю 🌀связь"></textarea>
      <div class="modal-actions">
        <button id="cancelImportModalBtn">Отмена</button>
        <button id="saveImportModalBtn" class="primary">Импортировать</button>
      </div>
    </div>
  </div>

  <div id="exportModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>📤 Экспорт</h3>
      <textarea id="exportTextarea" readonly></textarea>
      <div class="modal-actions">
        <button id="cancelExportModalBtn">Закрыть</button>
        <button id="copyExportBtn" class="primary">Копировать</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  // ---------- НОВЫЕ ДЕФОЛТНЫЕ ДАННЫЕ ----------
  // Каждый символ – отдельный объект с char, text и при необходимости settings.
  // Главный блок – полная первая фраза, разобранная на отдельные эмодзи+текст.
  const defaultLibrary = [
    { id: 'l1', char: '🔼', text: 'высшее' },
    { id: 'l2', char: '👁️', text: 'Я', settings: { point_geo: [0,0,0], point_screen: [0,0] } },
    { id: 'l3', char: '🌀', text: 'передача: «👁️Я 🌍внутри 🧿тебя 👁️Я ❤️люблю🧿тебя»' },
    { id: 'l4', char: '🌌', text: 'пространство' },
    { id: 'l5', char: '🛠️', text: 'создаёт' },
    { id: 'l6', char: '🎯', text: 'направление' },
    { id: 'l7', char: '🌊', text: 'течения' },
    { id: 'l8', char: '⚡️', text: 'энергии:' },
    { id: 'l9', char: '📍', text: 'старт,' },
    { id: 'l10', char: '🏁', text: 'финиш' },
    { id: 'l11', char: '⏳', text: 'время' },
    { id: 'l12', char: '🛠️', text: 'создаёт' },
    { id: 'l13', char: '🌪️', text: 'движение:' },
    { id: 'l14', char: '🚀', text: 'скорость' },
    { id: 'l15', char: '🔮', text: 'связующий' },
    { id: 'l16', char: '🛠️', text: 'создаёт' },
    { id: 'l17', char: '🔄', text: 'синхронизация' },
    { id: 'l18', char: '🔎', text: 'через' },
    { id: 'l19', char: '➕', text: 'добавление' },
    { id: 'l20', char: '❌', text: 'удаление' },
    { id: 'l21', char: '✅', text: 'подтверждение' },
    { id: 'l22', char: '🔺', text: 'поднимание' },
    { id: 'l23', char: '🔻', text: 'опускание' },
    { id: 'l24', char: '👍', text: 'нравится' },
    { id: 'l25', char: '👎', text: 'не нравится' },
    { id: 'l26', char: '♻️', text: 'трансформация' },
    { id: 'l27', char: '💠', text: 'усиление' },
    { id: 'l28', char: '🔅', text: 'ослабление' },
    { id: 'l29', char: '↕️', text: 'расширение' },
    { id: 'l30', char: '↔️', text: 'сжатие' },
    { id: 'l31', char: '🟡', text: 'чувств' },
    { id: 'l32', char: '🔗', text: 'и' },
    { id: 'l33', char: '🔳', text: 'мыслей' },
    { id: 'l34', char: '🔗', text: 'и' },
    { id: 'l35', char: '🟢', text: 'чувств' },
    { id: 'l36', char: '🌊', text: 'течение' },
    { id: 'l37', char: '🌳', text: 'рост' },
    { id: 'l38', char: '🔥', text: 'горение' },
    { id: 'l39', char: '🪨', text: 'опора' },
    { id: 'l40', char: '🎈', text: 'взлёт' }
  ];

  // Дополнительные блоки (строки из второй части сообщения)
  const defaultExtraBlocks = [
    // Блок 1: 🔼высшее 👁️Я 🌀передача: «👁️Я 🌍внутри
    [
      { id: 'b1s1', char: '🔼', text: 'высшее' },
      { id: 'b1s2', char: '👁️', text: 'Я', settings: { point_geo: [0,0,0], point_screen: [0,0] } },
      { id: 'b1s3', char: '🌀', text: 'передача: «👁️Я 🌍внутри' }
    ],
    // Блок 2: 👁️point=[0,0,0]  (с settings)
    [
      { id: 'b2s1', char: '👁️', text: 'point=[0,0,0]', settings: { point_geo: [0,0,0], point_screen: [0,0] } }
    ],
    // Блок 3: 🧿тебя 👁️Я ❤️люблю🧿тебя».
    [
      { id: 'b3s1', char: '🧿', text: 'тебя' },
      { id: 'b3s2', char: '👁️', text: 'Я' },
      { id: 'b3s3', char: '❤️', text: 'люблю🧿тебя»' }
    ],
    // Блок 4: 🌌пространство 🛠️создаёт 🏁финиш 🎯направление 🌊течения ⚡️энергии: 📍старт,
    [
      { id: 'b4s1', char: '🌌', text: 'пространство' },
      { id: 'b4s2', char: '🛠️', text: 'создаёт' },
      { id: 'b4s3', char: '🏁', text: 'финиш' },
      { id: 'b4s4', char: '🎯', text: 'направление' },
      { id: 'b4s5', char: '🌊', text: 'течения' },
      { id: 'b4s6', char: '⚡️', text: 'энергии:' },
      { id: 'b4s7', char: '📍', text: 'старт,' }
    ],
    // Блок 5: ⏳время 🛠️создаёт 🌪️движение: 🚀скорость
    [
      { id: 'b5s1', char: '⏳', text: 'время' },
      { id: 'b5s2', char: '🛠️', text: 'создаёт' },
      { id: 'b5s3', char: '🌪️', text: 'движение:' },
      { id: 'b5s4', char: '🚀', text: 'скорость' }
    ],
    // Блок 6: 🔮связующий 🛠️создаёт 🔄синхронизация 🔎через ➕добавление
    [
      { id: 'b6s1', char: '🔮', text: 'связующий' },
      { id: 'b6s2', char: '🛠️', text: 'создаёт' },
      { id: 'b6s3', char: '🔄', text: 'синхронизация' },
      { id: 'b6s4', char: '🔎', text: 'через' },
      { id: 'b6s5', char: '➕', text: 'добавление' }
    ],
    // Блок 7: ✅подтверждение 🔺поднимание ... 🎈взлёт
    [
      { id: 'b7s1', char: '✅', text: 'подтверждение' },
      { id: 'b7s2', char: '🔺', text: 'поднимание' },
      { id: 'b7s3', char: '🔻', text: 'опускание' },
      { id: 'b7s4', char: '👍', text: 'нравится' },
      { id: 'b7s5', char: '👎', text: 'не нравится' },
      { id: 'b7s6', char: '♻️', text: 'трансформация' },
      { id: 'b7s7', char: '💠', text: 'усиление' },
      { id: 'b7s8', char: '🔅', text: 'ослабление' },
      { id: 'b7s9', char: '↕️', text: 'расширение' },
      { id: 'b7s10', char: '↔️', text: 'сжатие' },
      { id: 'b7s11', char: '🟡', text: 'чувств' },
      { id: 'b7s12', char: '🔗', text: 'и' },
      { id: 'b7s13', char: '🔳', text: 'мыслей' },
      { id: 'b7s14', char: '🔗', text: 'и' },
      { id: 'b7s15', char: '🟢', text: 'чувств' },
      { id: 'b7s16', char: '🌊', text: 'течение' },
      { id: 'b7s17', char: '🌳', text: 'рост' },
      { id: 'b7s18', char: '🔥', text: 'горение' },
      { id: 'b7s19', char: '🪨', text: 'опора' },
      { id: 'b7s20', char: '🎈', text: 'взлёт' }
    ]
  ];

  let library = JSON.parse(localStorage.getItem('seq_library')) || defaultLibrary.map(s => ({...s}));
  let additionalBlocks = JSON.parse(localStorage.getItem('seq_blocks')) || defaultExtraBlocks.map(block => block.map(s => ({...s})));
  let detailedMode = false;
  let dragState = null;

  const $ = id => document.getElementById(id);
  const blocksContainer = $('blocksContainer');
  const resultString = $('resultString');
  const toggleModeBtn = $('toggleModeBtn');

  function saveState() {
    try {
      localStorage.setItem('seq_library', JSON.stringify(library));
      localStorage.setItem('seq_blocks', JSON.stringify(additionalBlocks));
    } catch(e) {}
  }

  function renderAll() {
    blocksContainer.innerHTML = '';
    blocksContainer.appendChild(createBlock('main', 'Главный блок', library, null));
    additionalBlocks.forEach((block, idx) => {
      blocksContainer.appendChild(createBlock('block', 'Блок ' + (idx+1), block, idx));
    });
    updateResult();
    requestAnimationFrame(computeAllCardSizes);
  }

  function createBlock(type, title, symbols, blockIndex) {
    const wrapper = document.createElement('div');
    wrapper.className = 'block';
    wrapper.dataset.type = type;
    if (blockIndex !== null) wrapper.dataset.blockIndex = blockIndex;
    wrapper.innerHTML = `<div class="block-header">${title}</div><div class="symbols-grid"></div>`;
    const grid = wrapper.querySelector('.symbols-grid');
    symbols.forEach((sym, idx) => grid.appendChild(createCard(sym, idx, blockIndex)));
    return wrapper;
  }

  function createCard(sym, idx, blockIndex) {
    const card = document.createElement('div');
    card.className = 'symbol-card';
    card.dataset.symbolIndex = idx;
    const settingsStr = sym.settings ? JSON.stringify(sym.settings) : '';
    card.innerHTML = `<span class="char">${sym.char}</span>
                      <span class="meta">${sym.text||''}</span>
                      <span class="settings-info">${settingsStr ? '⚙️ ' + settingsStr : ''}</span>`;
    if (blockIndex !== null) {
      const del = document.createElement('button');
      del.className = 'remove-symbol';
      del.textContent = '×';
      del.addEventListener('pointerdown', e => {
        e.stopPropagation();
        e.preventDefault();
        additionalBlocks[blockIndex].splice(idx, 1);
        saveState();
        renderAll();
      });
      card.appendChild(del);
    }
    card.addEventListener('pointerdown', onPointerDown);
    return card;
  }

  function updateResult() {
    let str = library.map(s => s.char).join('');
    additionalBlocks.forEach(b => str += b.map(s => s.char).join(''));
    resultString.textContent = str || '(пусто)';
  }

  function computeAllCardSizes() {
    document.querySelectorAll('.symbols-grid').forEach(grid => {
      const cards = grid.querySelectorAll('.symbol-card');
      const n = cards.length;
      if (!n) return;
      const style = getComputedStyle(grid);
      const gap = parseFloat(style.gap) || 4;
      const pad = parseFloat(style.paddingTop) || 4;
      const w = grid.clientWidth - pad * 2;
      const h = grid.clientHeight - pad * 2;
      if (w <= 0 || h <= 0) return;
      let bestSize = 20;
      const max = Math.min(w, h);
      for (let s = max; s >= 20; s--) {
        const cols = Math.floor((w + gap) / (s + gap));
        if (cols <= 0) continue;
        const rows = Math.ceil(n / cols);
        const totalHeight = rows * (s + gap) - gap;
        if (totalHeight <= h) {
          bestSize = s;
          break;
        }
      }
      grid.style.setProperty('--card-size', bestSize + 'px');
      grid.style.setProperty('--font-size', Math.max(8, bestSize * 0.22) + 'px');
      grid.style.setProperty('--emoji-size', Math.max(10, bestSize * 0.55) + 'px');
    });
  }

  window.addEventListener('resize', () => requestAnimationFrame(computeAllCardSizes));
  new ResizeObserver(() => computeAllCardSizes()).observe(blocksContainer);

  function onPointerDown(e) {
    if (dragState || (e.button && e.button !== 0)) return;
    const card = e.currentTarget;
    const grid = card.parentElement;
    const block = grid.closest('.block');
    const type = block.dataset.type;
    const blockIndex = type === 'block' ? +block.dataset.blockIndex : null;
    const symbolIndex = +card.dataset.symbolIndex;
    const arr = type === 'main' ? library : additionalBlocks[blockIndex];
    const sym = arr[symbolIndex];

    e.preventDefault();
    card.setPointerCapture(e.pointerId);
    card.classList.add('dragging');
    const rect = card.getBoundingClientRect();
    const ghost = document.createElement('div');
    ghost.className = 'drag-ghost';
    ghost.textContent = sym.char;
    ghost.style.width = rect.width + 'px';
    ghost.style.height = rect.height + 'px';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    document.body.appendChild(ghost);

    dragState = {
      type, blockIndex, symbolIndex, sym, ghost,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      pointerId: e.pointerId,
      sourceCard: card
    };
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
  }

  function onPointerMove(e) {
    if (!dragState || e.pointerId !== dragState.pointerId) return;
    dragState.ghost.style.left = (e.clientX - dragState.offsetX) + 'px';
    dragState.ghost.style.top = (e.clientY - dragState.offsetY) + 'px';
    clearHighlights();
    const el = getElementUnderPoint(e.clientX, e.clientY);
    if (el) {
      const block = el.closest('.block');
      if (block) block.classList.add('drop-target');
    }
  }

  function onPointerUp(e) {
    if (!dragState || e.pointerId !== dragState.pointerId) return;
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
    dragState.ghost.remove();
    dragState.sourceCard.classList.remove('dragging');
    clearHighlights();

    const targetEl = getElementUnderPoint(e.clientX, e.clientY);
    const targetBlock = targetEl?.closest('.block');
    if (!targetBlock) { dragState = null; return; }

    const targetType = targetBlock.dataset.type;
    const targetBlockIndex = targetType === 'block' ? +targetBlock.dataset.blockIndex : null;
    const targetCards = [...targetBlock.querySelectorAll('.symbol-card')];
    let insertIndex = targetCards.length;
    if (targetCards.length) {
      let bestDist = Infinity;
      for (let i = 0; i < targetCards.length; i++) {
        const r = targetCards[i].getBoundingClientRect();
        const mid = r.left + r.width / 2;
        const dist = Math.abs(e.clientX - mid);
        if (dist < bestDist) { bestDist = dist; insertIndex = e.clientX < mid ? i : i + 1; }
      }
    }

    if (dragState.type === 'main') {
      if (targetType === 'block' && targetBlockIndex !== null) {
        const moved = {...dragState.sym};
        library.splice(dragState.symbolIndex, 1);
        additionalBlocks[targetBlockIndex].splice(insertIndex, 0, moved);
      }
    } else {
      const srcIdx = dragState.blockIndex;
      if (targetType === 'block' && targetBlockIndex !== null) {
        if (srcIdx === targetBlockIndex) {
          const arr = additionalBlocks[srcIdx];
          const [moved] = arr.splice(dragState.symbolIndex, 1);
          arr.splice(insertIndex > dragState.symbolIndex ? insertIndex - 1 : insertIndex, 0, moved);
        } else {
          const moved = additionalBlocks[srcIdx].splice(dragState.symbolIndex, 1)[0];
          additionalBlocks[targetBlockIndex].splice(insertIndex, 0, moved);
        }
      } else if (targetType === 'main') {
        const moved = additionalBlocks[srcIdx].splice(dragState.symbolIndex, 1)[0];
        library.push(moved);
      }
    }
    saveState();
    renderAll();
    dragState = null;
  }

  function getElementUnderPoint(x, y) {
    if (dragState?.ghost) dragState.ghost.style.display = 'none';
    const el = document.elementFromPoint(x, y);
    if (dragState?.ghost) dragState.ghost.style.display = '';
    return el;
  }
  function clearHighlights() {
    document.querySelectorAll('.drop-target').forEach(b => b.classList.remove('drop-target'));
  }

  function parseToken(token) {
    const match = token.match(/^(\P{L}\P{N}?)(.*)$/u);
    if (!match) return null;
    const char = match[1];
    let rest = match[2] || '';
    let settings = null;
    const jsonMatch = rest.match(/^(.*?)(\{.*\})$/);
    if (jsonMatch) {
      rest = jsonMatch[1] || '';
      try { settings = JSON.parse(jsonMatch[2]); } catch (e) {}
    }
    return { id: Date.now().toString(36) + Math.random(), char, text: rest.trim(), settings };
  }

  function importData(text) {
    const lines = text.trim().split(/\n/).filter(l => l.trim());
    if (!lines.length) return alert('Пустой ввод');
    const mainTokens = lines[0].trim().split(/\s+/);
    const newLib = mainTokens.map(parseToken).filter(Boolean);
    if (newLib.length) library.push(...newLib);
    for (let i = 1; i < lines.length; i++) {
      const tokens = lines[i].trim().split(/\s+/);
      const blockSymbols = tokens.map(parseToken).filter(Boolean);
      if (blockSymbols.length) additionalBlocks.push(blockSymbols);
    }
    saveState();
    renderAll();
    importModalOverlay.classList.add('hidden');
    importTextarea.value = '';
    alert('Импортировано');
  }

  function exportData() {
    const serializeSymbol = s => {
      let out = s.char + (s.text || '');
      if (s.settings && Object.keys(s.settings).length) {
        out += JSON.stringify(s.settings);
      }
      return out;
    };
    const lines = [];
    lines.push(library.map(serializeSymbol).join(' '));
    additionalBlocks.forEach(b => lines.push(b.map(serializeSymbol).join(' ')));
    return lines.join('\n');
  }

  $('addBlockBtn').addEventListener('click', () => {
    additionalBlocks.push([]);
    saveState();
    renderAll();
  });
  $('addSymbolBtn').addEventListener('click', () => {
    $('addModalOverlay').classList.remove('hidden');
    $('newCharInput').focus();
  });
  $('importBtn').addEventListener('click', () => {
    $('importModalOverlay').classList.remove('hidden');
    $('importTextarea').focus();
  });
  $('exportBtn').addEventListener('click', () => {
    $('exportTextarea').value = exportData();
    $('exportModalOverlay').classList.remove('hidden');
  });
  toggleModeBtn.addEventListener('click', () => {
    detailedMode = !detailedMode;
    document.body.classList.toggle('detailed-mode', detailedMode);
    toggleModeBtn.textContent = detailedMode ? '▣' : '▤';
    requestAnimationFrame(computeAllCardSizes);
  });
  $('clearBtn').addEventListener('click', () => {
    if (confirm('Очистить всё?')) { library = []; additionalBlocks = []; saveState(); renderAll(); }
  });
  $('copyBtn').addEventListener('click', () => {
    const str = resultString.textContent;
    if (str && str !== '(пусто)') navigator.clipboard?.writeText(str);
  });
  $('saveBtn').addEventListener('click', () => { saveState(); alert('Сохранено'); });

  $('cancelAddModalBtn').addEventListener('click', () => $('addModalOverlay').classList.add('hidden'));
  $('saveAddModalBtn').addEventListener('click', () => {
    const ch = $('newCharInput').value.trim();
    if (!ch) return;
    let settings = null;
    const rawSettings = $('newSettingsInput').value.trim();
    if (rawSettings) {
      try { settings = JSON.parse(rawSettings); } catch (e) { alert('Неверный JSON для settings'); return; }
    }
    library.push({
      id: Date.now().toString(),
      char: ch.substring(0,2),
      text: $('newTextInput').value.trim(),
      settings
    });
    $('newCharInput').value = $('newTextInput').value = $('newSettingsInput').value = '';
    $('addModalOverlay').classList.add('hidden');
    saveState();
    renderAll();
  });
  $('cancelImportModalBtn').addEventListener('click', () => $('importModalOverlay').classList.add('hidden'));
  $('saveImportModalBtn').addEventListener('click', () => importData($('importTextarea').value));
  $('cancelExportModalBtn').addEventListener('click', () => $('exportModalOverlay').classList.add('hidden'));
  $('copyExportBtn').addEventListener('click', () => {
    const text = $('exportTextarea').value;
    if (text) navigator.clipboard?.writeText(text).then(() => alert('Скопировано'));
  });

  document.body.classList.toggle('detailed-mode', detailedMode);
  renderAll();
  window.addEventListener('resize', () => requestAnimationFrame(computeAllCardSizes));
})();
</script>
</body>
</html>
