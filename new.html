<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Жёлтый шар - луч к пальцу (WebXR)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(5px);
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            font-weight: 500;
        }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffcc00;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .instruction {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #ffdd88;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            font-weight: bold;
        }
        #enter-ar {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffaa33;
            color: #1e2a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            font-family: inherit;
            transition: transform 0.1s ease;
        }
        #enter-ar:active {
            transform: scale(0.97);
        }
        @media (max-width: 600px) {
            #enter-ar { font-size: 16px; padding: 10px 20px; bottom: 70px; }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="info">
        🔆 Жёлтый шар в 1 метре перед вами | Нажмите на экран → луч от шара к пальцу
    </div>
    <div id="status">
        🧩 Ожидание запуска AR
    </div>
    <div class="instruction">
        👆 Нажми и держи → жёлтый луч | Веди пальцем → луч следует | Отпусти → луч исчезает
    </div>
    <button id="enter-ar">🌟 Войти в AR (поставьте шар в мире)</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

        // --- Инициализация сцены, камеры, рендерера ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510); // временный фон, будет заменён AR-камерой

        // Камера будет управляться WebXR
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true;          // Включаем поддержку WebXR
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(2, 3, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.5);
        fillLight.position.set(1, 1, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x6688ff, 0.4);
        backLight.position.set(-1, 1, -2);
        scene.add(backLight);
        
        // --- Жёлтый шар (закреплён в мире на расстоянии 1 метр от начальной точки камеры) ---
        // В WebXR начало координат (0,0,0) — это место, где была запущена AR-сессия.
        // Размещаем шар на расстоянии 1 метра по оси Z (перед пользователем).
        const sphereGeometry = new THREE.SphereGeometry(0.12, 64, 64);
        const sphereMaterial = new THREE.MeshStandardMaterial({
            color: 0xffcc33,
            emissive: 0x442200,
            emissiveIntensity: 0.3,
            metalness: 0.7,
            roughness: 0.3
        });
        const yellowBall = new THREE.Mesh(sphereGeometry, sphereMaterial);
        yellowBall.position.set(0, 0, -1);   // -1 по Z значит в 1 метре перед камерой (ось Z направлена назад в Three.js)
        yellowBall.castShadow = true;
        scene.add(yellowBall);
        
        // Свечение шара
        const glowLight = new THREE.PointLight(0xffaa44, 0.8, 2.5);
        glowLight.position.set(0, 0, -1);
        scene.add(glowLight);
        
        // Аура
        const auraGeo = new THREE.SphereGeometry(0.145, 32, 32);
        const auraMat = new THREE.MeshBasicMaterial({
            color: 0xffaa55,
            transparent: true,
            opacity: 0.2,
            side: THREE.BackSide
        });
        const aura = new THREE.Mesh(auraGeo, auraMat);
        aura.position.set(0, 0, -1);
        scene.add(aura);
        
        // Декоративные частицы вокруг шара (для красоты)
        const particleCount = 300;
        const particlesGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radius = 0.2 + Math.random() * 0.4;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            positions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i*3+2] = radius * Math.cos(phi) - 1; // смещение к шару
        }
        particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0xffaa55,
            size: 0.008,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particlesGeo, particleMat);
        scene.add(particles);
        
        // --- Луч (цилиндр) ---
        let currentBeam = null;
        let isDragging = false;
        
        function createCylBetween(p1, p2, radius = 0.022, color = 0xffaa44) {
            const start = new THREE.Vector3(p1.x, p1.y, p1.z);
            const end = new THREE.Vector3(p2.x, p2.y, p2.z);
            const direction = new THREE.Vector3().subVectors(end, start);
            const length = direction.length();
            if (length < 0.005) return null;
            
            const geometry = new THREE.CylinderGeometry(radius, radius, length, 12);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: 0xaa4400,
                emissiveIntensity: 0.5,
                metalness: 0.2,
                roughness: 0.3
            });
            const cylinder = new THREE.Mesh(geometry, material);
            const center = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
            cylinder.position.copy(center);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), direction.clone().normalize());
            return cylinder;
        }
        
        function updateBeam(p1, p2) {
            if (currentBeam) {
                scene.remove(currentBeam);
                if (currentBeam.geometry) currentBeam.geometry.dispose();
                if (currentBeam.material) currentBeam.material.dispose();
                currentBeam = null;
            }
            if (p1 && p2 && p1.distanceTo(p2) > 0.01) {
                const newBeam = createCylBetween(p1, p2, 0.022, 0xffcc55);
                if (newBeam) {
                    currentBeam = newBeam;
                    scene.add(currentBeam);
                }
            }
        }
        
        function removeBeam() {
            if (currentBeam) {
                scene.remove(currentBeam);
                if (currentBeam.geometry) currentBeam.geometry.dispose();
                if (currentBeam.material) currentBeam.material.dispose();
                currentBeam = null;
            }
        }
        
        // --- Получение точки в пространстве по касанию (Raycaster из камеры в мир) ---
        // Для AR-сессии камера динамична, точка будет в мировой системе.
        function getWorldPointFromTouch(clientX, clientY, distanceFromCamera = 2.5) {
            // Получаем размеры canvas и нормализованные координаты
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
            // Вычисляем точку на расстоянии distanceFromCamera от камеры вдоль луча
            const point = raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(distanceFromCamera));
            return point;
        }
        
        // --- Обработчики ввода (с учётом AR-сессии) ---
        function onPointerStart(event) {
            if (!renderer.xr.isPresenting) return; // AR не активна
            event.preventDefault();
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            const touchPoint = getWorldPointFromTouch(clientX, clientY, 2.2);
            if (touchPoint) {
                isDragging = true;
                updateBeam(yellowBall.position, touchPoint);
            }
        }
        
        function onPointerMove(event) {
            if (!isDragging || !renderer.xr.isPresenting) return;
            event.preventDefault();
            let clientX, clientY;
            if (event.touches) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            } else {
                clientX = event.clientX;
                clientY = event.clientY;
            }
            const touchPoint = getWorldPointFromTouch(clientX, clientY, 2.2);
            if (touchPoint) {
                updateBeam(yellowBall.position, touchPoint);
            } else {
                removeBeam();
            }
        }
        
        function onPointerEnd(event) {
            if (!renderer.xr.isPresenting) return;
            event.preventDefault();
            isDragging = false;
            removeBeam();
        }
        
        // Добавляем слушатели, они будут активны всегда, но проверяют isPresenting
        const canvasEl = renderer.domElement;
        canvasEl.addEventListener('touchstart', onPointerStart, { passive: false });
        canvasEl.addEventListener('touchmove', onPointerMove, { passive: false });
        canvasEl.addEventListener('touchend', onPointerEnd);
        canvasEl.addEventListener('touchcancel', onPointerEnd);
        
        canvasEl.addEventListener('mousedown', onPointerStart);
        window.addEventListener('mousemove', (e) => {
            if (isDragging && renderer.xr.isPresenting) onPointerMove(e);
        });
        window.addEventListener('mouseup', onPointerEnd);
        canvasEl.addEventListener('contextmenu', (e) => e.preventDefault());
        
        // --- Анимация частиц и свечения ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            glowLight.intensity = 0.7 + Math.sin(time * 3) * 0.2;
            aura.scale.setScalar(1 + Math.sin(time * 4) * 0.02);
            particles.rotation.y = time * 0.15;
            particles.rotation.x = Math.sin(time * 0.4) * 0.1;
            
            renderer.render(scene, camera);
        }
        animate();
        
        // --- Интеграция ARButton (WebXR) ---
        const arButton = ARButton.createButton(renderer, {
            requiredFeatures: ['hit-test'], // запрашиваем возможность hit-test (но необязательно для простого шара)
            optionalFeatures: ['dom-overlay'],
            domOverlay: { root: document.body }
        });
        // Стилизуем кнопку и заменяем нашу
        const customBtn = document.getElementById('enter-ar');
        customBtn.addEventListener('click', () => {
            // Эмулируем нажатие на кнопку ARButton
            arButton.click();
            // После входа в AR можно скрыть кнопку
            customBtn.style.display = 'none';
            document.getElementById('status').innerHTML = "🌟 AR активен | Шар зафиксирован в мире";
        });
        
        // Слушаем события начала/окончания AR-сессии для обновления интерфейса
        renderer.xr.addEventListener('sessionstart', () => {
            console.log('AR session started');
            document.getElementById('status').innerHTML = "🌟 AR активен | Шар в 1 метре";
            customBtn.style.display = 'none';
            // Сбрасываем луч при старте
            removeBeam();
            isDragging = false;
        });
        
        renderer.xr.addEventListener('sessionend', () => {
            console.log('AR session ended');
            document.getElementById('status').innerHTML = "⏸ AR завершён | Нажмите 'Войти в AR'";
            customBtn.style.display = 'block';
            removeBeam();
            isDragging = false;
        });
        
        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Сообщаем пользователю о необходимости HTTPS и поддержки
        if (!navigator.xr) {
            document.getElementById('status').innerHTML = "❌ WebXR не поддерживается браузером";
            customBtn.disabled = true;
            customBtn.style.opacity = '0.5';
        } else {
            console.log("WebXR доступен");
        }
        
        // Небольшая подсказка в консоль
        console.log('AR приложение запущено. Нажмите "Войти в AR" для размещения жёлтого шара в реальном мире.');
    </script>
</body>
</html>
