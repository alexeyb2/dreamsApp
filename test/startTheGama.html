<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🟣🦅 Перетягивание каната 3D</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814;
            color: #e0d6ff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            touch-action: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: #100d1e;
            touch-action: none;
        }

        #canvas-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-panel {
            background: #161127;
            padding: 16px 20px;
            border-radius: 32px 32px 0 0;
            max-height: 55vh;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 -8px 30px rgba(0,0,0,0.8);
            touch-action: pan-y;
        }

        .row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; }
        .col { flex: 1; min-width: 120px; }
        .col label { display: block; font-size: 12px; opacity: 0.6; margin-bottom: 2px; }
        .col .flex { display: flex; gap: 6px; }

        input[type="text"] {
            width: 100%; padding: 8px 10px; font-size: 15px;
            background: #221b38; border: 1px solid #3a2f5a; border-radius: 12px;
            color: #f0eaff; outline: none;
        }
        input.small { width: 60px; flex-shrink: 0; }
        input[type="color"] {
            width: 40px; height: 40px; border: none; border-radius: 8px;
            background: transparent; cursor: pointer; padding: 0;
        }

        .info-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 12px; background: #100d1e; border-radius: 16px;
            margin-bottom: 10px; font-size: 14px;
        }
        .info-bar .left { color: #8f78e6; }
        .info-bar .right { color: #e6788f; }
        .info-bar .center { color: #b8a6ff; font-weight: 600; }

        .catalog-section { margin-top: 10px; background: #100d1e; border-radius: 16px; padding: 10px; }
        .catalog-section h4 { font-size: 14px; margin-bottom: 6px; color: #b8a6ff; }
        .catalog-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .catalog-row input { flex: 1; }
        .catalog-list { max-height: 100px; overflow-y: auto; }
        .catalog-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 4px 8px; background: #1a1330; border-radius: 10px; margin-bottom: 4px;
        }
        .catalog-item .name { flex: 1; font-size: 13px; }
        .catalog-item button {
            background: #2a2348; border: none; color: #b8a6ff;
            padding: 2px 10px; border-radius: 10px; font-size: 12px; cursor: pointer;
        }
        .catalog-item button.load { background: #6f52c4; color: #fff; }
        .catalog-item button.del { background: #5a2a2a; color: #ff8a8a; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 28px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            color: #fff; transition: 0.2s;
        }
        .btn-primary { background: #6f52c4; }
        .btn-primary:active { transform: scale(0.95); background: #5d43a8; }
        .btn-secondary { background: #2a2348; }
        .btn-secondary:active { background: #1f1937; }
        .btn-danger { background: #a03a3a; }
        .btn-danger:active { background: #7a2b2b; }

        #active-indicator {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(22,17,39,0.8); padding: 4px 14px; border-radius: 20px;
            font-size: 14px; color: #b8a6ff; pointer-events: none; white-space: nowrap;
        }

        @media (max-width: 600px) {
            #ui-panel { padding: 12px; }
            .col { min-width: 80px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div id="active-indicator">👆 Коснись эмодзи, чтобы выбрать</div>
    </div>

    <div id="ui-panel">
        <!-- Информация о силах -->
        <div class="info-bar">
            <span class="left" id="left-info">😌 Спокойствие 50%</span>
            <span class="center" id="center-info">⚖️</span>
            <span class="right" id="right-info">😢 Печаль 50%</span>
        </div>

        <!-- Редактирование -->
        <div class="row">
            <div class="col">
                <label>Чувство (слева)</label>
                <div class="flex">
                    <input type="text" id="edit-emoji1" class="small" placeholder="😌" />
                    <input type="text" id="edit-label1" placeholder="имя" />
                    <input type="color" id="color1" value="#8f78e6" />
                </div>
            </div>
            <div class="col">
                <label>Противоположность (справа)</label>
                <div class="flex">
                    <input type="text" id="edit-emoji2" class="small" placeholder="😢" />
                    <input type="text" id="edit-label2" placeholder="имя" />
                    <input type="color" id="color2" value="#e6788f" />
                </div>
            </div>
        </div>

        <!-- Каталог -->
        <div class="catalog-section">
            <h4>📂 Каталог балансов</h4>
            <div class="catalog-row">
                <input type="text" id="catalog-name" placeholder="Название пресета" />
                <button class="btn btn-primary" id="save-catalog-btn" style="flex:0.4; padding: 8px;">Сохранить</button>
            </div>
            <div class="catalog-list" id="catalog-list"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" id="reset-positions">🔄 Сброс в центр</button>
            <button class="btn btn-danger" id="reset-all">❌ Сбросить всё</button>
        </div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ============= DOM =============
    const container = document.getElementById('canvas-container');
    const activeIndicator = document.getElementById('active-indicator');
    const leftInfo = document.getElementById('left-info');
    const rightInfo = document.getElementById('right-info');
    const centerInfo = document.getElementById('center-info');
    const editEmoji1 = document.getElementById('edit-emoji1');
    const editLabel1 = document.getElementById('edit-label1');
    const color1 = document.getElementById('color1');
    const editEmoji2 = document.getElementById('edit-emoji2');
    const editLabel2 = document.getElementById('edit-label2');
    const color2 = document.getElementById('color2');
    const resetPosBtn = document.getElementById('reset-positions');
    const resetAllBtn = document.getElementById('reset-all');
    const catalogName = document.getElementById('catalog-name');
    const saveCatalogBtn = document.getElementById('save-catalog-btn');
    const catalogList = document.getElementById('catalog-list');

    // ============= Three.js =============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x100d1e);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(5, 6, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(container.clientWidth, container.clientHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 3;
    controls.maxDistance = 15;

    // Освещение
    scene.add(new THREE.AmbientLight(0x404060));
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x4466ff, 0.5);
    backLight.position.set(-5, 0, -5);
    scene.add(backLight);

    // Пол
    const gridHelper = new THREE.GridHelper(10, 10, 0x6f52c4, 0x3a2f5a);
    gridHelper.position.y = -0.01;
    scene.add(gridHelper);
    const floorMat = new THREE.ShadowMaterial({ opacity: 0.3, color: 0x000000 });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    floor.receiveShadow = true;
    scene.add(floor);

    // Звёзды
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = new Float32Array(3000);
    for (let i = 0; i < 3000; i++) starsPos[i] = (Math.random() - 0.5) * 200;
    starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
    scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0x8f78e6, size: 0.15, transparent: true })));

    // ============= Центр =============
    const centerSphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.5 })
    );
    centerSphere.position.set(0, 0, 0);
    scene.add(centerSphere);

    // Добавим свечение вокруг центра
    const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.4, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 })
    );
    glow.position.set(0, 0, 0);
    scene.add(glow);

    // ============= Логика эмодзи =============
    function createEmojiGroup(emoji, label, color) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(128, 128, 20, 128, 128, 120);
        grad.addColorStop(0, hexToRgba(color, 0.4));
        grad.addColorStop(1, hexToRgba(color, 0));
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(128, 128, 120, 0, Math.PI * 2); ctx.fill();
        ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 128, 128);
        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false }));
        sprite.scale.set(1.5, 1.5, 1);

        const labelDiv = document.createElement('div');
        labelDiv.textContent = label;
        labelDiv.style.cssText = `color:${color}; font-size:16px; font-weight:500; text-shadow:0 2px 10px rgba(0,0,0,0.8); background:rgba(22,17,39,0.7); padding:2px 12px; border-radius:12px; border:1px solid ${color}; backdrop-filter:blur(4px); pointer-events:none;`;
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(0, -1.2, 0);

        const group = new THREE.Group();
        group.add(sprite);
        group.add(labelObj);
        group.userData = { sprite, labelDiv, labelObj };
        return group;
    }

    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    // ============= МОДЕЛЬ =============
    const MAX_DIST = 4.0; // максимальное расстояние от центра, где сила = 1

    let state = {
        1: { emoji: '😌', label: 'Спокойствие', x: -2.0, z: 0, color: '#8f78e6' },
        2: { emoji: '😢', label: 'Печаль', x: 2.0, z: 0, color: '#e6788f' }
    };

    // Вычисление силы (0..1) на основе расстояния до центра
    function calcForce(x, z) {
        const dist = Math.sqrt(x*x + z*z);
        return Math.min(1, dist / MAX_DIST);
    }

    // Сохранение в localStorage
    function saveToLocal() {
        const data = {
            s1: state[1], s2: state[2],
            catalog: loadCatalog()
        };
        localStorage.setItem('tug_of_war', JSON.stringify(data));
    }

    function loadFromLocal() {
        const raw = localStorage.getItem('tug_of_war');
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            if (data.s1) Object.assign(state[1], data.s1);
            if (data.s2) Object.assign(state[2], data.s2);
        } catch (e) {}
    }

    function getSnapshot() {
        return JSON.parse(JSON.stringify(state));
    }

    function applySnapshot(snap) {
        Object.assign(state, snap);
        updateScene();
        updateUI();
        saveToLocal();
    }

    // ============= КАТАЛОГ =============
    function loadCatalog() {
        const raw = localStorage.getItem('tug_catalog');
        if (!raw) return [];
        try { return JSON.parse(raw); } catch { return []; }
    }

    function saveCatalog(catalog) {
        localStorage.setItem('tug_catalog', JSON.stringify(catalog));
    }

    function renderCatalog() {
        const catalog = loadCatalog();
        catalogList.innerHTML = '';
        catalog.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'catalog-item';
            div.innerHTML = `
                <span class="name">${item.name}</span>
                <div style="display:flex; gap:4px;">
                    <button class="load" data-idx="${idx}">Загрузить</button>
                    <button class="del" data-idx="${idx}">Удалить</button>
                </div>
            `;
            catalogList.appendChild(div);
        });
        catalogList.querySelectorAll('.load').forEach(b => b.addEventListener('click', (e) => {
            const idx = parseInt(e.target.dataset.idx);
            const catalog = loadCatalog();
            if (catalog[idx]) {
                applySnapshot(catalog[idx].snapshot);
                // Обновим интерфейс
                updateUI();
                updateScene();
                saveToLocal();
                // Обновим каталог в хранилище (но он уже сохранён)
            }
        }));
        catalogList.querySelectorAll('.del').forEach(b => b.addEventListener('click', (e) => {
            const idx = parseInt(e.target.dataset.idx);
            const catalog = loadCatalog();
            catalog.splice(idx, 1);
            saveCatalog(catalog);
            renderCatalog();
        }));
    }

    saveCatalogBtn.addEventListener('click', () => {
        const name = catalogName.value.trim();
        if (!name) { alert('Введите название'); return; }
        const catalog = loadCatalog();
        catalog.push({ name, snapshot: getSnapshot() });
        saveCatalog(catalog);
        renderCatalog();
        catalogName.value = '';
    });

    // ============= СЦЕНА И UI =============
    let group1, group2;
    let line1, line2;

    function initScene() {
        loadFromLocal();
        group1 = createEmojiGroup(state[1].emoji, state[1].label, state[1].color);
        group2 = createEmojiGroup(state[2].emoji, state[2].label, state[2].color);
        scene.add(group1);
        scene.add(group2);

        // Линии (канаты) – используем LineSegments с динамическим обновлением
        const createLine = (color) => {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array([0,0,0, 0,0,0]); // 2 точки
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            return line;
        };
        line1 = createLine(state[1].color);
        line2 = createLine(state[2].color);

        updateScene();
        updateUI();
        renderCatalog();
    }

    function updateScene() {
        group1.position.set(state[1].x, 0.1, state[1].z);
        group2.position.set(state[2].x, 0.1, state[2].z);

        // Обновить спрайты и метки при изменении эмодзи/имени/цвета
        updateSprite(group1, 1);
        updateSprite(group2, 2);

        // Обновить линии
        const pos1 = group1.position.clone();
        const pos2 = group2.position.clone();
        // Линия от центра к объекту
        const linePositions1 = line1.geometry.attributes.position.array;
        linePositions1[0] = 0; linePositions1[1] = 0; linePositions1[2] = 0;
        linePositions1[3] = pos1.x; linePositions1[4] = pos1.y; linePositions1[5] = pos1.z;
        line1.geometry.attributes.position.needsUpdate = true;

        const linePositions2 = line2.geometry.attributes.position.array;
        linePositions2[0] = 0; linePositions2[1] = 0; linePositions2[2] = 0;
        linePositions2[3] = pos2.x; linePositions2[4] = pos2.y; linePositions2[5] = pos2.z;
        line2.geometry.attributes.position.needsUpdate = true;

        // Цвет линий
        line1.material.color.set(state[1].color);
        line2.material.color.set(state[2].color);
    }

    function updateSprite(group, id) {
        const data = state[id];
        const color = data.color;
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(128, 128, 20, 128, 128, 120);
        grad.addColorStop(0, hexToRgba(color, 0.4));
        grad.addColorStop(1, hexToRgba(color, 0));
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(128, 128, 120, 0, Math.PI * 2); ctx.fill();
        ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(data.emoji, 128, 128);
        const texture = new THREE.CanvasTexture(canvas);
        group.userData.sprite.material.map = texture;
        group.userData.sprite.material.needsUpdate = true;
        group.userData.labelDiv.textContent = data.label;
        group.userData.labelDiv.style.color = color;
        group.userData.labelDiv.style.borderColor = color;
    }

    function updateUI() {
        editEmoji1.value = state[1].emoji;
        editLabel1.value = state[1].label;
        color1.value = state[1].color;
        editEmoji2.value = state[2].emoji;
        editLabel2.value = state[2].label;
        color2.value = state[2].color;

        // Вычислить силы и проценты
        const f1 = calcForce(state[1].x, state[1].z);
        const f2 = calcForce(state[2].x, state[2].z);
        const total = f1 + f2;
        const p1 = total > 0 ? Math.round((f1 / total) * 100) : 50;
        const p2 = total > 0 ? Math.round((f2 / total) * 100) : 50;

        leftInfo.textContent = `${state[1].emoji} ${state[1].label} ${p1}%`;
        rightInfo.textContent = `${state[2].emoji} ${state[2].label} ${p2}%`;
        if (p1 > p2) {
            centerInfo.textContent = `⬅️ ${state[1].label} тянет сильнее`;
            centerInfo.style.color = state[1].color;
        } else if (p2 > p1) {
            centerInfo.textContent = `➡️ ${state[2].label} тянет сильнее`;
            centerInfo.style.color = state[2].color;
        } else {
            centerInfo.textContent = '⚖️ Равновесие';
            centerInfo.style.color = '#b8a6ff';
        }

        // Обновить цвет центральной сферы (смесь)
        const mix = new THREE.Color(state[1].color).lerp(new THREE.Color(state[2].color), p2 / 100);
        centerSphere.material.color.copy(mix);
        centerSphere.material.emissive.copy(mix);
        glow.material.color.copy(mix);

        // Толщина линий (визуально через масштаб? не поддерживается в WebGL, используем прозрачность)
        const maxLineOpacity = 1.0;
        line1.material.opacity = Math.min(1, f1 * 1.5);
        line2.material.opacity = Math.min(1, f2 * 1.5);
        line1.material.transparent = true;
        line2.material.transparent = true;

        activeIndicator.textContent = `👉 ${state[activeId].emoji} ${state[activeId].label}`;
    }

    // ============= ПЕРЕТАСКИВАНИЕ И ВЫБОР =============
    let activeId = 1;
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let isDragging = false;
    let dragGroup = null;
    const dragOffset = new THREE.Vector3();
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    function getPointer(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX || event.pageX) - rect.left) / rect.width * 2 - 1;
        pointer.y = -((event.clientY || event.pageY) - rect.top) / rect.height * 2 + 1;
    }

    function onPointerDown(event) {
        getPointer(event);
        raycaster.setFromCamera(pointer, camera);
        const sprites = [group1.children[0], group2.children[0]];
        const intersects = raycaster.intersectObjects(sprites);
        if (intersects.length > 0) {
            const hit = intersects[0].object;
            if (hit === group1.children[0]) activeId = 1;
            else if (hit === group2.children[0]) activeId = 2;
            updateUI();
            isDragging = true;
            dragGroup = activeId === 1 ? group1 : group2;
            const intersectPoint = intersects[0].point;
            dragOffset.copy(intersectPoint).sub(dragGroup.position);
            controls.enabled = false;
        }
    }

    function onPointerMove(event) {
        if (!isDragging || !dragGroup) return;
        getPointer(event);
        raycaster.setFromCamera(pointer, camera);
        plane.set(new THREE.Vector3(0, 1, 0), -dragGroup.position.y);
        const intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, intersectPoint);
        if (intersectPoint) {
            const newPos = intersectPoint.clone().sub(dragOffset);
            newPos.x = Math.max(-MAX_DIST, Math.min(MAX_DIST, newPos.x));
            newPos.z = Math.max(-MAX_DIST, Math.min(MAX_DIST, newPos.z));
            dragGroup.position.copy(newPos);
            const id = activeId;
            state[id].x = newPos.x;
            state[id].z = newPos.z;
            updateScene();
            updateUI();
            saveToLocal();
        }
    }

    function onPointerUp() {
        if (isDragging) {
            isDragging = false;
            dragGroup = null;
            controls.enabled = true;
            saveToLocal();
        }
    }

    const canvas = renderer.domElement;
    canvas.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    // ============= ОБРАБОТЧИКИ UI =============
    editEmoji1.addEventListener('input', () => { state[1].emoji = editEmoji1.value.trim() || '😌'; updateSprite(group1, 1); updateUI(); saveToLocal(); });
    editLabel1.addEventListener('input', () => { state[1].label = editLabel1.value.trim() || 'Чувство'; updateSprite(group1, 1); updateUI(); saveToLocal(); });
    color1.addEventListener('input', () => { state[1].color = color1.value; updateSprite(group1, 1); updateScene(); updateUI(); saveToLocal(); });
    editEmoji2.addEventListener('input', () => { state[2].emoji = editEmoji2.value.trim() || '😢'; updateSprite(group2, 2); updateUI(); saveToLocal(); });
    editLabel2.addEventListener('input', () => { state[2].label = editLabel2.value.trim() || 'Противоположность'; updateSprite(group2, 2); updateUI(); saveToLocal(); });
    color2.addEventListener('input', () => { state[2].color = color2.value; updateSprite(group2, 2); updateScene(); updateUI(); saveToLocal(); });

    resetPosBtn.addEventListener('click', () => {
        state[1].x = -2.0; state[1].z = 0;
        state[2].x = 2.0; state[2].z = 0;
        updateScene();
        updateUI();
        saveToLocal();
    });

    resetAllBtn.addEventListener('click', () => {
        if (confirm('Сбросить все данные и каталог?')) {
            localStorage.removeItem('tug_of_war');
            localStorage.removeItem('tug_catalog');
            location.reload();
        }
    });

    // ============= АНИМАЦИЯ =============
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
    }

    // ============= ИНИЦИАЛИЗАЦИЯ =============
    initScene();
    animate();

    window.addEventListener('resize', () => {
        const w = container.clientWidth, h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
        labelRenderer.setSize(w, h);
    });

    console.log('🟣🦅 Перетягивание каната загружено');
</script>
</body>
</html>
