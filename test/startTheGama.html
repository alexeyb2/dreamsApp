<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Перетягивание свайпом</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; font-family: system-ui; }
        
        #ui {
            position: absolute; bottom: 40px; left: 0; right: 0; display: flex;
            justify-content: center; gap: 30px; pointer-events: none;
        }
        .stat {
            background: rgba(22,17,39,0.85); padding: 10px 24px; border-radius: 40px;
            border: 1px solid #3a2f5a; color: #fff; font-size: 18px; font-weight: 600;
            backdrop-filter: blur(8px); text-align: center; min-width: 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .stat span { display: block; font-size: 14px; opacity: 0.6; font-weight: normal; margin-top: 2px;}
        #stat-red { border-color: #ff6b6b; color: #ff6b6b; }
        #stat-blue { border-color: #6b9bff; color: #6b9bff; }
        
        #hint {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 30px;
            color: #b8a6ff; font-size: 14px; pointer-events: none; white-space: nowrap;
            backdrop-filter: blur(4px); border: 1px solid #3a2f5a;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>
    <div id="hint">👆 Веди пальцем влево-вправо по сфере, чтобы двигать границу</div>
    <div id="ui">
        <div class="stat" id="stat-red">❤️ <span id="red-percent">50%</span></div>
        <div class="stat" id="stat-blue">🧠 <span id="blue-percent">50%</span></div>
    </div>

    <script>
        // 1. Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0814);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 5.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0); controls.maxPolarAngle = Math.PI / 2.0;
        controls.minDistance = 2.5; controls.maxDistance = 10;

        // 2. Освещение
        scene.add(new THREE.AmbientLight(0x404060));
        const light = new THREE.DirectionalLight(0xffeedd, 1.2);
        light.position.set(5, 10, 7); scene.add(light);

        // 3. Шейдерная сфера
        const vertexShader = `
            varying float v_x;
            void main() {
                v_x = position.x;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const fragmentShader = `
            uniform float u_cut;
            uniform vec3 u_red;
            uniform vec3 u_blue;
            varying float v_x;

            void main() {
                float d = v_x - u_cut;
                float mixVal = smoothstep(-0.05, 0.05, d);
                vec3 col = mix(u_red, u_blue, mixVal);
                
                float glow = exp(-abs(d) * 15.0) * 0.7;
                col += glow;
                
                float rim = 1.0 - abs(v_x);
                col *= (0.8 + 0.2 * rim);
                gl_FragColor = vec4(col, 0.9);
            }
        `;

        const uniforms = {
            u_cut: { value: 0.0 },
            u_red: { value: new THREE.Color(0xff4d4d) },
            u_blue: { value: new THREE.Color(0x4d8bff) }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });

        const geometry = new THREE.SphereGeometry(1.7, 64, 64);
        const sphere = new THREE.Mesh(geometry, material);
        sphere.position.set(0, 0, 0);
        scene.add(sphere);

        // Прозрачная оболочка
        const wireframeMat = new THREE.MeshBasicMaterial({
            color: 0x8888ff,
            wireframe: true,
            transparent: true,
            opacity: 0.06
        });
        const wireSphere = new THREE.Mesh(new THREE.SphereGeometry(1.72, 32, 16), wireframeMat);
        scene.add(wireSphere);

        // 4. Метки (Цвета текста наоборот)
        function createLabel(text, color, offsetX) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color; // текст контрастным цветом
            div.style.fontSize = '24px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '0 0 20px currentColor, 0 0 40px currentColor';
            div.style.background = 'rgba(11, 8, 20, 0.5)';
            div.style.padding = '4px 16px';
            div.style.borderRadius = '20px';
            div.style.backdropFilter = 'blur(4px)';
            div.style.border = '1px solid ' + color;
            return new THREE.CSS2DObject(div);
        }

        // ❤️ Сердце (красная зона) -> пишем СИНИМ
        const labelRed = createLabel('❤️ Сердце', '#4d8bff');
        // 🧠 Ум (синяя зона) -> пишем КРАСНЫМ
        const labelBlue = createLabel('🧠 Ум', '#ff4d4d');
        scene.add(labelRed);
        scene.add(labelBlue);

        // 5. Логика "Свайп (перетаскивание) границы"
        let currentCut = 0.0; // Текущее положение границы (от -1.7 до 1.7)
        let targetCut = 0.0;  // Целевое положение границы (куда ведёт палец)
        let isDragging = false;
        let dragStartLocalX = 0.0;
        let dragStartCut = 0.0;

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function getPointer(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        }

        // Нажал пальцем на сферу
        renderer.domElement.addEventListener('pointerdown', (e) => {
            getPointer(e);
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObject(sphere);
            if (intersects.length > 0) {
                // Получаем координаты пересечения внутри самой сферы
                const localPoint = sphere.worldToLocal(intersects[0].point.clone());
                dragStartLocalX = localPoint.x;
                dragStartCut = uniforms.u_cut.value;
                isDragging = true;
                controls.enabled = false;
            }
        });

        // Водишь пальцем по сфере
        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            getPointer(e);
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObject(sphere);
            if (intersects.length > 0) {
                const localPoint = sphere.worldToLocal(intersects[0].point.clone());
                const currentLocalX = localPoint.x;
                
                // Считаем, насколько сдвинулся палец по оси X, и двигаем границу
                const deltaX = currentLocalX - dragStartLocalX;
                targetCut = dragStartCut + deltaX;
                
                // Ограничиваем, чтобы не вылетела за края сферы (радиус 1.7)
                targetCut = Math.max(-1.7, Math.min(1.7, targetCut));
            }
        });

        // Отпустил палец
        window.addEventListener('pointerup', () => {
            if (isDragging) {
                isDragging = false;
                controls.enabled = true;
            }
        });

        // 6. Обновление сцены и Анимация
        function updateScene() {
            // Плавно двигаем стенку к пальцу, чтобы не было рывков
            currentCut += (targetCut - currentCut) * 0.15;
            if (Math.abs(currentCut - targetCut) < 0.001) currentCut = targetCut;

            uniforms.u_cut.value = currentCut;

            // Позиции меток ровно по центру своих зон
            const redCenterX = (currentCut - 1.7) / 2; 
            const blueCenterX = (1.7 + currentCut) / 2; 
            labelRed.position.set(redCenterX, 0.2, 0);
            labelBlue.position.set(blueCenterX, 0.2, 0);

            // Проценты (от -1.7 до 1.7 преобразуем в 0% - 100%)
            const redPercent = Math.round(((currentCut / 1.7) + 1) / 2 * 100);
            const bluePercent = 100 - redPercent;
            document.getElementById('red-percent').textContent = redPercent + '%';
            document.getElementById('blue-percent').textContent = bluePercent + '%';
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Медленное автовращение всей сцены (показывает объём)
            scene.rotation.y += 0.003; 

            controls.update();
            updateScene();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
