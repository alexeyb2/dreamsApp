<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Инь-Ян Баланс</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; font-family: system-ui, sans-serif; }
        #bg {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: block;
            cursor: grab;
        }
        #bg:active { cursor: grabbing; }
        #hint {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); padding: 6px 18px; border-radius: 30px;
            color: rgba(255,255,255,0.7); font-size: 14px; pointer-events: none;
            backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
        }
        @media (max-width: 600px) { #hint { font-size: 12px; padding: 4px 14px; top: 20px; } }
    </style>
</head>
<body>
    <div id="hint">👆 Проведи пальцем, чтобы переместить границу</div>
    <canvas id="bg"></canvas>

    <script>
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');

        let w, h;
        let cut = 0.5; // Положение границы (0.5 = 50%)
        let isDragging = false;

        // Цвета
        const colorBlueTop = '#4d8bff';
        const colorRedBottom = '#ff4d4d';
        const textRed = '#ff4d4d';
        const textBlue = '#4d8bff';

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);

            // 1. Рисуем Синий фон (верхняя зона)
            const gradBlue = ctx.createLinearGradient(0, 0, 0, h);
            gradBlue.addColorStop(0, '#1e3a8a');
            gradBlue.addColorStop(1, colorBlueTop);
            ctx.fillStyle = gradBlue;
            ctx.fillRect(0, 0, w, h);

            // 2. Рисуем Красную зону (нижняя) через S-образный изгиб Инь-Ян
            ctx.beginPath();
            const amplitude = 0.12 * h; // Высота изгиба
            ctx.moveTo(0, cut * h + amplitude * Math.sin(0));
            
            for (let x = 1; x <= w; x++) {
                // Плавная синусоида (Инь-Ян изгиб)
                const y = cut * h + amplitude * Math.sin(x / w * Math.PI);
                ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();

            const gradRed = ctx.createLinearGradient(0, h, 0, 0);
            gradRed.addColorStop(0, '#991b1b');
            gradRed.addColorStop(1, colorRedBottom);
            ctx.fillStyle = gradRed;
            ctx.fill();

            // 3. Светящаяся линия границы (эффект воды/бассейна)
            ctx.beginPath();
            ctx.moveTo(0, cut * h + amplitude * Math.sin(0));
            for (let x = 1; x <= w; x++) {
                const y = cut * h + amplitude * Math.sin(x / w * Math.PI);
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.7)';
            ctx.shadowBlur = 25;
            ctx.stroke();
            ctx.shadowBlur = 0; // Сбросить тень

            // 4. Точки Инь-Ян (противоположные цвета)
            // Красная точка в синей зоне
            const dotRadius = w * 0.04;
            const dotOffsetX = w * 0.15;
            const dotOffsetY = h * 0.1;
            
            ctx.beginPath();
            ctx.arc(w / 2 - dotOffsetX, cut * h - dotOffsetY, dotRadius, 0, 2 * Math.PI);
            ctx.fillStyle = colorRedBottom;
            ctx.shadowColor = 'rgba(255, 77, 77, 0.5)';
            ctx.shadowBlur = 20;
            ctx.fill();

            // Синяя точка в красной зоне
            ctx.beginPath();
            ctx.arc(w / 2 + dotOffsetX, cut * h + dotOffsetY, dotRadius, 0, 2 * Math.PI);
            ctx.fillStyle = colorBlueTop;
            ctx.shadowColor = 'rgba(77, 139, 255, 0.5)';
            ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;

            // 5. Тексты (Цвета наоборот!)
            ctx.font = `bold ${w * 0.06}px system-ui, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 10;

            // Сердце (в верхней синей зоне -> пишем красным)
            ctx.fillStyle = textRed;
            ctx.fillText('❤️ Сердце', w / 2, cut * h * 0.45);

            // Ум (в нижней красной зоне -> пишем синим)
            ctx.fillStyle = textBlue;
            ctx.fillText('🧠 Ум', w / 2, (h + cut * h) / 1.85);

            ctx.shadowBlur = 0;

            // 6. Проценты (внизу)
            ctx.font = `bold ${w * 0.045}px system-ui, sans-serif`;
            ctx.textBaseline = 'bottom';
            
            const bluePercent = Math.round(cut * 100);
            const redPercent = 100 - bluePercent;

            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillText(`${bluePercent}%`, w / 4 - 20, h - 30);
            ctx.fillText(`${redPercent}%`, w * 3 / 4 + 20, h - 30);
        }

        // Логика перетаскивания
        canvas.addEventListener('pointerdown', (e) => {
            isDragging = true;
            updateCut(e.clientY);
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            updateCut(e.clientY);
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
        });

        function updateCut(clientY) {
            const rect = canvas.getBoundingClientRect();
            // Нормализуем от 0.05 до 0.95, чтобы текст не улетал за края
            cut = Math.min(0.95, Math.max(0.05, (clientY - rect.top) / rect.height));
            draw();
        }

        // Адаптация к повороту экрана
        window.addEventListener('resize', resize);
        resize();

        console.log('🟣🦅 Инь-Ян Баланс загружен');
    </script>
</body>
</html>
