<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Зоны Силы</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; font-family: system-ui; }
        
        #ui {
            position: absolute; bottom: 40px; left: 0; right: 0; display: flex;
            justify-content: center; gap: 30px; pointer-events: none;
        }
        .stat {
            background: rgba(22,17,39,0.8); padding: 10px 24px; border-radius: 40px;
            border: 1px solid #3a2f5a; color: #fff; font-size: 18px; font-weight: 600;
            backdrop-filter: blur(8px); text-align: center; min-width: 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .stat span { display: block; font-size: 14px; opacity: 0.6; font-weight: normal; margin-top: 2px;}
        #stat-red { border-color: #ff6b6b; color: #ff6b6b; }
        #stat-blue { border-color: #6b9bff; color: #6b9bff; }
        
        #hint {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 30px;
            color: #b8a6ff; font-size: 14px; pointer-events: none; white-space: nowrap;
            backdrop-filter: blur(4px); border: 1px solid #3a2f5a;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>
    <div id="hint">👆 Тапни по Красному или Синему, чтобы изменить баланс</div>
    <div id="ui">
        <div class="stat" id="stat-red">❤️ <span id="red-percent">50%</span></div>
        <div class="stat" id="stat-blue">🧠 <span id="blue-percent">50%</span></div>
    </div>

    <script>
        // 1. Настройка сцены
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0814);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.localClippingEnabled = true;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // Чтобы клики проходили сквозь метки
        document.body.appendChild(labelRenderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0); controls.maxPolarAngle = Math.PI / 2.1;
        controls.minDistance = 3; controls.maxDistance = 12;

        // 2. Освещение
        scene.add(new THREE.AmbientLight(0x404060));
        const light = new THREE.DirectionalLight(0xffeedd, 1.2);
        light.position.set(5, 10, 7); scene.add(light);

        // 3. Кастомный шейдер для единой сферы с подвижной стенкой
        const vertexShader = `
            varying float v_x;
            void main() {
                v_x = position.x;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        const fragmentShader = `
            uniform float u_cut;
            uniform vec3 u_red;
            uniform vec3 u_blue;
            varying float v_x;

            void main() {
                // Расстояние от текущей точки до границы
                float d = v_x - u_cut;
                
                // Основной цвет (переход через границу с мягким свечением)
                float mixVal = smoothstep(-0.05, 0.05, d);
                vec3 col = mix(u_red, u_blue, mixVal);
                
                // Свечение на границе
                float glow = exp(-abs(d) * 15.0) * 0.7;
                col += glow;
                
                // Эффект глубины по краям сферы (делаем края чуть темнее)
                float rim = 1.0 - abs(v_x);
                col *= (0.8 + 0.2 * rim);
                
                gl_FragColor = vec4(col, 0.9);
            }
        `;

        const uniforms = {
            u_cut: { value: 0.0 },
            u_red: { value: new THREE.Color(0xff4d4d) },
            u_blue: { value: new THREE.Color(0x4d8bff) }
        };

        const material = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });

        const geometry = new THREE.SphereGeometry(1.7, 64, 64);
        const sphere = new THREE.Mesh(geometry, material);
        sphere.position.set(0, 0, 0);
        scene.add(sphere);

        // 4. Внешняя оболочка (прозрачная сетка, чтобы выглядело как "овал" на твоём рисунке)
        const wireframeMat = new THREE.MeshBasicMaterial({
            color: 0x8888ff,
            wireframe: true,
            transparent: true,
            opacity: 0.08
        });
        const wireSphere = new THREE.Mesh(new THREE.SphereGeometry(1.72, 32, 16), wireframeMat);
        scene.add(wireSphere);

        // 5. Метки (Сердце / Ум) через CSS2DRenderer
        function createLabel(text, color, offsetX) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '24px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '0 0 20px currentColor, 0 0 40px currentColor';
            div.style.background = 'rgba(11, 8, 20, 0.5)';
            div.style.padding = '4px 16px';
            div.style.borderRadius = '20px';
            div.style.backdropFilter = 'blur(4px)';
            div.style.border = '1px solid ' + color;
            return new THREE.CSS2DObject(div);
        }

        const labelRed = createLabel('❤️ Сердце', '#ff4d4d');
        const labelBlue = createLabel('🧠 Ум', '#4d8bff');
        scene.add(labelRed);
        scene.add(labelBlue);

        // 6. Логика баланса и взаимодействия
        let currentRatio = 0.5; // 0.5 = 50% красного
        let targetRatio = 0.5;
        let isDragging = false;

        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function getPointer(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        }

        renderer.domElement.addEventListener('pointerdown', (e) => {
            getPointer(e);
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObject(sphere);
            if (intersects.length > 0) {
                const pt = intersects[0].point;
                const cut = uniforms.u_cut.value;
                if (pt.x < cut) {
                    // Нажали на красное -> красное растёт, синее сжимается
                    targetRatio = Math.min(1.0, targetRatio + 0.08);
                } else if (pt.x > cut) {
                    // Нажали на синее -> синее растёт, красное сжимается
                    targetRatio = Math.max(0.0, targetRatio - 0.08);
                }
                isDragging = true;
                controls.enabled = false;
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            getPointer(e);
            raycaster.setFromCamera(pointer, camera);
            const intersects = raycaster.intersectObject(sphere);
            if (intersects.length > 0) {
                const pt = intersects[0].point;
                const cut = uniforms.u_cut.value;
                // Пока палец двигается, продолжаем давить
                if (pt.x < cut) {
                    targetRatio = Math.min(1.0, targetRatio + 0.02);
                } else if (pt.x > cut) {
                    targetRatio = Math.max(0.0, targetRatio - 0.02);
                }
            }
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            controls.enabled = true;
        });

        // 7. Обновление сцены
        function updateScene() {
            // Плавное движение к цели
            currentRatio += (targetRatio - currentRatio) * 0.05;
            if (Math.abs(currentRatio - targetRatio) < 0.001) currentRatio = targetRatio;

            // Координата стенки (от -1 до 1)
            const cut = (currentRatio - 0.5) * 2.0;
            uniforms.u_cut.value = cut;

            // Позиции меток
            const redCenterX = (cut - 1.7) / 2; // Центр красной зоны
            const blueCenterX = (1.7 + cut) / 2; // Центр синей зоны
            labelRed.position.set(redCenterX, 0.2, 0);
            labelBlue.position.set(blueCenterX, 0.2, 0);

            // Обновление интерфейса
            const redPercent = Math.round(currentRatio * 100);
            const bluePercent = 100 - redPercent;
            document.getElementById('red-percent').textContent = redPercent + '%';
            document.getElementById('blue-percent').textContent = bluePercent + '%';
        }

        // 8. Анимация
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateScene();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // Адаптация экрана
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
