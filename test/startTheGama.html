<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🟣🦅 Каталог состояний 3D</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814;
            color: #e0d6ff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            touch-action: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: #100d1e;
            touch-action: none;
        }

        #canvas-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-panel {
            background: #161127;
            padding: 16px 20px;
            border-radius: 32px 32px 0 0;
            max-height: 60vh;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 -8px 30px rgba(0,0,0,0.8);
            touch-action: pan-y;
            scroll-behavior: smooth;
        }

        .edit-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .edit-item { flex: 1; min-width: 120px; }
        .edit-item label { display: block; font-size: 12px; opacity: 0.6; margin-bottom: 2px; }
        .edit-item .row { display: flex; gap: 6px; }
        input[type="text"] {
            width: 100%; padding: 8px 10px; font-size: 15px;
            background: #221b38; border: 1px solid #3a2f5a; border-radius: 12px;
            color: #f0eaff; outline: none;
        }
        input.small { width: 60px; flex-shrink: 0; }

        .slider-group { display: flex; align-items: center; gap: 16px; margin: 8px 0; }
        .slider-group label { font-size: 14px; min-width: 70px; }
        input[type="range"] {
            flex: 1; height: 4px; -webkit-appearance: none;
            background: #3a2f5a; border-radius: 8px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px;
            border-radius: 50%; background: #8f78e6; cursor: pointer;
        }

        /* ХАРАКТЕРИСТИКИ */
        #attrs-section { margin-top: 12px; padding: 12px; background: #100d1e; border-radius: 20px; }
        #attrs-section h4 { font-size: 14px; margin-bottom: 8px; color: #b8a6ff; }
        .attr-item {
            background: #1a1330; padding: 10px; border-radius: 14px;
            margin-bottom: 8px; border: 1px solid #2a2248;
        }
        .attr-item .top { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .attr-item .top input { flex: 1; min-width: 80px; }
        .attr-item .bottom { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .attr-item .bottom span { font-size: 13px; min-width: 40px; text-align: center; }
        .attr-item .btn-remove {
            background: #5a2a2a; border: none; color: #ff8a8a;
            border-radius: 50%; width: 28px; height: 28px; font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-add-attr {
            background: #2a2348; border: 1px dashed #6f52c4; color: #b8a6ff;
            padding: 8px 16px; border-radius: 20px; cursor: pointer; width: 100%; font-size: 14px;
            margin-top: 4px;
        }

        /* КАТАЛОГ */
        #catalog-section { margin-top: 12px; padding: 12px; background: #100d1e; border-radius: 20px; }
        #catalog-section h4 { font-size: 14px; margin-bottom: 8px; color: #b8a6ff; }
        .catalog-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .catalog-row input { flex: 1; }
        .catalog-list { max-height: 120px; overflow-y: auto; }
        .catalog-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 10px; background: #1a1330; border-radius: 12px; margin-bottom: 4px;
        }
        .catalog-item .name { flex: 1; font-size: 14px; }
        .catalog-item .actions { display: flex; gap: 6px; }
        .catalog-item button {
            background: #2a2348; border: none; color: #b8a6ff;
            padding: 4px 12px; border-radius: 12px; font-size: 12px; cursor: pointer;
        }
        .catalog-item button.load { background: #6f52c4; color: #fff; }
        .catalog-item button.del { background: #5a2a2a; color: #ff8a8a; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 28px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #fff; }
        .btn-primary { background: #6f52c4; }
        .btn-primary:active { transform: scale(0.95); background: #5d43a8; }
        .btn-secondary { background: #2a2348; }
        .btn-secondary:active { background: #1f1937; }
        .btn-danger { background: #a03a3a; }
        .btn-danger:active { background: #7a2b2b; }

        #status { text-align: center; font-size: 13px; opacity: 0.7; margin-top: 8px; }
        #active-indicator {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(22,17,39,0.8); padding: 4px 14px; border-radius: 20px;
            font-size: 14px; color: #b8a6ff; pointer-events: none; white-space: nowrap;
        }

        @media (max-width: 600px) {
            #ui-panel { padding: 12px; }
            .edit-item { min-width: 80px; }
            .slider-group label { min-width: 50px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div id="active-indicator">👆 Коснись эмодзи, чтобы выбрать</div>
    </div>

    <div id="ui-panel">
        <!-- Базовое редактирование -->
        <div class="edit-row">
            <div class="edit-item">
                <label>Чувство</label>
                <div class="row">
                    <input type="text" id="edit-emoji1" class="small" placeholder="😌" />
                    <input type="text" id="edit-label1" placeholder="имя" />
                </div>
            </div>
            <div class="edit-item">
                <label>Противоположность</label>
                <div class="row">
                    <input type="text" id="edit-emoji2" class="small" placeholder="😢" />
                    <input type="text" id="edit-label2" placeholder="имя" />
                </div>
            </div>
        </div>

        <!-- Слайдеры положения -->
        <div class="slider-group">
            <label>📏 Масштаб</label>
            <input type="range" id="scale-slider" min="0.3" max="2.5" step="0.01" value="1.0" />
            <span id="scale-val" style="min-width:36px;">1.0</span>
        </div>
        <div class="slider-group">
            <label>⬆ Высота (Y)</label>
            <input type="range" id="height-slider" min="-2" max="4" step="0.01" value="0" />
            <span id="height-val" style="min-width:36px;">0.0</span>
        </div>

        <!-- ХАРАКТЕРИСТИКИ (динамические) -->
        <div id="attrs-section">
            <h4>⚙️ Характеристики (влияют на 3D)</h4>
            <div id="attrs-list"></div>
            <button class="btn-add-attr" id="add-attr-btn">➕ Добавить характеристику</button>
        </div>

        <!-- КАТАЛОГ СОСТОЯНИЙ -->
        <div id="catalog-section">
            <h4>📂 Каталог состояний</h4>
            <div class="catalog-row">
                <input type="text" id="catalog-name" placeholder="Название пресета (например: Утренняя медитация)" />
                <button class="btn btn-primary" id="save-catalog-btn" style="flex:0.4; padding: 8px;">Сохранить</button>
            </div>
            <div class="catalog-list" id="catalog-list"></div>
        </div>

        <!-- Кнопки управления -->
        <div class="btn-group">
            <button class="btn btn-primary" id="reset-positions">🔄 Сброс поз.</button>
            <button class="btn btn-danger" id="reset-all">❌ Сбросить всё</button>
        </div>
        <div id="status">Перетащи эмодзи. Характеристики меняют физику объектов.</div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ============= DOM =============
    const container = document.getElementById('canvas-container');
    const activeIndicator = document.getElementById('active-indicator');
    const editEmoji1 = document.getElementById('edit-emoji1');
    const editLabel1 = document.getElementById('edit-label1');
    const editEmoji2 = document.getElementById('edit-emoji2');
    const editLabel2 = document.getElementById('edit-label2');
    const scaleSlider = document.getElementById('scale-slider');
    const scaleVal = document.getElementById('scale-val');
    const heightSlider = document.getElementById('height-slider');
    const heightVal = document.getElementById('height-val');
    const resetPosBtn = document.getElementById('reset-positions');
    const resetAllBtn = document.getElementById('reset-all');
    const attrsList = document.getElementById('attrs-list');
    const addAttrBtn = document.getElementById('add-attr-btn');
    const catalogName = document.getElementById('catalog-name');
    const saveCatalogBtn = document.getElementById('save-catalog-btn');
    const catalogList = document.getElementById('catalog-list');
    const statusDiv = document.getElementById('status');

    // ============= Three.js =============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x100d1e);
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(6, 4, 8);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(container.clientWidth, container.clientHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 3;
    controls.maxDistance = 20;

    // Освещение
    scene.add(new THREE.AmbientLight(0x404060));
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);
    scene.add(new THREE.DirectionalLight(0x4466ff, 0.5).position.set(-5, 0, -5));

    // Пол
    const gridHelper = new THREE.GridHelper(10, 10, 0x6f52c4, 0x3a2f5a);
    gridHelper.position.y = -0.01;
    scene.add(gridHelper);
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.ShadowMaterial({ opacity: 0.3 }));
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    floor.receiveShadow = true;
    scene.add(floor);

    // Звёзды
    const starsGeo = new THREE.BufferGeometry();
    const starsPos = new Float32Array(3000);
    for (let i = 0; i < 3000; i++) starsPos[i] = (Math.random() - 0.5) * 200;
    starsGeo.setAttribute('position', new THREE.Float32BufferAttribute(starsPos, 3));
    scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0x8f78e6, size: 0.15, transparent: true })));

    // ============= Логика эмодзи =============
    function createEmojiGroup(emoji, label, color = '#b8a6ff') {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(128, 128, 20, 128, 128, 120);
        grad.addColorStop(0, 'rgba(111, 82, 196, 0.3)');
        grad.addColorStop(1, 'rgba(111, 82, 196, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(128, 128, 120, 0, Math.PI * 2); ctx.fill();
        ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 128, 128);
        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false }));
        sprite.scale.set(1.5, 1.5, 1);
        const labelDiv = document.createElement('div');
        labelDiv.textContent = label;
        labelDiv.style.cssText = `color:${color}; font-size:16px; font-weight:500; text-shadow:0 2px 10px rgba(0,0,0,0.8); background:rgba(22,17,39,0.7); padding:2px 12px; border-radius:12px; border:1px solid #3a2f5a; backdrop-filter:blur(4px); pointer-events:none;`;
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(0, -1.2, 0);
        const group = new THREE.Group();
        group.add(sprite);
        group.add(labelObj);
        group.userData = { sprite, labelDiv, labelObj };
        group.position.set(0, 0, 0);
        return group;
    }

    let activeId = 1;
    let group1, group2;

    // ============= МОДЕЛЬ ДАННЫХ =============
    // У каждого объекта есть массив аттрибутов: { name, value, effect }.
    // effect: 'rotation' (скорость вращения по Y), 'scale' (дополнительный масштаб), 'opacity' (прозрачность)
    function getDefaultAttrs() {
        return [
            { name: 'Сила', value: 50, effect: 'rotation' },
            { name: 'Ловкость', value: 50, effect: 'scale' },
            { name: 'Интеллект', value: 50, effect: 'opacity' }
        ];
    }

    let state = {
        1: { emoji: '😌', label: 'Спокойствие', x: -1.5, z: 0, y: 0, scale: 1.0, attrs: getDefaultAttrs() },
        2: { emoji: '😢', label: 'Печаль', x: 1.5, z: 0, y: 0, scale: 1.0, attrs: getDefaultAttrs() }
    };

    function saveToLocal() {
        const data = {
            s1: state[1], s2: state[2],
            catalog: loadCatalog()
        };
        localStorage.setItem('mind_3d_adv', JSON.stringify(data));
    }

    function loadFromLocal() {
        const raw = localStorage.getItem('mind_3d_adv');
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            if (data.s1) Object.assign(state[1], data.s1);
            if (data.s2) Object.assign(state[2], data.s2);
        } catch (e) {}
    }

    function getSnapshot() {
        return JSON.parse(JSON.stringify(state));
    }

    function applySnapshot(snap) {
        Object.assign(state, snap);
        updateSceneFromState();
        refreshUI();
        saveToLocal();
    }

    // ============= КАТАЛОГ =============
    function loadCatalog() {
        const raw = localStorage.getItem('mind_catalog');
        if (!raw) return [];
        try { return JSON.parse(raw); } catch { return []; }
    }

    function saveCatalog(catalog) {
        localStorage.setItem('mind_catalog', JSON.stringify(catalog));
    }

    function renderCatalog() {
        const catalog = loadCatalog();
        catalogList.innerHTML = '';
        catalog.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'catalog-item';
            div.innerHTML = `
                <span class="name">${item.name}</span>
                <div class="actions">
                    <button class="load" data-idx="${idx}">Загрузить</button>
                    <button class="del" data-idx="${idx}">Удалить</button>
                </div>
            `;
            catalogList.appendChild(div);
        });
        catalogList.querySelectorAll('.load').forEach(b => b.addEventListener('click', (e) => {
            const idx = parseInt(e.target.dataset.idx);
            const catalog = loadCatalog();
            if (catalog[idx]) {
                applySnapshot(catalog[idx].snapshot);
                statusDiv.textContent = `✅ Загружено: ${catalog[idx].name}`;
            }
        }));
        catalogList.querySelectorAll('.del').forEach(b => b.addEventListener('click', (e) => {
            const idx = parseInt(e.target.dataset.idx);
            const catalog = loadCatalog();
            catalog.splice(idx, 1);
            saveCatalog(catalog);
            renderCatalog();
        }));
    }

    saveCatalogBtn.addEventListener('click', () => {
        const name = catalogName.value.trim();
        if (!name) { statusDiv.textContent = '⚠️ Введите название'; return; }
        const catalog = loadCatalog();
        catalog.push({ name, snapshot: getSnapshot() });
        saveCatalog(catalog);
        renderCatalog();
        catalogName.value = '';
        statusDiv.textContent = `✅ Сохранено: ${name}`;
    });

    // ============= СЦЕНА И UI =============
    function initScene() {
        loadFromLocal();
        group1 = createEmojiGroup(state[1].emoji, state[1].label, '#8f78e6');
        group2 = createEmojiGroup(state[2].emoji, state[2].label, '#e6788f');
        scene.add(group1);
        scene.add(group2);
        updateSceneFromState();
        refreshUI();
        renderCatalog();
    }

    function updateSceneFromState() {
        group1.position.set(state[1].x, state[1].y, state[1].z);
        group1.scale.set(state[1].scale, state[1].scale, state[1].scale);
        group2.position.set(state[2].x, state[2].y, state[2].z);
        group2.scale.set(state[2].scale, state[2].scale, state[2].scale);
        // Обновить спрайты и метки
        updateSprite(group1, 1);
        updateSprite(group2, 2);
        // Аттрибуты влияют на визуал в цикле анимации
    }

    function updateSprite(group, id) {
        const data = state[id];
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(128, 128, 20, 128, 128, 120);
        grad.addColorStop(0, 'rgba(111, 82, 196, 0.3)');
        grad.addColorStop(1, 'rgba(111, 82, 196, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(128, 128, 120, 0, Math.PI * 2); ctx.fill();
        ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(data.emoji, 128, 128);
        const texture = new THREE.CanvasTexture(canvas);
        group.userData.sprite.material.map = texture;
        group.userData.sprite.material.needsUpdate = true;
        group.userData.labelDiv.textContent = data.label;
    }

    function refreshUI() {
        editEmoji1.value = state[1].emoji;
        editLabel1.value = state[1].label;
        editEmoji2.value = state[2].emoji;
        editLabel2.value = state[2].label;
        scaleSlider.value = state[activeId].scale;
        scaleVal.textContent = state[activeId].scale.toFixed(2);
        heightSlider.value = state[activeId].y;
        heightVal.textContent = state[activeId].y.toFixed(2);
        renderAttrs();
        activeIndicator.textContent = `👉 ${state[activeId].emoji} ${state[activeId].label}`;
    }

    // ============= ДИНАМИЧЕСКИЕ ХАРАКТЕРИСТИКИ =============
    function renderAttrs() {
        const attrs = state[activeId].attrs;
        attrsList.innerHTML = '';
        attrs.forEach((attr, idx) => {
            const div = document.createElement('div');
            div.className = 'attr-item';
            div.innerHTML = `
                <div class="top">
                    <input type="text" value="${attr.name}" class="attr-name" data-idx="${idx}" placeholder="Название" />
                    <button class="btn-remove" data-idx="${idx}">✕</button>
                </div>
                <div class="bottom">
                    <span>0</span>
                    <input type="range" min="0" max="100" step="1" value="${attr.value}" class="attr-slider" data-idx="${idx}" />
                    <span>100</span>
                    <span style="min-width:30px; font-weight:600;" class="attr-val">${attr.value}</span>
                </div>
            `;
            attrsList.appendChild(div);

            const nameInput = div.querySelector('.attr-name');
            const slider = div.querySelector('.attr-slider');
            const valSpan = div.querySelector('.attr-val');
            const removeBtn = div.querySelector('.btn-remove');

            nameInput.addEventListener('input', () => {
                state[activeId].attrs[idx].name = nameInput.value.trim() || 'Хар-ка';
                saveToLocal();
            });

            slider.addEventListener('input', () => {
                const val = parseInt(slider.value);
                state[activeId].attrs[idx].value = val;
                valSpan.textContent = val;
                saveToLocal();
            });

            removeBtn.addEventListener('click', () => {
                state[activeId].attrs.splice(idx, 1);
                renderAttrs();
                saveToLocal();
            });
        });
    }

    addAttrBtn.addEventListener('click', () => {
        state[activeId].attrs.push({ name: 'Новая', value: 50, effect: 'scale' });
        renderAttrs();
        saveToLocal();
    });

    // ============= ПЕРЕТАСКИВАНИЕ И ВЫБОР =============
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let isDragging = false;
    let dragGroup = null;
    const dragOffset = new THREE.Vector3();
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    function getPointer(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX || event.pageX) - rect.left) / rect.width * 2 - 1;
        pointer.y = -((event.clientY || event.pageY) - rect.top) / rect.height * 2 + 1;
    }

    function onPointerDown(event) {
        getPointer(event);
        raycaster.setFromCamera(pointer, camera);
        const sprites = [group1.children[0], group2.children[0]];
        const intersects = raycaster.intersectObjects(sprites);
        if (intersects.length > 0) {
            const hit = intersects[0].object;
            if (hit === group1.children[0]) activeId = 1;
            else if (hit === group2.children[0]) activeId = 2;
            refreshUI();
            isDragging = true;
            dragGroup = activeId === 1 ? group1 : group2;
            const intersectPoint = intersects[0].point;
            dragOffset.copy(intersectPoint).sub(dragGroup.position);
            controls.enabled = false;
        }
    }

    function onPointerMove(event) {
        if (!isDragging || !dragGroup) return;
        getPointer(event);
        raycaster.setFromCamera(pointer, camera);
        plane.set(new THREE.Vector3(0, 1, 0), -dragGroup.position.y);
        const intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, intersectPoint);
        if (intersectPoint) {
            const newPos = intersectPoint.clone().sub(dragOffset);
            newPos.x = Math.max(-4, Math.min(4, newPos.x));
            newPos.z = Math.max(-4, Math.min(4, newPos.z));
            dragGroup.position.copy(newPos);
            const id = activeId;
            state[id].x = newPos.x;
            state[id].z = newPos.z;
            saveToLocal();
        }
    }

    function onPointerUp() {
        if (isDragging) {
            isDragging = false;
            dragGroup = null;
            controls.enabled = true;
            saveToLocal();
        }
    }

    const canvas = renderer.domElement;
    canvas.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    // ============= ПРИВЯЗКА СЛАЙДЕРОВ UI =============
    editEmoji1.addEventListener('input', () => { state[1].emoji = editEmoji1.value.trim() || '😌'; updateSprite(group1, 1); saveToLocal(); });
    editLabel1.addEventListener('input', () => { state[1].label = editLabel1.value.trim() || 'Чувство'; updateSprite(group1, 1); saveToLocal(); });
    editEmoji2.addEventListener('input', () => { state[2].emoji = editEmoji2.value.trim() || '😢'; updateSprite(group2, 2); saveToLocal(); });
    editLabel2.addEventListener('input', () => { state[2].label = editLabel2.value.trim() || 'Противоположность'; updateSprite(group2, 2); saveToLocal(); });

    scaleSlider.addEventListener('input', () => {
        const val = parseFloat(scaleSlider.value);
        scaleVal.textContent = val.toFixed(2);
        state[activeId].scale = val;
        const g = activeId === 1 ? group1 : group2;
        g.scale.set(val, val, val);
        saveToLocal();
    });

    heightSlider.addEventListener('input', () => {
        const val = parseFloat(heightSlider.value);
        heightVal.textContent = val.toFixed(2);
        state[activeId].y = val;
        const g = activeId === 1 ? group1 : group2;
        g.position.y = val;
        saveToLocal();
    });

    resetPosBtn.addEventListener('click', () => {
        state[1].x = -1.5; state[1].z = 0; state[1].y = 0; state[1].scale = 1.0;
        state[2].x = 1.5; state[2].z = 0; state[2].y = 0; state[2].scale = 1.0;
        updateSceneFromState();
        refreshUI();
        saveToLocal();
    });

    resetAllBtn.addEventListener('click', () => {
        if (confirm('Сбросить все данные, пресеты и каталог?')) {
            localStorage.removeItem('mind_3d_adv');
            localStorage.removeItem('mind_catalog');
            location.reload();
        }
    });

    // ============= АНИМАЦИЯ (передача характеристик в 3D) =============
    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        // Применяем эффекты характеристик к объектам
        [1, 2].forEach(id => {
            const group = id === 1 ? group1 : group2;
            const attrs = state[id].attrs || [];
            let rotationSpeed = 0;
            let extraScale = 1.0;
            let opacity = 1.0;

            attrs.forEach(attr => {
                const val = (attr.value - 50) / 50; // от -1 до 1
                if (attr.effect === 'rotation') rotationSpeed = val * 2; // скорость вращения
                else if (attr.effect === 'scale') extraScale = 1.0 + val * 0.5; // от 0.5 до 1.5
                else if (attr.effect === 'opacity') opacity = 0.4 + (attr.value / 100) * 0.6; // от 0.4 до 1.0
            });

            // Вращение
            group.rotation.y += rotationSpeed * 0.02;
            // Масштаб (дополнительный к базовому)
            const baseScale = state[id].scale;
            group.scale.set(baseScale * extraScale, baseScale * extraScale, baseScale * extraScale);
            // Прозрачность
            group.userData.sprite.material.opacity = opacity;
        });

        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
    }

    // ============= ИНИЦИАЛИЗАЦИЯ =============
    initScene();
    animate();

    // Resize
    window.addEventListener('resize', () => {
        const w = container.clientWidth, h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
        labelRenderer.setSize(w, h);
    });

    console.log('🟣🦅 Каталог состояний с физикой загружен');
</script>
</body>
</html>
