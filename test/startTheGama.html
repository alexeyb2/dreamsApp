<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🟣🦅 Карта состояний</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0b0814;
            color: #e0d6ff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        #app {
            background: #161127;
            width: 100%;
            max-width: 480px;
            padding: 24px 20px;
            border-radius: 32px;
            box-shadow: 0 12px 40px #000000cc;
            transition: all 0.2s ease;
            position: relative;
        }

        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
            color: #b8a6ff;
        }

        .hidden { display: none !important; }

        .step {
            margin-bottom: 20px;
        }

        .step label {
            display: block;
            font-size: 15px;
            margin-bottom: 6px;
            opacity: 0.9;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 17px;
            background: #221b38;
            border: 1px solid #3a2f5a;
            border-radius: 16px;
            color: #f0eaff;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus { border-color: #7c65c2; }
        input[type="text"]::placeholder { color: #635a82; }

        .body-map {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .body-map button {
            padding: 12px 0;
            background: #221b38;
            border: 1px solid #3a2f5a;
            border-radius: 14px;
            color: #c9bdff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .body-map button.active {
            background: #6f52c4;
            border-color: #8f78e6;
            color: #fff;
        }

        .power-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .power-wrap input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #3a2f5a;
            border-radius: 8px;
        }

        .power-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #8f78e6;
            cursor: pointer;
        }

        #power-val { min-width: 40px; text-align: center; font-weight: 600; }

        .btn-primary {
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            background: #6f52c4;
            color: #fff;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-primary:active { transform: scale(0.97); background: #5d43a8; }
        .btn-secondary {
            background: #2a2348;
            color: #b8a6ff;
        }
        .btn-secondary:active { background: #1f1937; }

        #status {
            margin-top: 12px;
            text-align: center;
            font-size: 14px;
            min-height: 20px;
            color: #9d8cdb;
        }

        /* === ПОЛЕ (STAGE) === */
        #stage-area {
            margin-top: 10px;
            border: 2px dashed #3a2f5a;
            border-radius: 24px;
            background: #100d1e;
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-height: 380px;
            touch-action: none;
            overflow: hidden;
            user-select: none;
        }

        .emoji-draggable {
            position: absolute;
            cursor: grab;
            touch-action: none;
            font-size: 56px;
            line-height: 1;
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.05s;
            pointer-events: auto;
            filter: drop-shadow(0 4px 12px #000000aa);
            will-change: transform, left, top;
            z-index: 10;
        }

        .emoji-draggable:active { cursor: grabbing; }

        .emoji-draggable .label-tag {
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            background: #221b38cc;
            padding: 2px 10px;
            border-radius: 12px;
            white-space: nowrap;
            color: #b8a6ff;
            border: 1px solid #3a2f5a;
            pointer-events: none;
        }

        /* Редактирование на карте */
        .edit-block {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            padding: 12px;
            background: #100d1e;
            border-radius: 20px;
        }

        .edit-item {
            flex: 1;
            min-width: 140px;
        }

        .edit-item label {
            display: block;
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        .edit-item .row {
            display: flex;
            gap: 6px;
        }

        .edit-item input[type="text"] {
            padding: 6px 10px;
            font-size: 15px;
            background: #1f1937;
            border-color: #2e2452;
        }

        .edit-item input.small {
            width: 60px;
            flex-shrink: 0;
        }

        .scale-control {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
            padding: 8px 12px;
            background: #100d1e;
            border-radius: 20px;
        }
        .scale-control label { font-size: 13px; flex-shrink: 0; }
        .scale-control input[type="range"] { flex: 1; }
        .scale-control span { min-width: 36px; text-align: center; }

        .axis-hint {
            display: flex;
            justify-content: space-between;
            padding: 4px 12px;
            font-size: 11px;
            color: #4a3f6a;
            margin-top: -6px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-group .btn-primary { flex: 1; }
        .btn-group .btn-secondary { flex: 1; }

        @media (max-width: 400px) {
            #app { padding: 16px; }
            .emoji-draggable { font-size: 44px; }
        }
    </style>
</head>
<body>

<div id="app">
    <h1>🟣🦅 Карта состояний</h1>

    <!-- ШАГ 1: Чувство -->
    <div id="step1">
        <div class="step">
            <label>Какое чувство ты чувствуешь сейчас?</label>
            <input type="text" id="feeling" placeholder="напиши..." />
        </div>
        <div class="step">
            <label>На какой смайлик оно похоже?</label>
            <input type="text" id="emoji1" placeholder="введи смайлик (например: 😌)" />
        </div>
        <div class="step">
            <label>Где оно в теле?</label>
            <div class="body-map" id="bodyMap">
                <button data-part="голова">🧠 Голова</button>
                <button data-part="грудь">💓 Грудь</button>
                <button data-part="горло">🗣 Горло</button>
                <button data-part="живот">🫀 Живот</button>
                <button data-part="руки">🤲 Руки</button>
                <button data-part="ноги">🦶 Ноги</button>
            </div>
        </div>
        <div class="step">
            <label>Сильное или слабое?</label>
            <div class="power-wrap">
                <span style="opacity:0.5;">Слабое</span>
                <input type="range" id="power" min="0" max="100" value="50" />
                <span style="opacity:0.5;">Сильное</span>
                <span id="power-val">50%</span>
            </div>
        </div>
        <button class="btn-primary" id="to-step2">➡️ Далее: Противоположность</button>
        <div id="status"></div>
    </div>

    <!-- ШАГ 2: Противоположность -->
    <div id="step2" class="hidden">
        <div class="step">
            <label>Какая у него противоположность?</label>
            <input type="text" id="opposite-text" placeholder="название..." />
        </div>
        <div class="step">
            <label>Смайл противоположности</label>
            <input type="text" id="emoji2" placeholder="введи смайлик (например: 😢)" />
        </div>
        <button class="btn-primary" id="to-stage">🗺️ Открыть поле</button>
    </div>

    <!-- ШАГ 3: Игровое поле -->
    <div id="step3" class="hidden">
        <div class="axis-hint">
            <span>⬅️ Слева</span>
            <span>⬆️ Сзади (дальше)</span>
            <span>➡️ Справа</span>
        </div>
        <div id="stage-area">
            <!-- Смайлы будут добавлены через JS -->
        </div>
        <div class="axis-hint">
            <span>⬇️ Спереди (ближе)</span>
        </div>

        <!-- Редактирование имён и смайлов -->
        <div class="edit-block">
            <div class="edit-item">
                <label>Чувство</label>
                <div class="row">
                    <input type="text" id="edit-emoji1" class="small" placeholder="😌" />
                    <input type="text" id="edit-label1" placeholder="имя" />
                </div>
            </div>
            <div class="edit-item">
                <label>Противоположность</label>
                <div class="row">
                    <input type="text" id="edit-emoji2" class="small" placeholder="😢" />
                    <input type="text" id="edit-label2" placeholder="имя" />
                </div>
            </div>
        </div>

        <div class="scale-control">
            <label>📏 Дистанция (масштаб)</label>
            <input type="range" id="scale-slider" min="0.4" max="2.0" step="0.01" value="1.0" />
            <span id="scale-val">1.0</span>
        </div>

        <div class="btn-group">
            <button class="btn-primary" id="reset-positions">🔄 Сброс позиций</button>
            <button class="btn-secondary" id="reset-all">❌ Сбросить всё</button>
        </div>
        <div id="stage-status" style="text-align:center; margin-top:10px; font-size:13px; opacity:0.5;">
            Перетащи смайлы пальцем. Дистанция меняет размер.
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM
        const s1 = document.getElementById('step1');
        const s2 = document.getElementById('step2');
        const s3 = document.getElementById('step3');

        const feeling = document.getElementById('feeling');
        const emoji1 = document.getElementById('emoji1');
        const bodyBtns = document.querySelectorAll('#bodyMap button');
        const power = document.getElementById('power');
        const powerVal = document.getElementById('power-val');

        const oppText = document.getElementById('opposite-text');
        const emoji2 = document.getElementById('emoji2');

        const stageArea = document.getElementById('stage-area');
        const scaleSlider = document.getElementById('scale-slider');
        const scaleVal = document.getElementById('scale-val');
        const resetPosBtn = document.getElementById('reset-positions');
        const resetAllBtn = document.getElementById('reset-all');

        // Поля редактирования на карте
        const editEmoji1 = document.getElementById('edit-emoji1');
        const editLabel1 = document.getElementById('edit-label1');
        const editEmoji2 = document.getElementById('edit-emoji2');
        const editLabel2 = document.getElementById('edit-label2');

        const toStep2Btn = document.getElementById('to-step2');
        const toStageBtn = document.getElementById('to-stage');

        let activeEmojiId = null;
        let emojiData = {};

        // =========== УПРАВЛЕНИЕ ТЕЛОМ ===========
        bodyBtns.forEach(b => b.addEventListener('click', function() {
            bodyBtns.forEach(x => x.classList.remove('active'));
            this.classList.add('active');
        }));

        power.addEventListener('input', () => powerVal.textContent = power.value + '%');

        // =========== ПЕРЕХОДЫ ===========
        toStep2Btn.addEventListener('click', function() {
            if (!feeling.value.trim() || !emoji1.value.trim() || !document.querySelector('#bodyMap button.active')) {
                document.getElementById('status').textContent = '⚠️ Заполни всё и выбери часть тела';
                return;
            }
            s1.classList.add('hidden');
            s2.classList.remove('hidden');
            document.getElementById('status').textContent = '';
        });

        toStageBtn.addEventListener('click', function() {
            if (!oppText.value.trim() || !emoji2.value.trim()) {
                document.getElementById('status').textContent = '⚠️ Введи противоположность и её смайл';
                return;
            }
            s2.classList.add('hidden');
            s3.classList.remove('hidden');
            // сохраняем все данные перед открытием карты
            saveFullState();
            initStage();
        });

        // =========== ИНИЦИАЛИЗАЦИЯ КАРТЫ ===========
        function initStage() {
            const saved = loadFullState();
            // Если данных нет, используем значения из полей
            const e1 = saved.emoji1 || emoji1.value.trim();
            const e2 = saved.emoji2 || emoji2.value.trim();
            const l1 = saved.feeling || feeling.value.trim();
            const l2 = saved.oppText || oppText.value.trim();

            const pos1 = saved.pos1 || { x: 35, y: 45, scale: 1.0 };
            const pos2 = saved.pos2 || { x: 65, y: 55, scale: 1.0 };

            emojiData = {
                1: { emoji: e1, label: l1, x: pos1.x, y: pos1.y, scale: pos1.scale },
                2: { emoji: e2, label: l2, x: pos2.x, y: pos2.y, scale: pos2.scale }
            };

            // Заполнить поля редактирования
            editEmoji1.value = e1;
            editLabel1.value = l1;
            editEmoji2.value = e2;
            editLabel2.value = l2;

            renderEmojis();
            applyScales();
            activeEmojiId = 1;
            scaleSlider.value = emojiData[1].scale;
            scaleVal.textContent = emojiData[1].scale.toFixed(2);
            setupDrag();
        }

        function renderEmojis() {
            stageArea.innerHTML = '';
            for (let id in emojiData) {
                const d = emojiData[id];
                const el = document.createElement('div');
                el.className = 'emoji-draggable';
                el.dataset.id = id;
                el.style.left = d.x + '%';
                el.style.top = d.y + '%';
                el.style.transform = `translate(-50%, -50%) scale(${d.scale})`;
                el.innerHTML = `${d.emoji}<span class="label-tag">${d.label}</span>`;
                stageArea.appendChild(el);
            }
        }

        function applyScales() {
            document.querySelectorAll('.emoji-draggable').forEach(el => {
                const id = el.dataset.id;
                const d = emojiData[id];
                el.style.transform = `translate(-50%, -50%) scale(${d.scale})`;
            });
        }

        // =========== ПЕРЕТАСКИВАНИЕ ===========
        function setupDrag() {
            const emojis = document.querySelectorAll('.emoji-draggable');
            let dragging = false;
            let currentEl = null;
            let startX, startY, startLeft, startTop;

            function onPointerDown(e) {
                const el = e.target.closest('.emoji-draggable');
                if (!el) return;
                e.preventDefault();
                dragging = true;
                currentEl = el;
                activeEmojiId = parseInt(el.dataset.id);
                // обновить слайдер
                scaleSlider.value = emojiData[activeEmojiId].scale;
                scaleVal.textContent = emojiData[activeEmojiId].scale.toFixed(2);

                const rect = stageArea.getBoundingClientRect();
                const p = e.clientX || e.pageX;
                const q = e.clientY || e.pageY;
                startX = p - rect.left;
                startY = q - rect.top;

                const leftPx = parseFloat(el.style.left) || 0;
                const topPx = parseFloat(el.style.top) || 0;
                startLeft = (leftPx / rect.width) * 100;
                startTop = (topPx / rect.height) * 100;
                el.setPointerCapture(e.pointerId);
            }

            function onPointerMove(e) {
                if (!dragging || !currentEl) return;
                e.preventDefault();
                const rect = stageArea.getBoundingClientRect();
                const p = e.clientX || e.pageX;
                const q = e.clientY || e.pageY;
                let dx = ((p - rect.left) / rect.width) * 100;
                let dy = ((q - rect.top) / rect.height) * 100;
                dx = Math.max(0, Math.min(100, dx));
                dy = Math.max(0, Math.min(100, dy));

                currentEl.style.left = dx + '%';
                currentEl.style.top = dy + '%';

                const id = parseInt(currentEl.dataset.id);
                emojiData[id].x = dx;
                emojiData[id].y = dy;
                saveFullState();
            }

            function onPointerUp(e) {
                if (dragging && currentEl) {
                    dragging = false;
                    currentEl = null;
                    saveFullState();
                }
            }

            stageArea.addEventListener('pointerdown', onPointerDown);
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
        }

        // =========== МАСШТАБ ===========
        scaleSlider.addEventListener('input', function() {
            if (activeEmojiId === null) activeEmojiId = 1;
            const val = parseFloat(this.value);
            scaleVal.textContent = val.toFixed(2);
            emojiData[activeEmojiId].scale = val;
            const el = document.querySelector(`.emoji-draggable[data-id="${activeEmojiId}"]`);
            if (el) {
                el.style.transform = `translate(-50%, -50%) scale(${val})`;
            }
            saveFullState();
        });

        // =========== РЕДАКТИРОВАНИЕ ИМЁН И СМАЙЛОВ ===========
        function updateEmojiFromEdit(id) {
            const emojiInput = id === 1 ? editEmoji1 : editEmoji2;
            const labelInput = id === 1 ? editLabel1 : editLabel2;
            const newEmoji = emojiInput.value.trim() || (id === 1 ? '😌' : '😢');
            const newLabel = labelInput.value.trim() || (id === 1 ? 'Чувство' : 'Противоположность');

            emojiData[id].emoji = newEmoji;
            emojiData[id].label = newLabel;
            renderEmojis();
            applyScales();
            saveFullState();
        }

        editEmoji1.addEventListener('input', () => updateEmojiFromEdit(1));
        editLabel1.addEventListener('input', () => updateEmojiFromEdit(1));
        editEmoji2.addEventListener('input', () => updateEmojiFromEdit(2));
        editLabel2.addEventListener('input', () => updateEmojiFromEdit(2));

        // =========== СБРОС ПОЗИЦИЙ ===========
        resetPosBtn.addEventListener('click', function() {
            const mid = { x: 50, y: 50 };
            emojiData[1].x = 35; emojiData[1].y = 45; emojiData[1].scale = 1.0;
            emojiData[2].x = 65; emojiData[2].y = 55; emojiData[2].scale = 1.0;
            renderEmojis();
            applyScales();
            if (activeEmojiId) {
                scaleSlider.value = emojiData[activeEmojiId].scale;
                scaleVal.textContent = emojiData[activeEmojiId].scale.toFixed(2);
            }
            saveFullState();
        });

        // =========== ПОЛНЫЙ СБРОС ===========
        resetAllBtn.addEventListener('click', function() {
            if (confirm('Сбросить все данные и вернуться к началу?')) {
                localStorage.removeItem('mind_state_full');
                location.reload();
            }
        });

        // =========== СОХРАНЕНИЕ / ЗАГРУЗКА ===========
        function saveFullState() {
            const data = {
                feeling: feeling.value.trim() || (emojiData[1]?.label || ''),
                emoji1: emoji1.value.trim() || (emojiData[1]?.emoji || ''),
                bodyPart: document.querySelector('#bodyMap button.active')?.dataset?.part || '',
                power: power.value,
                oppText: oppText.value.trim() || (emojiData[2]?.label || ''),
                emoji2: emoji2.value.trim() || (emojiData[2]?.emoji || ''),
                pos1: { x: emojiData[1]?.x || 35, y: emojiData[1]?.y || 45, scale: emojiData[1]?.scale || 1.0 },
                pos2: { x: emojiData[2]?.x || 65, y: emojiData[2]?.y || 55, scale: emojiData[2]?.scale || 1.0 }
            };
            localStorage.setItem('mind_state_full', JSON.stringify(data));
        }

        function loadFullState() {
            const raw = localStorage.getItem('mind_state_full');
            if (!raw) return {};
            try { return JSON.parse(raw); } catch { return {}; }
        }

        // =========== АВТОЗАГРУЗКА ===========
        function checkAndLoad() {
            const data = loadFullState();
            // Если есть все ключевые поля — показываем карту сразу
            if (data.feeling && data.emoji1 && data.bodyPart && data.oppText && data.emoji2) {
                // заполним скрытые поля, чтобы при сохранении они не потерялись
                feeling.value = data.feeling;
                emoji1.value = data.emoji1;
                oppText.value = data.oppText;
                emoji2.value = data.emoji2;
                power.value = data.power || 50;
                powerVal.textContent = power.value + '%';
                const btn = document.querySelector(`#bodyMap button[data-part="${data.bodyPart}"]`);
                if (btn) btn.classList.add('active');

                s1.classList.add('hidden');
                s2.classList.add('hidden');
                s3.classList.remove('hidden');
                initStage();
            } else {
                // иначе показываем шаг 1
                s1.classList.remove('hidden');
                s2.classList.add('hidden');
                s3.classList.add('hidden');
                // восстановим, что можно
                if (data.feeling) feeling.value = data.feeling;
                if (data.emoji1) emoji1.value = data.emoji1;
                if (data.power) { power.value = data.power; powerVal.textContent = data.power + '%'; }
                if (data.bodyPart) {
                    const btn = document.querySelector(`#bodyMap button[data-part="${data.bodyPart}"]`);
                    if (btn) btn.classList.add('active');
                }
                if (data.oppText) oppText.value = data.oppText;
                if (data.emoji2) emoji2.value = data.emoji2;
            }
        }

        checkAndLoad();
    })();
</script>
</body>
</html>
