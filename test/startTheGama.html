<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🟣🦅 3D Карта состояний</title>
    <!-- Three.js через import map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814;
            color: #e0d6ff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            touch-action: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
        }

        /* 3D-холст занимает верхнюю часть */
        #canvas-container {
            flex: 1;
            position: relative;
            background: #100d1e;
            touch-action: none;
        }

        #canvas-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Панель управления внизу */
        #ui-panel {
            background: #161127;
            padding: 16px 20px;
            border-radius: 32px 32px 0 0;
            max-height: 45vh;
            overflow-y: auto;
            backdrop-filter: blur(12px);
            box-shadow: 0 -8px 30px rgba(0,0,0,0.8);
            touch-action: pan-y;
        }

        .edit-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .edit-item {
            flex: 1;
            min-width: 120px;
        }

        .edit-item label {
            display: block;
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 2px;
        }

        .edit-item .row {
            display: flex;
            gap: 6px;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            font-size: 15px;
            background: #221b38;
            border: 1px solid #3a2f5a;
            border-radius: 12px;
            color: #f0eaff;
            outline: none;
        }

        input.small { width: 60px; flex-shrink: 0; }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 8px 0;
        }

        .slider-group label {
            font-size: 14px;
            min-width: 70px;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #3a2f5a;
            border-radius: 8px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #8f78e6;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
        }

        .btn-primary { background: #6f52c4; }
        .btn-primary:active { transform: scale(0.95); background: #5d43a8; }

        .btn-secondary { background: #2a2348; }
        .btn-secondary:active { background: #1f1937; }

        .btn-danger { background: #a03a3a; }
        .btn-danger:active { background: #7a2b2b; }

        #status {
            text-align: center;
            font-size: 13px;
            opacity: 0.7;
            margin-top: 8px;
        }

        /* Индикатор активного объекта */
        #active-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(22,17,39,0.8);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #b8a6ff;
            pointer-events: none;
            white-space: nowrap;
        }

        @media (max-width: 600px) {
            #ui-panel { padding: 12px; }
            .edit-item { min-width: 80px; }
            .slider-group label { min-width: 50px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="canvas-container">
        <div id="active-indicator">👆 Коснись эмодзи, чтобы выбрать</div>
    </div>

    <div id="ui-panel">
        <!-- Редактирование имён и смайлов -->
        <div class="edit-row">
            <div class="edit-item">
                <label>Чувство</label>
                <div class="row">
                    <input type="text" id="edit-emoji1" class="small" placeholder="😌" />
                    <input type="text" id="edit-label1" placeholder="имя" />
                </div>
            </div>
            <div class="edit-item">
                <label>Противоположность</label>
                <div class="row">
                    <input type="text" id="edit-emoji2" class="small" placeholder="😢" />
                    <input type="text" id="edit-label2" placeholder="имя" />
                </div>
            </div>
        </div>

        <!-- Слайдеры -->
        <div class="slider-group">
            <label>📏 Масштаб</label>
            <input type="range" id="scale-slider" min="0.3" max="2.5" step="0.01" value="1.0" />
            <span id="scale-val" style="min-width:36px;">1.0</span>
        </div>

        <div class="slider-group">
            <label>⬆ Высота (Y)</label>
            <input type="range" id="height-slider" min="-2" max="4" step="0.01" value="0" />
            <span id="height-val" style="min-width:36px;">0.0</span>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" id="reset-positions">🔄 Сброс позиций</button>
            <button class="btn btn-danger" id="reset-all">❌ Сбросить всё</button>
        </div>
        <div id="status">Перетащи эмодзи по полу. Камера вращается жестом.</div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ===== DOM =====
    const container = document.getElementById('canvas-container');
    const uiPanel = document.getElementById('ui-panel');
    const statusDiv = document.getElementById('status');
    const activeIndicator = document.getElementById('active-indicator');

    const editEmoji1 = document.getElementById('edit-emoji1');
    const editLabel1 = document.getElementById('edit-label1');
    const editEmoji2 = document.getElementById('edit-emoji2');
    const editLabel2 = document.getElementById('edit-label2');

    const scaleSlider = document.getElementById('scale-slider');
    const scaleVal = document.getElementById('scale-val');
    const heightSlider = document.getElementById('height-slider');
    const heightVal = document.getElementById('height-val');
    const resetPosBtn = document.getElementById('reset-positions');
    const resetAllBtn = document.getElementById('reset-all');

    // ===== Three.js Setup =====
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x100d1e);

    // Камера
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(6, 4, 8);
    camera.lookAt(0, 0, 0);

    // Рендерер WebGL
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    // CSS2D Renderer для меток
    const labelRenderer = new CSS2DRenderer();
    labelRenderer.setSize(container.clientWidth, container.clientHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none'; // метки не перехватывают клики
    container.appendChild(labelRenderer.domElement);

    // Орбитальные контролы
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 3;
    controls.maxDistance = 20;
    controls.touchRotate = true;
    controls.touchZoom = true;
    controls.touchPan = true;

    // ===== Освещение =====
    const ambientLight = new THREE.AmbientLight(0x404060);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const backLight = new THREE.DirectionalLight(0x4466ff, 0.5);
    backLight.position.set(-5, 0, -5);
    scene.add(backLight);

    // ===== Пол =====
    const gridHelper = new THREE.GridHelper(10, 10, 0x6f52c4, 0x3a2f5a);
    gridHelper.position.y = -0.01;
    scene.add(gridHelper);

    // Декоративная плоскость пола (прозрачная, для теней)
    const floorMat = new THREE.ShadowMaterial({ opacity: 0.3, color: 0x000000 });
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(12, 12),
        floorMat
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    floor.receiveShadow = true;
    scene.add(floor);

    // ===== Создание спрайтов с эмодзи =====
    function createEmojiSprite(emoji, label, color = '#b8a6ff') {
        // Создаём Canvas с текстом
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');

        // Очистка
        ctx.clearRect(0, 0, 256, 256);

        // Рисуем круглый фон (прозрачный, чуть свечение)
        const gradient = ctx.createRadialGradient(128, 128, 20, 128, 128, 120);
        gradient.addColorStop(0, 'rgba(111, 82, 196, 0.3)');
        gradient.addColorStop(1, 'rgba(111, 82, 196, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(128, 128, 120, 0, Math.PI * 2);
        ctx.fill();

        // Эмодзи по центру
        ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 128, 128);

        // Создаём текстуру и спрайт
        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;

        const material = new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            depthWrite: false,
            blending: THREE.NormalBlending
        });

        const sprite = new THREE.Sprite(material);
        sprite.scale.set(1.5, 1.5, 1);

        // Метка (CSS2D) под спрайтом
        const labelDiv = document.createElement('div');
        labelDiv.textContent = label;
        labelDiv.style.color = color;
        labelDiv.style.fontSize = '16px';
        labelDiv.style.fontWeight = '500';
        labelDiv.style.textShadow = '0 2px 10px rgba(0,0,0,0.8)';
        labelDiv.style.background = 'rgba(22,17,39,0.7)';
        labelDiv.style.padding = '2px 12px';
        labelDiv.style.borderRadius = '12px';
        labelDiv.style.border = '1px solid #3a2f5a';
        labelDiv.style.backdropFilter = 'blur(4px)';
        labelDiv.style.pointerEvents = 'none';

        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(0, -1.2, 0); // ниже спрайта

        // Группируем спрайт и метку
        const group = new THREE.Group();
        group.add(sprite);
        group.add(labelObj);

        // Сохраняем ссылки для обновления
        group.userData = { sprite, labelObj, labelDiv, emoji, label };

        return group;
    }

    // ===== Данные =====
    let emojiData = {
        1: { emoji: '😌', label: 'Спокойствие', x: -1.5, z: 0, y: 0, scale: 1.0 },
        2: { emoji: '😢', label: 'Печаль', x: 1.5, z: 0, y: 0, scale: 1.0 }
    };

    // Загружаем из localStorage
    function loadState() {
        const raw = localStorage.getItem('mind_3d_state');
        if (!raw) return;
        try {
            const saved = JSON.parse(raw);
            if (saved.emoji1) emojiData[1].emoji = saved.emoji1;
            if (saved.label1) emojiData[1].label = saved.label1;
            if (saved.emoji2) emojiData[2].emoji = saved.emoji2;
            if (saved.label2) emojiData[2].label = saved.label2;
            if (saved.pos1) {
                emojiData[1].x = saved.pos1.x ?? -1.5;
                emojiData[1].y = saved.pos1.y ?? 0;
                emojiData[1].z = saved.pos1.z ?? 0;
                emojiData[1].scale = saved.pos1.scale ?? 1.0;
            }
            if (saved.pos2) {
                emojiData[2].x = saved.pos2.x ?? 1.5;
                emojiData[2].y = saved.pos2.y ?? 0;
                emojiData[2].z = saved.pos2.z ?? 0;
                emojiData[2].scale = saved.pos2.scale ?? 1.0;
            }
        } catch (e) {}
    }

    function saveState() {
        const data = {
            emoji1: emojiData[1].emoji,
            label1: emojiData[1].label,
            emoji2: emojiData[2].emoji,
            label2: emojiData[2].label,
            pos1: { x: emojiData[1].x, y: emojiData[1].y, z: emojiData[1].z, scale: emojiData[1].scale },
            pos2: { x: emojiData[2].x, y: emojiData[2].y, z: emojiData[2].z, scale: emojiData[2].scale }
        };
        localStorage.setItem('mind_3d_state', JSON.stringify(data));
    }

    loadState();

    // Создаём объекты
    const group1 = createEmojiSprite(emojiData[1].emoji, emojiData[1].label, '#8f78e6');
    group1.position.set(emojiData[1].x, emojiData[1].y, emojiData[1].z);
    group1.scale.set(emojiData[1].scale, emojiData[1].scale, emojiData[1].scale);
    scene.add(group1);

    const group2 = createEmojiSprite(emojiData[2].emoji, emojiData[2].label, '#e6788f');
    group2.position.set(emojiData[2].x, emojiData[2].y, emojiData[2].z);
    group2.scale.set(emojiData[2].scale, emojiData[2].scale, emojiData[2].scale);
    scene.add(group2);

    // Обновляем UI
    function updateUI() {
        editEmoji1.value = emojiData[1].emoji;
        editLabel1.value = emojiData[1].label;
        editEmoji2.value = emojiData[2].emoji;
        editLabel2.value = emojiData[2].label;
        scaleSlider.value = emojiData[activeId].scale;
        scaleVal.textContent = emojiData[activeId].scale.toFixed(2);
        heightSlider.value = emojiData[activeId].y;
        heightVal.textContent = emojiData[activeId].y.toFixed(2);
    }

    let activeId = 1;
    updateUI();

    // ===== Обновление спрайтов при изменении эмодзи/имени =====
    function updateSprite(group, id) {
        const data = emojiData[id];
        const sprite = group.userData.sprite;
        const labelDiv = group.userData.labelDiv;

        // Обновляем текстуру
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(128, 128, 20, 128, 128, 120);
        gradient.addColorStop(0, 'rgba(111, 82, 196, 0.3)');
        gradient.addColorStop(1, 'rgba(111, 82, 196, 0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(128, 128, 120, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(data.emoji, 128, 128);
        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        sprite.material.map = texture;
        sprite.material.needsUpdate = true;

        // Обновляем метку
        labelDiv.textContent = data.label;

        // Масштаб
        const s = data.scale;
        group.scale.set(s, s, s);

        // Позиция
        group.position.set(data.x, data.y, data.z);
    }

    // ===== Обработчики UI =====
    editEmoji1.addEventListener('input', () => {
        emojiData[1].emoji = editEmoji1.value.trim() || '😌';
        updateSprite(group1, 1);
        saveState();
    });
    editLabel1.addEventListener('input', () => {
        emojiData[1].label = editLabel1.value.trim() || 'Чувство';
        updateSprite(group1, 1);
        saveState();
    });
    editEmoji2.addEventListener('input', () => {
        emojiData[2].emoji = editEmoji2.value.trim() || '😢';
        updateSprite(group2, 2);
        saveState();
    });
    editLabel2.addEventListener('input', () => {
        emojiData[2].label = editLabel2.value.trim() || 'Противоположность';
        updateSprite(group2, 2);
        saveState();
    });

    // Масштаб
    scaleSlider.addEventListener('input', () => {
        const val = parseFloat(scaleSlider.value);
        scaleVal.textContent = val.toFixed(2);
        emojiData[activeId].scale = val;
        const group = activeId === 1 ? group1 : group2;
        group.scale.set(val, val, val);
        saveState();
    });

    // Высота
    heightSlider.addEventListener('input', () => {
        const val = parseFloat(heightSlider.value);
        heightVal.textContent = val.toFixed(2);
        emojiData[activeId].y = val;
        const group = activeId === 1 ? group1 : group2;
        group.position.y = val;
        saveState();
    });

    // Сброс позиций (всех)
    resetPosBtn.addEventListener('click', () => {
        emojiData[1].x = -1.5; emojiData[1].z = 0; emojiData[1].y = 0; emojiData[1].scale = 1.0;
        emojiData[2].x = 1.5; emojiData[2].z = 0; emojiData[2].y = 0; emojiData[2].scale = 1.0;
        group1.position.set(-1.5, 0, 0);
        group1.scale.set(1, 1, 1);
        group2.position.set(1.5, 0, 0);
        group2.scale.set(1, 1, 1);
        updateUI();
        saveState();
    });

    // Полный сброс
    resetAllBtn.addEventListener('click', () => {
        if (confirm('Сбросить все данные и вернуться к начальному экрану?')) {
            localStorage.removeItem('mind_3d_state');
            location.reload();
        }
    });

    // ===== Выбор активного объекта (клик/тап) =====
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function getPointer(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((event.clientX || event.pageX) - rect.left) / rect.width * 2 - 1;
        pointer.y = -((event.clientY || event.pageY) - rect.top) / rect.height * 2 + 1;
    }

    function onPointerDown(event) {
        getPointer(event);
        raycaster.setFromCamera(pointer, camera);

        // Собираем спрайты из групп
        const sprites = [group1.children[0], group2.children[0]];
        const intersects = raycaster.intersectObjects(sprites);

        if (intersects.length > 0) {
            const hit = intersects[0].object;
            // Определяем, к какой группе принадлежит
            if (hit === group1.children[0]) {
                activeId = 1;
                activeIndicator.textContent = '👉 ' + emojiData[1].emoji + ' ' + emojiData[1].label;
            } else if (hit === group2.children[0]) {
                activeId = 2;
                activeIndicator.textContent = '👉 ' + emojiData[2].emoji + ' ' + emojiData[2].label;
            }
            updateUI();
            // Включаем режим перетаскивания (запоминаем)
            isDragging = true;
            dragGroup = activeId === 1 ? group1 : group2;
            // Запоминаем смещение
            const intersectPoint = intersects[0].point;
            dragOffset.copy(intersectPoint).sub(dragGroup.position);
            controls.enabled = false; // отключаем орбиту на время перетаскивания
        } else {
            // Клик по пустому месту – можно сбросить выделение, но оставим активным
        }
    }

    let isDragging = false;
    let dragGroup = null;
    const dragOffset = new THREE.Vector3();
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // горизонтальная плоскость

    function onPointerMove(event) {
        if (!isDragging || !dragGroup) {
            // OrbitControls сам обрабатывает вращение
            return;
        }
        getPointer(event);
        raycaster.setFromCamera(pointer, camera);

        // Проецируем луч на горизонтальную плоскость Y=0 (или на текущую высоту объекта?)
        // Для простоты используем плоскость Y = dragGroup.position.y (чтобы двигать по горизонтали на той же высоте)
        plane.set(new THREE.Vector3(0, 1, 0), -dragGroup.position.y);
        const intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, intersectPoint);

        if (intersectPoint) {
            const newPos = intersectPoint.clone().sub(dragOffset);
            // Ограничиваем по XZ
            newPos.x = Math.max(-4, Math.min(4, newPos.x));
            newPos.z = Math.max(-4, Math.min(4, newPos.z));
            dragGroup.position.copy(newPos);
            // Обновляем данные
            const id = activeId;
            emojiData[id].x = newPos.x;
            emojiData[id].z = newPos.z;
            saveState();
        }
    }

    function onPointerUp(event) {
        if (isDragging) {
            isDragging = false;
            dragGroup = null;
            controls.enabled = true;
            saveState();
        }
    }

    // Подключаем события к canvas
    const canvas = renderer.domElement;
    canvas.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);

    // ===== Адаптивный resize =====
    function onResize() {
        const width = container.clientWidth;
        const height = container.clientHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height);
        labelRenderer.setSize(width, height);
    }

    window.addEventListener('resize', onResize);

    // ===== Анимационный цикл =====
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
    }
    animate();

    // Начальное обновление UI
    updateUI();
    activeIndicator.textContent = '👉 ' + emojiData[1].emoji + ' ' + emojiData[1].label;

    // ===== Дополнительно: Звезды на заднем фоне =====
    function addStars() {
        const vertices = [];
        for (let i = 0; i < 1000; i++) {
            const x = (Math.random() - 0.5) * 200;
            const y = (Math.random() - 0.5) * 200;
            const z = (Math.random() - 0.5) * 200;
            vertices.push(x, y, z);
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x8f78e6, size: 0.15, transparent: true });
        const stars = new THREE.Points(geometry, material);
        scene.add(stars);
    }
    addStars();

    console.log('🟣🦅 3D Карта состояний загружена');
</script>
</body>
