<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Сердце и Мозг</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; }
        #info {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(22,17,39,0.8); padding: 8px 20px; border-radius: 20px;
            color: #b8a6ff; font-family: system-ui; font-size: 14px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">👆 Коснись, чтобы вращать (жест двумя пальцами для зума)</div>

    <!-- Подключаем Three.js и OrbitControls через старые скрипты (гарантированно работает на мобилках) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. Сцена, Камера, Рендерер
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0814);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4, 5, 7); // Вид немного сверху сбоку
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // 2. Освещение
        scene.add(new THREE.AmbientLight(0x404060));
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // 3. Создаём спрайт (эмодзи) в 3D
        function createEmoji(emoji, position) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.font = '180px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 128, 128);
            
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, transparent: true }));
            sprite.scale.set(1.8, 1.8, 1);
            sprite.position.set(position.x, position.y, position.z);
            return sprite;
        }

        // Расставляем ровно так, как на твоём рисунке
        const heart = createEmoji('❤️', { x: -2.0, y: 1.5, z: 0 });
        const brain = createEmoji('🧠', { x: 2.0, y: -1.5, z: 0 });
        scene.add(heart);
        scene.add(brain);

        // 4. Белые оси (перекрестие)
        function drawLine(points, color = 0xffffff, opacity = 0.7) {
            const geometry = new THREE.BufferGeometry().setFromPoints(
                points.map(p => new THREE.Vector3(p.x, p.y, p.z))
            );
            const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            return line;
        }

        drawLine([{x:-5,y:0,z:0}, {x:5,y:0,z:0}]); // Горизонталь
        drawLine([{x:0,y:-5,z:0}, {x:0,y:5,z:0}]); // Вертикаль

        // 5. Жёлтые линии (как на рисунке - контур и связи)
        // Имитируем жёлтую петлю, которую ты нарисовал
        const yellowColor = 0xffcc00;
        
        // Линия от сердца к центру
        drawLine([{x:-2,y:1.5,z:0}, {x:0,y:0,z:0}], yellowColor);
        // Линия от мозга к центру
        drawLine([{x:2,y:-1.5,z:0}, {x:0,y:0,z:0}], yellowColor);
        
        // Жёлтый контур-петля вокруг них (эллипс/овал)
        const contourPoints = [];
        const a = 3.0; // ширина
        const b = 2.5; // высота
        for (let i = 0; i <= 50; i++) {
            const angle = (i / 50) * Math.PI * 2;
            contourPoints.push({
                x: Math.cos(angle) * a - 0.2, // чуть смещён, как на рисунке
                y: Math.sin(angle) * b + 0.1,
                z: 0
            });
        }
        drawLine(contourPoints, yellowColor, 0.5); // Полупрозрачный контур

        // 6. Жёлтый центр (точка 0,0)
        const centerSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.15, 16, 16),
            new THREE.MeshBasicMaterial({ color: 0xffcc00 })
        );
        centerSphere.position.set(0, 0, 0);
        scene.add(centerSphere);

        // 7. Анимация
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 8. Адаптация под экран
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
