<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Sin Interactive Concept</title>
    <style>
        body {
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 300px;
            height: 300px;
            border: 1px dashed #444;
            border-radius: 50%;
        }

        .element {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* Расположение по кругу */
        .fire { top: 0; left: 50%; transform: translate(-50%, -50%); border: 2px solid #ff4d4d; }
        .earth { top: 30%; right: 0; transform: translate(50%, -50%); border: 2px solid #ffcc00; }
        .metal { bottom: 0; right: 20%; transform: translate(0, 50%); border: 2px solid #e0e0e0; }
        .water { bottom: 0; left: 20%; transform: translate(0, 50%); border: 2px solid #3399ff; }
        .wood { top: 30%; left: 0; transform: translate(-50%, -50%); border: 2px solid #4CAF50; }

        .element:hover {
            transform: scale(1.2) translate(var(--tw-translate-x), var(--tw-translate-y)); /* Упрощено для примера */
            box-shadow: 0 0 20px currentColor;
        }

        .info {
            margin-top: 80px;
            text-align: center;
            max-width: 80%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        h2 { color: #aaa; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Огонь -->
        <div class="element fire" onclick="showInfo('Огонь', 'Создает Землю, но боится Воды. Если Огня слишком много, Вода испарится!')">🔥</div>
        <!-- Земля -->
        <div class="element earth" onclick="showInfo('Земля', 'Создает Металл, поглощает Воду.')">🌐</div>
        <!-- Металл -->
        <div class="element metal" onclick="showInfo('Металл', 'Создает Воду, рубит Дерево.')">⚔️</div>
        <!-- Вода -->
        <div class="element water" onclick="showInfo('Вода', 'Питает Дерево, тушит Огонь. Мало воды — она испарится.')">🫧</div>
        <!-- Дерево -->
        <div class="element wood" onclick="showInfo('Дерево', 'Питает Огонь, истощает Землю.')">🌴</div>
    </div>

    <div class="info">
        <h2 id="title">Нажми на стихию</h2>
        <p id="desc">Проверь, как работают связи в твоем приложении.</p>
    </div>

    <script>
        function showInfo(name, text) {
            document.getElementById('title').innerText = name;
            document.getElementById('title').style.color = 'white';
            document.getElementById('desc').innerText = text;
        }
    </script>
</body>
</html>
