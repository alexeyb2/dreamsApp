<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Sin: Баланс  100%</title>
    <style>
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 1.2rem; color: #888; letter-spacing: 2px; }
        #total-status { font-weight: bold; color: #52b788; }

        .world {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            height: 400px;
            padding: 25px;
            background: #151515;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            border: 1px solid #222;
        }

        .element-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 60px;
            height: 100%;
        }

        .bar-wrapper {
            width: 35px;
            height: 300px;
            background: #222;
            border-radius: 20px;
            position: relative;
            overflow: visible;
            cursor: pointer;
            border: 1px solid #333;
        }

        .bar-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            border-radius: 20px;
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            box-shadow: 0 0 15px currentColor;
        }

        /* Цвета шкал */
        .wood { color: #52b788; } .wood .bar-fill { background: #2d6a4f; }
        .fire { color: #ff4d4d; } .fire .bar-fill { background: #9b2226; }
        .earth { color: #ffcc00; } .earth .bar-fill { background: #bb9457; }
        .metal { color: #e0e0e0; } .metal .bar-fill { background: #4a4e69; }
        .water { color: #3399ff; } .water .bar-fill { background: #0077b6; }

        .icon { font-size: 28px; margin-bottom: 10px; transition: transform 0.3s; }
        .percent { font-size: 12px; margin-top: 10px; font-weight: bold; }

        /* Анимация критического состояния */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
            100% { transform: translateX(0); }
        }
        .critical { animation: shake 0.1s infinite; }

        .hint {
            margin-top: 30px;
            color: #555;
            font-size: 13px;
            max-width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>СИСТЕМА У-СИН</h1>
        <div id="total-status">БАЛАНС: 100%</div>
    </div>

    <div class="world">
        <!-- Дерево -->
        <div class="element-column wood" onclick="adjust('wood')">
            <div class="icon">🌴</div>
            <div class="bar-wrapper" id="wood-wrap"><div id="wood-bar" class="bar-fill"></div></div>
            <div class="percent" id="wood-pct">20%</div>
        </div>
        <!-- Огонь -->
        <div class="element-column fire" onclick="adjust('fire')">
            <div class="icon">🔥</div>
            <div class="bar-wrapper" id="fire-wrap"><div id="fire-bar" class="bar-fill"></div></div>
            <div class="percent" id="fire-pct">20%</div>
        </div>
        <!-- Земля -->
        <div class="element-column earth" onclick="adjust('earth')">
            <div class="icon">🌐</div>
            <div class="bar-wrapper" id="earth-wrap"><div id="earth-bar" class="bar-fill"></div></div>
            <div class="percent" id="earth-pct">20%</div>
        </div>
        <!-- Металл -->
        <div class="element-column metal" onclick="adjust('metal')">
            <div class="icon">⚔️</div>
            <div class="bar-wrapper" id="metal-wrap"><div id="metal-bar" class="bar-fill"></div></div>
            <div class="percent" id="metal-pct">20%</div>
        </div>
        <!-- Вода -->
        <div class="element-column water" onclick="adjust('water')">
            <div class="icon">🫧</div>
            <div class="bar-wrapper" id="water-wrap"><div id="water-bar" class="bar-fill"></div></div>
            <div class="percent" id="water-pct">20%</div>
        </div>
    </div>

    <p class="hint">Нажимай на стихию, чтобы усилить её. Помни: энергия берется у других!</p>

    <script>
        // Идеальный старт: всем по 20%
        let state = { wood: 20, fire: 20, earth: 20, metal: 20, water: 20 };
        const order = ['wood', 'fire', 'earth', 'metal', 'water'];

        function updateUI() {
            order.forEach(el => {
                const val = state[el];
                const bar = document.getElementById(el + '-bar');
                const pct = document.getElementById(el + '-pct');
                const wrap = document.getElementById(el + '-wrap');
                
                bar.style.height = (val * 3) + 'px'; // Визуальное масштабирование
                pct.innerText = Math.round(val) + '%';
                
                // Эффект тряски при дисбалансе
                if (val > 45 || val < 5) wrap.classList.add('critical');
                else wrap.classList.remove('critical');
            });
        }

        function adjust(selected) {
            const step = 10; // На сколько растет стихия за клик
            
            // 1. Увеличиваем выбранную
            state[selected] += step;
            if (state[selected] > 80) state[selected] = 80;

            // 2. Распределяем "нагрузку" на остальные
            // Больше всего забираем у того, кого эта стихия ПОДАВЛЯЕТ (по звезде)
            const victims = {
                'wood': 'earth',
                'fire': 'metal',
                'earth': 'water',
                'metal': 'wood',
                'water': 'fire'
            };

            const victim = victims[selected];
            const others = order.filter(el => el !== selected);
            
            // Расчет: жертва теряет 60% от шага, остальные поровну остальное
            others.forEach(el => {
                let reduction = (el === victim) ? step * 0.6 : step * 0.133;
                state[el] -= reduction;
                if (state[el] < 2) state[el] = 2; // Минимум 2%
            });

            // 3. Нормализация (чтобы сумма всегда была 100)
            const sum = Object.values(state).reduce((a, b) => a + b, 0);
            order.forEach(el => {
                state[el] = (state[el] / sum) * 100;
            });

            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
