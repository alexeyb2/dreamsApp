<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Sin God Mode</title>
    <style>
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .world {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            height: 350px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .element-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 55px;
            height: 100%;
        }

        .bar-wrapper {
            width: 100%;
            height: 250px;
            background: #252525;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #333;
        }

        .bar-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 50%;
            transition: height 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67), background 0.3s;
        }

        .icon { font-size: 30px; margin-bottom: 10px; z-index: 10; }
        .label { font-size: 10px; color: #666; margin-top: 8px; text-transform: uppercase; }

        /* Цвета шкал */
        .wood .bar-fill { background: linear-gradient(to top, #1b4332, #52b788); }
        .fire .bar-fill { background: linear-gradient(to top, #780000, #ff4d4d); }
        .earth .bar-fill { background: linear-gradient(to top, #7e6325, #ffcc00); }
        .metal .bar-fill { background: linear-gradient(to top, #4a4e69, #adc178); color: #fff; } /* Металл в У-син часто белый/желтый */
        .metal .bar-fill { background: linear-gradient(to top, #444, #e0e0e0); }
        .water .bar-fill { background: linear-gradient(to top, #003049, #3399ff); }

        .hint {
            margin-top: 30px;
            text-align: center;
            color: #888;
            max-width: 300px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2 id="status">Баланс Стихий</h2>

    <div class="world">
        <div class="element-column wood" onclick="change('wood', 80)">
            <div class="icon">🌴</div>
            <div class="bar-wrapper"><div id="wood-bar" class="bar-fill"></div></div>
            <div class="label">Дерево</div>
        </div>
        <div class="element-column fire" onclick="change('fire', 80)">
            <div class="icon">🔥</div>
            <div class="bar-wrapper"><div id="fire-bar" class="bar-fill"></div></div>
            <div class="label">Огонь</div>
        </div>
        <div class="element-column earth" onclick="change('earth', 80)">
            <div class="icon">🌐</div>
            <div class="bar-wrapper"><div id="earth-bar" class="bar-fill"></div></div>
            <div class="label">Земля</div>
        </div>
        <div class="element-column metal" onclick="change('metal', 80)">
            <div class="icon">⚔️</div>
            <div class="bar-wrapper"><div id="metal-bar" class="bar-fill"></div></div>
            <div class="label">Металл</div>
        </div>
        <div class="element-column water" onclick="change('water', 80)">
            <div class="icon">🫧</div>
            <div class="bar-wrapper"><div id="water-bar" class="bar-fill"></div></div>
            <div class="label">Вода</div>
        </div>
    </div>

    <p class="hint">Нажимай на верхнюю часть любой шкалы, чтобы усилить стихию и увидеть цепную реакцию.</p>

    <script>
        // Начальные значения
        let levels = { wood: 40, fire: 40, earth: 40, metal: 40, water: 40 };

        function updateUI() {
            for (let el in levels) {
                document.getElementById(el + '-bar').style.height = levels[el] + '%';
            }
        }

        function change(el, val) {
            // 1. Увеличиваем выбранную стихию
            levels[el] = 90;

            // 2. Логика цепной реакции (У-син)
            if (el === 'water') {
                levels.wood += 30;  // Вода кормит Дерево
                levels.fire -= 50;  // Вода тушит Огонь
            }
            if (el === 'fire') {
                levels.earth += 30; // Огонь создает Землю
                levels.metal -= 50; // Огонь плавит Металл
            }
            if (el === 'wood') {
                levels.fire += 30;  // Дерево питает Огонь
                levels.earth -= 50; // Дерево истощает Землю
            }
            if (el === 'earth') {
                levels.metal += 30; // Земля рождает Металл
                levels.water -= 50; // Земля впитывает Воду
            }
            if (el === 'metal') {
                levels.water += 30; // Металл дает Воду (конденсат)
                levels.wood -= 50;  // Металл рубит Дерево
            }

            // Ограничители 0-100
            for (let k in levels) {
                if (levels[k] > 100) levels[k] = 100;
                if (levels[k] < 5) levels[k] = 5;
            }

            updateUI();
            
            // Плавное возвращение к балансу (саморегуляция)
            setTimeout(() => {
                for (let k in levels) {
                    levels[k] = levels[k] > 40 ? levels[k] - 5 : levels[k] + 2;
                }
                updateUI();
            }, 1000);
        }

        updateUI();
    </script>
</body>
</html>
