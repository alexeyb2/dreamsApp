<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Sin Balance Prototype</title>
    <style>
        body {
            background: #121212;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .stage {
            position: relative;
            width: 320px;
            height: 400px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 50px;
            background: radial-gradient(circle, #222 0%, #121212 100%);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .element-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px;
        }

        .icon { font-size: 40px; margin-bottom: 10px; transition: transform 0.2s; }
        
        /* Визуальные шкалы */
        .bar-container {
            width: 20px;
            height: 200px;
            background: #333;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 0.3s ease, background 0.3s;
        }

        /* Цвета стихий */
        #fire-bar { background: linear-gradient(to top, #ff4d4d, #ff944d); height: 50%; }
        #wood-bar { background: linear-gradient(to top, #2d6a4f, #52b788); height: 20%; }
        #water-bar { background: linear-gradient(to top, #0077b6, #00b4d8); height: 30%; }

        .controls {
            margin-top: 30px;
            width: 280px;
            text-align: center;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        .label { font-size: 14px; color: #888; margin-top: 5px; }
        .status { margin-top: 15px; font-weight: bold; color: #ffcc00; height: 20px; }
    </style>
</head>
<body>

    <div class="stage">
        <!-- ОГОНЬ (Слева) -->
        <div class="element-group">
            <div class="icon" id="fire-icon">🔥</div>
            <div class="bar-container">
                <div id="fire-bar" class="bar"></div>
            </div>
            <div class="label">Огонь</div>
        </div>

        <!-- ДЕРЕВО (Центр) -->
        <div class="element-group">
            <div class="icon" id="wood-icon">🌴</div>
            <div class="bar-container">
                <div id="wood-bar" class="bar"></div>
            </div>
            <div class="label">Дерево</div>
        </div>

        <!-- ВОДА (Справа) -->
        <div class="element-group">
            <div class="icon" id="water-icon">🫧</div>
            <div class="bar-container">
                <div id="water-bar" class="bar"></div>
            </div>
            <div class="label">Вода</div>
        </div>
    </div>

    <div class="controls">
        <div class="status" id="status-text">Баланс соблюден</div>
        <input type="range" id="water-slider" min="0" max="100" value="30">
        <div class="label">Управляй уровнем ВОДЫ пальцем</div>
    </div>

    <script>
        const slider = document.getElementById('water-slider');
        const waterBar = document.getElementById('water-bar');
        const fireBar = document.getElementById('fire-bar');
        const woodBar = document.getElementById('wood-bar');
        const statusText = document.getElementById('status-text');

        slider.addEventListener('input', (e) => {
            const waterVal = parseInt(e.target.value);
            
            // 1. Уровень воды
            waterBar.style.height = waterVal + '%';

            // 2. Логика Дерева: Вода питает дерево (до определенного момента)
            let woodVal = waterVal * 1.2; 
            if (woodVal > 100) woodVal = 100;
            woodBar.style.height = woodVal + '%';

            // 3. Логика Огня: Вода тушит огонь
            // Чем выше вода, тем ниже огонь
            let fireVal = 100 - (waterVal * 1.5);
            if (fireVal < 0) fireVal = 0;
            fireBar.style.height = fireVal + '%';

            // 4. Текстовые подсказки
            if (waterVal > 80) {
                statusText.innerText = "⚠️ Наводнение! Огонь погас.";
                statusText.style.color = "#3399ff";
            } else if (waterVal < 10) {
                statusText.innerText = "🔥 Засуха! Огонь слишком сильный.";
                statusText.style.color = "#ff4d4d";
            } else {
                statusText.innerText = "🌱 Жизнь процветает";
                statusText.style.color = "#52b788";
            }
        });
    </script>
</body>
</html>
