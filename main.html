<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
  <meta name="telegram-webapp-theme-color" content="#f5f5f7">
  <link rel="apple-touch-icon" href="icon.png">
  <title>Символьные кубики — Мозаика</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #f5f5f7;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 6px 10px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      z-index: 20;
      flex-shrink: 0;
    }
    .result-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f0f0f5;
      border-radius: 18px;
      padding: 4px 10px;
      gap: 6px;
      min-width: 0;
    }
    .result-label {
      font-size: 11px;
      font-weight: 600;
      color: #86868b;
      text-transform: uppercase;
    }
    .result-string {
      flex: 1;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-buttons {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    button {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 6px 10px;
      border-radius: 18px;
      font-size: 12px;
      font-weight: 600;
      color: #1d1d1f;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
      white-space: nowrap;
    }
    button:active { transform: scale(0.94); background: #f0f0f5; }
    button.primary { background: #007aff; color: #fff; border-color: transparent; }
    button.primary:active { background: #0066d6; }
    button.danger { background: #ff3b30; color: #fff; border-color: transparent; }

    /* Поле кубиков */
    .cubes-field {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      overflow: hidden;
      background: #000;
    }

    .cube {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      position: relative;
      transition: 0.1s;
      font-family: inherit;
    }
    .cube:active { filter: brightness(0.9); }
    .cube .cube-char {
      font-size: var(--emoji-size);
      line-height: 1;
    }
    .cube .cube-text {
      display: none;
      font-size: var(--text-size);
      color: #fff;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
      line-height: 1.2;
    }
    body.detailed-mode .cube .cube-text {
      display: block;
    }
    body.detailed-mode .cube {
      /* высота авто, но сохраняем ширину */
      height: auto !important;
      min-height: var(--cube-size);
    }

    .cube .delete-cube {
      position: absolute;
      top: 1px;
      right: 1px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ff3b30;
      color: #fff;
      border: none;
      font-size: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .cube.editable .delete-cube {
      display: flex;
    }

    /* Модальные окна */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: #fff;
      border-radius: 22px;
      padding: 20px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 16px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal h3 { font-size: 17px; font-weight: 700; }
    .modal textarea, .modal input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      -webkit-user-select: text;
      user-select: text;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="result-box">
      <span class="result-label">Итог</span>
      <span class="result-string" id="resultString"></span>
    </div>
    <div class="header-buttons">
      <button id="copyBtn">📋</button>
      <button id="saveBtn">💾</button>
      <button id="toggleModeBtn">▤</button>
    </div>
  </header>

  <main class="cubes-field" id="cubesField"></main>

  <div style="padding:3px 8px 6px; display:flex; gap:5px; flex-shrink:0;">
    <button id="addBlockBtn" class="primary" style="flex:1;">+ Блок</button>
    <button id="addSymbolBtn" style="flex:1;">+ Символ</button>
    <button id="importBtn" style="flex:1;">📥 Импорт</button>
    <button id="exportBtn" style="flex:1;">📤 Экспорт</button>
    <button id="clearBtn" class="danger">🗑</button>
  </div>

  <div id="addModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>Новый символ (в главный блок)</h3>
      <input id="newCharInput" placeholder="Символ (эмодзи)" maxlength="2">
      <input id="newTextInput" placeholder="Текст">
      <div class="modal-actions">
        <button id="cancelAddModalBtn">Отмена</button>
        <button id="saveAddModalBtn" class="primary">Добавить</button>
      </div>
    </div>
  </div>
  <div id="importModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>📥 Импорт</h3>
      <p style="font-size:13px;color:#86868b;">Каждая строка — блок. Пары «символ:слово» через пробел.</p>
      <textarea id="importTextarea" placeholder="👁️:Я ❤️:люблю 🌀:связь"></textarea>
      <div class="modal-actions">
        <button id="cancelImportModalBtn">Отмена</button>
        <button id="saveImportModalBtn" class="primary">Импортировать</button>
      </div>
    </div>
  </div>
  <div id="exportModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>📤 Экспорт</h3>
      <textarea id="exportTextarea" readonly></textarea>
      <div class="modal-actions">
        <button id="cancelExportModalBtn">Закрыть</button>
        <button id="copyExportBtn" class="primary">Копировать</button>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  // Исходная фраза
  const phrase = `🔼:высшее 👁️:Я 🌀:передача:👁️Я 🌍:внутри 🧿:тебя 👁️:Я ❤️:люблю 🧿:тебя
🌌:пространство 🛠️:создаёт 🎯:направление 🌊:течения ⚡️:энергии: 📍:старт 🏁:финиш 
⏳:время 🛠️:создаёт 🌪️:движение: 🚀:скорость 
🔮:связующий 🛠️:создаёт 🔄:синхронизация 🔎:через 
🔳:мыслей ➕:добавление ❌:удаление ✅:подтверждение ♻️:трансформация 🔗:и
🟡:чувств 🔺:поднимание 🔻:опускание 👍:нравится 👎:не_нравится  💠:усиление 🔅:ослабление ↕️:расширение ↔️:сжатие  
 🔗:и 🛠️:создаёт  🌊:течение 🌳:рост 🔥:горение 🪨:опора 🎈:взлёт.`;

  function parseLine(line) {
    const symbols = [];
    const tokens = line.trim().split(/\s+/);
    for (const token of tokens) {
      if (!token) continue;
      const colonIndex = token.indexOf(':');
      let char, text;
      if (colonIndex > 0) {
        char = token.substring(0, colonIndex);
        text = token.substring(colonIndex + 1);
      } else {
        char = token;
        text = '';
      }
      if (char) symbols.push({ id: Date.now().toString(36)+Math.random().toString(36), char, text });
    }
    return symbols;
  }

  function parsePhrase(phraseText) {
    const lines = phraseText.split(/\n/).filter(l => l.trim());
    const res = { library: [], blocks: [] };
    if (lines.length > 0) res.library = parseLine(lines[0]);
    for (let i = 1; i < lines.length; i++) {
      const s = parseLine(lines[i]);
      if (s.length) res.blocks.push(s);
    }
    return res;
  }

  const defaultData = parsePhrase(phrase);
  let library = JSON.parse(localStorage.getItem('seq_library')) || defaultData.library;
  let additionalBlocks = JSON.parse(localStorage.getItem('seq_blocks')) || defaultData.blocks;
  let detailedMode = false;

  const $ = id => document.getElementById(id);
  const cubesField = $('cubesField');
  const resultString = $('resultString');
  const toggleModeBtn = $('toggleModeBtn');

  // Цвета для блоков
  const blockColors = [
    '#e74c3c', // красный
    '#f39c12', // оранжевый
    '#9b59b6', // фиолетовый
    '#2ecc71', // зелёный
    '#3498db', // синий
    '#1abc9c', // бирюзовый
    '#e67e22', // морковный
    '#34495e', // тёмно-серый
  ];

  function saveState() {
    try {
      localStorage.setItem('seq_library', JSON.stringify(library));
      localStorage.setItem('seq_blocks', JSON.stringify(additionalBlocks));
    } catch(e) {}
  }

  function renderAll() {
    cubesField.innerHTML = '';
    const allBlocks = [library, ...additionalBlocks];
    const totalSymbols = allBlocks.reduce((sum, b) => sum + b.length, 0);
    if (totalSymbols === 0) {
      updateResult();
      return;
    }

    // Вычисляем размер кубика
    const fieldWidth = cubesField.clientWidth;
    const fieldHeight = cubesField.clientHeight;
    if (fieldWidth <= 0 || fieldHeight <= 0) return;

    let bestSize = 20;
    const maxSize = Math.min(fieldWidth, fieldHeight);
    for (let s = maxSize; s >= 20; s--) {
      const cols = Math.floor(fieldWidth / s);
      if (cols === 0) continue;
      const rows = Math.ceil(totalSymbols / cols);
      if (rows * s <= fieldHeight) {
        bestSize = s;
        break;
      }
    }

    const cubeSize = bestSize;
    const emojiSize = Math.max(10, cubeSize * 0.5);
    const textSize = Math.max(6, cubeSize * 0.18);

    let globalIdx = 0;
    for (let blockIdx = 0; blockIdx < allBlocks.length; blockIdx++) {
      const blockSymbols = allBlocks[blockIdx];
      const color = blockColors[blockIdx % blockColors.length];
      const isMain = (blockIdx === 0);

      for (const sym of blockSymbols) {
        const cube = document.createElement('div');
        cube.className = 'cube';
        if (!isMain) cube.classList.add('editable');
        cube.style.width = cubeSize + 'px';
        cube.style.height = cubeSize + 'px';
        cube.style.backgroundColor = color;
        cube.style.setProperty('--cube-size', cubeSize + 'px');
        cube.style.setProperty('--emoji-size', emojiSize + 'px');
        cube.style.setProperty('--text-size', textSize + 'px');

        cube.innerHTML = `
          <span class="cube-char">${sym.char}</span>
          <span class="cube-text">${sym.text||''}</span>
        `;

        if (!isMain) {
          const delBtn = document.createElement('button');
          delBtn.className = 'delete-cube';
          delBtn.textContent = '✕';
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm(`Удалить символ «${sym.char}»?`)) {
              additionalBlocks[blockIdx-1].splice(globalIdx - library.length, 1);
              saveState();
              renderAll();
            }
          });
          cube.appendChild(delBtn);
        }

        cubesField.appendChild(cube);
        globalIdx++;
      }
    }

    updateResult();
  }

  function updateResult() {
    let str = library.map(s => s.char).join('');
    additionalBlocks.forEach(b => str += b.map(s => s.char).join(''));
    resultString.textContent = str || '(пусто)';
  }

  window.addEventListener('resize', () => requestAnimationFrame(renderAll));
  new ResizeObserver(() => renderAll()).observe(cubesField);

  // Кнопки управления
  $('addBlockBtn').addEventListener('click', () => {
    additionalBlocks.push([]);
    saveState();
    renderAll();
  });
  $('addSymbolBtn').addEventListener('click', () => {
    $('addModalOverlay').classList.remove('hidden');
    $('newCharInput').focus();
  });
  $('importBtn').addEventListener('click', () => {
    $('importModalOverlay').classList.remove('hidden');
    $('importTextarea').focus();
  });
  $('exportBtn').addEventListener('click', () => {
    $('exportTextarea').value = exportData();
    $('exportModalOverlay').classList.remove('hidden');
  });
  toggleModeBtn.addEventListener('click', () => {
    detailedMode = !detailedMode;
    document.body.classList.toggle('detailed-mode', detailedMode);
    toggleModeBtn.textContent = detailedMode ? '▣' : '▤';
    renderAll();
  });
  $('clearBtn').addEventListener('click', () => {
    if (confirm('Очистить всё?')) {
      library = [];
      additionalBlocks = [];
      saveState();
      renderAll();
    }
  });
  $('copyBtn').addEventListener('click', () => {
    const str = resultString.textContent;
    if (str && str !== '(пусто)') navigator.clipboard?.writeText(str);
  });
  $('saveBtn').addEventListener('click', () => { saveState(); alert('Сохранено'); });

  // Модалки
  $('cancelAddModalBtn').addEventListener('click', () => $('addModalOverlay').classList.add('hidden'));
  $('saveAddModalBtn').addEventListener('click', () => {
    const ch = $('newCharInput').value.trim();
    if (!ch) return;
    library.push({ id: Date.now().toString(), char: ch.substring(0,2), text: $('newTextInput').value.trim() });
    $('newCharInput').value = $('newTextInput').value = '';
    $('addModalOverlay').classList.add('hidden');
    saveState();
    renderAll();
  });
  $('cancelImportModalBtn').addEventListener('click', () => $('importModalOverlay').classList.add('hidden'));
  $('saveImportModalBtn').addEventListener('click', () => {
    const parsed = parsePhrase($('importTextarea').value);
    if (parsed.library.length) library.push(...parsed.library);
    if (parsed.blocks.length) additionalBlocks.push(...parsed.blocks);
    saveState();
    renderAll();
    $('importModalOverlay').classList.add('hidden');
    $('importTextarea').value = '';
    alert('Импортировано');
  });
  $('cancelExportModalBtn').addEventListener('click', () => $('exportModalOverlay').classList.add('hidden'));
  $('copyExportBtn').addEventListener('click', () => {
    const text = $('exportTextarea').value;
    if (text) navigator.clipboard?.writeText(text).then(() => alert('Скопировано'));
  });

  function exportData() {
    const lines = [];
    lines.push(library.map(s => s.char + ':' + s.text).join(' '));
    additionalBlocks.forEach(b => lines.push(b.map(s => s.char + ':' + s.text).join(' ')));
    return lines.join('\n');
  }

  // Запуск
  document.body.classList.toggle('detailed-mode', detailedMode);
  renderAll();
})();
</script>
</body>
</html>
