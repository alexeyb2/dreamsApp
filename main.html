<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
  <meta name="telegram-webapp-theme-color" content="#f5f5f7">
  <link rel="apple-touch-icon" href="icon.png">
  <title>Символьные кубики — Управление блоками</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #f5f5f7;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      z-index: 20;
      flex-shrink: 0;
    }
    .result-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: #f0f0f5;
      border-radius: 18px;
      padding: 4px 10px;
      gap: 6px;
      min-width: 0;
    }
    .result-label { font-size: 11px; font-weight: 600; color: #86868b; text-transform: uppercase; }
    .result-string {
      flex: 1;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-buttons {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    button {
      background: #fff;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 6px 10px;
      border-radius: 18px;
      font-size: 12px;
      font-weight: 600;
      color: #1d1d1f;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
      white-space: nowrap;
    }
    button:active { transform: scale(0.94); background: #f0f0f5; }
    button.primary { background: #007aff; color: #fff; border-color: transparent; }
    button.primary:active { background: #0066d6; }
    button.danger { background: #ff3b30; color: #fff; border-color: transparent; }
    .active-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 4px;
      margin-right: 4px;
      border: 1px solid rgba(0,0,0,0.2);
      vertical-align: middle;
    }

    .cubes-field {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    .cube {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.25);
      cursor: pointer;
      position: relative;
      transition: 0.1s;
      font-family: inherit;
    }
    .cube.dragging { opacity: 0.4; transform: scale(0.95); }
    .cube .cube-char { font-size: var(--emoji-size); line-height: 1; }
    .cube .cube-text {
      display: none;
      font-size: var(--text-size);
      color: #fff;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
      line-height: 1.2;
    }
    body.detailed-mode .cube .cube-text { display: block; }
    body.detailed-mode .cube { height: auto !important; min-height: var(--cube-size); }

    .cube .delete-cube {
      position: absolute;
      top: 1px;
      right: 1px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ff3b30;
      color: #fff;
      border: none;
      font-size: 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    body.edit-mode .cube.editable .delete-cube { display: flex; }

    .drag-ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.9;
      transform: scale(1.1);
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
      background: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: inherit;
      border: 2px solid #fff;
      border-radius: 4px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: #fff;
      border-radius: 22px;
      padding: 20px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 16px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .export-fullscreen {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 200;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }
    .export-fullscreen textarea {
      flex: 1;
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      -webkit-user-select: text;
      user-select: text;
    }
    .switch-row { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="result-box">
      <span class="result-label">Итог</span>
      <span class="result-string" id="resultString"></span>
    </div>
    <div class="header-buttons">
      <button id="editModeBtn" title="Режим удаления">✎</button>
      <button id="colorBtn" title="Сменить цвет активного блока">🎨</button>
      <button id="copyBtn">📋</button>
      <button id="saveBtn">💾</button>
      <button id="toggleModeBtn">▤</button>
    </div>
  </header>

  <main class="cubes-field" id="cubesField"></main>

  <div style="padding:3px 8px 6px; display:flex; gap:5px; flex-shrink:0;">
    <button id="addBlockBtn" class="primary" style="flex:1;">+ Блок</button>
    <button id="addSymbolBtn" style="flex:1;">+ Символ</button>
    <button id="importBtn" style="flex:1;">📥 Импорт</button>
    <button id="exportBtn" style="flex:1;">📤 Экспорт</button>
    <button id="clearBtn" class="danger">🗑</button>
  </div>

  <div id="addModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>Добавить символ</h3>
      <div style="display:flex; align-items:center; gap:8px;">
        <span>В блок:</span>
        <span id="activeBlockLabel" style="font-weight:600;"></span>
      </div>
      <input id="newCharInput" placeholder="Символ (эмодзи)" maxlength="2">
      <input id="newTextInput" placeholder="Текст">
      <div class="modal-actions">
        <button id="cancelAddModalBtn">Отмена</button>
        <button id="saveAddModalBtn" class="primary">Добавить</button>
      </div>
    </div>
  </div>

  <div id="importModalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>📥 Импорт</h3>
      <p style="font-size:13px;color:#86868b;">Каждая строка — блок. Пары «символ:слово» через пробел.</p>
      <textarea id="importTextarea" placeholder="👁️:Я ❤️:люблю 🌀:связь"></textarea>
      <div class="modal-actions">
        <button id="cancelImportModalBtn">Отмена</button>
        <button id="saveImportModalBtn" class="primary">Импортировать</button>
      </div>
    </div>
  </div>

  <div id="exportFullscreen" class="export-fullscreen hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3>📤 Экспорт</h3>
      <button id="closeExportBtn" style="background:none; border:none; font-size:20px;">✕</button>
    </div>
    <div class="switch-row">
      <label><input type="radio" name="exportMode" value="withWords" checked> Со словами</label>
      <label><input type="radio" name="exportMode" value="symbolsOnly"> Только символы</label>
    </div>
    <textarea id="exportTextareaFull" readonly></textarea>
    <button id="copyExportFullBtn" class="primary" style="align-self:flex-end;">Копировать</button>
  </div>
</div>

<script>
(function() {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const phrase = `🔼:высшее 👁️:Я 🌀:передача:👁️Я 🌍:внутри 🧿:тебя 👁️:Я ❤️:люблю 🧿:тебя
🌌:пространство 🛠️:создаёт 🎯:направление 🌊:течения ⚡️:энергии: 📍:старт 🏁:финиш 
⏳:время 🛠️:создаёт 🌪️:движение: 🚀:скорость 
🔮:связующий 🛠️:создаёт 🔄:синхронизация 🔎:через 
🔳:мыслей ➕:добавление ❌:удаление ✅:подтверждение ♻️:трансформация 🔗:и
🟡:чувств 🔺:поднимание 🔻:опускание 👍:нравится 👎:не_нравится 💠:усиление 🔅:ослабление ↕️:расширение ↔️:сжатие  
 🔗:и 🛠️:создаёт 🌊:течение 🌳:рост 🔥:горение 🪨:опора 🎈:взлёт.`;

  function parseLine(line) {
    const symbols = [];
    const tokens = line.trim().split(/\s+/);
    for (const token of tokens) {
      if (!token) continue;
      const colonIndex = token.indexOf(':');
      let char, text;
      if (colonIndex > 0) { char = token.substring(0, colonIndex); text = token.substring(colonIndex + 1); }
      else { char = token; text = ''; }
      if (char) symbols.push({ id: Date.now().toString(36)+Math.random().toString(36), char, text });
    }
    return symbols;
  }

  function parsePhrase(phraseText) {
    const lines = phraseText.split(/\n/).filter(l => l.trim());
    const res = { library: [], blocks: [] };
    if (lines.length > 0) res.library = parseLine(lines[0]);
    for (let i = 1; i < lines.length; i++) {
      const s = parseLine(lines[i]);
      if (s.length) res.blocks.push(s);
    }
    return res;
  }

  const defaultData = parsePhrase(phrase);
  let library = JSON.parse(localStorage.getItem('seq_library')) || defaultData.library;
  let additionalBlocks = JSON.parse(localStorage.getItem('seq_blocks')) || defaultData.blocks;
  let blockColors = JSON.parse(localStorage.getItem('seq_blockColors')) || [
    '#e74c3c', '#f39c12', '#9b59b6', '#2ecc71',
    '#3498db', '#1abc9c', '#e67e22', '#34495e'
  ];
  let detailedMode = false;
  let editMode = false; // режим удаления
  let activeBlockIndex = 0; // 0 – главный, 1.. – доп.блок
  let dragState = null;

  const $ = id => document.getElementById(id);
  const cubesField = $('cubesField');
  const resultString = $('resultString');
  const toggleModeBtn = $('toggleModeBtn');
  const editModeBtn = $('editModeBtn');
  const colorBtn = $('colorBtn');
  const activeBlockLabel = $('activeBlockLabel');

  function saveState() {
    try {
      localStorage.setItem('seq_library', JSON.stringify(library));
      localStorage.setItem('seq_blocks', JSON.stringify(additionalBlocks));
      localStorage.setItem('seq_blockColors', JSON.stringify(blockColors));
    } catch(e) {}
  }

  function getBlockColor(index) {
    return blockColors[index % blockColors.length];
  }

  function flattenBlocks() {
    const result = [];
    library.forEach((sym, idx) => result.push({ ...sym, blockType: 'main', blockIndex: 0, symbolIndex: idx }));
    additionalBlocks.forEach((block, blockIdx) => {
      block.forEach((sym, symIdx) => result.push({ ...sym, blockType: 'block', blockIndex: blockIdx + 1, symbolIndex: symIdx }));
    });
    return result;
  }

  function renderAll() {
    cubesField.innerHTML = '';
    const allSymbols = flattenBlocks();
    if (allSymbols.length === 0) {
      updateResult();
      return;
    }

    const fieldWidth = cubesField.clientWidth;
    const fieldHeight = cubesField.clientHeight;
    if (fieldWidth <= 0 || fieldHeight <= 0) return;

    let bestSize = 20;
    const maxSize = Math.min(fieldWidth, fieldHeight);
    for (let s = maxSize; s >= 20; s--) {
      const cols = Math.floor(fieldWidth / s);
      if (cols === 0) continue;
      const rows = Math.ceil(allSymbols.length / cols);
      if (rows * s <= fieldHeight) { bestSize = s; break; }
    }

    const cubeSize = bestSize;
    const emojiSize = Math.max(10, cubeSize * 0.5);
    const textSize = Math.max(6, cubeSize * 0.18);

    allSymbols.forEach((sym, globalIndex) => {
      const cube = document.createElement('div');
      cube.className = 'cube';
      const color = getBlockColor(sym.blockIndex);
      cube.style.backgroundColor = color;
      cube.style.width = cubeSize + 'px';
      cube.style.height = cubeSize + 'px';
      cube.style.setProperty('--cube-size', cubeSize + 'px');
      cube.style.setProperty('--emoji-size', emojiSize + 'px');
      cube.style.setProperty('--text-size', textSize + 'px');

      cube.innerHTML = `<span class="cube-char">${sym.char}</span><span class="cube-text">${sym.text||''}</span>`;
      cube.dataset.blockType = sym.blockType;
      cube.dataset.blockIndex = sym.blockIndex;
      cube.dataset.symbolIndex = sym.symbolIndex;
      cube.dataset.globalIndex = globalIndex;

      if (sym.blockType === 'block') {
        cube.classList.add('editable');
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-cube';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const blockIdx = sym.blockIndex - 1;
          additionalBlocks[blockIdx].splice(sym.symbolIndex, 1);
          saveState();
          renderAll();
        });
        cube.appendChild(delBtn);
      }

      cube.addEventListener('pointerdown', onCubePointerDown);
      cube.addEventListener('click', (e) => {
        // tap без перетаскивания — смена активного блока
        if (!dragState || !dragState.moved) {
          const idx = parseInt(cube.dataset.blockIndex);
          setActiveBlock(idx);
        }
      });
      cubesField.appendChild(cube);
    });

    updateResult();
    updateActiveBlockLabel();
  }

  function updateResult() {
    let str = library.map(s => s.char).join('');
    additionalBlocks.forEach(b => str += b.map(s => s.char).join(''));
    resultString.textContent = str || '(пусто)';
  }

  function setActiveBlock(index) {
    activeBlockIndex = index;
    updateActiveBlockLabel();
    // визуально можно подсветить кубики этого блока (добавим класс active-block)
    document.querySelectorAll('.cube').forEach(c => {
      c.classList.toggle('active-block', parseInt(c.dataset.blockIndex) === index);
    });
  }

  function updateActiveBlockLabel() {
    const names = ['Главный', ...additionalBlocks.map((_, i) => `Блок ${i+1}`)];
    const color = getBlockColor(activeBlockIndex);
    activeBlockLabel.innerHTML = `<span class="active-indicator" style="background:${color};"></span> ${names[activeBlockIndex] || 'Главный'}`;
  }

  window.addEventListener('resize', () => requestAnimationFrame(renderAll));
  new ResizeObserver(() => renderAll()).observe(cubesField);

  // Drag & Drop
  function onCubePointerDown(e) {
    if (dragState) return;
    if (e.button && e.button !== 0) return;
    const cube = e.currentTarget;
    if (e.target.classList.contains('delete-cube')) return;
    if (editMode && cube.classList.contains('editable')) return; // в режиме редактирования не перетаскиваем

    e.preventDefault();
    cube.setPointerCapture(e.pointerId);
    const rect = cube.getBoundingClientRect();
    const ghost = cube.cloneNode(true);
    ghost.classList.add('drag-ghost');
    ghost.style.width = rect.width + 'px';
    ghost.style.height = rect.height + 'px';
    ghost.style.left = rect.left + 'px';
    ghost.style.top = rect.top + 'px';
    document.body.appendChild(ghost);
    cube.classList.add('dragging');

    dragState = {
      sourceCube: cube,
      ghost,
      blockType: cube.dataset.blockType,
      blockIndex: parseInt(cube.dataset.blockIndex),
      symbolIndex: parseInt(cube.dataset.symbolIndex),
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top,
      pointerId: e.pointerId,
      moved: false,
    };
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup', onPointerUp);
  }

  function onPointerMove(e) {
    if (!dragState || e.pointerId !== dragState.pointerId) return;
    const dx = e.clientX - (dragState.ghost.getBoundingClientRect().left + dragState.offsetX);
    const dy = e.clientY - (dragState.ghost.getBoundingClientRect().top + dragState.offsetY);
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragState.moved = true;
    dragState.ghost.style.left = (e.clientX - dragState.offsetX) + 'px';
    dragState.ghost.style.top = (e.clientY - dragState.offsetY) + 'px';
  }

  function onPointerUp(e) {
    if (!dragState || e.pointerId !== dragState.pointerId) return;
    document.removeEventListener('pointermove', onPointerMove);
    document.removeEventListener('pointerup', onPointerUp);
    dragState.ghost.remove();
    if (dragState.sourceCube) dragState.sourceCube.classList.remove('dragging');

    if (!dragState.moved) { dragState = null; return; }

    const targetEl = document.elementFromPoint(e.clientX, e.clientY);
    const targetCube = targetEl?.closest('.cube');
    if (!targetCube || targetCube === dragState.sourceCube) { dragState = null; return; }

    const srcType = dragState.blockType;
    const srcBlockIdx = dragState.blockIndex;
    const srcSymIdx = dragState.symbolIndex;
    const tgtType = targetCube.dataset.blockType;
    const tgtBlockIdx = parseInt(targetCube.dataset.blockIndex);
    let tgtSymIdx = parseInt(targetCube.dataset.symbolIndex);

    let movedSym;
    if (srcType === 'main') {
      movedSym = library.splice(srcSymIdx, 1)[0];
    } else {
      movedSym = additionalBlocks[srcBlockIdx - 1].splice(srcSymIdx, 1)[0];
    }

    if (tgtType === 'main') {
      library.splice(tgtSymIdx, 0, movedSym);
    } else {
      additionalBlocks[tgtBlockIdx - 1].splice(tgtSymIdx, 0, movedSym);
    }

    saveState();
    renderAll();
    dragState = null;
  }

  // Кнопки
  $('addBlockBtn').addEventListener('click', () => {
    additionalBlocks.push([]);
    if (activeBlockIndex === 0 || activeBlockIndex > additionalBlocks.length) {
      setActiveBlock(additionalBlocks.length); // новый блок становится активным
    }
    saveState();
    renderAll();
  });

  $('addSymbolBtn').addEventListener('click', () => {
    $('addModalOverlay').classList.remove('hidden');
    $('newCharInput').focus();
    updateActiveBlockLabel();
  });

  $('importBtn').addEventListener('click', () => {
    $('importModalOverlay').classList.remove('hidden');
    $('importTextarea').focus();
  });
  $('exportBtn').addEventListener('click', () => openExportFullscreen());

  toggleModeBtn.addEventListener('click', () => {
    detailedMode = !detailedMode;
    document.body.classList.toggle('detailed-mode', detailedMode);
    toggleModeBtn.textContent = detailedMode ? '▣' : '▤';
    renderAll();
  });

  editModeBtn.addEventListener('click', () => {
    editMode = !editMode;
    document.body.classList.toggle('edit-mode', editMode);
    editModeBtn.style.background = editMode ? '#ff3b30' : '#fff';
    editModeBtn.style.color = editMode ? '#fff' : '#1d1d1f';
  });

  colorBtn.addEventListener('click', () => {
    // меняем цвет активного блока на следующий в палитре
    const palette = ['#e74c3c','#f39c12','#9b59b6','#2ecc71','#3498db','#1abc9c','#e67e22','#34495e','#f1c40f','#e91e63'];
    const current = getBlockColor(activeBlockIndex);
    let nextIdx = palette.indexOf(current);
    if (nextIdx === -1) nextIdx = 0;
    else nextIdx = (nextIdx + 1) % palette.length;
    blockColors[activeBlockIndex % blockColors.length] = palette[nextIdx];
    saveState();
    renderAll();
  });

  $('clearBtn').addEventListener('click', () => {
    if (confirm('Очистить всё?')) {
      library = []; additionalBlocks = []; activeBlockIndex = 0;
      saveState(); renderAll();
    }
  });
  $('copyBtn').addEventListener('click', () => {
    const str = resultString.textContent;
    if (str && str !== '(пусто)') navigator.clipboard?.writeText(str);
  });
  $('saveBtn').addEventListener('click', () => { saveState(); alert('Сохранено'); });

  // Модалки
  $('cancelAddModalBtn').addEventListener('click', () => $('addModalOverlay').classList.add('hidden'));
  $('saveAddModalBtn').addEventListener('click', () => {
    const ch = $('newCharInput').value.trim();
    if (!ch) return;
    const txt = $('newTextInput').value.trim();
    const sym = { id: Date.now().toString(), char: ch.substring(0,2), text: txt };
    if (activeBlockIndex === 0) {
      library.push(sym);
    } else {
      const idx = activeBlockIndex - 1;
      if (idx < additionalBlocks.length) {
        additionalBlocks[idx].push(sym);
      } else {
        library.push(sym);
      }
    }
    $('newCharInput').value = $('newTextInput').value = '';
    $('addModalOverlay').classList.add('hidden');
    saveState();
    renderAll();
  });

  $('cancelImportModalBtn').addEventListener('click', () => $('importModalOverlay').classList.add('hidden'));
  $('saveImportModalBtn').addEventListener('click', () => {
    const parsed = parsePhrase($('importTextarea').value);
    if (parsed.library.length) library.push(...parsed.library);
    if (parsed.blocks.length) additionalBlocks.push(...parsed.blocks);
    saveState();
    renderAll();
    $('importModalOverlay').classList.add('hidden');
    $('importTextarea').value = '';
    alert('Импортировано');
  });

  // Экспорт
  function openExportFullscreen() {
    $('exportFullscreen').classList.remove('hidden');
    updateExportText();
  }
  function updateExportText() {
    const withWords = document.querySelector('input[name="exportMode"]:checked').value === 'withWords';
    const lines = [];
    if (withWords) {
      lines.push(library.map(s => s.char + ':' + s.text).join(' '));
      additionalBlocks.forEach(b => lines.push(b.map(s => s.char + ':' + s.text).join(' ')));
    } else {
      lines.push(library.map(s => s.char).join(' '));
      additionalBlocks.forEach(b => lines.push(b.map(s => s.char).join(' ')));
    }
    $('exportTextareaFull').value = lines.join('\n');
  }
  document.querySelectorAll('input[name="exportMode"]').forEach(r => r.addEventListener('change', updateExportText));
  $('closeExportBtn').addEventListener('click', () => $('exportFullscreen').classList.add('hidden'));
  $('copyExportFullBtn').addEventListener('click', () => {
    const text = $('exportTextareaFull').value;
    if (text) navigator.clipboard?.writeText(text).then(() => alert('Скопировано'));
  });

  document.body.classList.toggle('detailed-mode', detailedMode);
  renderAll();
})();
</script>
</body>
</html>
