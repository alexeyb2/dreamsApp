<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌀 Идеальная восьмёрка — два потока</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #05070f; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      font-family: system-ui, sans-serif;
      color: #0ff;
    }
    canvas {
      width: 100%;
      max-width: 100vw;
      height: auto;
      max-height: calc(100vh - 80px);
      aspect-ratio: 1 / 1;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #010314;
      touch-action: none;
    }
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      background: rgba(10, 25, 45, 0.9);
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.96); }
    button.playing { background: #0ff; color: #000; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <button id="resetBtn">Сбросить точки</button>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // Начальные пропорциональные координаты (доли от размера холста)
      const initialPoints = {
        heart:       { rx: 0.5, ry: 0.5 },
        front_left:  { rx: 0.3, ry: 0.25 }, // перед левым локтем
        left:        { rx: 0.1, ry: 0.5 },  // левая рука
        behind_left: { rx: 0.2, ry: 0.75 }, // за левым локтем
        front_right: { rx: 0.7, ry: 0.25 }, // перед правым локтем
        right:       { rx: 0.9, ry: 0.5 },  // правая рука
        behind_right:{ rx: 0.8, ry: 0.75 }  // за правым локтем
      };

      let points = {};
      let dragTarget = null;
      let playing = false;
      let time = 0;
      const animSpeed = 0.12; // циклов в секунду

      function initPoints() {
        const w = canvas.width;
        const h = canvas.height;
        for (let key in initialPoints) {
          points[key] = {
            x: initialPoints[key].rx * w,
            y: initialPoints[key].ry * h
          };
        }
      }

      // Catmull-Rom сплайн
      function catmullRom(p0, p1, p2, p3, t) {
        const t2 = t * t, t3 = t2 * t;
        return {
          x: 0.5 * ((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3),
          y: 0.5 * ((2*p1.y) + (-p0.y + p2.y)*t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3)
        };
      }

      // Построение замкнутой петли: heart -> a -> hand -> b -> heart
      function buildLoop(heart, a, hand, b, steps = 280) {
        const pts = [heart, a, hand, b, heart];
        const segments = pts.length - 1;
        const stepsPerSegment = Math.floor(steps / segments);
        const result = [];

        for (let i = 0; i < segments; i++) {
          const p0 = pts[Math.max(0, i - 1)];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = pts[Math.min(pts.length - 1, i + 2)];
          for (let s = 0; s < stepsPerSegment; s++) {
            const t = s / stepsPerSegment;
            result.push(catmullRom(p0, p1, p2, p3, t));
          }
        }
        result.push({ x: heart.x, y: heart.y }); // замыкание
        return result;
      }

      function drawCurve(curve, color, width, blur, alpha) {
        if (curve.length < 2) return;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.shadowBlur = blur;
        ctx.shadowColor = color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(curve[0].x, curve[0].y);
        for (let i = 1; i < curve.length; i++) {
          ctx.lineTo(curve[i].x, curve[i].y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawParticle(curve, progress, color, size = 7) {
        const idx = Math.floor(progress * (curve.length - 1));
        const pt = curve[idx];
        ctx.save();
        ctx.shadowBlur = 35;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size * 0.6, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();
      }

      function drawNode(pt, color, label, radius = 14) {
        ctx.save();
        ctx.shadowBlur = 40;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius * 0.4, 0, 2 * Math.PI);
        ctx.fill();
        ctx.font = '11px system-ui';
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#000';
        ctx.fillText(label, pt.x + radius + 5, pt.y - 5);
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const heart = points.heart;
        const frontLeft = points.front_left;
        const leftHand = points.left;
        const behindLeft = points.behind_left;
        const frontRight = points.front_right;
        const rightHand = points.right;
        const behindRight = points.behind_right;

        // Петли
        const frontLoop = buildLoop(heart, frontLeft, leftHand, behindLeft); // синяя
        const backLoop = buildLoop(heart, frontRight, rightHand, behindRight); // красная

        // Статические линии
        drawCurve(frontLoop, 'rgba(51,153,255,0.4)', 3, 20, 1);
        drawCurve(backLoop, 'rgba(255,51,102,0.4)', 3, 20, 1);

        const t = time % 1.0;

        // Два шара, разлетающиеся из сердца в противоположные стороны
        // Синий – по передней петле (heart → перед L)
        drawParticle(frontLoop, t, '#3399ff', 7);

        // Красный – по задней петле в обратном направлении (heart → за R)
        const redProgress = (1 - t + 1) % 1;
        drawParticle(backLoop, redProgress, '#ff3366', 7);

        // Узлы
        drawNode(heart, '#ffffff', 'Сердце', 18);
        drawNode(frontLeft, '#3399ff', 'Перед L', 14);
        drawNode(leftHand, '#3399ff', 'Левая', 14);
        drawNode(behindLeft, '#3399ff', 'За L', 14);
        drawNode(frontRight, '#ff3366', 'Перед R', 14);
        drawNode(rightHand, '#ff3366', 'Правая', 14);
        drawNode(behindRight, '#ff3366', 'За R', 14);
      }

      function animationLoop() {
        if (playing) {
          time += animSpeed / 60;
          if (time > 1000) time -= 1000;
        }
        draw();
        requestAnimationFrame(animationLoop);
      }

      // Перетаскивание
      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      canvas.addEventListener('pointerdown', e => {
        const pos = getCanvasPos(e);
        for (let key in points) {
          if (Math.hypot(pos.x - points[key].x, pos.y - points[key].y) < 30) {
            dragTarget = key;
            canvas.setPointerCapture(e.pointerId);
            break;
          }
        }
      });

      canvas.addEventListener('pointermove', e => {
        if (!dragTarget) return;
        const pos = getCanvasPos(e);
        points[dragTarget].x = pos.x;
        points[dragTarget].y = pos.y;
      });

      canvas.addEventListener('pointerup', e => {
        dragTarget = null;
        canvas.releasePointerCapture(e.pointerId);
      });

      document.getElementById('playBtn').addEventListener('click', () => {
        playing = !playing;
        const btn = document.getElementById('playBtn');
        btn.textContent = playing ? '⏸ Pause' : '▶ Play';
        btn.classList.toggle('playing', playing);
      });

      document.getElementById('resetBtn').addEventListener('click', initPoints);

      function resize() {
        const maxSize = Math.min(window.innerWidth - 16, window.innerHeight - 80, 800);
        canvas.width = maxSize;
        canvas.height = maxSize;
        initPoints();
      }

      window.addEventListener('resize', resize);
      resize();
      animationLoop();
    })();
  </script>
</body>
</html>
