<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌀 Объёмная восьмёрка — два потока</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050a14;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      padding: 10px;
    }
    canvas {
      display: block;
      width: 100%;
      max-width: 700px;
      aspect-ratio: 1 / 1;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #010314;
      touch-action: none;
      cursor: grab;
    }
    .ui {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 12px 24px;
      background: rgba(10, 25, 45, 0.8);
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { background: #0ff; color: #000; }
    .hint {
      color: #6cf;
      font-size: 0.8rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="ui">
    <button id="playBtn">▶ Play</button>
    <span class="hint">Перетаскивай точки</span>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // Изометрическая проекция
      const cosA = 0.5, sinA = 0.5;

      // Мировые координаты контрольных точек
      let points = {
        heart:  { worldX: 0, worldY: 0, worldZ: 0 },
        left:   { worldX: -90, worldY: 0, worldZ: 75 },   // впереди слева
        right:  { worldX: 90, worldY: 0, worldZ: -75 }    // сзади справа
      };

      function worldToScreen(wx, wy, wz) {
        return {
          sx: wx + wz * cosA,
          sy: -wy + wz * sinA
        };
      }
      function screenToWorld(sx, sy, fixedWz) {
        return {
          wx: sx - fixedWz * cosA,
          wy: -(sy - fixedWz * sinA)
        };
      }

      let screenPoints = { heart: null, left: null, right: null };

      function updateScreenPoints() {
        for (let key in points) {
          screenPoints[key] = worldToScreen(points[key].worldX, points[key].worldY, points[key].worldZ);
        }
      }

      let dragTarget = null;
      let canvasOffsetX = 0, canvasOffsetY = 0;

      function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      }

      function onPointerDown(e) {
        e.preventDefault();
        const { x, y } = getCanvasCoords(e);
        const clickRadius = 25;
        for (let key of ['heart', 'left', 'right']) {
          const sp = screenPoints[key];
          if (Math.hypot(x - sp.sx - canvasOffsetX, y - sp.sy - canvasOffsetY) < clickRadius) {
            dragTarget = key;
            canvas.style.cursor = 'grabbing';
            return;
          }
        }
        dragTarget = null;
      }

      function onPointerMove(e) {
        if (!dragTarget) return;
        e.preventDefault();
        const { x, y } = getCanvasCoords(e);
        const newSx = x - canvasOffsetX;
        const newSy = y - canvasOffsetY;
        const fixedWz = points[dragTarget].worldZ;
        const { wx, wy } = screenToWorld(newSx, newSy, fixedWz);
        points[dragTarget].worldX = wx;
        points[dragTarget].worldY = wy;
        updateScreenPoints();
        draw();
      }

      function onPointerUp() {
        dragTarget = null;
        canvas.style.cursor = 'grab';
      }

      canvas.addEventListener('mousedown', onPointerDown);
      window.addEventListener('mousemove', onPointerMove);
      window.addEventListener('mouseup', onPointerUp);
      canvas.addEventListener('touchstart', onPointerDown, { passive: false });
      canvas.addEventListener('touchmove', onPointerMove, { passive: false });
      canvas.addEventListener('touchend', onPointerUp);

      // Catmull-Rom сплайн
      function catmullRom(p0, p1, p2, p3, t) {
        const t2 = t * t, t3 = t2 * t;
        const interp = (a, b, c, d) => 0.5 * ((2*b) + (-a + c) * t + (2*a - 5*b + 4*c - d) * t2 + (-a + 3*b - 3*c + d) * t3);
        return {
          worldX: interp(p0.worldX, p1.worldX, p2.worldX, p3.worldX),
          worldY: interp(p0.worldY, p1.worldY, p2.worldY, p3.worldY),
          worldZ: interp(p0.worldZ, p1.worldZ, p2.worldZ, p3.worldZ)
        };
      }

      function buildCurve() {
        const pts = [points.heart, points.left, points.heart, points.right];
        const curve = [];
        const stepsPerSegment = 80;
        for (let i = 0; i < pts.length; i++) {
          const p0 = pts[(i - 1 + pts.length) % pts.length];
          const p1 = pts[i];
          const p2 = pts[(i + 1) % pts.length];
          const p3 = pts[(i + 2) % pts.length];
          for (let s = 0; s < stepsPerSegment; s++) {
            const t = s / stepsPerSegment;
            curve.push(catmullRom(p0, p1, p2, p3, t));
          }
        }
        curve.push(curve[0]); // замкнуть
        return curve;
      }

      // Разделение кривой на две петли по индексам
      function splitCurve(curve) {
        const n = curve.length;
        // heart->left->heart: индексы от 0 до примерно 2*80 = 160
        const blueEnd = 2 * 80;
        const blueLoop = curve.slice(0, blueEnd + 1);
        // heart->right->heart: индексы от blueEnd до n-1
        const redLoop = curve.slice(blueEnd, n);
        return { blueLoop, redLoop };
      }

      let playing = false;
      let progressBlue = 0;   // для синей частицы (движется по синей петле)
      let progressRed = 0;    // для красной частицы (движется по красной петле)
      const animSpeed = 0.15; // циклов в секунду
      let lastTime = performance.now();

      const playBtn = document.getElementById('playBtn');
      playBtn.addEventListener('click', () => {
        playing = !playing;
        playBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
        if (playing) {
          lastTime = performance.now();
          requestAnimationFrame(animate);
        } else {
          draw();
        }
      });

      function animate(now) {
        if (!playing) return;
        const dt = (now - lastTime) / 1000;
        lastTime = now;
        // Синяя частица идёт вперёд (heart -> left -> heart)
        progressBlue = (progressBlue + animSpeed * dt) % 1.0;
        // Красная частица идёт в обратном направлении (heart -> right -> heart)
        progressRed = (progressRed - animSpeed * dt + 1.0) % 1.0;
        draw();
        requestAnimationFrame(animate);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Сетка
        ctx.save();
        ctx.strokeStyle = 'rgba(0,255,255,0.05)';
        ctx.lineWidth = 1;
        for (let gx = -200; gx <= 200; gx += 40) {
          for (let gz = -200; gz <= 200; gz += 40) {
            const p1 = worldToScreen(gx, 0, gz);
            const p2 = worldToScreen(gx + 40, 0, gz);
            ctx.beginPath();
            ctx.moveTo(p1.sx + canvasOffsetX, p1.sy + canvasOffsetY);
            ctx.lineTo(p2.sx + canvasOffsetX, p2.sy + canvasOffsetY);
            ctx.stroke();
          }
        }
        ctx.restore();

        const curve = buildCurve();
        if (curve.length < 2) return;
        const { blueLoop, redLoop } = splitCurve(curve);

        // Функция отрисовки линии с свечением
        function drawGlowLine(loop, color, width, blur, alpha = 1) {
          if (loop.length < 2) return;
          ctx.save();
          ctx.strokeStyle = color;
          ctx.lineWidth = width;
          ctx.shadowColor = color;
          ctx.shadowBlur = blur;
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          loop.forEach((pt, i) => {
            const { sx, sy } = worldToScreen(pt.worldX, pt.worldY, pt.worldZ);
            const px = sx + canvasOffsetX;
            const py = sy + canvasOffsetY;
            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          });
          ctx.stroke();
          ctx.restore();
        }

        // Рисуем петли разными цветами
        drawGlowLine(blueLoop, '#3399ff', 3, 20, 0.9);   // синяя (передняя)
        drawGlowLine(blueLoop, '#3399ff', 1.5, 30, 0.6);
        drawGlowLine(redLoop, '#ff3366', 3, 20, 0.9);    // красная (задняя)
        drawGlowLine(redLoop, '#ff3366', 1.5, 30, 0.6);

        // Контрольные точки
        function drawPoint(sp, color, label) {
          ctx.save();
          ctx.shadowColor = color;
          ctx.shadowBlur = 25;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(sp.sx + canvasOffsetX, sp.sy + canvasOffsetY, 12, 0, 2*Math.PI);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(sp.sx + canvasOffsetX, sp.sy + canvasOffsetY, 5, 0, 2*Math.PI);
          ctx.fill();
          ctx.font = '12px system-ui';
          ctx.fillStyle = '#fff';
          ctx.shadowColor = '#000';
          ctx.shadowBlur = 4;
          ctx.fillText(label, sp.sx + canvasOffsetX + 15, sp.sy + canvasOffsetY - 10);
          ctx.restore();
        }

        drawPoint(screenPoints.heart, '#ff66aa', 'Сердце');
        drawPoint(screenPoints.left, '#3399ff', 'Левая рука');
        drawPoint(screenPoints.right, '#ff3366', 'Правая рука');

        // Частицы
        function drawParticle(loop, progress, color) {
          const idx = Math.floor(progress * (loop.length - 1));
          const pt = loop[idx];
          const { sx, sy } = worldToScreen(pt.worldX, pt.worldY, pt.worldZ);
          const px = sx + canvasOffsetX;
          const py = sy + canvasOffsetY;
          ctx.save();
          ctx.shadowColor = color;
          ctx.shadowBlur = 35;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(px, py, 7, 0, 2*Math.PI);
          ctx.fill();
          ctx.shadowBlur = 50;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(px, py, 3, 0, 2*Math.PI);
          ctx.fill();
          ctx.restore();
        }

        drawParticle(blueLoop, progressBlue, '#3399ff');  // синяя частица на передней петле
        drawParticle(redLoop, progressRed, '#ff3366');   // красная частица на задней петле
      }

      function resize() {
        const size = Math.min(window.innerWidth - 20, 700);
        canvas.width = size;
        canvas.height = size;
        canvasOffsetX = size / 2;
        canvasOffsetY = size / 2;
        updateScreenPoints();
        draw();
      }

      window.addEventListener('resize', resize);
      resize();
    })();
  </script>
</body>
</html>
