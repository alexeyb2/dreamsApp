<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌀 Двойная энергетическая восьмёрка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #05070f; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      font-family: system-ui, sans-serif;
      color: #0ff;
    }
    canvas {
      width: 100%;
      height: auto;
      max-width: 100vw;
      max-height: calc(100vh - 80px);
      aspect-ratio: 1 / 1;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #010314;
      touch-action: none; /* важно для перетаскивания */
    }
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      background: rgba(10, 25, 45, 0.9);
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.96); }
    button.playing {
      background: #0ff;
      color: #000;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <button id="resetBtn">Сбросить точки</button>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // Пропорциональные координаты (доли от ширины/высоты)
      const initialPoints = {
        heart: { rx: 0.5, ry: 0.5 },
        front: { rx: 0.5, ry: 0.2 },  // верх
        back:  { rx: 0.5, ry: 0.8 },  // низ
        left:  { rx: 0.15, ry: 0.5 }, // левая рука
        right: { rx: 0.85, ry: 0.5 }  // правая рука
      };

      let points = {};
      let dragTarget = null;
      let playing = false;
      let time = 0;
      const animSpeed = 0.15;

      function initPoints() {
        const w = canvas.width;
        const h = canvas.height;
        for (let key in initialPoints) {
          points[key] = {
            x: initialPoints[key].rx * w,
            y: initialPoints[key].ry * h
          };
        }
      }

      function catmullRom(p0, p1, p2, p3, t) {
        const t2 = t * t;
        const t3 = t2 * t;
        return {
          x: 0.5 * ((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3),
          y: 0.5 * ((2*p1.y) + (-p0.y + p2.y)*t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3)
        };
      }

      function buildCurve(a, b, c, steps = 140) {
        const result = [];
        const half = steps / 2;
        for (let i = 0; i <= half; i++) {
          const t = i / half;
          result.push(catmullRom(a, a, b, c, t));
        }
        for (let i = 0; i <= half; i++) {
          const t = i / half;
          result.push(catmullRom(a, b, c, c, t));
        }
        return result;
      }

      function drawCurve(curve, color, width, blur, alpha) {
        if (curve.length < 2) return;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.shadowBlur = blur;
        ctx.shadowColor = color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(curve[0].x, curve[0].y);
        for (let i = 1; i < curve.length; i++) {
          ctx.lineTo(curve[i].x, curve[i].y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawParticle(curve, progress, color, size) {
        const idx = Math.floor(progress * (curve.length - 1));
        const pt = curve[idx];
        ctx.save();
        ctx.shadowBlur = 35;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size * 0.6, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();
      }

      function drawNode(pt, color, label, radius) {
        ctx.save();
        ctx.shadowBlur = 40;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius * 0.4, 0, 2 * Math.PI);
        ctx.fill();
        // подпись
        ctx.font = '12px system-ui';
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#000';
        ctx.fillText(label, pt.x + radius + 5, pt.y - 5);
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const frontCurve = buildCurve(points.heart, points.front, points.left);
        const backCurve = buildCurve(points.heart, points.back, points.right);

        // статические линии
        drawCurve(frontCurve, 'rgba(51,153,255,0.35)', 3, 20, 1);
        drawCurve(backCurve, 'rgba(255,51,102,0.35)', 3, 20, 1);

        const t = time % 1.0;
        const tRev = (1 - t + 1) % 1;

        // синие частицы (от сердца к рукам)
        drawParticle(frontCurve, t, '#3399ff', 7);
        drawParticle(backCurve, t, '#3399ff', 7);
        // красные частицы (от рук к сердцу)
        drawParticle(frontCurve, tRev, '#ff3366', 7);
        drawParticle(backCurve, tRev, '#ff3366', 7);

        // узлы
        drawNode(points.heart, '#ffffff', 'Сердце', 18);
        drawNode(points.front, '#3399ff', 'Верх', 15);
        drawNode(points.back, '#ff3366', 'Низ', 15);
        drawNode(points.left, '#3399ff', 'Левая', 15);
        drawNode(points.right, '#ff3366', 'Правая', 15);
      }

      function animationLoop() {
        if (playing) {
          time += animSpeed / 60;
          if (time > 1000) time -= 1000;
        }
        draw();
        requestAnimationFrame(animationLoop);
      }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      canvas.addEventListener('pointerdown', e => {
        const pos = getCanvasPos(e);
        for (let key in points) {
          if (Math.hypot(pos.x - points[key].x, pos.y - points[key].y) < 30) {
            dragTarget = key;
            canvas.setPointerCapture(e.pointerId);
            break;
          }
        }
      });

      canvas.addEventListener('pointermove', e => {
        if (!dragTarget) return;
        const pos = getCanvasPos(e);
        points[dragTarget].x = pos.x;
        points[dragTarget].y = pos.y;
      });

      canvas.addEventListener('pointerup', e => {
        dragTarget = null;
        canvas.releasePointerCapture(e.pointerId);
      });

      document.getElementById('playBtn').addEventListener('click', () => {
        playing = !playing;
        const btn = document.getElementById('playBtn');
        btn.textContent = playing ? '⏸ Pause' : '▶ Play';
        btn.classList.toggle('playing', playing);
      });

      document.getElementById('resetBtn').addEventListener('click', initPoints);

      function resize() {
        const maxSize = Math.min(window.innerWidth - 16, window.innerHeight - 80, 800);
        canvas.width = maxSize;
        canvas.height = maxSize;
        initPoints();
      }

      window.addEventListener('resize', resize);
      resize();
      animationLoop();
    })();
  </script>
</body>
</html>
