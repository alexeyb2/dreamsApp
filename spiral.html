<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌀 Две спирали — лучи из сердца</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #05070f; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      font-family: system-ui, sans-serif;
      color: #0ff;
    }
    canvas {
      width: 100%;
      max-width: 100vw;
      height: auto;
      max-height: calc(100vh - 80px);
      aspect-ratio: 1 / 1;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #010314;
      touch-action: none;
    }
    .controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 10px 18px;
      font-size: 14px;
      background: rgba(10, 25, 45, 0.9);
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.96); }
    button.playing { background: #0ff; color: #000; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <button id="resetBtn">↺ Сброс</button>
  </div>

  <script>
    class SpiralEnergy {
      constructor(canvas, defaultPoints) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.defaultPoints = defaultPoints; // { key: { rx, ry } } – исходные пропорции
        this.points = {};                   // текущие пиксельные координаты
        this.rays = [];                     // { out: { keys, color }, in: { keys, color } }
        this.dragTarget = null;
        this.playing = false;
        this.time = 0;
        this.animSpeed = 0.12;

        // Загружаем сохранённые пропорции или используем дефолтные
        this.loadPoints();
        this.initPoints();
        this.bindEvents();
        this.resize();
        this.animationLoop();
      }

      // Добавляет пару лучей: out (цвет outColor) проходит через outKeys, in (цвет inColor) через inKeys
      makeSpiralOutIn(outKeys, outColor, inKeys, inColor) {
        this.rays.push({
          out: { keys: outKeys, color: outColor },
          in:  { keys: inKeys,  color: inColor }
        });
      }

      // Загрузка сохранённых пропорций из localStorage
      loadPoints() {
        const saved = localStorage.getItem('energyPoints');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            // Обновляем дефолтные пропорции, если ключи совпадают
            for (let key in data) {
              if (this.defaultPoints.hasOwnProperty(key)) {
                this.defaultPoints[key].rx = data[key].rx;
                this.defaultPoints[key].ry = data[key].ry;
              }
            }
          } catch (e) { /* игнорируем ошибки */ }
        }
      }

      // Сохранение текущих пропорций в localStorage
      savePoints() {
        const data = {};
        for (let key in this.points) {
          data[key] = {
            rx: this.points[key].x / this.canvas.width,
            ry: this.points[key].y / this.canvas.height
          };
        }
        localStorage.setItem('energyPoints', JSON.stringify(data));
      }

      // Пересчёт пиксельных координат на основе пропорций (вызывается при ресайзе или сбросе)
      initPoints() {
        const w = this.canvas.width;
        const h = this.canvas.height;
        for (let key in this.defaultPoints) {
          this.points[key] = {
            x: this.defaultPoints[key].rx * w,
            y: this.defaultPoints[key].ry * h
          };
        }
      }

      // Catmull-Rom сплайн
      catmullRom(p0, p1, p2, p3, t) {
        const t2 = t * t, t3 = t2 * t;
        return {
          x: 0.5 * ((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3),
          y: 0.5 * ((2*p1.y) + (-p0.y + p2.y)*t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3)
        };
      }

      // Построение замкнутой петли: heart → keys → heart
      buildLoop(keys, steps = 300) {
        const allKeys = ['heart', ...keys, 'heart'];
        const pts = allKeys.map(k => this.points[k]);
        const n = pts.length; // должно быть >= 3
        if (n < 2) return [];
        const segments = n - 1; // замкнутая: heart→...→heart
        const stepsPerSegment = Math.floor(steps / segments);
        const result = [];
        for (let i = 0; i < segments; i++) {
          const p0 = pts[(i - 1 + n) % n];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = pts[(i + 2) % n];
          for (let s = 0; s < stepsPerSegment; s++) {
            result.push(this.catmullRom(p0, p1, p2, p3, s / stepsPerSegment));
          }
        }
        result.push(pts[0]); // замыкание
        return result;
      }

      drawCurve(curve, color, width, blur, alpha) {
        if (!curve || curve.length < 2) return;
        const ctx = this.ctx;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.shadowBlur = blur;
        ctx.shadowColor = color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(curve[0].x, curve[0].y);
        for (let i = 1; i < curve.length; i++) ctx.lineTo(curve[i].x, curve[i].y);
        ctx.stroke();
        ctx.restore();
      }

      drawParticle(curve, progress, color, size = 7) {
        if (!curve || curve.length < 2) return;
        const idx = Math.floor(progress * (curve.length - 1));
        const pt = curve[idx];
        const ctx = this.ctx;
        ctx.save();
        ctx.shadowBlur = 35;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size * 0.6, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();
      }

      drawNode(pt, color, label, radius = 14) {
        const ctx = this.ctx;
        ctx.save();
        ctx.shadowBlur = 40;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius * 0.4, 0, 2 * Math.PI);
        ctx.fill();
        ctx.font = '10px system-ui';
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#000';
        ctx.fillText(label, pt.x + radius + 4, pt.y - 3);
        ctx.restore();
      }

      draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        const t = this.time % 1.0;

        // Для каждого луча строим петли по текущим позициям точек
        for (let ray of this.rays) {
          const outCurve = this.buildLoop(ray.out.keys);
          const inCurve = this.buildLoop(ray.in.keys);

          // Статические полупрозрачные линии
          this.drawCurve(outCurve, ray.out.color + '44', 3, 20, 1);
          this.drawCurve(inCurve,  ray.in.color  + '44', 3, 20, 1);

          // Частицы, одновременно вылетающие из сердца по обеим веткам
          this.drawParticle(outCurve, t, ray.out.color);
          this.drawParticle(inCurve,  t, ray.in.color);
        }

        // Подписи узлов
        const colorMap = {
          heart: '#ffffff',
          front_left: '#3399ff', left: '#3399ff', behind_left: '#3399ff',
          front_right: '#ff3366', right: '#ff3366', behind_right: '#ff3366',
          top: '#ffaa00', bottom: '#ffaa00', front_heart: '#ffaa00', back_heart: '#ffaa00'
        };
        const labelMap = {
          heart: 'Сердце',
          front_left: 'Перед L локтем', left: 'Левая ладонь', behind_left: 'За L локтем',
          front_right: 'Перед R локтем', right: 'Правая ладонь', behind_right: 'За R локтем',
          top: 'Макушка', bottom: 'Копчик', front_heart: 'Перед сердцем', back_heart: 'За сердцем'
        };
        for (let key in this.points) {
          const pt = this.points[key];
          const color = colorMap[key] || '#aaa';
          const label = labelMap[key] || key;
          this.drawNode(pt, color, label, key === 'heart' ? 18 : 14);
        }
      }

      animationLoop() {
        if (this.playing) {
          this.time += this.animSpeed / 60;
          if (this.time > 1000) this.time -= 1000;
        }
        this.draw();
        requestAnimationFrame(() => this.animationLoop());
      }

      getCanvasPos(e) {
        const rect = this.canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      }

      onPointerDown(e) {
        const pos = this.getCanvasPos(e);
        for (let key in this.points) {
          if (Math.hypot(pos.x - this.points[key].x, pos.y - this.points[key].y) < 30) {
            this.dragTarget = key;
            this.canvas.setPointerCapture(e.pointerId);
            break;
          }
        }
      }

      onPointerMove(e) {
        if (!this.dragTarget) return;
        const pos = this.getCanvasPos(e);
        this.points[this.dragTarget].x = pos.x;
        this.points[this.dragTarget].y = pos.y;
        // Обновляем пропорциональные координаты в реальном времени
        this.defaultPoints[this.dragTarget].rx = pos.x / this.canvas.width;
        this.defaultPoints[this.dragTarget].ry = pos.y / this.canvas.height;
      }

      onPointerUp(e) {
        if (this.dragTarget) {
          this.savePoints(); // автоматическое сохранение после перемещения
          this.dragTarget = null;
        }
        this.canvas.releasePointerCapture(e.pointerId);
      }

      bindEvents() {
        this.canvas.addEventListener('pointerdown', e => this.onPointerDown(e));
        this.canvas.addEventListener('pointermove', e => this.onPointerMove(e));
        this.canvas.addEventListener('pointerup', e => this.onPointerUp(e));
      }

      resize() {
        const maxSize = Math.min(window.innerWidth - 16, window.innerHeight - 80, 800);
        this.canvas.width = maxSize;
        this.canvas.height = maxSize;
        this.initPoints();
      }
    }

    // --- Конфигурация ---
    const defaultPoints = {
      heart:        { rx: 0.50, ry: 0.50 },
      front_left:   { rx: 0.30, ry: 0.25 },
      left:         { rx: 0.10, ry: 0.50 },
      behind_left:  { rx: 0.20, ry: 0.75 },
      front_right:  { rx: 0.70, ry: 0.25 },
      right:        { rx: 0.90, ry: 0.50 },
      behind_right: { rx: 0.80, ry: 0.75 },
      top:          { rx: 0.50, ry: 0.08 },
      bottom:       { rx: 0.50, ry: 0.92 },
      front_heart:  { rx: 0.50, ry: 0.35 },
      back_heart:   { rx: 0.50, ry: 0.65 }
    };

    const canvas = document.getElementById('canvas');
    const energy = new SpiralEnergy(canvas, defaultPoints);

    // Горизонтальная спираль: синий луч (левая сторона) и красный (правая)
    energy.makeSpiralOutIn(
      ['front_left', 'left', 'behind_left'],       // outKeys
      '#3399ff',                                   // blue
      ['behind_right', 'right', 'front_right'],    // inKeys
      '#ff3366'                                    // red
    );

    // Вертикальная спираль: жёлтый вверх (макушка) и оранжевый вниз (копчик)
    energy.makeSpiralOutIn(
      ['top', 'front_heart', 'left'],              // outKeys
      '#ffaa00',                                   // yellow
      ['bottom', 'back_heart', 'right'],           // inKeys
      '#ff8800'                                    // orange
    );

    // Кнопки управления
    document.getElementById('playBtn').addEventListener('click', () => {
      energy.playing = !energy.playing;
      const btn = document.getElementById('playBtn');
      btn.textContent = energy.playing ? '⏸ Pause' : '▶ Play';
      btn.classList.toggle('playing', energy.playing);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      // Восстанавливаем исходные пропорции (без учёта сохранённых)
      Object.assign(energy.defaultPoints, {
        heart: { rx: 0.50, ry: 0.50 },
        front_left: { rx: 0.30, ry: 0.25 },
        left: { rx: 0.10, ry: 0.50 },
        behind_left: { rx: 0.20, ry: 0.75 },
        front_right: { rx: 0.70, ry: 0.25 },
        right: { rx: 0.90, ry: 0.50 },
        behind_right: { rx: 0.80, ry: 0.75 },
        top: { rx: 0.50, ry: 0.08 },
        bottom: { rx: 0.50, ry: 0.92 },
        front_heart: { rx: 0.50, ry: 0.35 },
        back_heart: { rx: 0.50, ry: 0.65 }
      });
      energy.initPoints();
      energy.savePoints(); // сброшенные позиции тоже сохраняем
    });

    window.addEventListener('resize', () => energy.resize());
  </script>
</body>
</html>
