<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌀 Идеальная восьмёрка — класс EnergyEight</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #05070f; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      font-family: system-ui, sans-serif;
      color: #0ff;
    }
    canvas {
      width: 100%;
      max-width: 100vw;
      height: auto;
      max-height: calc(100vh - 80px);
      aspect-ratio: 1 / 1;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #010314;
      touch-action: none;
    }
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      background: rgba(10, 25, 45, 0.9);
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.96); }
    button.playing { background: #0ff; color: #000; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <button id="resetBtn">Сбросить точки</button>
  </div>

  <script>
    class EnergyEight {
      /**
       * @param {HTMLCanvasElement} canvas — холст для рисования
       * @param {Object} initialPoints — объект с семью точками в пропорциях (rx, ry)
       *        { heart, front_left, left, behind_left, front_right, right, behind_right }
       */
      constructor(canvas, initialPoints) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.initialPoints = initialPoints; // пропорции (0..1)
        this.points = {};                  // текущие пиксельные координаты
        this.dragTarget = null;
        this.playing = false;
        this.time = 0;
        this.animSpeed = 0.12; // циклов в секунду

        this.initPoints();
        this.bindEvents();
        this.resize();
        this.animationLoop();
      }

      // Инициализация пиксельных координат на основе пропорций
      initPoints() {
        const w = this.canvas.width;
        const h = this.canvas.height;
        for (let key in this.initialPoints) {
          this.points[key] = {
            x: this.initialPoints[key].rx * w,
            y: this.initialPoints[key].ry * h
          };
        }
      }

      // Catmull-Rom сплайн
      catmullRom(p0, p1, p2, p3, t) {
        const t2 = t * t, t3 = t2 * t;
        return {
          x: 0.5 * ((2*p1.x) + (-p0.x + p2.x)*t + (2*p0.x - 5*p1.x + 4*p2.x - p3.x)*t2 + (-p0.x + 3*p1.x - 3*p2.x + p3.x)*t3),
          y: 0.5 * ((2*p1.y) + (-p0.y + p2.y)*t + (2*p0.y - 5*p1.y + 4*p2.y - p3.y)*t2 + (-p0.y + 3*p1.y - 3*p2.y + p3.y)*t3)
        };
      }

      // Построение замкнутой петли: heart -> a -> hand -> b -> heart
      buildLoop(heart, a, hand, b, steps = 280) {
        const pts = [heart, a, hand, b, heart];
        const segments = pts.length - 1;
        const stepsPerSegment = Math.floor(steps / segments);
        const result = [];

        for (let i = 0; i < segments; i++) {
          const p0 = pts[Math.max(0, i - 1)];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = pts[Math.min(pts.length - 1, i + 2)];
          for (let s = 0; s < stepsPerSegment; s++) {
            const t = s / stepsPerSegment;
            result.push(this.catmullRom(p0, p1, p2, p3, t));
          }
        }
        result.push({ x: heart.x, y: heart.y }); // замыкание
        return result;
      }

      drawCurve(curve, color, width, blur, alpha) {
        if (curve.length < 2) return;
        const ctx = this.ctx;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.shadowBlur = blur;
        ctx.shadowColor = color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(curve[0].x, curve[0].y);
        for (let i = 1; i < curve.length; i++) {
          ctx.lineTo(curve[i].x, curve[i].y);
        }
        ctx.stroke();
        ctx.restore();
      }

      drawParticle(curve, progress, color, size = 7) {
        const idx = Math.floor(progress * (curve.length - 1));
        const pt = curve[idx];
        const ctx = this.ctx;
        ctx.save();
        ctx.shadowBlur = 35;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size * 0.6, 0, 2 * Math.PI);
        ctx.fill();
        ctx.restore();
      }

      drawNode(pt, color, label, radius = 14) {
        const ctx = this.ctx;
        ctx.save();
        ctx.shadowBlur = 40;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius, 0, 2 * Math.PI);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius * 0.4, 0, 2 * Math.PI);
        ctx.fill();
        ctx.font = '11px system-ui';
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#000';
        ctx.fillText(label, pt.x + radius + 5, pt.y - 5);
        ctx.restore();
      }

      draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        const heart = this.points.heart;
        const frontLeft = this.points.front_left;
        const leftHand = this.points.left;
        const behindLeft = this.points.behind_left;
        const frontRight = this.points.front_right;
        const rightHand = this.points.right;
        const behindRight = this.points.behind_right;

        // Петли
        const frontLoop = this.buildLoop(heart, frontLeft, leftHand, behindLeft); // синяя
        const backLoop = this.buildLoop(heart, frontRight, rightHand, behindRight); // красная

        // Статические линии
        this.drawCurve(frontLoop, 'rgba(51,153,255,0.4)', 3, 20, 1);
        this.drawCurve(backLoop, 'rgba(255,51,102,0.4)', 3, 20, 1);

        const t = this.time % 1.0;

        // Синий шар по передней петле (heart → перед L)
        this.drawParticle(frontLoop, t, '#3399ff', 7);

        // Красный шар по задней петле в противоположном направлении (heart → за R)
        const redProgress = (1 - t + 1) % 1;
        this.drawParticle(backLoop, redProgress, '#ff3366', 7);

        // Узлы
        this.drawNode(heart, '#ffffff', 'Сердце', 18);
        this.drawNode(frontLeft, '#3399ff', 'Перед L', 14);
        this.drawNode(leftHand, '#3399ff', 'Левая', 14);
        this.drawNode(behindLeft, '#3399ff', 'За L', 14);
        this.drawNode(frontRight, '#ff3366', 'Перед R', 14);
        this.drawNode(rightHand, '#ff3366', 'Правая', 14);
        this.drawNode(behindRight, '#ff3366', 'За R', 14);
      }

      animationLoop() {
        if (this.playing) {
          this.time += this.animSpeed / 60;
          if (this.time > 1000) this.time -= 1000;
        }
        this.draw();
        requestAnimationFrame(() => this.animationLoop());
      }

      // Перетаскивание
      getCanvasPos(e) {
        const rect = this.canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      onPointerDown(e) {
        const pos = this.getCanvasPos(e);
        for (let key in this.points) {
          if (Math.hypot(pos.x - this.points[key].x, pos.y - this.points[key].y) < 30) {
            this.dragTarget = key;
            this.canvas.setPointerCapture(e.pointerId);
            break;
          }
        }
      }

      onPointerMove(e) {
        if (!this.dragTarget) return;
        const pos = this.getCanvasPos(e);
        this.points[this.dragTarget].x = pos.x;
        this.points[this.dragTarget].y = pos.y;
      }

      onPointerUp(e) {
        this.dragTarget = null;
        this.canvas.releasePointerCapture(e.pointerId);
      }

      bindEvents() {
        this.canvas.addEventListener('pointerdown', (e) => this.onPointerDown(e));
        this.canvas.addEventListener('pointermove', (e) => this.onPointerMove(e));
        this.canvas.addEventListener('pointerup', (e) => this.onPointerUp(e));
      }

      resize() {
        const maxSize = Math.min(window.innerWidth - 16, window.innerHeight - 80, 800);
        this.canvas.width = maxSize;
        this.canvas.height = maxSize;
        this.initPoints();
      }
    }

    // --- Использование класса ---
    const canvas = document.getElementById('canvas');

    // Начальные пропорциональные координаты семи точек
    const initialPoints = {
      heart:       { rx: 0.5, ry: 0.5 },
      front_left:  { rx: 0.3, ry: 0.25 },
      left:        { rx: 0.1, ry: 0.5 },
      behind_left: { rx: 0.2, ry: 0.75 },
      front_right: { rx: 0.7, ry: 0.25 },
      right:       { rx: 0.9, ry: 0.5 },
      behind_right:{ rx: 0.8, ry: 0.75 }
    };

    const energyEight = new EnergyEight(canvas, initialPoints);

    // Внешние кнопки
    document.getElementById('playBtn').addEventListener('click', () => {
      energyEight.playing = !energyEight.playing;
      const btn = document.getElementById('playBtn');
      btn.textContent = energyEight.playing ? '⏸ Pause' : '▶ Play';
      btn.classList.toggle('playing', energyEight.playing);
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      energyEight.initPoints();
    });

    window.addEventListener('resize', () => energyEight.resize());
  </script>
</body>
</html>
