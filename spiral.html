<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌀 Горизонтальная Восьмёрка</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #05070f; color: #0ff; font-family: system-ui, sans-serif;
      height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 10px; overflow: hidden;
    }
    canvas {
      flex: 1; max-width: 740px; max-height: 740px; border: 2px solid #0ff;
      border-radius: 20px; background: #000; touch-action: none;
    }
    .controls {
      margin-top: 12px; display: flex; gap: 12px; align-items: center;
    }
    button {
      padding: 12px 28px; font-size: 17px; background: rgba(10,25,45,0.9);
      color: #0ff; border: 2px solid #0ff; border-radius: 30px; cursor: pointer;
      transition: 0.2s;
    }
    button:hover { background: #0ff; color: #000; }
    button.playing { background: #0ff; color: #000; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <button id="resetBtn">Сбросить точки</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let playing = false;
    let time = 0;                 // общий счётчик времени для движения частиц
    const animSpeed = 0.08;       // скорость частиц (циклов в секунду)

    // Точки – центры (Heart, Left Hand, Right Hand)
    let points = {
      heart: { x: 370, y: 370 },
      left:  { x: 140, y: 280 },
      right: { x: 590, y: 460 }
    };

    let dragTarget = null;

    // Размер холста и начальные координаты
    function resize() {
      const size = Math.min(window.innerWidth - 20, 740);
      canvas.width = size;
      canvas.height = size;
      resetPoints(); // при ресайзе сбрасываем точки пропорционально
    }

    // Установка точек пропорционально размеру холста
    function resetPoints() {
      const w = canvas.width;
      const h = canvas.height;
      points.heart = { x: w * 0.5,  y: h * 0.48 };
      points.left  = { x: w * 0.22, y: h * 0.38 };
      points.right = { x: w * 0.78, y: h * 0.62 };
    }

    // Квадратичная кривая Безье между тремя точками
    function bezierPoint(p0, p1, p2, t) {
      const x = Math.pow(1-t, 2) * p0.x + 2*(1-t)*t * p1.x + t*t * p2.x;
      const y = Math.pow(1-t, 2) * p0.y + 2*(1-t)*t * p1.y + t*t * p2.y;
      return { x, y };
    }

    // Получить все точки петли (heart->hand->heart) в виде массива
    function buildLoop(start, mid, end, steps = 120) {
      const loop = [];
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        loop.push(bezierPoint(start, mid, end, t));
      }
      return loop;
    }

    // Отрисовка петли с неоновым свечением
    function drawLoop(loop, color) {
      if (loop.length < 2) return;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 4;
      ctx.shadowBlur = 30;
      ctx.shadowColor = color;
      ctx.beginPath();
      ctx.moveTo(loop[0].x, loop[0].y);
      for (let i = 1; i < loop.length; i++) {
        ctx.lineTo(loop[i].x, loop[i].y);
      }
      ctx.stroke();
      ctx.restore();
    }

    // Отрисовка светящейся частицы на петле по нормализованному прогрессу (0..1)
    function drawParticle(loop, progress, color) {
      const idx = Math.floor(progress * (loop.length - 1));
      const pt = loop[idx];
      ctx.save();
      ctx.shadowBlur = 40;
      ctx.shadowColor = color;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 60;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function draw() {
      // Полная очистка
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Обновление времени при воспроизведении
      if (playing) {
        time += animSpeed * (1/60); // примерно 60 fps
        if (time > 1) time -= 1;
      }

      const h = points.heart;
      const l = points.left;
      const r = points.right;

      // Построение петель
      // Синяя петля (передняя): heart -> left -> heart
      const blueLoop1 = buildLoop(h, {x: l.x-30, y: l.y-90}, l);
      const blueLoop2 = buildLoop(l, {x: h.x+20, y: h.y+70}, h);
      const blueFull = [...blueLoop1, ...blueLoop2]; // полная петля от heart через left обратно

      // Красная петля (задняя): heart -> right -> heart
      const redLoop1 = buildLoop(h, {x: r.x+50, y: r.y+50}, r);
      const redLoop2 = buildLoop(r, {x: h.x-30, y: h.y-60}, h);
      const redFull = [...redLoop1, ...redLoop2];

      // Рисуем статические петли
      drawLoop(blueFull, '#3399ff');
      drawLoop(redFull, '#ff3366');

      // Анимированные частицы (по две на каждой петле, в противоположных направлениях)
      // Синяя: одна вперёд, другая назад
      const blueProg1 = time;
      const blueProg2 = (1 - time + 1) % 1; // обратное движение
      drawParticle(blueFull, blueProg1, '#3399ff');
      drawParticle(blueFull, blueProg2, '#3399ff');

      // Красная: аналогично, но со смещением фазы, чтобы не совпадало
      const redPhase = 0.35; // сдвиг
      const redProg1 = (time + redPhase) % 1;
      const redProg2 = (1 - time + redPhase) % 1;
      drawParticle(redFull, redProg1, '#ff3366');
      drawParticle(redFull, redProg2, '#ff3366');

      // Яркие узлы (центры)
      function drawNode(pt, color, radius = 16) {
        ctx.save();
        ctx.shadowBlur = 45;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius, 0, Math.PI*2);
        ctx.fill();
        // белая сердцевина
        ctx.shadowBlur = 60;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius*0.35, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }

      drawNode(l, '#3399ff');
      drawNode(r, '#ff3366');
      drawNode(h, '#ffffff', 19);
    }

    // Перетаскивание точек (мышь и касания)
    canvas.addEventListener('pointerdown', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const dist = (pt) => Math.hypot(x - pt.x, y - pt.y);
      if (dist(points.heart) < 35) dragTarget = 'heart';
      else if (dist(points.left) < 30) dragTarget = 'left';
      else if (dist(points.right) < 30) dragTarget = 'right';
    });

    canvas.addEventListener('pointermove', e => {
      if (!dragTarget) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      points[dragTarget].x = x;
      points[dragTarget].y = y;
    });

    canvas.addEventListener('pointerup', () => dragTarget = null);

    document.getElementById('playBtn').addEventListener('click', () => {
      playing = !playing;
      const btn = document.getElementById('playBtn');
      btn.textContent = playing ? '⏸ Pause' : '▶ Play';
      btn.classList.toggle('playing', playing);
    });

    document.getElementById('resetBtn').addEventListener('click', resetPoints);

    window.addEventListener('resize', resize);
    resize();

    // Главный цикл отрисовки
    function animationLoop() {
      draw();
      requestAnimationFrame(animationLoop);
    }
    animationLoop();
  </script>
</body>
</html>
