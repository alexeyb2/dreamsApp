<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌀 Двойная энергетическая восьмёрка</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #05070f;
      color: #0ff;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      overflow: hidden;
    }
    canvas {
      flex: 1;
      max-width: 800px;
      max-height: 800px;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #010314;
      touch-action: none;
    }
    .controls {
      margin-top: 12px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    button {
      padding: 12px 28px;
      font-size: 17px;
      background: rgba(10, 25, 45, 0.9);
      color: #0ff;
      border: 2px solid #0ff;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #0ff;
      color: #000;
    }
    button.playing {
      background: #0ff;
      color: #000;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <button id="resetBtn">Сбросить точки</button>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // Точки (в пропорциях от размера холста, будут пересчитаны в resize)
      const initialPoints = {
        heart: { rx: 0.5, ry: 0.48 },
        front: { rx: 0.35, ry: 0.3 },
        back:  { rx: 0.65, ry: 0.3 },
        left:  { rx: 0.15, ry: 0.4 },
        right: { rx: 0.85, ry: 0.4 }
      };

      let points = {};
      let dragTarget = null;
      let playing = false;
      let time = 0;                 // накопительное время для анимации
      const animSpeed = 0.15;       // циклов в секунду (медленное движение)

      // Преобразование пропорциональных координат в пиксельные
      function initPoints() {
        const w = canvas.width;
        const h = canvas.height;
        for (let key in initialPoints) {
          points[key] = {
            x: initialPoints[key].rx * w,
            y: initialPoints[key].ry * h
          };
        }
      }

      // Catmull-Rom сплайн – интерполяция между p1 и p2 с учетом p0 и p3
      function catmullRom(p0, p1, p2, p3, t) {
        const t2 = t * t;
        const t3 = t2 * t;
        const x = 0.5 * ((2 * p1.x) +
          (-p0.x + p2.x) * t +
          (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
          (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
        const y = 0.5 * ((2 * p1.y) +
          (-p0.y + p2.y) * t +
          (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
          (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3);
        return { x, y };
      }

      // Построить массив точек кривой, проходящей через a -> b -> c
      function buildCurve(a, b, c, steps = 120) {
        const result = [];
        // Сегмент a->b (используем a, a, b, c)
        for (let i = 0; i <= steps / 2; i++) {
          const t = i / (steps / 2);
          result.push(catmullRom(a, a, b, c, t));
        }
        // Сегмент b->c (используем a, b, c, c)
        for (let i = 0; i <= steps / 2; i++) {
          const t = i / (steps / 2);
          result.push(catmullRom(a, b, c, c, t));
        }
        return result;
      }

      // Отрисовка кривой с неоновым свечением
      function drawCurve(curve, color, lineWidth = 3, blur = 25, alpha = 1) {
        if (curve.length < 2) return;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.shadowBlur = blur;
        ctx.shadowColor = color;
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(curve[0].x, curve[0].y);
        for (let i = 1; i < curve.length; i++) {
          ctx.lineTo(curve[i].x, curve[i].y);
        }
        ctx.stroke();
        ctx.restore();
      }

      // Отрисовка светящейся частицы на кривой по нормализованной позиции (0..1)
      function drawParticle(curve, progress, color, size = 8) {
        const idx = Math.floor(progress * (curve.length - 1));
        const pt = curve[idx];
        ctx.save();
        ctx.shadowBlur = 35;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, size * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Отрисовка узловой точки (перетаскиваемой)
      function drawNode(pt, color, label, radius = 16) {
        ctx.save();
        ctx.shadowBlur = 40;
        ctx.shadowColor = color;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
        ctx.fill();
        // Белая сердцевина
        ctx.shadowBlur = 50;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius * 0.4, 0, Math.PI * 2);
        ctx.fill();
        // Подпись
        ctx.font = '12px system-ui';
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#000';
        ctx.fillText(label, pt.x + radius + 5, pt.y - radius);
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Построение кривых
        const frontCurve = buildCurve(points.heart, points.front, points.left);
        const backCurve = buildCurve(points.heart, points.back, points.right);

        // Рисуем кривые (полупрозрачные, чтобы не перебивать частицы)
        drawCurve(frontCurve, 'rgba(51, 153, 255, 0.4)', 3, 20);
        drawCurve(backCurve, 'rgba(255, 51, 102, 0.4)', 3, 20);

        // Анимация
        const t = time % 1.0; // циклический прогресс 0..1

        // Синие частицы (от сердца к рукам)
        drawParticle(frontCurve, t, '#3399ff', 7);        // heart → left по передней
        drawParticle(backCurve, t, '#3399ff', 7);         // heart → right по задней

        // Красные частицы (от рук к сердцу) – движутся в обратном направлении
        const tReverse = (1 - t + 1) % 1;
        drawParticle(frontCurve, tReverse, '#ff3366', 7); // left → heart
        drawParticle(backCurve, tReverse, '#ff3366', 7);  // right → heart

        // Узлы
        drawNode(points.heart, '#ffffff', 'Сердце', 18);
        drawNode(points.front, '#3399ff', 'Front', 14);
        drawNode(points.back, '#ff3366', 'Back', 14);
        drawNode(points.left, '#3399ff', 'Левая рука', 14);
        drawNode(points.right, '#ff3366', 'Правая рука', 14);
      }

      // Анимационный цикл
      function animationLoop() {
        if (playing) {
          time += animSpeed / 60; // 60 fps
          if (time > 1000) time -= 1000; // предотвращаем переполнение
        }
        draw();
        requestAnimationFrame(animationLoop);
      }

      // Перетаскивание (Pointer Events)
      function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      canvas.addEventListener('pointerdown', e => {
        const pos = getPos(e);
        for (let key in points) {
          if (Math.hypot(pos.x - points[key].x, pos.y - points[key].y) < 25) {
            dragTarget = key;
            canvas.setPointerCapture(e.pointerId);
            break;
          }
        }
      });

      canvas.addEventListener('pointermove', e => {
        if (!dragTarget) return;
        const pos = getPos(e);
        points[dragTarget].x = pos.x;
        points[dragTarget].y = pos.y;
      });

      canvas.addEventListener('pointerup', e => {
        dragTarget = null;
        canvas.releasePointerCapture(e.pointerId);
      });

      // Кнопка Play/Pause
      document.getElementById('playBtn').addEventListener('click', () => {
        playing = !playing;
        const btn = document.getElementById('playBtn');
        btn.textContent = playing ? '⏸ Pause' : '▶ Play';
        btn.classList.toggle('playing', playing);
      });

      // Сброс точек
      document.getElementById('resetBtn').addEventListener('click', () => {
        initPoints();
      });

      // Ресайз
      function resize() {
        const size = Math.min(window.innerWidth - 20, 800);
        canvas.width = size;
        canvas.height = size;
        initPoints();
      }

      window.addEventListener('resize', resize);
      resize();

      // Запуск анимации
      animationLoop();
    })();
  </script>
</body>
</html>
