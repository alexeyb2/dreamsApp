<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Внутренний куб · 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: white;
        }
        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            border-left: 3px solid #ffd700;
            font-size: 16px;
            color: #eee;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #info-panel span {
            color: #ffd700;
            font-weight: bold;
        }
        /* небольшой хинт для мобильных */
        #hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.4);
            color: #aaa;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 16px;
            backdrop-filter: blur(2px);
            z-index: 100;
        }
        /* анимация пульсации для центрального символа */
        .center-emoji {
            animation: pulse 2s infinite ease-in-out;
            filter: drop-shadow(0 0 8px gold);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.25); opacity: 0.9; text-shadow: 0 0 15px gold; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="info-panel">👆 Нажми на любой символ</div>
    <div id="hint">🧊 3×3×3 · линии через центр</div>

    <!-- Подключаем Three.js и дополнительные модули через CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Конфигурация (эмулируем config.js) ---
        const CONFIG = {
            cubeSize: 1,                      // размер куба (0..1)
            emojiPositions: [
                // формат: { emoji, x, y, z }
                // Верхний слой y = 1
                { emoji: '💨', x: 0, y: 1, z: 0 },
                { emoji: '◀️', x: 0, y: 1, z: 0.5 },
                { emoji: '🌦', x: 0, y: 1, z: 1 },
                { emoji: '🔼', x: 0.5, y: 1, z: 0 },
                { emoji: '🟠', x: 0.5, y: 1, z: 0.5 },
                { emoji: '🔽', x: 0.5, y: 1, z: 1 },
                { emoji: '🌤', x: 1, y: 1, z: 0 },
                { emoji: '▶️', x: 1, y: 1, z: 0.5 },
                { emoji: '🌧', x: 1, y: 1, z: 1 },
                // Средний слой y = 0.5
                { emoji: '↙️', x: 0, y: 0.5, z: 0 },
                { emoji: '⬅️', x: 0, y: 0.5, z: 0.5 },
                { emoji: '↖️', x: 0, y: 0.5, z: 1 },
                { emoji: '⬇️', x: 0.5, y: 0.5, z: 0 },
                { emoji: '🟡', x: 0.5, y: 0.5, z: 0.5 },  // центр
                { emoji: '⬆️', x: 0.5, y: 0.5, z: 1 },
                { emoji: '↘️', x: 1, y: 0.5, z: 0 },
                { emoji: '➡️', x: 1, y: 0.5, z: 0.5 },
                { emoji: '↗️', x: 1, y: 0.5, z: 1 },
                // Нижний слой y = 0
                { emoji: '🔴', x: 0, y: 0, z: 0 },
                { emoji: '⚔️', x: 0, y: 0, z: 0.5 },
                { emoji: '🟦', x: 0, y: 0, z: 1 },
                { emoji: '🫧', x: 0.5, y: 0, z: 0 },
                { emoji: '🟧', x: 0.5, y: 0, z: 0.5 },
                { emoji: '🪨', x: 0.5, y: 0, z: 1 },
                { emoji: '🔵', x: 1, y: 0, z: 0 },
                { emoji: '🪵', x: 1, y: 0, z: 0.5 },
                { emoji: '🟥', x: 1, y: 0, z: 1 }
            ],
            line1: {
                start: [0, 1, 0],   // 💨
                end: [1, 0, 1],      // 🟥
                color: '#FFD700',    // желтый
                dashLength: 0.05,
                gapLength: 0.03,
                thickness: 0.02
            },
            line2: {
                start: [0.5, 0, 0.5], // 🟧
                end: [0.5, 1, 0.5],   // 🟠
                color: '#FF9900',      // оранжевый
                dashLength: 0.05,
                gapLength: 0.03,
                thickness: 0.02
            }
        };

        // --- Инициализация сцены, камер, рендереров ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 1.5, 3.5);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(1.8, 1.5, 2.2);
        camera.lookAt(0.5, 0.5, 0.5);

        // WebGL рендерер для геометрии (каркас, линии)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // CSS2D рендерер для эмодзи (четкий текст)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none'; // разрешаем клики через наш слой? лучше разрешить, но мы будем вешать события на элементы
        // Однако чтобы клики проходили на элементы, pointerEvents должен быть auto. Мы сделаем элементы кликабельными.
        labelRenderer.domElement.style.pointerEvents = 'none'; // сделаем так, чтобы фон не перехватывал клики, а сами элементы будут иметь pointer-events: auto
        document.body.appendChild(labelRenderer.domElement);

        // --- Освещение (для линий-сфер, но не обязательно) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);

        // --- Орбитальный контроллер ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2; // ограничим, чтобы не уходить под землю
        controls.target.set(0.5, 0.5, 0.5);

        // --- Создание полупрозрачного каркаса куба (грани и рёбра) ---
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
        const boxEdges = new THREE.EdgesGeometry(boxGeometry);
        
        // Полупрозрачные грани
        const transparentMaterial = new THREE.MeshPhongMaterial({
            color: 0x2a4a6a,
            transparent: true,
            opacity: 0.1,
            side: THREE.DoubleSide
        });
        const wireframeBox = new THREE.Mesh(boxGeometry, transparentMaterial);
        wireframeBox.position.set(0.5, 0.5, 0.5);
        scene.add(wireframeBox);

        // Рёбра (белые, полупрозрачные)
        const edgesMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.25, transparent: true });
        const edgesLines = new THREE.LineSegments(boxEdges, edgesMaterial);
        edgesLines.position.set(0.5, 0.5, 0.5);
        scene.add(edgesLines);

        // Дополнительно тонкие линии на гранях для красоты (можно добавить сетку)
        const gridHelper = new THREE.GridHelper(1, 3, 0x88aaff, 0x445577);
        gridHelper.position.set(0.5, 0, 0.5);
        scene.add(gridHelper);
        
        // Еще одна сетка вертикальная? необязательно.

        // --- Создание пунктирных линий (из маленьких сфер) ---
        function createDashedLine(start, end, color, thickness, dashLen, gapLen) {
            const group = new THREE.Group();
            const vecStart = new THREE.Vector3(...start);
            const vecEnd = new THREE.Vector3(...end);
            const direction = new THREE.Vector3().subVectors(vecEnd, vecStart);
            const totalLength = direction.length();
            direction.normalize();
            
            const sphereMaterial = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.6 });
            const step = dashLen + gapLen;
            const numSpheres = Math.floor(totalLength / step);
            
            for (let i = 0; i <= numSpheres; i++) {
                const t = i * step / totalLength;
                if (t > 1.0) break;
                
                const pos = new THREE.Vector3().copy(vecStart).addScaledVector(direction, i * step);
                // небольшая случайность? нет, ровно.
                
                const sphereGeom = new THREE.SphereGeometry(thickness * 0.8, 6);
                const sphere = new THREE.Mesh(sphereGeom, sphereMaterial);
                sphere.position.copy(pos);
                group.add(sphere);
            }
            
            // Добавим центральную сферу чуть больше? не обязательно, линии проходят через центр, и там есть сфера.
            return group;
        }

        const line1Group = createDashedLine(
            CONFIG.line1.start, CONFIG.line1.end, 
            CONFIG.line1.color, CONFIG.line1.thickness, 
            CONFIG.line1.dashLength, CONFIG.line1.gapLength
        );
        scene.add(line1Group);

        const line2Group = createDashedLine(
            CONFIG.line2.start, CONFIG.line2.end, 
            CONFIG.line2.color, CONFIG.line2.thickness, 
            CONFIG.line2.dashLength, CONFIG.line2.gapLength
        );
        scene.add(line2Group);

        // Анимация линий (пульсация яркости)
        const lineSpheres = [...line1Group.children, ...line2Group.children];
        
        // --- Создание эмодзи с помощью CSS2DRenderer и обработчиков кликов ---
        const emojiGroup = new THREE.Group(); // группа для CSS2D объектов, но они не добавляются в Three группу как обычно, просто добавляем на сцену
        
        // Функция создания CSS2D объекта с эмодзи
        function createEmojiLabel(emoji, x, y, z, isCenter = false) {
            const div = document.createElement('div');
            div.textContent = emoji;
            div.style.fontSize = isCenter ? '60px' : '44px';
            div.style.fontWeight = 'bold';
            div.style.fontFamily = 'Arial, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
            div.style.textShadow = '0 0 10px rgba(255,255,255,0.5)';
            div.style.color = 'white';
            div.style.cursor = 'pointer';
            div.style.userSelect = 'none';
            div.style.pointerEvents = 'auto'; // разрешаем клики
            div.style.transition = 'transform 0.1s';
            
            if (isCenter) {
                div.classList.add('center-emoji');
                div.style.textShadow = '0 0 20px gold, 0 0 30px orange';
            }
            
            // Обработчик клика
            div.addEventListener('click', (ev) => {
                ev.stopPropagation();
                const infoDiv = document.getElementById('info-panel');
                infoDiv.innerHTML = `🧿 Символ: <span>${emoji}</span>  |  (X: ${x.toFixed(1)}, Y: ${y.toFixed(1)}, Z: ${z.toFixed(1)})`;
                // добавим небольшую вибрацию при клике (если в Telegram)
                if (navigator.vibrate) navigator.vibrate(10);
                
                // анимация вспышки
                div.style.transform = 'scale(1.3)';
                setTimeout(() => div.style.transform = 'scale(1)', 150);
            });
            
            const label = new CSS2DObject(div);
            label.position.set(x, y, z);
            return label;
        }

        // Добавляем все эмодзи из конфига
        CONFIG.emojiPositions.forEach(pos => {
            const isCenter = (pos.x === 0.5 && pos.y === 0.5 && pos.z === 0.5);
            const label = createEmojiLabel(pos.emoji, pos.x, pos.y, pos.z, isCenter);
            scene.add(label); // CSS2DObject добавляется в сцену как обычный Object3D
        });

        // --- Добавим маленькие опорные точки на местах линий для красоты? уже есть сферы линий ---

        // --- Добавим легкий туман и звездочки (мелкие частицы) для атмосферы ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 400;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            const r = 2 + Math.random() * 2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = 0.5 + r * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = 0.5 + r * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = 0.5 + r * Math.cos(phi);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.02, transparent: true, opacity: 0.4 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- Анимация ---
        let clock = new THREE.Clock();

        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;

            // Пульсация линий (изменение масштаба или emissive)
            lineSpheres.forEach((sphere, index) => {
                const scale = 1 + Math.sin(elapsedTime * 5 + index) * 0.2;
                sphere.scale.set(scale, scale, scale);
            });

            // Вращение звезд (медленное)
            stars.rotation.y += 0.0002;

            controls.update();

            // Сначала рендерим WebGL
            renderer.render(scene, camera);
            
            // Потом CSS2D (поверх)
            labelRenderer.render(scene, camera);

            requestAnimationFrame(animate);
        }

        animate();

        // --- Обработка ресайза ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Небольшая настройка для Telegram Mini App (изменение темы) ---
        // Если есть Telegram WebApp, можно задать цвета под темы, но это опционально
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand(); // растянуть на весь экран
            // можно установить цвета в соответствии с темой Telegram
        }

        // --- Инициализационное сообщение в info-panel ---
        document.getElementById('info-panel').innerHTML = '👆 Нажми на любой символ';
        
        console.log('Инициализация завершена. Куб 3x3x3 с линиями через центр.');
    </script>
</body>
</html>
