<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Внутренний куб · 3D интерактив (центр 👁️)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: white;
        }
        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            border-left: 3px solid #ffd700;
            font-size: 16px;
            color: #eee;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #info-panel span {
            color: #ffd700;
            font-weight: bold;
        }
        #hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.4);
            color: #aaa;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 16px;
            backdrop-filter: blur(2px);
            z-index: 100;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(5px);
            padding: 15px 20px;
            border-radius: 20px;
            color: #ddd;
            font-size: 14px;
            border: 1px solid #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            z-index: 200;
            pointer-events: auto;
            width: 240px;
        }
        #controls h4 {
            margin: 0 0 10px 0;
            color: #ffd700;
            text-align: center;
        }
        #controls label {
            display: block;
            margin-bottom: 5px;
        }
        #controls select {
            width: 100%;
            padding: 5px;
            background: #222;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #controls .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        #controls input[type=range] {
            flex: 1;
            cursor: pointer;
            accent-color: #ffd700;
            height: 6px;
        }
        #controls span#size-value {
            min-width: 40px;
            text-align: right;
            font-weight: bold;
            color: #ffd700;
        }
        #controls button {
            background: #ffd700;
            color: #0a0a0a;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: 0.2s;
        }
        #controls button:hover {
            background: #ffb700;
        }
        #status {
            color: #0f0;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }
        .center-emoji {
            animation: pulse 2s infinite ease-in-out;
            filter: drop-shadow(0 0 12px gold);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.95; text-shadow: 0 0 20px gold; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="info-panel">👆 Нажми на символ (цветные фигуры можно двигать)</div>
    <div id="hint">🧊 3×3×3 · центр 👁️ · фигуры сохраняются</div>

    <div id="controls">
        <h4>⚙️ Управление фигурами</h4>
        <label>Выбрать фигуру:</label>
        <select id="shape-select">
            <option value="🟧">🟧 (0.5,0,0.5) куб</option>
            <option value="🟠">🟠 (0.5,1,0.5) сфера</option>
            <option value="🟥">🟥 (1,0,1) сфера</option>
            <option value="🟦">🟦 (0,0,1) куб</option>
            <option value="🔵">🔵 (1,0,0) куб</option>
            <option value="🔴">🔴 (0,0,0) куб</option>
        </select>
        <div class="slider-container">
            <span>Размер</span>
            <input type="range" id="size-slider" min="0.1" max="1.0" step="0.01" value="0.2">
            <span id="size-value">0.20</span>
        </div>
        <button id="save-btn">💾 Сохранить состояние</button>
        <button id="reset-btn">↺ Сбросить позиции и размер</button>
        <div id="status">Готово</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';

        // --- Конфигурация (центр заменён на 👁️) ---
        const CONFIG = {
            cubeSize: 1,
            // Все позиции эмодзи (для CSS2D)
            emojiPositions: [
                // Верхний слой y = 1
                { emoji: '💨', x: 0, y: 1, z: 0 },
                { emoji: '◀️', x: 0, y: 1, z: 0.5 },
                { emoji: '🌦', x: 0, y: 1, z: 1 },
                { emoji: '🔼', x: 0.5, y: 1, z: 0 },
                { emoji: '🟠', x: 0.5, y: 1, z: 0.5 },
                { emoji: '🔽', x: 0.5, y: 1, z: 1 },
                { emoji: '🌤', x: 1, y: 1, z: 0 },
                { emoji: '▶️', x: 1, y: 1, z: 0.5 },
                { emoji: '🌧', x: 1, y: 1, z: 1 },
                // Средний слой y = 0.5
                { emoji: '↙️', x: 0, y: 0.5, z: 0 },
                { emoji: '⬅️', x: 0, y: 0.5, z: 0.5 },
                { emoji: '↖️', x: 0, y: 0.5, z: 1 },
                { emoji: '⬇️', x: 0.5, y: 0.5, z: 0 },
                { emoji: '👁️', x: 0.5, y: 0.5, z: 0.5 },  // ЦЕНТР - глаз
                { emoji: '⬆️', x: 0.5, y: 0.5, z: 1 },
                { emoji: '↘️', x: 1, y: 0.5, z: 0 },
                { emoji: '➡️', x: 1, y: 0.5, z: 0.5 },
                { emoji: '↗️', x: 1, y: 0.5, z: 1 },
                // Нижний слой y = 0
                { emoji: '🔴', x: 0, y: 0, z: 0 },
                { emoji: '⚔️', x: 0, y: 0, z: 0.5 },
                { emoji: '🟦', x: 0, y: 0, z: 1 },
                { emoji: '🧊', x: 0.5, y: 0, z: 0 },
                { emoji: '🟧', x: 0.5, y: 0, z: 0.5 },
                { emoji: '🪨', x: 0.5, y: 0, z: 1 },
                { emoji: '🔵', x: 1, y: 0, z: 0 },
                { emoji: '🪵', x: 1, y: 0, z: 0.5 },
                { emoji: '🟥', x: 1, y: 0, z: 1 }
            ],
            // Какие эмодзи заменяем на 3D-фигуры (убрали 🟡, добавить при необходимости)
            shapeEmojis: ['🟧', '🟠', '🟥', '🟦', '🔵', '🔴'],
            line1: {
                startEmoji: '💨',
                endEmoji: '🟥',
                color: '#FFD700', // жёлтый
                dashLength: 0.06,
                gapLength: 0.04,
                thickness: 0.025
            },
            line2: {
                startEmoji: '🟧',
                endEmoji: '🟠',
                color: '#FF9900', // оранжевый
                dashLength: 0.06,
                gapLength: 0.04,
                thickness: 0.025
            }
        };

        // --- Глобальные переменные ---
        let scene, camera, renderer, labelRenderer, controls;
        let shapes = [];            // { emoji, mesh, initialPos }
        let line1Group, line2Group;
        let dragControls;
        let selectedMesh = null;

        // --- Загрузка состояния из localStorage ---
        function loadState() {
            const saved = localStorage.getItem('interactiveCubeState');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        // --- Сохранение состояния ---
        function saveState() {
            const state = {};
            shapes.forEach(item => {
                state[item.emoji] = {
                    position: [item.mesh.position.x, item.mesh.position.y, item.mesh.position.z],
                    size: item.mesh.scale.x   // масштаб одинаковый по всем осям
                };
            });
            localStorage.setItem('interactiveCubeState', JSON.stringify(state));
            document.getElementById('status').innerText = 'Сохранено ✓';
            setTimeout(() => document.getElementById('status').innerText = 'Готово', 1500);
        }

        // --- Сброс к начальным позициям и размеру ---
        function resetPositions() {
            shapes.forEach(item => {
                item.mesh.position.copy(item.initialPos);
                item.mesh.scale.set(0.2, 0.2, 0.2); // базовый размер 0.2
            });
            updateLines();
            saveState();
            // Обновить слайдер, если выбрана эта фигура
            updateSliderFromSelected();
            document.getElementById('status').innerText = 'Сброшено ↺';
            setTimeout(() => document.getElementById('status').innerText = 'Готово', 1500);
        }

        // --- Вспомогательная функция для получения позиции эмодзи (из фигуры или из конфига) ---
        function getEmojiPosition(emoji) {
            // Сначала ищем среди фигур
            const shape = shapes.find(s => s.emoji === emoji);
            if (shape) return shape.mesh.position.clone();
            
            // Иначе ищем в исходной конфигурации
            const pos = CONFIG.emojiPositions.find(p => p.emoji === emoji);
            if (pos) return new THREE.Vector3(pos.x, pos.y, pos.z);
            
            // Если не найдено, возвращаем центр (запасной вариант)
            return new THREE.Vector3(0.5, 0.5, 0.5);
        }

        // --- Обновление пунктирных линий по текущим позициям ---
        function updateLines() {
            // Удалить старые линии
            if (line1Group) scene.remove(line1Group);
            if (line2Group) scene.remove(line2Group);

            // Создать новые
            line1Group = createDashedLine(
                getEmojiPosition(CONFIG.line1.startEmoji),
                getEmojiPosition(CONFIG.line1.endEmoji),
                CONFIG.line1.color,
                CONFIG.line1.thickness,
                CONFIG.line1.dashLength,
                CONFIG.line1.gapLength
            );
            scene.add(line1Group);

            line2Group = createDashedLine(
                getEmojiPosition(CONFIG.line2.startEmoji),
                getEmojiPosition(CONFIG.line2.endEmoji),
                CONFIG.line2.color,
                CONFIG.line2.thickness,
                CONFIG.line2.dashLength,
                CONFIG.line2.gapLength
            );
            scene.add(line2Group);
        }

        // --- Создание пунктирной линии из сфер ---
        function createDashedLine(startVec, endVec, color, thickness, dashLen, gapLen) {
            const group = new THREE.Group();
            const direction = new THREE.Vector3().subVectors(endVec, startVec);
            const totalLength = direction.length();
            if (totalLength < 0.001) return group; // защита от нулевой длины
            direction.normalize();
            
            const sphereMaterial = new THREE.MeshStandardMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 0.8,
                roughness: 0.3
            });
            
            const step = dashLen + gapLen;
            const numSpheres = Math.floor(totalLength / step);
            
            for (let i = 0; i <= numSpheres; i++) {
                const t = i * step;
                if (t > totalLength) break;
                const pos = new THREE.Vector3().copy(startVec).addScaledVector(direction, t);
                const sphereGeom = new THREE.SphereGeometry(thickness * 1.2, 8);
                const sphere = new THREE.Mesh(sphereGeom, sphereMaterial);
                sphere.position.copy(pos);
                group.add(sphere);
            }
            
            // Добавим сферы покрупнее на концах для яркости
            const endGeom = new THREE.SphereGeometry(thickness * 1.8, 8);
            const s1 = new THREE.Mesh(endGeom, sphereMaterial);
            s1.position.copy(startVec);
            group.add(s1);
            const s2 = new THREE.Mesh(endGeom, sphereMaterial);
            s2.position.copy(endVec);
            group.add(s2);
            
            return group;
        }

        // --- Инициализация сцены ---
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 1.5, 3.5);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(1.8, 1.5, 2.2);
            camera.lookAt(0.5, 0.5, 0.5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            // Освещение
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(1, 2, 1);
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0x446688, 0.5);
            fillLight.position.set(0.5, 0.5, 0.5);
            scene.add(fillLight);

            // Орбитальный контроллер
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.rotateSpeed = 0.8;
            controls.enableZoom = true;
            controls.zoomSpeed = 1.2;
            controls.enablePan = false;
            controls.maxPolarAngle = Math.PI / 2;
            controls.target.set(0.5, 0.5, 0.5);

            // Каркас куба
            const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
            const boxEdges = new THREE.EdgesGeometry(boxGeometry);
            
            const transparentMaterial = new THREE.MeshPhongMaterial({
                color: 0x2a4a6a,
                transparent: true,
                opacity: 0.1,
                side: THREE.DoubleSide
            });
            const wireframeBox = new THREE.Mesh(boxGeometry, transparentMaterial);
            wireframeBox.position.set(0.5, 0.5, 0.5);
            scene.add(wireframeBox);

            const edgesMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.25, transparent: true });
            const edgesLines = new THREE.LineSegments(boxEdges, edgesMaterial);
            edgesLines.position.set(0.5, 0.5, 0.5);
            scene.add(edgesLines);

            // Сетка на полу
            const gridHelper = new THREE.GridHelper(1, 3, 0x88aaff, 0x445577);
            gridHelper.position.set(0.5, 0, 0.5);
            scene.add(gridHelper);

            // --- Создаём CSS2D метки для ВСЕХ эмодзи ---
            CONFIG.emojiPositions.forEach(pos => {
                const isCenter = (pos.emoji === '👁️');
                const div = document.createElement('div');
                div.textContent = pos.emoji;
                div.style.fontSize = isCenter ? '60px' : '44px';
                div.style.fontWeight = 'bold';
                div.style.fontFamily = 'Arial, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
                div.style.textShadow = '0 0 10px rgba(255,255,255,0.5)';
                div.style.color = 'white';
                div.style.cursor = 'pointer';
                div.style.userSelect = 'none';
                div.style.pointerEvents = 'auto';
                
                if (isCenter) {
                    div.classList.add('center-emoji');
                    div.style.textShadow = '0 0 20px gold, 0 0 30px orange';
                }
                
                div.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    document.getElementById('info-panel').innerHTML = `🧿 Символ: <span>${pos.emoji}</span>  |  (X: ${pos.x.toFixed(1)}, Y: ${pos.y.toFixed(1)}, Z: ${pos.z.toFixed(1)})`;
                    if (navigator.vibrate) navigator.vibrate(10);
                });
                
                const label = new CSS2DObject(div);
                label.position.set(pos.x, pos.y, pos.z);
                scene.add(label);
            });

            // --- Создаём 3D-фигуры для выбранных эмодзи ---
            const savedState = loadState();

            CONFIG.emojiPositions.forEach(pos => {
                if (!CONFIG.shapeEmojis.includes(pos.emoji)) return;

                // Определяем цвет
                let color;
                switch (pos.emoji) {
                    case '🟧': color = 0xff8800; break;
                    case '🟠': color = 0xff9900; break;
                    case '🟥': color = 0xff3333; break;
                    case '🟦': color = 0x3366ff; break;
                    case '🔵': color = 0x0066cc; break;
                    case '🔴': color = 0xcc3333; break;
                    default: color = 0xffffff;
                }

                // Для разнообразия: сферы для 🟠,🟥; кубы для остальных
                let geometry;
                if (pos.emoji === '🟠' || pos.emoji === '🟥') {
                    geometry = new THREE.SphereGeometry(0.15, 32);
                } else {
                    geometry = new THREE.BoxGeometry(0.25, 0.25, 0.25);
                }
                const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
                const mesh = new THREE.Mesh(geometry, material);
                
                const initialPos = new THREE.Vector3(pos.x, pos.y, pos.z);
                
                // Применяем сохранённое состояние или начальное
                if (savedState && savedState[pos.emoji]) {
                    const p = savedState[pos.emoji].position;
                    mesh.position.set(p[0], p[1], p[2]);
                    const sz = savedState[pos.emoji].size || 0.2;
                    mesh.scale.set(sz, sz, sz);
                } else {
                    mesh.position.copy(initialPos);
                    mesh.scale.set(0.2, 0.2, 0.2);
                }
                
                scene.add(mesh);
                
                shapes.push({
                    emoji: pos.emoji,
                    mesh: mesh,
                    initialPos: initialPos
                });
            });

            // --- Создаём линии (первоначально) ---
            updateLines();

            // --- DragControls для перемещения фигур ---
            const dragableMeshes = shapes.map(s => s.mesh);
            dragControls = new DragControls(dragableMeshes, camera, renderer.domElement);
            
            dragControls.addEventListener('dragstart', function(event) {
                controls.enabled = false;
                selectedMesh = event.object;
                // подсветка
                if (event.object.material) {
                    if (Array.isArray(event.object.material))
                        event.object.material.forEach(m => m.emissiveIntensity = 0.8);
                    else
                        event.object.material.emissiveIntensity = 0.8;
                }
            });

            dragControls.addEventListener('drag', function() {
                // ничего не делаем, линии обновятся в конце
            });

            dragControls.addEventListener('dragend', function(event) {
                controls.enabled = true;
                if (event.object.material) {
                    if (Array.isArray(event.object.material))
                        event.object.material.forEach(m => m.emissiveIntensity = 0.3);
                    else
                        event.object.material.emissiveIntensity = 0.3;
                }
                updateLines();   // перестраиваем линии
                saveState();      // автосохранение
            });

            // --- Звёзды для фона ---
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 400;
            const starPositions = new Float32Array(starsCount * 3);
            for (let i = 0; i < starsCount; i++) {
                const r = 2 + Math.random() * 2;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                starPositions[i*3] = 0.5 + r * Math.sin(phi) * Math.cos(theta);
                starPositions[i*3+1] = 0.5 + r * Math.sin(phi) * Math.sin(theta);
                starPositions[i*3+2] = 0.5 + r * Math.cos(phi);
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starsMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.02, transparent: true, opacity: 0.4 });
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // Анимация звёзд
            function animateStars() {
                stars.rotation.y += 0.0002;
                requestAnimationFrame(animateStars);
            }
            animateStars();
        }

        // --- Вспомогательные функции для UI ---
        function updateSliderFromSelected() {
            const select = document.getElementById('shape-select');
            const selectedEmoji = select.value;
            const shape = shapes.find(s => s.emoji === selectedEmoji);
            if (shape) {
                const size = shape.mesh.scale.x;
                document.getElementById('size-slider').value = size.toFixed(2);
                document.getElementById('size-value').innerText = size.toFixed(2);
            }
        }

        // --- Настройка UI и событий ---
        function setupUI() {
            const select = document.getElementById('shape-select');
            const slider = document.getElementById('size-slider');
            const sizeSpan = document.getElementById('size-value');
            const saveBtn = document.getElementById('save-btn');
            const resetBtn = document.getElementById('reset-btn');

            // При смене выбора обновляем ползунок
            select.addEventListener('change', () => {
                updateSliderFromSelected();
            });

            // При движении ползунка меняем размер выбранной фигуры
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                sizeSpan.innerText = val.toFixed(2);
                const selectedEmoji = select.value;
                const shape = shapes.find(s => s.emoji === selectedEmoji);
                if (shape) {
                    shape.mesh.scale.set(val, val, val);
                }
            });

            slider.addEventListener('change', () => {
                saveState(); // сохраняем после изменения размера
            });

            saveBtn.addEventListener('click', saveState);
            resetBtn.addEventListener('click', resetPositions);

            // Инициализация ползунка
            updateSliderFromSelected();
        }

        // --- Анимация линий (пульсация) ---
        function animateLines() {
            const elapsedTime = performance.now() / 1000;
            if (line1Group) {
                line1Group.children.forEach((sphere, i) => {
                    const scale = 1 + Math.sin(elapsedTime * 5 + i) * 0.2;
                    sphere.scale.set(scale, scale, scale);
                });
            }
            if (line2Group) {
                line2Group.children.forEach((sphere, i) => {
                    const scale = 1 + Math.sin(elapsedTime * 5 + i) * 0.2;
                    sphere.scale.set(scale, scale, scale);
                });
            }
        }

        // --- Основной цикл анимации ---
        function animate() {
            requestAnimationFrame(animate);

            animateLines();

            controls.update();

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // --- Запуск ---
        function start() {
            initScene();
            setupUI();
            animate();

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Telegram Mini App ---
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        start();
    </script>
</body>
</html>
