<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Внутренний куб · 3D интерактив</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0a;
            color: white;
        }
        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 30px;
            border-left: 3px solid #ffd700;
            font-size: 16px;
            color: #eee;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #info-panel span {
            color: #ffd700;
            font-weight: bold;
        }
        #hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.4);
            color: #aaa;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 16px;
            backdrop-filter: blur(2px);
            z-index: 100;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(5px);
            padding: 15px 20px;
            border-radius: 20px;
            color: #ddd;
            font-size: 14px;
            border: 1px solid #444;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            z-index: 200;
            pointer-events: auto;
            width: 220px;
        }
        #controls h4 {
            margin: 0 0 10px 0;
            color: #ffd700;
            text-align: center;
        }
        #controls label {
            display: block;
            margin-bottom: 5px;
        }
        #controls input {
            width: 100%;
            cursor: pointer;
            accent-color: #ffd700;
        }
        #controls select {
            width: 100%;
            padding: 5px;
            background: #222;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        #controls button {
            background: #ffd700;
            color: #0a0a0a;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: 0.2s;
        }
        #controls button:hover {
            background: #ffb700;
        }
        #status {
            color: #0f0;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
        }
        .center-emoji {
            animation: pulse 2s infinite ease-in-out;
            filter: drop-shadow(0 0 12px gold);
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.95; text-shadow: 0 0 20px gold; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="info-panel">👆 Нажми на символ (или перетащи цветную фигуру)</div>
    <div id="hint">🧊 3×3×3 · центр 🟡 · фигуры двигаются</div>

    <div id="controls">
        <h4>⚙️ Управление фигурами</h4>
        <label>Выбрать фигуру:</label>
        <select id="shape-select">
            <option value="🟧">🟧 (0.5,0,0.5)</option>
            <option value="🟡" selected>🟡 центр (0.5,0.5,0.5)</option>
            <option value="🟠">🟠 (0.5,1,0.5)</option>
            <option value="🟥">🟥 (1,0,1)</option>
            <option value="🟦">🟦 (0,0,1)</option>
            <option value="🔵">🔵 (1,0,0)</option>
            <option value="🔴">🔴 (0,0,0)</option>
        </select>
        <label>Размер: <span id="size-value">0.2</span></label>
        <input type="range" id="size-slider" min="0.1" max="0.5" step="0.01" value="0.2">
        <button id="save-btn">💾 Сохранить состояние</button>
        <button id="reset-btn">↺ Сбросить позиции</button>
        <div id="status">Готово</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { DragControls } from 'three/addons/controls/DragControls.js';

        // --- Конфигурация ---
        const CONFIG = {
            cubeSize: 1,
            emojiPositions: [
                // Верхний слой y = 1 (перед z=0, зад z=1)
                { emoji: '💨', x: 0, y: 1, z: 0 },
                { emoji: '◀️', x: 0, y: 1, z: 0.5 },
                { emoji: '🌦', x: 0, y: 1, z: 1 },
                { emoji: '🔼', x: 0.5, y: 1, z: 0 },
                { emoji: '🟠', x: 0.5, y: 1, z: 0.5 },
                { emoji: '🔽', x: 0.5, y: 1, z: 1 },
                { emoji: '🌤', x: 1, y: 1, z: 0 },
                { emoji: '▶️', x: 1, y: 1, z: 0.5 },
                { emoji: '🌧', x: 1, y: 1, z: 1 },
                // Средний слой y = 0.5
                { emoji: '↙️', x: 0, y: 0.5, z: 0 },
                { emoji: '⬅️', x: 0, y: 0.5, z: 0.5 },
                { emoji: '↖️', x: 0, y: 0.5, z: 1 },
                { emoji: '⬇️', x: 0.5, y: 0.5, z: 0 },
                { emoji: '🟡', x: 0.5, y: 0.5, z: 0.5 },  // ЦЕНТР
                { emoji: '⬆️', x: 0.5, y: 0.5, z: 1 },
                { emoji: '↘️', x: 1, y: 0.5, z: 0 },
                { emoji: '➡️', x: 1, y: 0.5, z: 0.5 },
                { emoji: '↗️', x: 1, y: 0.5, z: 1 },
                // Нижний слой y = 0 (🧊 вместо 🫧)
                { emoji: '🔴', x: 0, y: 0, z: 0 },
                { emoji: '⚔️', x: 0, y: 0, z: 0.5 },
                { emoji: '🟦', x: 0, y: 0, z: 1 },
                { emoji: '🧊', x: 0.5, y: 0, z: 0 },
                { emoji: '🟧', x: 0.5, y: 0, z: 0.5 },
                { emoji: '🪨', x: 0.5, y: 0, z: 1 },
                { emoji: '🔵', x: 1, y: 0, z: 0 },
                { emoji: '🪵', x: 1, y: 0, z: 0.5 },
                { emoji: '🟥', x: 1, y: 0, z: 1 }
            ],
            // Список эмодзи, которые заменяем на 3D-фигуры (цветные кружки)
            shapeEmojis: ['🟧', '🟡', '🟠', '🟥', '🟦', '🔵', '🔴'],
            line1: {
                startEmoji: '💨',
                endEmoji: '🟥',
                color: '#FFD700',
                dashLength: 0.06,
                gapLength: 0.04,
                thickness: 0.03
            },
            line2: {
                startEmoji: '🟧',
                endEmoji: '🟠',
                color: '#FF9900',
                dashLength: 0.06,
                gapLength: 0.04,
                thickness: 0.03
            }
        };

        // --- Состояние фигур (позиции и масштабы) ---
        let shapes = []; // массив объектов { emoji, mesh, initialPos }
        let line1Group, line2Group;
        let dragControls;
        let selectedMesh = null;

        // --- Загрузка из localStorage ---
        function loadState() {
            const saved = localStorage.getItem('cubeShapes');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    return null;
                }
            }
            return null;
        }

        function saveState() {
            const state = {};
            shapes.forEach(item => {
                state[item.emoji] = {
                    position: [item.mesh.position.x, item.mesh.position.y, item.mesh.position.z],
                    scale: item.mesh.scale.x
                };
            });
            localStorage.setItem('cubeShapes', JSON.stringify(state));
            document.getElementById('status').innerText = 'Сохранено ✓';
            setTimeout(() => document.getElementById('status').innerText = 'Готово', 1500);
        }

        // --- Сброс позиций к исходным ---
        function resetPositions() {
            shapes.forEach(item => {
                item.mesh.position.copy(item.initialPos);
                item.mesh.scale.set(0.2, 0.2, 0.2);
            });
            updateLines(); // перестроить линии
            saveState(); // автоматически сохраним после сброса
            document.getElementById('status').innerText = 'Сброшено ↺';
            setTimeout(() => document.getElementById('status').innerText = 'Готово', 1500);
        }

        // --- Обновление линий (перестраиваем группы) ---
        function updateLines() {
            // Находим текущие позиции нужных эмодзи
            const getPos = (emoji) => {
                const item = shapes.find(s => s.emoji === emoji);
                return item ? item.mesh.position.clone() : null;
            };

            const start1 = getPos(CONFIG.line1.startEmoji);
            const end1 = getPos(CONFIG.line1.endEmoji);
            const start2 = getPos(CONFIG.line2.startEmoji);
            const end2 = getPos(CONFIG.line2.endEmoji);

            if (start1 && end1) {
                scene.remove(line1Group);
                line1Group = createDashedLine(start1, end1, CONFIG.line1.color, CONFIG.line1.thickness, CONFIG.line1.dashLength, CONFIG.line1.gapLength);
                scene.add(line1Group);
            }
            if (start2 && end2) {
                scene.remove(line2Group);
                line2Group = createDashedLine(start2, end2, CONFIG.line2.color, CONFIG.line2.thickness, CONFIG.line2.dashLength, CONFIG.line2.gapLength);
                scene.add(line2Group);
            }
        }

        // --- Создание пунктирной линии из сфер ---
        function createDashedLine(startVec, endVec, color, thickness, dashLen, gapLen) {
            const group = new THREE.Group();
            const direction = new THREE.Vector3().subVectors(endVec, startVec);
            const totalLength = direction.length();
            direction.normalize();
            
            const sphereMaterial = new THREE.MeshStandardMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 0.9,
                roughness: 0.3
            });
            
            const step = dashLen + gapLen;
            const numSpheres = Math.floor(totalLength / step);
            
            for (let i = 0; i <= numSpheres; i++) {
                const t = i * step;
                if (t > totalLength) break;
                const pos = new THREE.Vector3().copy(startVec).addScaledVector(direction, t);
                const sphereGeom = new THREE.SphereGeometry(thickness * 1.2, 8);
                const sphere = new THREE.Mesh(sphereGeom, sphereMaterial);
                sphere.position.copy(pos);
                group.add(sphere);
            }
            
            // Добавим сферы на концах покрупнее
            const endGeom = new THREE.SphereGeometry(thickness * 1.8, 8);
            const s1 = new THREE.Mesh(endGeom, sphereMaterial);
            s1.position.copy(startVec);
            group.add(s1);
            const s2 = new THREE.Mesh(endGeom, sphereMaterial);
            s2.position.copy(endVec);
            group.add(s2);
            
            return group;
        }

        // --- Сцена, камера, рендереры ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 1.5, 3.5);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(1.8, 1.5, 2.2);
        camera.lookAt(0.5, 0.5, 0.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);
        const fillLight = new THREE.PointLight(0x446688, 0.5);
        fillLight.position.set(0.5, 0.5, 0.5);
        scene.add(fillLight);

        // --- Орбитальный контроллер ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2;
        controls.target.set(0.5, 0.5, 0.5);

        // --- Каркас куба ---
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
        const boxEdges = new THREE.EdgesGeometry(boxGeometry);
        
        const transparentMaterial = new THREE.MeshPhongMaterial({
            color: 0x2a4a6a,
            transparent: true,
            opacity: 0.1,
            side: THREE.DoubleSide
        });
        const wireframeBox = new THREE.Mesh(boxGeometry, transparentMaterial);
        wireframeBox.position.set(0.5, 0.5, 0.5);
        scene.add(wireframeBox);

        const edgesMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.25, transparent: true });
        const edgesLines = new THREE.LineSegments(boxEdges, edgesMaterial);
        edgesLines.position.set(0.5, 0.5, 0.5);
        scene.add(edgesLines);

        // Сетка на полу
        const gridHelper = new THREE.GridHelper(1, 3, 0x88aaff, 0x445577);
        gridHelper.position.set(0.5, 0, 0.5);
        scene.add(gridHelper);

        // --- Создаём эмодзи (CSS2D) для всех, но для цветных кружков дополнительно создаём 3D-фигуры ---
        const savedState = loadState();

        // Сначала создадим все CSS2D метки (они будут отображать эмодзи)
        CONFIG.emojiPositions.forEach(pos => {
            const isCenter = (pos.x === 0.5 && pos.y === 0.5 && pos.z === 0.5);
            const div = document.createElement('div');
            div.textContent = pos.emoji;
            div.style.fontSize = isCenter ? '60px' : '44px';
            div.style.fontWeight = 'bold';
            div.style.fontFamily = 'Arial, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
            div.style.textShadow = '0 0 10px rgba(255,255,255,0.5)';
            div.style.color = 'white';
            div.style.cursor = 'pointer';
            div.style.userSelect = 'none';
            div.style.pointerEvents = 'auto';
            
            if (isCenter) {
                div.classList.add('center-emoji');
                div.style.textShadow = '0 0 20px gold, 0 0 30px orange';
            }
            
            div.addEventListener('click', (ev) => {
                ev.stopPropagation();
                document.getElementById('info-panel').innerHTML = `🧿 Символ: <span>${pos.emoji}</span>  |  (X: ${pos.x.toFixed(1)}, Y: ${pos.y.toFixed(1)}, Z: ${pos.z.toFixed(1)})`;
                if (navigator.vibrate) navigator.vibrate(10);
            });
            
            const label = new CSS2DObject(div);
            label.position.set(pos.x, pos.y, pos.z);
            scene.add(label);
        });

        // Теперь создаём 3D-фигуры для выбранных эмодзи
        CONFIG.emojiPositions.forEach(pos => {
            if (!CONFIG.shapeEmojis.includes(pos.emoji)) return;

            // Определяем цвет по эмодзи
            let color;
            switch (pos.emoji) {
                case '🟧': color = 0xff8800; break;
                case '🟡': color = 0xffdd00; break;
                case '🟠': color = 0xff9900; break;
                case '🟥': color = 0xff3333; break;
                case '🟦': color = 0x3366ff; break;
                case '🔵': color = 0x0066cc; break;
                case '🔴': color = 0xcc3333; break;
                default: color = 0xffffff;
            }

            // Для разнообразия: сферы для 🟡,🟠,🟥; кубы для остальных
            let geometry, material;
            if (pos.emoji === '🟡' || pos.emoji === '🟠' || pos.emoji === '🟥') {
                geometry = new THREE.SphereGeometry(0.1, 32);
            } else {
                geometry = new THREE.BoxGeometry(0.15, 0.15, 0.15);
            }
            material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
            const mesh = new THREE.Mesh(geometry, material);
            
            // Начальная позиция
            let initialPos = new THREE.Vector3(pos.x, pos.y, pos.z);
            if (savedState && savedState[pos.emoji]) {
                const p = savedState[pos.emoji].position;
                mesh.position.set(p[0], p[1], p[2]);
                const scale = savedState[pos.emoji].scale || 0.2;
                mesh.scale.set(scale, scale, scale);
            } else {
                mesh.position.copy(initialPos);
                mesh.scale.set(0.2, 0.2, 0.2);
            }
            
            scene.add(mesh);
            
            shapes.push({
                emoji: pos.emoji,
                mesh: mesh,
                initialPos: initialPos
            });
        });

        // --- Создаём линии, используя текущие позиции фигур ---
        const getPos = (emoji) => {
            const item = shapes.find(s => s.emoji === emoji);
            return item ? item.mesh.position.clone() : new THREE.Vector3(0,0,0);
        };

        line1Group = createDashedLine(
            getPos(CONFIG.line1.startEmoji),
            getPos(CONFIG.line1.endEmoji),
            CONFIG.line1.color,
            CONFIG.line1.thickness,
            CONFIG.line1.dashLength,
            CONFIG.line1.gapLength
        );
        scene.add(line1Group);

        line2Group = createDashedLine(
            getPos(CONFIG.line2.startEmoji),
            getPos(CONFIG.line2.endEmoji),
            CONFIG.line2.color,
            CONFIG.line2.thickness,
            CONFIG.line2.dashLength,
            CONFIG.line2.gapLength
        );
        scene.add(line2Group);

        // --- DragControls для перемещения фигур ---
        const dragableMeshes = shapes.map(s => s.mesh);
        dragControls = new DragControls(dragableMeshes, camera, renderer.domElement);
        
        dragControls.addEventListener('dragstart', function(event) {
            controls.enabled = false;
            selectedMesh = event.object;
            // подсветка
            event.object.material.emissiveIntensity = 0.8;
        });

        dragControls.addEventListener('drag', function() {
            // при перетаскивании линии не обновляем постоянно, только в конце
        });

        dragControls.addEventListener('dragend', function(event) {
            controls.enabled = true;
            event.object.material.emissiveIntensity = 0.3;
            updateLines(); // перестраиваем линии с новыми позициями
            saveState(); // автосохранение
        });

        // --- UI контролы ---
        const selectEl = document.getElementById('shape-select');
        const slider = document.getElementById('size-slider');
        const sizeSpan = document.getElementById('size-value');
        const saveBtn = document.getElementById('save-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Функция обновления ползунка под выбранную фигуру
        function updateSliderForSelected() {
            const selectedEmoji = selectEl.value;
            const shape = shapes.find(s => s.emoji === selectedEmoji);
            if (shape) {
                const currentScale = shape.mesh.scale.x;
                slider.value = currentScale;
                sizeSpan.innerText = currentScale.toFixed(2);
            }
        }

        selectEl.addEventListener('change', updateSliderForSelected);
        updateSliderForSelected(); // инициализация

        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            sizeSpan.innerText = val.toFixed(2);
            const selectedEmoji = selectEl.value;
            const shape = shapes.find(s => s.emoji === selectedEmoji);
            if (shape) {
                shape.mesh.scale.set(val, val, val);
            }
        });

        slider.addEventListener('change', () => {
            saveState(); // сохраняем после изменения размера
        });

        saveBtn.addEventListener('click', saveState);
        resetBtn.addEventListener('click', resetPositions);

        // --- Звёзды ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 400;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            const r = 2 + Math.random() * 2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = 0.5 + r * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = 0.5 + r * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = 0.5 + r * Math.cos(phi);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.02, transparent: true, opacity: 0.4 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- Анимация ---
        function animate() {
            const elapsedTime = performance.now() / 1000;

            // Пульсация сфер линий
            if (line1Group) {
                line1Group.children.forEach((sphere, i) => {
                    const scale = 1 + Math.sin(elapsedTime * 5 + i) * 0.2;
                    sphere.scale.set(scale, scale, scale);
                });
            }
            if (line2Group) {
                line2Group.children.forEach((sphere, i) => {
                    const scale = 1 + Math.sin(elapsedTime * 5 + i) * 0.2;
                    sphere.scale.set(scale, scale, scale);
                });
            }

            stars.rotation.y += 0.0002;
            controls.update();

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);

            requestAnimationFrame(animate);
        }
        animate();

        // --- Ресайз ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Telegram Mini App интеграция ---
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        console.log('Интерактивный куб загружен. Фигуры можно двигать, размер менять, состояние сохраняется.');
