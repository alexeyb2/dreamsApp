<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Три плоскости чистых цветов внутри шара</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a20; }
        
        /* Верхняя панель с кнопками (как в удачной версии) */
        #top-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 70px;
            border: 1px solid #444;
            z-index: 30;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
        }
        .color-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: 3px solid white;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
            min-width: 100px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 15px currentColor;
        }
        .color-btn:hover { transform: scale(1.05); }
        .color-btn span { 
            display: block; 
            font-size: 16px; 
            margin-top: 4px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 2px 0;
        }
        #btn-red { background: #ff0000; color: white; text-shadow: 0 0 5px black; }
        #btn-blue { background: #0000ff; color: white; text-shadow: 0 0 5px black; }
        #btn-yellow { background: #ffff00; color: black; text-shadow: 0 0 5px white; }

        /* Панель с ползунком (появляется при клике) */
        #slider-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,40,0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px 35px;
            border-radius: 70px;
            border: 2px solid #555;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            z-index: 25;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 300px;
            border-top: 4px solid;
            border-bottom: 4px solid;
        }
        #slider-panel.active { display: flex; }
        #current-color-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .slider-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .slider-container input {
            width: 100%;
            cursor: pointer;
            height: 12px;
            border-radius: 20px;
        }
        #slider-value {
            font-size: 22px;
            font-weight: bold;
            color: #ffaa66;
        }

        @media (max-width: 700px) {
            #top-panel { gap: 8px; padding: 10px 15px; }
            .color-btn { padding: 8px 12px; font-size: 16px; min-width: 70px; }
            .color-btn span { font-size: 14px; }
            #slider-panel { width: 85%; padding: 20px; }
        }

        #instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>
    <!-- Верхние кнопки (цветные, с процентами) -->
    <div id="top-panel">
        <div class="color-btn" id="btn-red">🔴 КРАСНЫЙ<span id="red-angle">0°</span></div>
        <div class="color-btn" id="btn-blue">🔵 СИНИЙ<span id="blue-angle">0°</span></div>
        <div class="color-btn" id="btn-yellow">🟡 ЖЁЛТЫЙ<span id="yellow-angle">0°</span></div>
    </div>

    <!-- Панель с ползунком (скрыта по умолчанию) -->
    <div id="slider-panel">
        <div id="current-color-title"></div>
        <div class="slider-container">
            <input type="range" id="color-slider" min="-80" max="80" value="0" step="1">
            <span id="slider-value">0°</span>
        </div>
    </div>

    <div id="instruction">👆 Вращайте · Три плоскости пересекаются</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.5, 2.5, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a20);
        document.body.appendChild(renderer.domElement);

        // --- Управление камерой ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.maxDistance = 9;
        controls.minDistance = 2.2;
        controls.target.set(0, 0, 0);

        // --- Освещение (яркое) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(2, 3, 2);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466aa, 2.0);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xaa88ff, 2.0);
        fillLight.position.set(1, -1, 2);
        scene.add(fillLight);

        const sphereRadius = 1;

        // --- Шар: только тонкий белый каркас ---
        const sphereGeom = new THREE.SphereGeometry(sphereRadius, 48, 24);
        const edges = new THREE.EdgesGeometry(sphereGeom);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.3, transparent: true });
        const wireframeSphere = new THREE.LineSegments(edges, lineMat);
        scene.add(wireframeSphere);

        // --- ТРИ ПЛОСКОСТИ (чистые цвета, почти непрозрачные) ---

        // Красная (#ff0000) — вертикальная, вращается вокруг Y
        const redMat = new THREE.MeshPhongMaterial({
            color: 0xff0000,
            emissive: 0x440000,
            transparent: true,
            opacity: 0.95,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.5
        });
        const redPlane = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 2.4), redMat);
        redPlane.rotation.y = 0; // нормаль Z
        scene.add(redPlane);

        // Синяя (#0000ff) — вертикальная, вращается вокруг Y
        const blueMat = new THREE.MeshPhongMaterial({
            color: 0x0000ff,
            emissive: 0x000044,
            transparent: true,
            opacity: 0.95,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.5
        });
        const bluePlane = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 2.4), blueMat);
        bluePlane.rotation.y = Math.PI / 2; // нормаль X
        scene.add(bluePlane);

        // Жёлтая (#ffff00) — горизонтальная, вращается вокруг X
        const yellowMat = new THREE.MeshPhongMaterial({
            color: 0xffff00,
            emissive: 0x444400,
            transparent: true,
            opacity: 0.95,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.5
        });
        const yellowPlane = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 2.4), yellowMat);
        yellowPlane.rotation.x = Math.PI / 2; // нормаль Y
        scene.add(yellowPlane);

        // Белые контуры плоскостей (чтобы лучше видеть границы)
        function addEdges(mesh, color) {
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color }));
            mesh.add(line);
        }
        addEdges(redPlane, 0xffffff);
        addEdges(bluePlane, 0xffffff);
        addEdges(yellowPlane, 0xffffff);

        // --- ЛИНИИ ПЕРЕСЕЧЕНИЙ (толстые, яркие) ---

        // Красная ∩ Синяя = ось Y (фиолетовая)
        const axisYGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -1.3, 0),
            new THREE.Vector3(0, 1.3, 0)
        ]);
        const axisYLine = new THREE.Line(axisYGeom, new THREE.LineBasicMaterial({ color: 0xff88ff, linewidth: 3 }));
        scene.add(axisYLine);

        // Красная ∩ Жёлтая и Синяя ∩ Жёлтая (динамические линии)
        const lineRYGeom = new THREE.BufferGeometry();
        const lineBYGeom = new THREE.BufferGeometry();
        const lineRY = new THREE.Line(lineRYGeom, new THREE.LineBasicMaterial({ color: 0xffaa66, linewidth: 3 })); // оранжевая
        const lineBY = new THREE.Line(lineBYGeom, new THREE.LineBasicMaterial({ color: 0xaaff66, linewidth: 3 })); // салатовая
        scene.add(lineRY);
        scene.add(lineBY);

        // Точка пересечения всех трёх плоскостей
        const centerPoint = new THREE.Mesh(
            new THREE.SphereGeometry(0.07, 10, 10),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xaaaaaa })
        );
        scene.add(centerPoint);

        // --- Состояние углов ---
        const angles = {
            red: 0,
            blue: 0,
            yellow: 0
        };

        // Обновление текста на кнопках
        function updateAngleDisplays() {
            document.getElementById('red-angle').textContent = angles.red + '°';
            document.getElementById('blue-angle').textContent = angles.blue + '°';
            document.getElementById('yellow-angle').textContent = angles.yellow + '°';
        }

        // Поворот плоскостей и обновление динамических линий
        function applyRotations() {
            redPlane.rotation.y = THREE.MathUtils.degToRad(angles.red);
            bluePlane.rotation.y = THREE.MathUtils.degToRad(90 + angles.blue);
            yellowPlane.rotation.x = THREE.MathUtils.degToRad(90 + angles.yellow);

            // Нормали после поворота
            const nRed = new THREE.Vector3(Math.sin(redPlane.rotation.y), 0, Math.cos(redPlane.rotation.y));
            const nBlue = new THREE.Vector3(Math.cos(bluePlane.rotation.y), 0, -Math.sin(bluePlane.rotation.y));
            const yRot = yellowPlane.rotation.x;
            const nYellow = new THREE.Vector3(0, Math.cos(yRot), Math.sin(yRot));

            // Направления линий пересечений
            const dirRY = new THREE.Vector3().crossVectors(nRed, nYellow).normalize();
            const dirBY = new THREE.Vector3().crossVectors(nBlue, nYellow).normalize();
            const len = 1.3;

            // Обновляем геометрию линий
            lineRY.geometry.dispose();
            lineRY.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, -len)
            ]);
            lineBY.geometry.dispose();
            lineBY.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, -len)
            ]);
        }

        // --- Интерфейс: работа с кнопками и ползунком ---
        const btnRed = document.getElementById('btn-red');
        const btnBlue = document.getElementById('btn-blue');
        const btnYellow = document.getElementById('btn-yellow');
        const sliderPanel = document.getElementById('slider-panel');
        const currentColorTitle = document.getElementById('current-color-title');
        const colorSlider = document.getElementById('color-slider');
        const sliderValue = document.getElementById('slider-value');

        let activeColor = null; // 'red', 'blue', 'yellow' или null

        // Функция открытия панели для конкретного цвета
        function openPanel(color) {
            activeColor = color;
            // Устанавливаем заголовок и цвет ползунка
            if (color === 'red') {
                currentColorTitle.innerHTML = '🔴 КРАСНАЯ';
                colorSlider.style.accentColor = '#ff0000';
            } else if (color === 'blue') {
                currentColorTitle.innerHTML = '🔵 СИНЯЯ';
                colorSlider.style.accentColor = '#0000ff';
            } else if (color === 'yellow') {
                currentColorTitle.innerHTML = '🟡 ЖЁЛТАЯ';
                colorSlider.style.accentColor = '#ffff00';
            }
            // Устанавливаем значение ползунка из текущего угла
            colorSlider.value = angles[color];
            sliderValue.textContent = angles[color] + '°';
            // Показываем панель
            sliderPanel.classList.add('active');
        }

        // Закрытие панели
        function closePanel() {
            sliderPanel.classList.remove('active');
            activeColor = null;
        }

        // Обработчики кликов на кнопки
        btnRed.addEventListener('click', () => {
            if (activeColor === 'red') {
                closePanel();
            } else {
                openPanel('red');
            }
        });
        btnBlue.addEventListener('click', () => {
            if (activeColor === 'blue') {
                closePanel();
            } else {
                openPanel('blue');
            }
        });
        btnYellow.addEventListener('click', () => {
            if (activeColor === 'yellow') {
                closePanel();
            } else {
                openPanel('yellow');
            }
        });

        // Обработка ползунка
        colorSlider.addEventListener('input', (e) => {
            if (!activeColor) return;
            const val = parseInt(e.target.value);
            sliderValue.textContent = val + '°';
            angles[activeColor] = val;
            updateAngleDisplays();
            applyRotations();
        });

        // Инициализация
        updateAngleDisplays();
        applyRotations();

        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
