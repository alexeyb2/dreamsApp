<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Три плоскости: пересечения внутри шара (фон)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: pan-x pan-y; background: #0a0a20; }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid #555;
            z-index: 15;
            font-size: 16px;
            pointer-events: none;
            border-left: 4px solid #FF3333;
            border-right: 4px solid #FFD700;
            border-top: 2px solid #3366FF;
        }
        #balance {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .red-text { color: #ff8888; font-weight: bold; text-shadow: 0 0 8px #FF3333; }
        .blue-text { color: #88aaff; font-weight: bold; text-shadow: 0 0 8px #3366FF; }
        .yellow-text { color: #ffd966; font-weight: bold; text-shadow: 0 0 8px #FFD700; }

        /* Кнопка скрытия/показа панели */
        #toggle-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(30, 30, 50, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #aaa;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            transition: 0.3s;
            user-select: none;
        }
        #toggle-panel:hover { background: rgba(60, 60, 90, 1); transform: scale(1.1); }
        #toggle-panel.hidden-panel { background: rgba(200, 50, 50, 0.8); }

        #controls {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(15px);
            color: white;
            padding: 25px 35px;
            border-radius: 70px;
            display: flex;
            gap: 30px;
            align-items: center;
            border: 2px solid #555;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            z-index: 25;
            font-size: 16px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 3px solid #FFD700;
            border-top: 3px solid #FF3333;
            border-left: 2px solid #3366FF;
            border-right: 2px solid #3366FF;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: auto;
        }
        #controls.hidden {
            opacity: 0;
            transform: translateX(-50%) scale(0.8);
            pointer-events: none;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 160px;
        }
        .slider-container label {
            font-size: 18px;
            letter-spacing: 1px;
        }
        .slider-container input {
            width: 100%;
            cursor: pointer;
            height: 8px;
            border-radius: 10px;
        }
        #red-slider { accent-color: #ff4d4d; }
        #blue-slider { accent-color: #4d4dff; }
        #yellow-slider { accent-color: #ffd966; }
        .angle-value {
            font-size: 16px;
            color: #ffaa66;
            font-weight: bold;
        }

        @media (max-width: 800px) {
            #controls { 
                flex-direction: column; 
                gap: 20px; 
                padding: 20px; 
                border-radius: 40px; 
                width: 85%; 
                bottom: 80px;
            }
            .slider-container { width: 100%; }
            #info { font-size: 14px; padding: 10px 16px; }
            #toggle-panel { width: 50px; height: 50px; font-size: 26px; bottom: 15px; right: 15px; }
        }

        #instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 30px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            z-index: 15;
        }
    </style>
</head>
<body>
    <div id="info">
        <div id="balance">
            <span class="red-text">🔴 <span id="red-angle-display">0°</span></span>
            <span class="blue-text">🔵 <span id="blue-angle-display">0°</span></span>
            <span class="yellow-text">🟡 <span id="yellow-angle-display">0°</span></span>
        </div>
    </div>

    <div id="toggle-panel">⚙️</div>

    <div id="controls">
        <div class="slider-container">
            <label class="red-text">🔴 КРАСНАЯ (Y)</label>
            <input type="range" id="red-slider" min="-80" max="80" value="0" step="1">
            <span class="angle-value" id="red-val">0°</span>
        </div>
        <div class="slider-container">
            <label class="blue-text">🔵 СИНЯЯ (Y)</label>
            <input type="range" id="blue-slider" min="-80" max="80" value="0" step="1">
            <span class="angle-value" id="blue-val">0°</span>
        </div>
        <div class="slider-container">
            <label class="yellow-text">🟡 ЖЁЛТАЯ (X)</label>
            <input type="range" id="yellow-slider" min="-80" max="80" value="0" step="1">
            <span class="angle-value" id="yellow-val">0°</span>
        </div>
    </div>

    <div id="instruction">👆 Вращайте · Три плоскости пересекаются</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Инициализация ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.5, 2.5, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a20);
        document.body.appendChild(renderer.domElement);

        // --- Управление ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.maxDistance = 9;
        controls.minDistance = 2.2;
        controls.target.set(0, 0, 0);

        // --- Освещение (яркое, чтобы плоскости сияли) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
        dirLight.position.set(2, 3, 2);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466aa, 1.5);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xaa88ff, 1.2);
        fillLight.position.set(1, -1, 2);
        scene.add(fillLight);

        // --- Звёзды (фон) ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            const r = 8 + Math.random() * 15;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = r * Math.cos(phi);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.1, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        const sphereRadius = 1;

        // --- Сфера (ПОЧТИ НЕВИДИМАЯ, только тонкий каркас) ---
        const sphereGeom = new THREE.SphereGeometry(sphereRadius, 48, 24);
        // Убираем заливку полностью, оставляем только каркас
        const sphereMat = new THREE.MeshPhongMaterial({
            color: 0x3a6ea5,
            transparent: true,
            opacity: 0.0, // абсолютно прозрачная заливка
            side: THREE.DoubleSide,
            wireframe: false
        });
        const sphere = new THREE.Mesh(sphereGeom, sphereMat);
        scene.add(sphere);

        // Каркас сферы (очень тонкие линии)
        const edges = new THREE.EdgesGeometry(sphereGeom);
        const lineMat = new THREE.LineBasicMaterial({ color: 0x88aaff, opacity: 0.25, transparent: true });
        const wireframeSphere = new THREE.LineSegments(edges, lineMat);
        sphere.add(wireframeSphere);

        // --- ТРИ ПЛОСКОСТИ (очень яркие, плотные) ---
        const planeGeom = new THREE.PlaneGeometry(2.4, 2.4);

        // 1. КРАСНАЯ — вертикальная, вращается вокруг Y
        const redMat = new THREE.MeshPhongMaterial({
            color: 0xFF3333,
            emissive: 0x661111,
            transparent: true,
            opacity: 0.9,        // почти непрозрачная
            side: THREE.DoubleSide,
            emissiveIntensity: 1.2
        });
        const redPlane = new THREE.Mesh(planeGeom, redMat);
        redPlane.position.set(0, 0, 0);
        redPlane.rotation.y = 0; // нормаль Z
        scene.add(redPlane);

        // 2. СИНЯЯ — вертикальная, вращается вокруг Y (изначально нормаль X)
        const blueMat = new THREE.MeshPhongMaterial({
            color: 0x3366FF,
            emissive: 0x113366,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.2
        });
        const bluePlane = new THREE.Mesh(planeGeom, blueMat);
        bluePlane.position.set(0, 0, 0);
        bluePlane.rotation.y = Math.PI / 2; // нормаль X
        scene.add(bluePlane);

        // 3. ЖЁЛТАЯ — горизонтальная, вращается вокруг X
        const yellowMat = new THREE.MeshPhongMaterial({
            color: 0xFFD700,
            emissive: 0x664411,
            transparent: true,
            opacity: 0.9,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.2
        });
        const yellowPlane = new THREE.Mesh(planeGeom, yellowMat);
        yellowPlane.position.set(0, 0, 0);
        yellowPlane.rotation.x = Math.PI / 2; // горизонталь (нормаль Y)
        scene.add(yellowPlane);

        // Яркие контуры плоскостей
        function addGlowingEdges(mesh, color) {
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color, linewidth: 2 }));
            mesh.add(line);
        }
        addGlowingEdges(redPlane, 0xff8888);
        addGlowingEdges(bluePlane, 0x88aaff);
        addGlowingEdges(yellowPlane, 0xffd966);

        // Окружности пересечения со сферой (привязаны к плоскостям) — делаем их ярче
        function createIntersectionCircle(radius, color) {
            const points = [];
            for (let i = 0; i <= 80; i++) {
                const angle = (i / 80) * Math.PI * 2;
                points.push(new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle) * radius, 0));
            }
            const geom = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
            return new THREE.LineLoop(geom, mat);
        }

        const redCircle = createIntersectionCircle(sphereRadius, 0xff8888);
        redPlane.add(redCircle);
        const blueCircle = createIntersectionCircle(sphereRadius, 0x88aaff);
        bluePlane.add(blueCircle);
        const yellowCircle = createIntersectionCircle(sphereRadius, 0xffd966);
        yellowPlane.add(yellowCircle);

        // --- ЛИНИИ ПЕРЕСЕЧЕНИЙ (сделаем их толще и ярче) ---

        // Красная ∩ Синяя = ось Y (фиолетовая)
        const axisYGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -1.3, 0),
            new THREE.Vector3(0, 1.3, 0)
        ]);
        const axisYLine = new THREE.Line(axisYGeom, new THREE.LineBasicMaterial({ color: 0xcc88ff, linewidth: 3 }));
        scene.add(axisYLine);
        // Добавим свечение
        const glowYGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -1.3, 0),
            new THREE.Vector3(0, 1.3, 0)
        ]);
        const glowYLine = new THREE.Line(glowYGeom, new THREE.LineBasicMaterial({ color: 0xffaaff, opacity: 0.5, transparent: true }));
        scene.add(glowYLine);

        // Красная ∩ Жёлтая и Синяя ∩ Жёлтая (динамические линии)
        const lineRYGeom = new THREE.BufferGeometry();
        const lineBYGeom = new THREE.BufferGeometry();
        
        const lineRY = new THREE.Line(lineRYGeom, new THREE.LineBasicMaterial({ color: 0xffaa66, linewidth: 3 })); // оранжевая
        const lineBY = new THREE.Line(lineBYGeom, new THREE.LineBasicMaterial({ color: 0xaaff66, linewidth: 3 })); // салатовая
        
        // Добавим свечение для них (полупрозрачные копии)
        const glowRYGeom = new THREE.BufferGeometry();
        const glowBYGeom = new THREE.BufferGeometry();
        const glowRY = new THREE.Line(glowRYGeom, new THREE.LineBasicMaterial({ color: 0xffaa66, opacity: 0.4, transparent: true }));
        const glowBY = new THREE.Line(glowBYGeom, new THREE.LineBasicMaterial({ color: 0xaaff66, opacity: 0.4, transparent: true }));
        
        scene.add(lineRY);
        scene.add(lineBY);
        scene.add(glowRY);
        scene.add(glowBY);

        // Точка пересечения всех трёх в центре
        const centerSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.06, 10, 10),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xaaaaaa })
        );
        scene.add(centerSphere);

        // --- Ползунки и обновление ---
        const redSlider = document.getElementById('red-slider');
        const blueSlider = document.getElementById('blue-slider');
        const yellowSlider = document.getElementById('yellow-slider');
        const redVal = document.getElementById('red-val');
        const blueVal = document.getElementById('blue-val');
        const yellowVal = document.getElementById('yellow-val');
        const redAngleDisplay = document.getElementById('red-angle-display');
        const blueAngleDisplay = document.getElementById('blue-angle-display');
        const yellowAngleDisplay = document.getElementById('yellow-angle-display');

        function updateFromSliders() {
            const redDeg = parseFloat(redSlider.value);
            const blueDeg = parseFloat(blueSlider.value);
            const yellowDeg = parseFloat(yellowSlider.value);
            
            redVal.textContent = redDeg + '°';
            blueVal.textContent = blueDeg + '°';
            yellowVal.textContent = yellowDeg + '°';
            redAngleDisplay.textContent = redDeg + '°';
            blueAngleDisplay.textContent = blueDeg + '°';
            yellowAngleDisplay.textContent = yellowDeg + '°';

            // Повороты
            redPlane.rotation.y = THREE.MathUtils.degToRad(redDeg);
            bluePlane.rotation.y = THREE.MathUtils.degToRad(90 + blueDeg);
            yellowPlane.rotation.x = THREE.MathUtils.degToRad(90 + yellowDeg);

            // Вычисляем нормали
            const nRed = new THREE.Vector3(Math.sin(redPlane.rotation.y), 0, Math.cos(redPlane.rotation.y));
            const nBlue = new THREE.Vector3(Math.cos(bluePlane.rotation.y), 0, -Math.sin(bluePlane.rotation.y));
            const yRot = yellowPlane.rotation.x;
            const nYellow = new THREE.Vector3(0, Math.cos(yRot), Math.sin(yRot));

            // Линии пересечений
            const dirRY = new THREE.Vector3().crossVectors(nRed, nYellow).normalize();
            const dirBY = new THREE.Vector3().crossVectors(nBlue, nYellow).normalize();

            const len = 1.3;
            const pointsRY = [
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, -len)
            ];
            const pointsBY = [
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, -len)
            ];

            lineRY.geometry.dispose();
            lineRY.geometry = new THREE.BufferGeometry().setFromPoints(pointsRY);
            lineBY.geometry.dispose();
            lineBY.geometry = new THREE.BufferGeometry().setFromPoints(pointsBY);

            glowRY.geometry.dispose();
            glowRY.geometry = new THREE.BufferGeometry().setFromPoints(pointsRY);
            glowBY.geometry.dispose();
            glowBY.geometry = new THREE.BufferGeometry().setFromPoints(pointsBY);
        }

        redSlider.addEventListener('input', updateFromSliders);
        blueSlider.addEventListener('input', updateFromSliders);
        yellowSlider.addEventListener('input', updateFromSliders);
        updateFromSliders();

        // --- Кнопка скрытия/показа панели ---
        const toggleBtn = document.getElementById('toggle-panel');
        const controlsPanel = document.getElementById('controls');
        toggleBtn.addEventListener('click', () => {
            controlsPanel.classList.toggle('hidden');
            toggleBtn.classList.toggle('hidden-panel');
            toggleBtn.textContent = controlsPanel.classList.contains('hidden') ? '⚙️' : '✕';
        });

        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            stars.rotation.y += 0.0002;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
