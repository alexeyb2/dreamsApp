<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Баланс красного и синего + жёлтый</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a20; }
        
        #top-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 70px;
            border: 1px solid #444;
            z-index: 30;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
        }
        .color-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: 3px solid white;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
            min-width: 100px;
            transition: transform 0.2s;
            box-shadow: 0 0 15px currentColor;
        }
        .color-btn:hover { transform: scale(1.05); }
        .color-btn span { 
            display: block; 
            font-size: 18px; 
            margin-top: 4px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 4px 0;
        }
        #btn-red { background: #ff0000; color: white; }
        #btn-blue { background: #0000ff; color: white; }
        #btn-yellow { background: #ffff00; color: black; }

        /* Панели слайдеров */
        .slider-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,40,0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px 35px;
            border-radius: 70px;
            border: 2px solid #555;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            z-index: 25;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 320px;
            border-top: 4px solid;
            border-bottom: 4px solid;
        }
        .slider-panel.active { display: flex; }
        .panel-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .slider-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .slider-container input {
            width: 100%;
            cursor: pointer;
            height: 14px;
            border-radius: 20px;
        }
        #balance-slider { accent-color: #ff00ff; }
        #yellow-slider { accent-color: #ffff00; }
        .percentage-row {
            display: flex;
            width: 100%;
            justify-content: space-between;
            font-size: 22px;
            font-weight: bold;
        }
        .red-pct { color: #ff8888; }
        .blue-pct { color: #8888ff; }

        @media (max-width: 700px) {
            #top-panel { gap: 8px; padding: 10px 15px; }
            .color-btn { padding: 8px 12px; font-size: 16px; min-width: 70px; }
            .color-btn span { font-size: 16px; }
            .slider-panel { width: 85%; padding: 20px; }
        }

        #instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>
    <div id="top-panel">
        <div class="color-btn" id="btn-red">🔴<span id="red-pct">50%</span></div>
        <div class="color-btn" id="btn-blue">🔵<span id="blue-pct">50%</span></div>
        <div class="color-btn" id="btn-yellow">🟡<span id="yellow-pct">50%</span></div>
    </div>

    <!-- Панель баланса красный/синий -->
    <div id="balance-panel" class="slider-panel" style="border-top-color: #ff0000; border-bottom-color: #0000ff;">
        <div class="panel-title">🔴🔵 БАЛАНС</div>
        <div class="percentage-row">
            <span class="red-pct" id="balance-red-pct">50%</span>
            <span class="blue-pct" id="balance-blue-pct">50%</span>
        </div>
        <div class="slider-container">
            <input type="range" id="balance-slider" min="-80" max="80" value="0" step="1">
        </div>
    </div>

    <!-- Панель жёлтого -->
    <div id="yellow-panel" class="slider-panel" style="border-top-color: #ffff00; border-bottom-color: #ffff00;">
        <div class="panel-title">🟡 ЖЁЛТАЯ</div>
        <div class="percentage-row" style="justify-content: center;">
            <span id="yellow-panel-pct">50%</span>
        </div>
        <div class="slider-container">
            <input type="range" id="yellow-slider" min="-80" max="80" value="0" step="1">
        </div>
    </div>

    <div id="instruction">👆 Нажми на цвет — появится ползунок (проценты)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Сцена ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.5, 2.5, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a20);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.maxDistance = 9;
        controls.minDistance = 2.2;
        controls.target.set(0, 0, 0);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(2, 3, 2);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466aa, 2.0);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xaa88ff, 2.0);
        fillLight.position.set(1, -1, 2);
        scene.add(fillLight);

        const sphereRadius = 1;
        // Шар - каркас
        const sphereGeom = new THREE.SphereGeometry(sphereRadius, 48, 24);
        const edges = new THREE.EdgesGeometry(sphereGeom);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.3, transparent: true });
        const wireframeSphere = new THREE.LineSegments(edges, lineMat);
        scene.add(wireframeSphere);

        // Плоскости
        const planeGeom = new THREE.PlaneGeometry(2.4, 2.4);

        // СИНЯЯ - неподвижная, нормаль X (плоскость YZ)
        const blueMat = new THREE.MeshPhongMaterial({
            color: 0x0000ff,
            emissive: 0x000044,
            transparent: true,
            opacity: 0.95,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.5
        });
        const bluePlane = new THREE.Mesh(planeGeom, blueMat);
        bluePlane.rotation.y = Math.PI / 2; // нормаль X
        scene.add(bluePlane);

        // КРАСНАЯ - вращается вокруг Y
        const redMat = new THREE.MeshPhongMaterial({
            color: 0xff0000,
            emissive: 0x440000,
            transparent: true,
            opacity: 0.95,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.5
        });
        const redPlane = new THREE.Mesh(planeGeom, redMat);
        redPlane.rotation.y = 0; // начальное положение: нормаль Z (перпендикулярно синей)
        scene.add(redPlane);

        // ЖЁЛТАЯ - вращается вокруг X
        const yellowMat = new THREE.MeshPhongMaterial({
            color: 0xffff00,
            emissive: 0x444400,
            transparent: true,
            opacity: 0.95,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.5
        });
        const yellowPlane = new THREE.Mesh(planeGeom, yellowMat);
        yellowPlane.rotation.x = Math.PI / 2; // горизонталь (нормаль Y)
        scene.add(yellowPlane);

        // Белые контуры
        function addEdges(mesh, color) {
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color }));
            mesh.add(line);
        }
        addEdges(bluePlane, 0xffffff);
        addEdges(redPlane, 0xffffff);
        addEdges(yellowPlane, 0xffffff);

        // Линии пересечений
        // Красная ∩ Синяя = ось Y (фиолетовая)
        const axisYGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -1.3, 0),
            new THREE.Vector3(0, 1.3, 0)
        ]);
        const axisYLine = new THREE.Line(axisYGeom, new THREE.LineBasicMaterial({ color: 0xff88ff, linewidth: 3 }));
        scene.add(axisYLine);

        // Красная ∩ Жёлтая и Синяя ∩ Жёлтая (динамические)
        const lineRYGeom = new THREE.BufferGeometry();
        const lineBYGeom = new THREE.BufferGeometry();
        const lineRY = new THREE.Line(lineRYGeom, new THREE.LineBasicMaterial({ color: 0xffaa66, linewidth: 3 }));
        const lineBY = new THREE.Line(lineBYGeom, new THREE.LineBasicMaterial({ color: 0xaaff66, linewidth: 3 }));
        scene.add(lineRY);
        scene.add(lineBY);

        const centerPoint = new THREE.Mesh(
            new THREE.SphereGeometry(0.07, 10, 10),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xaaaaaa })
        );
        scene.add(centerPoint);

        // --- Состояние ---
        let redAngle = 0;          // угол поворота красной плоскости вокруг Y (градусы)
        let yellowAngle = 0;       // угол поворота жёлтой вокруг X

        // Функция обновления процентов
        function updatePercentages() {
            // Вычисляем угол между нормалями красной и синей
            // Нормаль синей: (1,0,0)
            // Нормаль красной: (sin(redRad), 0, cos(redRad))
            const redRad = THREE.MathUtils.degToRad(redAngle);
            const dot = Math.sin(redRad); // скалярное произведение
            let angleBetween = Math.acos(Math.min(1, Math.max(-1, dot))) * 180 / Math.PI; // угол в градусах (0..180)
            // Процент синего = (angleBetween / 180) * 100, красного = 100 - синий
            let bluePct = (angleBetween / 180) * 100;
            if (bluePct < 0) bluePct = 0;
            if (bluePct > 100) bluePct = 100;
            let redPct = 100 - bluePct;

            // Жёлтый процент: 50 + (yellowAngle/80)*50
            let yellowPct = 50 + (yellowAngle / 80) * 50;
            if (yellowPct < 0) yellowPct = 0;
            if (yellowPct > 100) yellowPct = 100;

            // Обновляем кнопки
            document.getElementById('red-pct').textContent = redPct.toFixed(1) + '%';
            document.getElementById('blue-pct').textContent = bluePct.toFixed(1) + '%';
            document.getElementById('yellow-pct').textContent = yellowPct.toFixed(1) + '%';

            // Обновляем панели
            if (activePanel === 'balance') {
                document.getElementById('balance-red-pct').textContent = redPct.toFixed(1) + '%';
                document.getElementById('balance-blue-pct').textContent = bluePct.toFixed(1) + '%';
            }
            if (activePanel === 'yellow') {
                document.getElementById('yellow-panel-pct').textContent = yellowPct.toFixed(1) + '%';
            }
        }

        // Поворот плоскостей и обновление линий
        function applyRotations() {
            redPlane.rotation.y = THREE.MathUtils.degToRad(redAngle);
            // Синяя неподвижна
            yellowPlane.rotation.x = THREE.MathUtils.degToRad(90 + yellowAngle); // +90 чтобы из горизонтали

            // Нормали
            const nRed = new THREE.Vector3(Math.sin(redPlane.rotation.y), 0, Math.cos(redPlane.rotation.y));
            const nBlue = new THREE.Vector3(1, 0, 0); // фиксированная
            const yRot = yellowPlane.rotation.x;
            const nYellow = new THREE.Vector3(0, Math.cos(yRot), Math.sin(yRot));

            // Линии пересечений
            const dirRY = new THREE.Vector3().crossVectors(nRed, nYellow).normalize();
            const dirBY = new THREE.Vector3().crossVectors(nBlue, nYellow).normalize();
            const len = 1.3;

            lineRY.geometry.dispose();
            lineRY.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, -len)
            ]);
            lineBY.geometry.dispose();
            lineBY.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, -len)
            ]);
        }

        // --- Интерфейс ---
        const btnRed = document.getElementById('btn-red');
        const btnBlue = document.getElementById('btn-blue');
        const btnYellow = document.getElementById('btn-yellow');
        const balancePanel = document.getElementById('balance-panel');
        const yellowPanel = document.getElementById('yellow-panel');
        const balanceSlider = document.getElementById('balance-slider');
        const yellowSlider = document.getElementById('yellow-slider');

        let activePanel = null; // 'balance' или 'yellow'

        function showBalancePanel() {
            if (activePanel === 'balance') {
                balancePanel.classList.remove('active');
                activePanel = null;
            } else {
                if (activePanel === 'yellow') yellowPanel.classList.remove('active');
                balancePanel.classList.add('active');
                activePanel = 'balance';
                updatePercentages();
            }
        }

        function showYellowPanel() {
            if (activePanel === 'yellow') {
                yellowPanel.classList.remove('active');
                activePanel = null;
            } else {
                if (activePanel === 'balance') balancePanel.classList.remove('active');
                yellowPanel.classList.add('active');
                activePanel = 'yellow';
                updatePercentages();
            }
        }

        btnRed.addEventListener('click', showBalancePanel);
        btnBlue.addEventListener('click', showBalancePanel);
        btnYellow.addEventListener('click', showYellowPanel);

        balanceSlider.addEventListener('input', (e) => {
            redAngle = parseInt(e.target.value);
            updatePercentages();
            applyRotations();
        });

        yellowSlider.addEventListener('input', (e) => {
            yellowAngle = parseInt(e.target.value);
            updatePercentages();
            applyRotations();
        });

        // Инициализация
        updatePercentages();
        applyRotations();

        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
