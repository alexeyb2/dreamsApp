<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Баланс: независимые панели красного и синего</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a20; }
        
        #top-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 70px;
            border: 1px solid #444;
            z-index: 30;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
        }
        .color-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: 3px solid white;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            text-align: center;
            min-width: 100px;
            transition: transform 0.2s;
            box-shadow: 0 0 15px currentColor;
        }
        .color-btn:hover { transform: scale(1.05); }
        .color-btn span { 
            display: block; 
            font-size: 18px; 
            margin-top: 4px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 4px 0;
        }
        #btn-red { background: #ff0000; color: white; }
        #btn-blue { background: #0000ff; color: white; }
        #btn-yellow { background: #ffff00; color: black; }

        /* Панели слайдеров */
        .slider-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,40,0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px 35px;
            border-radius: 70px;
            border: 2px solid #555;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            z-index: 25;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 320px;
            border-top: 4px solid;
            border-bottom: 4px solid;
        }
        .slider-panel.active { display: flex; }
        .panel-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Кастомные слайдеры для красного и синего */
        .custom-slider {
            width: 100%;
            height: 60px;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            cursor: grab;
            user-select: none;
            touch-action: none;
        }
        .custom-slider .fill {
            height: 100%;
            width: 50%;
            background: currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px #000;
            transition: width 0.05s linear;
        }
        .custom-slider .thumb {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 20px gold;
            cursor: grab;
            z-index: 3;
            user-select: none;
            touch-action: none;
            border: 2px solid #333;
        }
        .custom-slider .thumb:active { cursor: grabbing; }

        /* Обычный слайдер для жёлтого */
        .yellow-slider-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .yellow-slider-container input {
            width: 100%;
            cursor: pointer;
            height: 14px;
            border-radius: 20px;
            background: linear-gradient(to right, #ffff00, #ffffaa);
            accent-color: #ffff00;
        }

        @media (max-width: 700px) {
            #top-panel { gap: 8px; padding: 10px 15px; }
            .color-btn { padding: 8px 12px; font-size: 16px; min-width: 70px; }
            .color-btn span { font-size: 16px; }
            .slider-panel { width: 85%; padding: 20px; }
            .custom-slider .thumb { width: 40px; height: 40px; font-size: 24px; }
        }

        #instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 30px;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>
    <div id="top-panel">
        <div class="color-btn" id="btn-red">🔴<span id="red-pct">50%</span></div>
        <div class="color-btn" id="btn-blue">🔵<span id="blue-pct">50%</span></div>
        <div class="color-btn" id="btn-yellow">🟡<span id="yellow-pct">50%</span></div>
    </div>

    <!-- Панель красного (кастомный слайдер) -->
    <div id="red-panel" class="slider-panel" style="border-top-color: #ff0000; border-bottom-color: #ff0000;">
        <div class="panel-title" style="color:#ff8888;">🔴 КРАСНЫЙ</div>
        <div id="red-custom" class="custom-slider" style="background: #330000;">
            <div id="red-fill" class="fill" style="background: #ff0000; width:50%;">50%</div>
            <div id="red-thumb" class="thumb" draggable="false">🔴</div>
        </div>
    </div>

    <!-- Панель синего (кастомный слайдер) -->
    <div id="blue-panel" class="slider-panel" style="border-top-color: #0000ff; border-bottom-color: #0000ff;">
        <div class="panel-title" style="color:#8888ff;">🔵 СИНИЙ</div>
        <div id="blue-custom" class="custom-slider" style="background: #000033;">
            <div id="blue-fill" class="fill" style="background: #0000ff; width:50%;">50%</div>
            <div id="blue-thumb" class="thumb" draggable="false">🔵</div>
        </div>
    </div>

    <!-- Панель жёлтого (обычный слайдер) -->
    <div id="yellow-panel" class="slider-panel" style="border-top-color: #ffff00; border-bottom-color: #ffff00;">
        <div class="panel-title" style="color:#ffffaa;">🟡 ЖЁЛТАЯ</div>
        <div class="yellow-slider-container">
            <input type="range" id="yellow-slider" min="-80" max="80" value="0" step="1">
        </div>
    </div>

    <div id="instruction">👆 Нажми на цвет — появится панель</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Сцена ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.5, 2.5, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a20);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.maxDistance = 9;
        controls.minDistance = 2.2;
        controls.target.set(0, 0, 0);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(2, 3, 2);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466aa, 2.0);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xaa88ff, 2.0);
        fillLight.position.set(1, -1, 2);
        scene.add(fillLight);

        const sphereRadius = 1;

        // --- Шар - только тонкий каркас ---
        const sphereGeom = new THREE.SphereGeometry(sphereRadius, 48, 24);
        const edges = new THREE.EdgesGeometry(sphereGeom);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.3, transparent: true });
        const wireframeSphere = new THREE.LineSegments(edges, lineMat);
        scene.add(wireframeSphere);

        // --- Плоскости ---
        const planeGeom = new THREE.PlaneGeometry(2.4, 2.4);

        // СИНЯЯ - неподвижная, нормаль X (плоскость YZ) - чистая #0000ff
        const blueMat = new THREE.MeshPhongMaterial({
            color: 0x0000ff,
            emissive: 0x000044,
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.0
        });
        const bluePlane = new THREE.Mesh(planeGeom, blueMat);
        bluePlane.rotation.y = Math.PI / 2;
        scene.add(bluePlane);

        // КРАСНАЯ - вращается вокруг Y - чистая #ff0000
        const redMat = new THREE.MeshPhongMaterial({
            color: 0xff0000,
            emissive: 0x440000,
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.0
        });
        const redPlane = new THREE.Mesh(planeGeom, redMat);
        redPlane.rotation.y = 0;
        scene.add(redPlane);

        // ЖЁЛТАЯ - вращается вокруг X - чистая #ffff00
        const yellowMat = new THREE.MeshPhongMaterial({
            color: 0xffff00,
            emissive: 0x444400,
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.0
        });
        const yellowPlane = new THREE.Mesh(planeGeom, yellowMat);
        yellowPlane.rotation.x = Math.PI / 2;
        scene.add(yellowPlane);

        // Белые контуры плоскостей
        function addEdges(mesh, color) {
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color }));
            mesh.add(line);
        }
        addEdges(bluePlane, 0x8888ff);
        addEdges(redPlane, 0xff8888);
        addEdges(yellowPlane, 0xffff88);

        // Линии пересечений (для красоты)
        const axisYGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -1.3, 0),
            new THREE.Vector3(0, 1.3, 0)
        ]);
        const axisYLine = new THREE.Line(axisYGeom, new THREE.LineBasicMaterial({ color: 0xff88ff }));
        scene.add(axisYLine);

        // Красная ∩ Жёлтая и Синяя ∩ Жёлтая (динамические)
        const lineRYGeom = new THREE.BufferGeometry();
        const lineBYGeom = new THREE.BufferGeometry();
        const lineRY = new THREE.Line(lineRYGeom, new THREE.LineBasicMaterial({ color: 0xffaa66 }));
        const lineBY = new THREE.Line(lineBYGeom, new THREE.LineBasicMaterial({ color: 0xaaff66 }));
        scene.add(lineRY);
        scene.add(lineBY);

        // Точка пересечения
        const centerPoint = new THREE.Mesh(
            new THREE.SphereGeometry(0.07, 10, 10),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xaaaaaa })
        );
        scene.add(centerPoint);

        // --- Состояние ---
        // Проценты: redPercent и bluePercent, сумма = 100
        let redPercent = 50;
        let bluePercent = 50;
        let yellowAngle = 0;   // угол поворота жёлтой вокруг X

        // Функция обновления процентов на кнопках и панелях
        function updateUI() {
            // Обновляем кнопки
            document.getElementById('red-pct').textContent = redPercent.toFixed(1) + '%';
            document.getElementById('blue-pct').textContent = bluePercent.toFixed(1) + '%';
            
            // Жёлтый процент от yellowAngle
            let yellowPct = 50 + (yellowAngle / 80) * 50;
            if (yellowPct < 0) yellowPct = 0;
            if (yellowPct > 100) yellowPct = 100;
            document.getElementById('yellow-pct').textContent = yellowPct.toFixed(1) + '%';

            // Обновляем панель красного
            const redFill = document.getElementById('red-fill');
            redFill.style.width = redPercent + '%';
            redFill.textContent = redPercent.toFixed(1) + '%';
            document.getElementById('red-thumb').style.left = redPercent + '%';

            // Обновляем панель синего
            const blueFill = document.getElementById('blue-fill');
            blueFill.style.width = bluePercent + '%';
            blueFill.textContent = bluePercent.toFixed(1) + '%';
            document.getElementById('blue-thumb').style.left = bluePercent + '%';
        }

        // Поворот плоскостей и обновление линий
        function applyRotations() {
            // Преобразуем redPercent в угол: при 0% -> -80°, 50% -> 0°, 100% -> +80°
            let redAngle = (redPercent - 50) * 1.6;
            redPlane.rotation.y = THREE.MathUtils.degToRad(redAngle);
            
            // Синяя плоскость неподвижна (она всегда под 90° относительно начального положения красной)
            // Но для визуализации пересечений мы используем её фиксированную нормаль

            yellowPlane.rotation.x = THREE.MathUtils.degToRad(90 + yellowAngle);

            // Нормали
            const nRed = new THREE.Vector3(Math.sin(redPlane.rotation.y), 0, Math.cos(redPlane.rotation.y));
            const nBlue = new THREE.Vector3(1, 0, 0);
            const yRot = yellowPlane.rotation.x;
            const nYellow = new THREE.Vector3(0, Math.cos(yRot), Math.sin(yRot));

            // Линии пересечений
            const dirRY = new THREE.Vector3().crossVectors(nRed, nYellow).normalize();
            const dirBY = new THREE.Vector3().crossVectors(nBlue, nYellow).normalize();
            const len = 1.3;

            lineRY.geometry.dispose();
            lineRY.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, -len)
            ]);
            lineBY.geometry.dispose();
            lineBY.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, -len)
            ]);

            updateUI();
        }

        // --- Интерфейс: открытие панелей ---
        const btnRed = document.getElementById('btn-red');
        const btnBlue = document.getElementById('btn-blue');
        const btnYellow = document.getElementById('btn-yellow');
        const redPanel = document.getElementById('red-panel');
        const bluePanel = document.getElementById('blue-panel');
        const yellowPanel = document.getElementById('yellow-panel');
        const yellowSlider = document.getElementById('yellow-slider');

        let activePanel = null;

        function showPanel(panel) {
            if (activePanel === panel) {
                panel.classList.remove('active');
                activePanel = null;
            } else {
                if (activePanel) activePanel.classList.remove('active');
                panel.classList.add('active');
                activePanel = panel;
            }
        }

        btnRed.addEventListener('click', () => showPanel(redPanel));
        btnBlue.addEventListener('click', () => showPanel(bluePanel));
        btnYellow.addEventListener('click', () => showPanel(yellowPanel));

        // --- Кастомный слайдер для красного ---
        const redCustom = document.getElementById('red-custom');
        const redThumb = document.getElementById('red-thumb');
        let isDraggingRed = false;

        function handleRedStart(e) {
            e.preventDefault();
            isDraggingRed = true;
        }
        function handleRedMove(e) {
            if (!isDraggingRed) return;
            e.preventDefault();
            const rect = redCustom.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let x = Math.max(0, Math.min(rect.width, clientX - rect.left));
            let newPercent = (x / rect.width) * 100;
            // Ограничиваем и обновляем redPercent, bluePercent = 100 - redPercent
            redPercent = Math.round(newPercent * 10) / 10;
            bluePercent = 100 - redPercent;
            applyRotations();
        }
        function handleRedEnd(e) {
            e.preventDefault();
            isDraggingRed = false;
        }
        redThumb.addEventListener('mousedown', handleRedStart);
        window.addEventListener('mousemove', handleRedMove);
        window.addEventListener('mouseup', handleRedEnd);
        redThumb.addEventListener('touchstart', handleRedStart, { passive: false });
        window.addEventListener('touchmove', handleRedMove, { passive: false });
        window.addEventListener('touchend', handleRedEnd);
        redThumb.addEventListener('dragstart', (e) => e.preventDefault());

        // --- Кастомный слайдер для синего ---
        const blueCustom = document.getElementById('blue-custom');
        const blueThumb = document.getElementById('blue-thumb');
        let isDraggingBlue = false;

        function handleBlueStart(e) {
            e.preventDefault();
            isDraggingBlue = true;
        }
        function handleBlueMove(e) {
            if (!isDraggingBlue) return;
            e.preventDefault();
            const rect = blueCustom.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let x = Math.max(0, Math.min(rect.width, clientX - rect.left));
            let newPercent = (x / rect.width) * 100;
            bluePercent = Math.round(newPercent * 10) / 10;
            redPercent = 100 - bluePercent;
            applyRotations();
        }
        function handleBlueEnd(e) {
            e.preventDefault();
            isDraggingBlue = false;
        }
        blueThumb.addEventListener('mousedown', handleBlueStart);
        window.addEventListener('mousemove', handleBlueMove);
        window.addEventListener('mouseup', handleBlueEnd);
        blueThumb.addEventListener('touchstart', handleBlueStart, { passive: false });
        window.addEventListener('touchmove', handleBlueMove, { passive: false });
        window.addEventListener('touchend', handleBlueEnd);
        blueThumb.addEventListener('dragstart', (e) => e.preventDefault());

        // --- Обычный слайдер для жёлтого ---
        yellowSlider.addEventListener('input', (e) => {
            yellowAngle = parseInt(e.target.value);
            applyRotations();
        });

        // Инициализация
        applyRotations();
        updateUI();

        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
