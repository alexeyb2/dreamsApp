<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Баланс красного и синего (инь-ян слайдер)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a20; }
        
        /* Верхние кнопки - крупные, удобные для тача */
        #top-panel {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 70px;
            border: 1px solid #444;
            z-index: 40; /* выше всего */
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            touch-action: manipulation;
        }
        .color-btn {
            padding: 15px 30px; /* увеличены для тача */
            border-radius: 60px;
            border: 3px solid white;
            cursor: pointer;
            font-weight: bold;
            font-size: 24px;
            text-align: center;
            min-width: 130px;
            transition: transform 0.2s;
            box-shadow: 0 0 15px currentColor;
            touch-action: manipulation;
            user-select: none;
        }
        .color-btn:hover { transform: scale(1.05); }
        .color-btn span { 
            display: block; 
            font-size: 20px; 
            margin-top: 6px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 6px 0;
        }
        #btn-red { background: #ff0000; color: white; }
        #btn-blue { background: #0000ff; color: white; }
        #btn-yellow { background: #ffff00; color: black; }

        /* Панели слайдеров */
        .slider-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,40,0.98);
            backdrop-filter: blur(10px);
            color: white;
            padding: 25px 35px;
            border-radius: 70px;
            border: 2px solid #555;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            z-index: 50; /* выше кнопок */
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 320px;
            border-top: 4px solid;
            border-bottom: 4px solid;
            touch-action: manipulation;
        }
        .slider-panel.active { display: flex; }
        .panel-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Специальный балансер для красного/синего */
        #balance-custom {
            width: 100%;
            height: 90px; /* ещё увеличено */
            display: flex;
            border-radius: 60px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
            cursor: grab;
            user-select: none;
            touch-action: none;
            margin: 15px 0;
        }
        #balance-red-part, #balance-blue-part {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            transition: width 0.05s linear;
        }
        #balance-red-part {
            background: #ff0000;
            color: #0000ff;
            text-shadow: 0 0 10px #ffffff;
        }
        #balance-blue-part {
            background: #0000ff;
            color: #ff0000;
            text-shadow: 0 0 10px #ffffff;
        }
        #balance-thumb {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.98);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            box-shadow: 0 0 20px gold;
            cursor: grab;
            z-index: 3;
            user-select: none;
            touch-action: none;
            border: 3px solid #333;
        }

        /* Обычный слайдер для жёлтого */
        .yellow-slider-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .yellow-slider-container input {
            width: 100%;
            cursor: pointer;
            height: 20px;
            border-radius: 30px;
            background: linear-gradient(to right, #ffff00, #ffffaa);
            accent-color: #ffff00;
        }

        @media (max-width: 700px) {
            #top-panel { gap: 8px; padding: 10px 15px; }
            .color-btn { padding: 12px 16px; font-size: 20px; min-width: 90px; }
            .color-btn span { font-size: 18px; }
            .slider-panel { width: 92%; padding: 20px; min-width: auto; }
            #balance-custom { height: 80px; }
            #balance-red-part, #balance-blue-part { font-size: 26px; }
            #balance-thumb { width: 60px; height: 60px; font-size: 36px; }
        }

        #instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>
    <div id="top-panel">
        <div class="color-btn" id="btn-red">🔴<span id="red-pct">50%</span></div>
        <div class="color-btn" id="btn-blue">🔵<span id="blue-pct">50%</span></div>
        <div class="color-btn" id="btn-yellow">🟡<span id="yellow-pct">50%</span></div>
    </div>

    <!-- Панель баланса красный/синий -->
    <div id="balance-panel" class="slider-panel" style="border-top-color: #ff0000; border-bottom-color: #0000ff;">
        <div class="panel-title" style="color:#ff8888;">🔴🔵 БАЛАНС</div>
        <div id="balance-custom">
            <div id="balance-red-part">50%</div>
            <div id="balance-blue-part">50%</div>
            <div id="balance-thumb" draggable="false">☯</div>
        </div>
        <div style="font-size: 16px; color: #ccc;">Перетаскивайте символ</div>
    </div>

    <!-- Панель жёлтого -->
    <div id="yellow-panel" class="slider-panel" style="border-top-color: #ffff00; border-bottom-color: #ffff00;">
        <div class="panel-title" style="color:#ffffaa;">🟡 ЖЁЛТАЯ</div>
        <div class="yellow-slider-container">
            <input type="range" id="yellow-slider" min="-80" max="80" value="0" step="1">
        </div>
    </div>

    <div id="instruction">👆 Нажми на цвет — появится панель</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Сцена ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3.5, 2.5, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a20);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.maxDistance = 9;
        controls.minDistance = 2.2;
        controls.target.set(0, 0, 0);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
        dirLight.position.set(2, 3, 2);
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466aa, 2.0);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xaa88ff, 2.0);
        fillLight.position.set(1, -1, 2);
        scene.add(fillLight);

        const sphereRadius = 1;

        // --- Шар - только тонкий каркас ---
        const sphereGeom = new THREE.SphereGeometry(sphereRadius, 48, 24);
        const edges = new THREE.EdgesGeometry(sphereGeom);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.3, transparent: true });
        const wireframeSphere = new THREE.LineSegments(edges, lineMat);
        scene.add(wireframeSphere);

        // --- Плоскости ---
        const planeGeom = new THREE.PlaneGeometry(2.4, 2.4);

        // СИНЯЯ - неподвижная, нормаль X (плоскость YZ) - чистая #0000ff
        const blueMat = new THREE.MeshPhongMaterial({
            color: 0x0000ff,
            emissive: 0x000044,
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.0
        });
        const bluePlane = new THREE.Mesh(planeGeom, blueMat);
        bluePlane.rotation.y = Math.PI / 2;
        scene.add(bluePlane);

        // КРАСНАЯ - вращается вокруг Y - чистая #ff0000
        const redMat = new THREE.MeshPhongMaterial({
            color: 0xff0000,
            emissive: 0x440000,
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.0
        });
        const redPlane = new THREE.Mesh(planeGeom, redMat);
        redPlane.rotation.y = 0;
        scene.add(redPlane);

        // ЖЁЛТАЯ - вращается вокруг X - чистая #ffff00
        const yellowMat = new THREE.MeshPhongMaterial({
            color: 0xffff00,
            emissive: 0x444400,
            transparent: true,
            opacity: 0.4,
            side: THREE.DoubleSide,
            emissiveIntensity: 1.0
        });
        const yellowPlane = new THREE.Mesh(planeGeom, yellowMat);
        yellowPlane.rotation.x = Math.PI / 2;
        scene.add(yellowPlane);

        // Белые контуры плоскостей
        function addEdges(mesh, color) {
            const edges = new THREE.EdgesGeometry(mesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: color }));
            mesh.add(line);
        }
        addEdges(bluePlane, 0x8888ff);
        addEdges(redPlane, 0xff8888);
        addEdges(yellowPlane, 0xffff88);

        // Линии пересечений (для красоты)
        const axisYGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -1.3, 0),
            new THREE.Vector3(0, 1.3, 0)
        ]);
        const axisYLine = new THREE.Line(axisYGeom, new THREE.LineBasicMaterial({ color: 0xff88ff }));
        scene.add(axisYLine);

        // Красная ∩ Жёлтая и Синяя ∩ Жёлтая (динамические)
        const lineRYGeom = new THREE.BufferGeometry();
        const lineBYGeom = new THREE.BufferGeometry();
        const lineRY = new THREE.Line(lineRYGeom, new THREE.LineBasicMaterial({ color: 0xffaa66 }));
        const lineBY = new THREE.Line(lineBYGeom, new THREE.LineBasicMaterial({ color: 0xaaff66 }));
        scene.add(lineRY);
        scene.add(lineBY);

        // Точка пересечения
        const centerPoint = new THREE.Mesh(
            new THREE.SphereGeometry(0.07, 10, 10),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xaaaaaa })
        );
        scene.add(centerPoint);

        // --- Состояние ---
        let redAngle = 0;
        let yellowAngle = 0;
        let redPercent = 50;

        // Функция обновления процентов
        function updateUI() {
            let bluePercent = 100 - redPercent;
            document.getElementById('red-pct').textContent = redPercent.toFixed(1) + '%';
            document.getElementById('blue-pct').textContent = bluePercent.toFixed(1) + '%';
            
            let yellowPct = 50 + (yellowAngle / 80) * 50;
            if (yellowPct < 0) yellowPct = 0;
            if (yellowPct > 100) yellowPct = 100;
            document.getElementById('yellow-pct').textContent = yellowPct.toFixed(1) + '%';

            document.getElementById('balance-red-part').textContent = redPercent.toFixed(1) + '%';
            document.getElementById('balance-blue-part').textContent = bluePercent.toFixed(1) + '%';
            document.getElementById('balance-red-part').style.width = redPercent + '%';
            document.getElementById('balance-blue-part').style.width = bluePercent + '%';
            document.getElementById('balance-thumb').style.left = redPercent + '%';
        }

        // Поворот плоскостей
        function applyRotations() {
            redAngle = (redPercent - 50) * 1.6;
            redPlane.rotation.y = THREE.MathUtils.degToRad(redAngle);
            yellowPlane.rotation.x = THREE.MathUtils.degToRad(90 + yellowAngle);

            const nRed = new THREE.Vector3(Math.sin(redPlane.rotation.y), 0, Math.cos(redPlane.rotation.y));
            const nBlue = new THREE.Vector3(1, 0, 0);
            const yRot = yellowPlane.rotation.x;
            const nYellow = new THREE.Vector3(0, Math.cos(yRot), Math.sin(yRot));

            const dirRY = new THREE.Vector3().crossVectors(nRed, nYellow).normalize();
            const dirBY = new THREE.Vector3().crossVectors(nBlue, nYellow).normalize();
            const len = 1.3;

            lineRY.geometry.dispose();
            lineRY.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirRY, -len)
            ]);
            lineBY.geometry.dispose();
            lineBY.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, len),
                new THREE.Vector3(0,0,0).clone().addScaledVector(dirBY, -len)
            ]);

            updateUI();
        }

        // --- Интерфейс: открытие панелей с поддержкой touch ---
        const btnRed = document.getElementById('btn-red');
        const btnBlue = document.getElementById('btn-blue');
        const btnYellow = document.getElementById('btn-yellow');
        const balancePanel = document.getElementById('balance-panel');
        const yellowPanel = document.getElementById('yellow-panel');
        const yellowSlider = document.getElementById('yellow-slider');

        let activePanel = null;

        function showBalancePanel() {
            if (activePanel === 'balance') {
                balancePanel.classList.remove('active');
                activePanel = null;
            } else {
                if (activePanel === 'yellow') yellowPanel.classList.remove('active');
                balancePanel.classList.add('active');
                activePanel = 'balance';
            }
        }

        function showYellowPanel() {
            if (activePanel === 'yellow') {
                yellowPanel.classList.remove('active');
                activePanel = null;
            } else {
                if (activePanel === 'balance') balancePanel.classList.remove('active');
                yellowPanel.classList.add('active');
                activePanel = 'yellow';
            }
        }

        // Обработчики касаний и кликов
        btnRed.addEventListener('click', showBalancePanel);
        btnRed.addEventListener('touchstart', (e) => { e.preventDefault(); showBalancePanel(); }, { passive: false });
        
        btnBlue.addEventListener('click', showBalancePanel);
        btnBlue.addEventListener('touchstart', (e) => { e.preventDefault(); showBalancePanel(); }, { passive: false });
        
        btnYellow.addEventListener('click', showYellowPanel);
        btnYellow.addEventListener('touchstart', (e) => { e.preventDefault(); showYellowPanel(); }, { passive: false });

        // --- Кастомный слайдер (перетаскивание) ---
        const balanceCustom = document.getElementById('balance-custom');
        const thumb = document.getElementById('balance-thumb');
        let isDragging = false;

        function handleDragStart(e) {
            e.preventDefault();
            isDragging = true;
        }

        function handleDragMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const rect = balanceCustom.getBoundingClientRect();
            let clientX;
            if (e.touches) {
                clientX = e.touches[0].clientX;
            } else {
                clientX = e.clientX;
            }
            
            let x = clientX - rect.left;
            x = Math.max(0, Math.min(rect.width, x));
            let newRedPercent = (x / rect.width) * 100;
            redPercent = Math.round(newRedPercent * 10) / 10;
            applyRotations();
        }

        function handleDragEnd(e) {
            e.preventDefault();
            isDragging = false;
        }

        // Мышь
        thumb.addEventListener('mousedown', handleDragStart);
        window.addEventListener('mousemove', handleDragMove);
        window.addEventListener('mouseup', handleDragEnd);

        // Тач
        thumb.addEventListener('touchstart', handleDragStart, { passive: false });
        window.addEventListener('touchmove', handleDragMove, { passive: false });
        window.addEventListener('touchend', handleDragEnd);
        window.addEventListener('touchcancel', handleDragEnd);

        thumb.addEventListener('dragstart', (e) => e.preventDefault());

        // --- Слайдер для жёлтого ---
        yellowSlider.addEventListener('input', (e) => {
            yellowAngle = parseInt(e.target.value);
            applyRotations();
        });
        yellowSlider.addEventListener('touchmove', (e) => e.preventDefault()); // чтобы не скроллило страницу при движении

        // Инициализация
        updateUI();
        applyRotations();

        // Анимация
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
