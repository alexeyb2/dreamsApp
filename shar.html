<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Баланс синего и красного в сфере</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: pan-x pan-y; }
        #info {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid #555;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 4px solid #3366FF;
            border-right: 4px solid #FF3333;
            font-size: 16px;
            pointer-events: none;
        }
        #balance {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .blue-text { color: #88aaff; font-weight: bold; }
        .red-text { color: #ff8888; font-weight: bold; }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            align-items: center;
            border: 1px solid #555;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            z-index: 20;
            font-size: 16px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 2px solid #3366FF;
            border-top: 2px solid #FF3333;
            min-width: 280px;
        }
        #controls label {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ccc;
        }
        #controls input {
            width: 260px;
            cursor: pointer;
            accent-color: #ff6666;
            height: 6px;
            border-radius: 10px;
        }
        #angle-value {
            min-width: 60px;
            text-align: center;
            font-weight: bold;
            color: #ffaa66;
        }
        @media (max-width: 700px) {
            #controls { flex-direction: column; gap: 15px; padding: 20px; border-radius: 30px; width: 90%; }
            #controls input { width: 100%; }
            #info { font-size: 14px; padding: 10px 16px; }
        }
        #instruction {
            position: absolute;
            bottom: 100px;
            right: 15px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <div id="balance">
            <span><span class="blue-text">●</span> Синий: <span id="blue-percent" class="blue-text">50.0%</span></span>
            <span style="font-size: 18px;">⚖️</span>
            <span><span class="red-text">●</span> Красный: <span id="red-percent" class="red-text">50.0%</span></span>
        </div>
        <div style="text-align: center; font-size: 13px; margin-top: 5px; color: #aaa;">
            Угол между плоскостями: <span id="angle-display">90.0°</span>
        </div>
    </div>

    <div id="controls">
        <label>
            <span style="color:#88aaff;">◀ Синий перекос</span>
            <input type="range" id="tilt" min="-80" max="80" value="0" step="1">
            <span style="color:#ff8888;">Красный перекос ▶</span>
        </label>
        <div id="angle-value">0°</div>
    </div>

    <div id="instruction">👆 Вращайте / масштабируйте</div>

    <!-- Подключаем Three.js и OrbitControls -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Инициализация сцены, камеры, рендерера ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a20); // космический тёмно-синий

        // Камера: ставим подальше, чтобы сфера точно влезала на любом экране
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0a20);
        document.body.appendChild(renderer.domElement);

        // --- Управление (поддержка touch) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.rotateSpeed = 0.8;
        controls.maxDistance = 10;
        controls.minDistance = 2.5;
        controls.target.set(0, 0, 0);

        // --- Освещение ---
        // Мягкий рассеянный свет
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Основной направленный свет
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);

        // Подсветка сзади и снизу
        const backLight = new THREE.PointLight(0x4466aa, 0.6);
        backLight.position.set(-2, 1, -2);
        scene.add(backLight);

        const bottomLight = new THREE.PointLight(0xaa66aa, 0.5);
        bottomLight.position.set(0, -2, 1);
        scene.add(bottomLight);

        // --- Звёзды (просто для атмосферы) ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 600;
        const starPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            const r = 6 + Math.random() * 12;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            starPositions[i*3+2] = r * Math.cos(phi);
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.08, transparent: true, opacity: 0.5 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- Сфера (прозрачная, с каркасом) ---
        const sphereRadius = 1;
        const sphereGeom = new THREE.SphereGeometry(sphereRadius, 48, 24); // меньше полигонов для мобильных, но достаточно
        
        // Полупрозрачная оболочка
        const sphereMat = new THREE.MeshPhongMaterial({
            color: 0x3a6ea5,
            emissive: 0x112233,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide,
            wireframe: false
        });
        const sphere = new THREE.Mesh(sphereGeom, sphereMat);
        scene.add(sphere);

        // Каркас из линий (чтобы сфера была видна)
        const edges = new THREE.EdgesGeometry(sphereGeom);
        const lineMat = new THREE.LineBasicMaterial({ color: 0x88ccff, opacity: 0.3, transparent: true });
        const wireframeSphere = new THREE.LineSegments(edges, lineMat);
        sphere.add(wireframeSphere);

        // Дополнительные окружности (экватор и меридианы) для красоты
        const circleMat = new THREE.LineBasicMaterial({ color: 0x44aaff, opacity: 0.2, transparent: true });
        const circlePoints = [];
        const segments = 64;
        for (let i = 0; i <= segments; i++) {
            const angle = (i / segments) * Math.PI * 2;
            circlePoints.push(new THREE.Vector3(Math.cos(angle) * sphereRadius, 0, Math.sin(angle) * sphereRadius));
        }
        const equatorGeom = new THREE.BufferGeometry().setFromPoints(circlePoints);
        const equator = new THREE.LineLoop(equatorGeom, circleMat);
        sphere.add(equator);

        const meridianPoints1 = [];
        const meridianPoints2 = [];
        for (let i = 0; i <= segments; i++) {
            const angle = (i / segments) * Math.PI * 2;
            meridianPoints1.push(new THREE.Vector3(0, Math.cos(angle) * sphereRadius, Math.sin(angle) * sphereRadius));
            meridianPoints2.push(new THREE.Vector3(Math.cos(angle) * sphereRadius, Math.sin(angle) * sphereRadius, 0));
        }
        const meridianGeom1 = new THREE.BufferGeometry().setFromPoints(meridianPoints1);
        const meridianGeom2 = new THREE.BufferGeometry().setFromPoints(meridianPoints2);
        const meridian1 = new THREE.LineLoop(meridianGeom1, circleMat);
        const meridian2 = new THREE.LineLoop(meridianGeom2, circleMat);
        sphere.add(meridian1);
        sphere.add(meridian2);

        // --- Плоскости (исправленная ориентация) ---
        // Плоскость чуть больше диаметра, чтобы выходила за сферу (нагляднее)
        const planeGeom = new THREE.PlaneGeometry(2.2, 2.2);

        // Синяя плоскость (нормаль по X) -> лежит в плоскости YZ (вертикальная)
        const blueMat = new THREE.MeshPhongMaterial({
            color: 0x3366FF,
            emissive: 0x112244,
            transparent: true,
            opacity: 0.45, // чуть плотнее для видимости
            side: THREE.DoubleSide,
            emissiveIntensity: 0.5
        });
        const bluePlane = new THREE.Mesh(planeGeom, blueMat);
        bluePlane.position.set(0, 0, 0);
        bluePlane.rotation.y = Math.PI / 2; // нормаль X
        scene.add(bluePlane);

        // Красная плоскость (нормаль по Z) -> лежит в плоскости XY (вертикальная)
        const redMat = new THREE.MeshPhongMaterial({
            color: 0xFF3333,
            emissive: 0x331111,
            transparent: true,
            opacity: 0.45,
            side: THREE.DoubleSide,
            emissiveIntensity: 0.5
        });
        const redPlane = new THREE.Mesh(planeGeom, redMat);
        redPlane.position.set(0, 0, 0);
        redPlane.rotation.y = 0; // нормаль Z (исходная ориентация)
        scene.add(redPlane);

        // Добавляем контуры плоскостей (чтобы лучше видеть их границы)
        function addEdges(planeMesh, colorHex) {
            const edges = new THREE.EdgesGeometry(planeMesh.geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: colorHex }));
            planeMesh.add(line);
        }
        addEdges(bluePlane, 0x88aaff);
        addEdges(redPlane, 0xff8888);

        // Линия пересечения плоскостей (ось Y) с подсветкой
        const axisPoints = [
            new THREE.Vector3(0, -1.3, 0),
            new THREE.Vector3(0, 1.3, 0)
        ];
        const axisGeom = new THREE.BufferGeometry().setFromPoints(axisPoints);
        const axisLine = new THREE.Line(axisGeom, new THREE.LineBasicMaterial({ color: 0xffdd99 }));
        scene.add(axisLine);

        // Маленькие сферы на концах оси
        const sphereCapGeom = new THREE.SphereGeometry(0.04, 8, 8);
        const capMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
        const capTop = new THREE.Mesh(sphereCapGeom, capMat);
        capTop.position.set(0, 1.3, 0);
        scene.add(capTop);
        const capBottom = new THREE.Mesh(sphereCapGeom, capMat);
        capBottom.position.set(0, -1.3, 0);
        scene.add(capBottom);

        // --- Частицы внутри сферы (подчёркивают объём) ---
        const particleCount = 300;
        const particleGeom = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const r = sphereRadius * Math.cbrt(Math.random()); // равномерно по объёму
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePositions[i*3] = r * Math.sin(phi) * Math.cos(theta);
            particlePositions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            particlePositions[i*3+2] = r * Math.cos(phi);
        }
        particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.02, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeom, particleMat);
        scene.add(particles);

        // --- Интерфейс и логика процентов ---
        const tiltInput = document.getElementById('tilt');
        const angleValue = document.getElementById('angle-value');
        const bluePercentSpan = document.getElementById('blue-percent');
        const redPercentSpan = document.getElementById('red-percent');
        const angleDisplaySpan = document.getElementById('angle-display');

        function updateTilt() {
            const alphaDeg = parseFloat(tiltInput.value);
            angleValue.textContent = alphaDeg + '°';

            // Поворачиваем красную плоскость вокруг Y (в радианах)
            const alphaRad = THREE.MathUtils.degToRad(alphaDeg);
            redPlane.rotation.y = alphaRad; // при 0 нормаль Z, при 90 нормаль X

            // Вычисляем угол между нормалями:
            // Синяя нормаль = (1,0,0)
            // Красная нормаль = (sin(alphaRad), 0, cos(alphaRad))
            const dot = Math.sin(alphaRad); // скалярное произведение
            // Угол между нормалями в градусах (от 0 до 180)
            let angleBetween = Math.acos(Math.min(1, Math.max(-1, dot))) * 180 / Math.PI;
            
            // Проценты: синий занимает долю, пропорциональную углу
            let bluePct = (angleBetween / 180) * 100;
            // Коррекция границ
            if (bluePct < 0) bluePct = 0;
            if (bluePct > 100) bluePct = 100;
            const redPct = 100 - bluePct;

            bluePercentSpan.textContent = bluePct.toFixed(1) + '%';
            redPercentSpan.textContent = redPct.toFixed(1) + '%';
            angleDisplaySpan.textContent = angleBetween.toFixed(1) + '°';
        }

        tiltInput.addEventListener('input', updateTilt);
        updateTilt(); // инициализация

        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // для плавного damping
            stars.rotation.y += 0.0002; // медленно вращаем звёзды
            renderer.render(scene, camera);
        }
        animate();

        // --- Обработка изменения размера окна ---
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
