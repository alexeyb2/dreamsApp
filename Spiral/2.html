<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>👁🌀📱DreamSApp</title>
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="description" content="👁️:Я 🌀:Внимание 📱:Связь ">
  <meta property="og:type" content="website">
  <meta property="og:title" content="🔼👁🌀📱DreamSApp">
  <meta property="og:description" content="🔼👁 👁️:Я 🌀:Внимание 📱:Связь ">
  <meta property="og:image" content="https://alexeyb2.github.io/dreamsApp/Spiral/icon.png">
  <meta property="og:url" content="https://alexeyb2.github.io/dreamsApp/Spiral">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #05070f;
      color: #0ff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    h2 {
      text-align: center;
      padding: 6px 0 2px;
      letter-spacing: 2px;
      font-size: 1.1rem;
      flex-shrink: 0;
      background: #05070f;
      z-index: 2;
    }
    canvas {
      flex: 1 1 auto;
      background: #000;
      touch-action: none;
      min-height: 0;
      width: 100%;
    }
    .controls-container {
      flex-shrink: 0;
      background: rgba(5, 7, 15, 0.95);
      border-top: 2px solid #0ff;
      padding: 6px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
      max-height: 50vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .controls-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn {
      background: rgba(10, 25, 45, 0.9);
      border: 1px solid #0ff;
      color: #0ff;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }
    .btn:active {
      background: #0ff;
      color: #000;
    }
    .btn.active {
      background: #0ff;
      color: #000;
      border-color: #0ff;
    }
    .controls-grid {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .block {
      flex: 1 0 48%;
      background: rgba(0, 0, 0, 0.75);
      padding: 8px;
      border-radius: 12px;
      border: 1px solid;
      min-width: 160px;
    }
    .red { border-color: #ff3366; }
    .blue { border-color: #3388ff; }
    h3 {
      text-align: center;
      margin-bottom: 4px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .param {
      display: flex;
      justify-content: space-between;
      margin: 5px 0 2px;
      font-size: 0.7rem;
      color: #ccc;
    }
    .param span {
      color: #0ff;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      margin-bottom: 6px;
      background: #1a2a3a;
      height: 5px;
      border-radius: 3px;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #0ff;
      border-radius: 50%;
      border: 2px solid #000;
      cursor: pointer;
      box-shadow: 0 0 8px #0ff;
    }
    .controls-grid, .block, .param, input {
      visibility: visible !important;
      opacity: 1 !important;
    }
    @media (max-width: 400px) {
      .block { min-width: 145px; }
      h3 { font-size: 0.8rem; }
      .param { font-size: 0.65rem; }
    }
  </style>
</head>
<body>
  <h2>🌀 Две спирали Бернулли</h2>
  <canvas id="canvas"></canvas>

  <div class="controls-container" id="controlsContainer">
    <div class="controls-header">
      <span style="color:#0ff; font-size:0.8rem;">Параметры</span>
      <button class="btn" id="lockBtn">🔓</button>
      <button class="btn" id="centerBtn">🟡 В центр</button>
      <button class="btn toggle-btn" id="togglePanel">▲ Скрыть</button>
    </div>
    <div class="controls-grid" id="controlsGrid">
      <!-- Красная спираль -->
      <div class="block red">
        <h3 style="color:#ff3366;">🔴 Красная (зад)</h3>
        <div class="param">A (см) <span id="a1_val">10</span></div>
        <input type="range" id="a1" min="10" max="40" value="10" step="1">
        <div class="param">K <span id="k1_val">0.12</span></div>
        <input type="range" id="k1" min="0.02" max="0.25" value="0.12" step="0.01">
        <div class="param">Макс. угол (рад) <span id="max1_val">25</span></div>
        <input type="range" id="max1" min="5" max="80" value="25" step="1">
        <div class="param">Нач. угол <span id="angle1_val">3π/2</span></div>
        <input type="range" id="angle1" min="0" max="6.283" value="4.712" step="0.7854">
      </div>

      <!-- Синяя спираль -->
      <div class="block blue">
        <h3 style="color:#3388ff;">🔵 Синяя (перед)</h3>
        <div class="param">A (см) <span id="a2_val">10</span></div>
        <input type="range" id="a2" min="10" max="40" value="10" step="1">
        <div class="param">K <span id="k2_val">0.12</span></div>
        <input type="range" id="k2" min="0.02" max="0.25" value="0.12" step="0.01">
        <div class="param">Макс. угол (рад) <span id="max2_val">25</span></div>
        <input type="range" id="max2" min="5" max="80" value="25" step="1">
        <div class="param">Нач. угол <span id="angle2_val">π/2</span></div>
        <input type="range" id="angle2" min="0" max="6.283" value="1.571" step="0.7854">
      </div>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      const STORAGE_KEY = 'spiralBernoulliV5';

      let centerRed = { x: 0, y: 0, relX: null, relY: null };
      let centerBlue = { x: 0, y: 0, relX: null, relY: null };
      let dragging = null;
      let locked = false;

      const a1 = document.getElementById('a1');
      const k1 = document.getElementById('k1');
      const max1 = document.getElementById('max1');
      const angle1 = document.getElementById('angle1');
      const a1Val = document.getElementById('a1_val');
      const k1Val = document.getElementById('k1_val');
      const max1Val = document.getElementById('max1_val');
      const angle1Val = document.getElementById('angle1_val');

      const a2 = document.getElementById('a2');
      const k2 = document.getElementById('k2');
      const max2 = document.getElementById('max2');
      const angle2 = document.getElementById('angle2');
      const a2Val = document.getElementById('a2_val');
      const k2Val = document.getElementById('k2_val');
      const max2Val = document.getElementById('max2_val');
      const angle2Val = document.getElementById('angle2_val');

      const lockBtn = document.getElementById('lockBtn');
      const centerBtn = document.getElementById('centerBtn');

      // Преобразование радиан в строку с π
      function formatAngle(rad) {
        const pi = Math.PI;
        if (rad === 0) return '0';
        const multiples = [
          { value: 0, label: '0' },
          { value: pi/2, label: 'π/2' },
          { value: pi, label: 'π' },
          { value: 3*pi/2, label: '3π/2' },
          { value: 2*pi, label: '2π' }
        ];
        // Ищем точное совпадение или близкое значение
        const found = multiples.find(m => Math.abs(m.value - rad) < 0.01);
        if (found) return found.label;
        // Если нет точного совпадения, выводим с точностью до 2 знаков
        return rad.toFixed(2) + ' рад';
      }

      function loadState() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const data = JSON.parse(saved);
            if (data.a1 !== undefined) a1.value = data.a1;
            if (data.k1 !== undefined) k1.value = data.k1;
            if (data.max1 !== undefined) max1.value = data.max1;
            if (data.angle1 !== undefined) angle1.value = data.angle1;
            if (data.a2 !== undefined) a2.value = data.a2;
            if (data.k2 !== undefined) k2.value = data.k2;
            if (data.max2 !== undefined) max2.value = data.max2;
            if (data.angle2 !== undefined) angle2.value = data.angle2;
            if (data.locked !== undefined) locked = data.locked;
            if (data.centerRed) {
              centerRed.relX = data.centerRed.relX;
              centerRed.relY = data.centerRed.relY;
            }
            if (data.centerBlue) {
              centerBlue.relX = data.centerBlue.relX;
              centerBlue.relY = data.centerBlue.relY;
            }
          } catch (e) {}
        }
        updateLockButton();
      }

      function saveState() {
        const data = {
          a1: a1.value, k1: k1.value, max1: max1.value, angle1: angle1.value,
          a2: a2.value, k2: k2.value, max2: max2.value, angle2: angle2.value,
          locked: locked,
          centerRed: { relX: centerRed.x / canvas.width, relY: centerRed.y / canvas.height },
          centerBlue: { relX: centerBlue.x / canvas.width, relY: centerBlue.y / canvas.height }
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function updateLockButton() {
        lockBtn.textContent = locked ? '🔒' : '🔓';
        lockBtn.classList.toggle('active', locked);
      }

      function syncParameters(sourceId) {
        if (!locked) return;
        const isRed = sourceId.includes('1');
        const targetPrefix = isRed ? '2' : '1';
        const targetId = sourceId.replace(isRed ? '1' : '2', targetPrefix);
        const targetEl = document.getElementById(targetId);
        if (targetEl) {
          targetEl.value = document.getElementById(sourceId).value;
        }
        draw();
        saveState();
      }

      function onInputChange(e) {
        draw();
        saveState();
        if (locked) {
          syncParameters(e.target.id);
        }
      }

      function resize() {
        const h2 = document.querySelector('h2');
        const controls = document.getElementById('controlsContainer');
        const headerH = h2 ? h2.offsetHeight : 30;
        const controlsH = controls ? controls.offsetHeight : 120;
        canvas.width = window.innerWidth - 16;
        canvas.height = Math.max(300, window.innerHeight - headerH - controlsH - 20);

        if (centerRed.relX !== undefined) {
          centerRed.x = centerRed.relX * canvas.width;
          centerRed.y = centerRed.relY * canvas.height;
        } else {
          centerRed.x = canvas.width / 2;
          centerRed.y = canvas.height * 0.75;
        }
        if (centerBlue.relX !== undefined) {
          centerBlue.x = centerBlue.relX * canvas.width;
          centerBlue.y = centerBlue.relY * canvas.height;
        } else {
          centerBlue.x = canvas.width / 2;
          centerBlue.y = canvas.height * 0.25;
        }
        draw();
      }

      function drawSpiral(cx, cy, A, K, maxPhi, startAngleRad, color, direction) {
        ctx.beginPath();
        const steps = 300;
        for (let i = 0; i <= steps; i++) {
          const t = (i / steps) * maxPhi;
          const r = A * Math.exp(K * t);
          const angle = direction * t + startAngleRad;
          const x = cx + r * Math.cos(angle);
          const y = cy + r * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;
        ctx.stroke();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const A1 = parseFloat(a1.value);
        const K1 = parseFloat(k1.value);
        const maxPhi1 = parseFloat(max1.value);
        const angle1Rad = parseFloat(angle1.value);
        const A2 = parseFloat(a2.value);
        const K2 = parseFloat(k2.value);
        const maxPhi2 = parseFloat(max2.value);
        const angle2Rad = parseFloat(angle2.value);

        a1Val.textContent = A1;
        k1Val.textContent = K1.toFixed(2);
        max1Val.textContent = maxPhi1;
        angle1Val.textContent = formatAngle(angle1Rad);
        a2Val.textContent = A2;
        k2Val.textContent = K2.toFixed(2);
        max2Val.textContent = maxPhi2;
        angle2Val.textContent = formatAngle(angle2Rad);

        drawSpiral(centerRed.x, centerRed.y, A1, K1, maxPhi1, angle1Rad, '#ff3366', 1);
        drawSpiral(centerBlue.x, centerBlue.y, A2, K2, maxPhi2, angle2Rad, '#3388ff', -1);

        ctx.fillStyle = '#ff3366';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff3366';
        ctx.beginPath();
        ctx.arc(centerRed.x, centerRed.y, 6, 0, 2 * Math.PI);
        ctx.fill();

        ctx.fillStyle = '#3388ff';
        ctx.shadowColor = '#3388ff';
        ctx.beginPath();
        ctx.arc(centerBlue.x, centerBlue.y, 6, 0, 2 * Math.PI);
        ctx.fill();

        ctx.shadowBlur = 0;
      }

      function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
      }

      function onPointerDown(e) {
        e.preventDefault();
        const pos = getCanvasCoords(e);
        if (Math.hypot(pos.x - centerRed.x, pos.y - centerRed.y) < 20) dragging = 'red';
        else if (Math.hypot(pos.x - centerBlue.x, pos.y - centerBlue.y) < 20) dragging = 'blue';
      }

      function onPointerMove(e) {
        if (!dragging) return;
        e.preventDefault();
        const pos = getCanvasCoords(e);
        if (dragging === 'red') { centerRed.x = pos.x; centerRed.y = pos.y; }
        else if (dragging === 'blue') { centerBlue.x = pos.x; centerBlue.y = pos.y; }
        draw();
        saveState();
      }

      function onPointerUp() {
        if (dragging) { saveState(); dragging = null; }
      }

      canvas.addEventListener('mousedown', onPointerDown);
      window.addEventListener('mousemove', onPointerMove);
      window.addEventListener('mouseup', onPointerUp);
      canvas.addEventListener('touchstart', onPointerDown, { passive: false });
      canvas.addEventListener('touchmove', onPointerMove, { passive: false });
      canvas.addEventListener('touchend', onPointerUp);

      [a1, k1, max1, angle1, a2, k2, max2, angle2].forEach(input => {
        input.addEventListener('input', onInputChange);
      });

      centerBtn.addEventListener('click', () => {
        centerRed.x = canvas.width / 2;
        centerRed.y = canvas.height / 2;
        centerBlue.x = canvas.width / 2;
        centerBlue.y = canvas.height / 2;
        draw();
        saveState();
      });

      lockBtn.addEventListener('click', () => {
        locked = !locked;
        updateLockButton();
        saveState();
        if (locked) {
          // Синхронизация от красной к синей
          a2.value = a1.value;
          k2.value = k1.value;
          max2.value = max1.value;
          angle2.value = angle1.value;
          draw();
          saveState();
        }
      });

      const toggleBtn = document.getElementById('togglePanel');
      const controlsGrid = document.getElementById('controlsGrid');
      let panelVisible = true;
      toggleBtn.addEventListener('click', () => {
        panelVisible = !panelVisible;
        controlsGrid.style.display = panelVisible ? 'flex' : 'none';
        toggleBtn.textContent = panelVisible ? '▲ Скрыть' : '▼ Показать';
        setTimeout(resize, 50);
      });

      loadState();
      window.addEventListener('resize', resize);
      resize();
    })();
  </script>
</body>
</html>
