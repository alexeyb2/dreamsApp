<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌀 Две спирали Бернулли</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #05070f;
      color: #0ff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 8px;
      touch-action: pan-x pan-y;
    }
    h2 {
      font-weight: 400;
      letter-spacing: 2px;
      margin: 4px 0 8px;
      font-size: 1.3rem;
    }
    canvas {
      display: block;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #000;
      width: 100%;
      max-width: 700px;
      aspect-ratio: 1 / 1;
      touch-action: none;
      margin-bottom: 8px;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 700px;
    }
    .control-block {
      background: rgba(10, 25, 45, 0.95);
      border-radius: 16px;
      padding: 8px 10px;
      border: 1px solid;
      flex: 1 1 0;
      min-width: 150px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .control-block h3 {
      text-align: center;
      font-size: 1rem;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .control-block button {
      padding: 6px 8px;
      margin-bottom: 8px;
      background: #112;
      color: #0ff;
      border: 1px solid #0ff;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .control-block button:active {
      background: #0ff;
      color: #000;
    }
    .param {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #8ff;
      margin: 4px 0 1px;
    }
    .param span {
      color: #0ff;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      margin-bottom: 6px;
      background: #0a1929;
      height: 4px;
      border-radius: 2px;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #0ff;
      border-radius: 50%;
      border: 2px solid #000;
      cursor: pointer;
    }
    @media (max-width: 500px) {
      .control-block {
        min-width: 130px;
        padding: 6px 8px;
      }
      .param {
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <h2>🌀 Две спирали Бернулли</h2>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <!-- Красная – Копчик -->
    <div class="control-block" style="border-color:#ff3366;">
      <h3 style="color:#ff3366;">🔴 Копчик</h3>
      <button id="dirBtn1" onclick="toggleDir(1)">По часовой</button>
      <div class="param">A <span id="a1_val">18.0</span></div>
      <input type="range" id="a1" min="5" max="40" value="18" step="0.5">
      <div class="param">K <span id="k1_val">0.105</span></div>
      <input type="range" id="k1" min="0.03" max="0.2" value="0.105" step="0.001">
      <div class="param">Angle (°) <span id="angle1_val">270</span></div>
      <input type="range" id="angle1" min="0" max="360" value="270" step="1">
    </div>

    <!-- Синяя – Сердце -->
    <div class="control-block" style="border-color:#3388ff;">
      <h3 style="color:#3388ff;">🔵 Сердце</h3>
      <button id="dirBtn2" onclick="toggleDir(2)">По часовой</button>
      <div class="param">A <span id="a2_val">18.0</span></div>
      <input type="range" id="a2" min="5" max="40" value="18" step="0.5">
      <div class="param">K <span id="k2_val">0.105</span></div>
      <input type="range" id="k2" min="0.03" max="0.2" value="0.105" step="0.001">
      <div class="param">Angle (°) <span id="angle2_val">0</span></div>
      <input type="range" id="angle2" min="0" max="360" value="0" step="1">
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // Центры спиралей (перетаскиваются)
      let center1 = { x: 0, y: 0 }; // красный
      let center2 = { x: 0, y: 0 }; // синий
      let dragging = null;

      // Направления вращения (1 – по часовой, -1 – против)
      let dir1 = 1;
      let dir2 = 1;

      // Привязки к DOM
      const a1Input = document.getElementById('a1');
      const k1Input = document.getElementById('k1');
      const angle1Input = document.getElementById('angle1');
      const a1Val = document.getElementById('a1_val');
      const k1Val = document.getElementById('k1_val');
      const angle1Val = document.getElementById('angle1_val');

      const a2Input = document.getElementById('a2');
      const k2Input = document.getElementById('k2');
      const angle2Input = document.getElementById('angle2');
      const a2Val = document.getElementById('a2_val');
      const k2Val = document.getElementById('k2_val');
      const angle2Val = document.getElementById('angle2_val');

      const dirBtn1 = document.getElementById('dirBtn1');
      const dirBtn2 = document.getElementById('dirBtn2');

      // Начальные позиции центров (проценты от размера холста)
      const INIT_RED_Y = 0.72;   // копчик внизу
      const INIT_BLUE_Y = 0.29;  // сердце выше

      function resizeCanvas() {
        const containerWidth = canvas.parentElement.clientWidth;
        const size = Math.min(containerWidth - 16, 700);
        canvas.width = size;
        canvas.height = size;

        // Если центры не заданы – ставим по умолчанию
        if (!dragging && center1.x === 0 && center1.y === 0) {
          center1 = { x: size * 0.5, y: size * INIT_RED_Y };
          center2 = { x: size * 0.5, y: size * INIT_BLUE_Y };
        } else {
          // При ресайзе сохраняем относительные координаты
          const oldSize = canvas.width === size ? size : canvas.width;
          center1.x = (center1.x / oldSize) * size;
          center1.y = (center1.y / oldSize) * size;
          center2.x = (center2.x / oldSize) * size;
          center2.y = (center2.y / oldSize) * size;
        }
        draw();
      }

      // Рисование одной спирали: формула r = A * e^(K * phi)
      function drawSpiral(cx, cy, A, K, angleDeg, dir, color) {
        const angleRad = angleDeg * Math.PI / 180;
        const steps = 500;          // больше шагов – плавнее и дальше раскрутка
        const step = 0.04;          // phi_max = 20
        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
          const phi = i * step;
          const r = A * Math.exp(K * phi);
          const theta = dir * phi + angleRad;
          const x = cx + r * Math.cos(theta);
          const y = cy + r * Math.sin(theta);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 5;
        ctx.shadowColor = color;
        ctx.shadowBlur = 30;
        ctx.stroke();
      }

      function draw() {
        // Обновляем подписи значений
        a1Val.textContent = parseFloat(a1Input.value).toFixed(1);
        k1Val.textContent = parseFloat(k1Input.value).toFixed(3);
        angle1Val.textContent = angle1Input.value;
        a2Val.textContent = parseFloat(a2Input.value).toFixed(1);
        k2Val.textContent = parseFloat(k2Input.value).toFixed(3);
        angle2Val.textContent = angle2Input.value;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Яркие центры
        ctx.shadowBlur = 25;
        ctx.shadowColor = '#ff3366';
        ctx.fillStyle = '#ff3366';
        ctx.beginPath();
        ctx.arc(center1.x, center1.y, 16, 0, 2 * Math.PI);
        ctx.fill();

        ctx.shadowColor = '#3388ff';
        ctx.fillStyle = '#3388ff';
        ctx.beginPath();
        ctx.arc(center2.x, center2.y, 16, 0, 2 * Math.PI);
        ctx.fill();

        // Спирали
        drawSpiral(center1.x, center1.y,
          parseFloat(a1Input.value),
          parseFloat(k1Input.value),
          parseFloat(angle1Input.value),
          dir1, '#ff3366');

        drawSpiral(center2.x, center2.y,
          parseFloat(a2Input.value),
          parseFloat(k2Input.value),
          parseFloat(angle2Input.value),
          dir2, '#3388ff');

        ctx.shadowBlur = 0;
      }

      // Переключение направления
      window.toggleDir = function(n) {
        if (n === 1) {
          dir1 *= -1;
          dirBtn1.textContent = (dir1 === 1) ? 'По часовой' : 'Против часовой';
        } else {
          dir2 *= -1;
          dirBtn2.textContent = (dir2 === 1) ? 'По часовой' : 'Против часовой';
        }
        draw();
      };

      // Перетаскивание центров (пальцем)
      canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;

        const dist1 = Math.hypot(tx - center1.x, ty - center1.y);
        const dist2 = Math.hypot(tx - center2.x, ty - center2.y);

        if (dist1 < 50) dragging = 1;
        else if (dist2 < 50) dragging = 2;
      }, { passive: false });

      canvas.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;

        if (dragging === 1) {
          center1.x = tx;
          center1.y = ty;
        } else if (dragging === 2) {
          center2.x = tx;
          center2.y = ty;
        }
        draw();
      }, { passive: false });

      canvas.addEventListener('touchend', () => { dragging = null; });

      // Обновление при движении ползунков
      [a1Input, k1Input, angle1Input, a2Input, k2Input, angle2Input].forEach(inp => {
        inp.addEventListener('input', draw);
      });

      // Старт
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    })();
  </script>
</body>
</html>
