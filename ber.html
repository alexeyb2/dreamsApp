<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌀 Две спирали Бернулли</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      background: #05070f;
      color: #0ff;
      font-family: system-ui, -apple-system, sans-serif;
      touch-action: pan-x pan-y;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px;
    }
    h2 {
      font-weight: 400;
      letter-spacing: 2px;
      margin: 0 0 4px;
      font-size: clamp(1rem, 4vw, 1.3rem);
      flex-shrink: 0;
    }
    canvas {
      flex: 1 1 auto;
      width: 100%;
      max-width: 700px;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #000;
      touch-action: none;  /* важно для перетаскивания */
      margin-bottom: 8px;
      min-height: 0;
    }
    .controls {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 700px;
      padding-bottom: 4px;
    }
    .control-block {
      background: rgba(10, 25, 45, 0.95);
      border-radius: 12px;
      padding: 6px 8px;
      border: 1px solid;
      flex: 1 1 0;
      min-width: 130px;
      display: flex;
      flex-direction: column;
    }
    .control-block h3 {
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .control-block button {
      padding: 4px 6px;
      margin-bottom: 6px;
      background: #112;
      color: #0ff;
      border: 1px solid #0ff;
      border-radius: 6px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .control-block button:active {
      background: #0ff;
      color: #000;
    }
    .param {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: #8ff;
      margin: 3px 0 1px;
    }
    .param span {
      color: #0ff;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      margin-bottom: 5px;
      background: #0a1929;
      height: 4px;
      border-radius: 2px;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #0ff;
      border-radius: 50%;
      border: 2px solid #000;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>🌀 Две спирали Бернулли</h2>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <!-- Красная – Копчик -->
    <div class="control-block" style="border-color:#ff3366;">
      <h3 style="color:#ff3366;">🔴 Копчик</h3>
      <button id="dirBtn1" onclick="toggleDir(1)">По часовой</button>
      <div class="param">A <span id="a1_val">15.0</span></div>
      <input type="range" id="a1" min="1" max="40" value="15" step="0.1">
      <div class="param">K <span id="k1_val">0.120</span></div>
      <input type="range" id="k1" min="0.01" max="0.30" value="0.120" step="0.001">
      <div class="param">Длина <span id="len1_val">30</span></div>
      <input type="range" id="len1" min="5" max="120" value="30" step="1">
      <div class="param">Angle (°) <span id="angle1_val">270</span></div>
      <input type="range" id="angle1" min="0" max="360" value="270" step="1">
    </div>

    <!-- Синяя – Сердце -->
    <div class="control-block" style="border-color:#3388ff;">
      <h3 style="color:#3388ff;">🔵 Сердце</h3>
      <button id="dirBtn2" onclick="toggleDir(2)">По часовой</button>
      <div class="param">A <span id="a2_val">15.0</span></div>
      <input type="range" id="a2" min="1" max="40" value="15" step="0.1">
      <div class="param">K <span id="k2_val">0.120</span></div>
      <input type="range" id="k2" min="0.01" max="0.30" value="0.120" step="0.001">
      <div class="param">Длина <span id="len2_val">30</span></div>
      <input type="range" id="len2" min="5" max="120" value="30" step="1">
      <div class="param">Angle (°) <span id="angle2_val">0</span></div>
      <input type="range" id="angle2" min="0" max="360" value="0" step="1">
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // Центры спиралей (перетаскиваются)
      let centerRed = { x: 0, y: 0 };
      let centerBlue = { x: 0, y: 0 };
      let dragging = null; // 'red' или 'blue'

      // Направления вращения (1 — по часовой, -1 — против)
      let dirRed = 1;
      let dirBlue = 1;

      // DOM‑элементы
      const a1 = document.getElementById('a1');
      const k1 = document.getElementById('k1');
      const len1 = document.getElementById('len1');
      const angle1 = document.getElementById('angle1');
      const a1Val = document.getElementById('a1_val');
      const k1Val = document.getElementById('k1_val');
      const len1Val = document.getElementById('len1_val');
      const angle1Val = document.getElementById('angle1_val');

      const a2 = document.getElementById('a2');
      const k2 = document.getElementById('k2');
      const len2 = document.getElementById('len2');
      const angle2 = document.getElementById('angle2');
      const a2Val = document.getElementById('a2_val');
      const k2Val = document.getElementById('k2_val');
      const len2Val = document.getElementById('len2_val');
      const angle2Val = document.getElementById('angle2_val');

      const dirBtn1 = document.getElementById('dirBtn1');
      const dirBtn2 = document.getElementById('dirBtn2');

      // Ключи для localStorage
      const STORAGE_KEY_RED = 'spiral_red_params';
      const STORAGE_KEY_BLUE = 'spiral_blue_params';

      // Значения по умолчанию
      const defaultParamsRed = { a: 15, k: 0.120, len: 30, angle: 270, dir: 1 };
      const defaultParamsBlue = { a: 15, k: 0.120, len: 30, angle: 0, dir: 1 };

      // Загрузка сохранённых параметров
      function loadParams() {
        function load(key, defaults) {
          try {
            const saved = localStorage.getItem(key);
            if (saved) {
              const parsed = JSON.parse(saved);
              return {
                a: parsed.a ?? defaults.a,
                k: parsed.k ?? defaults.k,
                len: parsed.len ?? defaults.len,
                angle: parsed.angle ?? defaults.angle,
                dir: parsed.dir ?? defaults.dir
              };
            }
          } catch (e) {}
          return defaults;
        }

        const red = load(STORAGE_KEY_RED, defaultParamsRed);
        const blue = load(STORAGE_KEY_BLUE, defaultParamsBlue);

        a1.value = red.a;
        k1.value = red.k;
        len1.value = red.len;
        angle1.value = red.angle;
        dirRed = red.dir;
        dirBtn1.textContent = (dirRed === 1) ? 'По часовой' : 'Против часовой';

        a2.value = blue.a;
        k2.value = blue.k;
        len2.value = blue.len;
        angle2.value = blue.angle;
        dirBlue = blue.dir;
        dirBtn2.textContent = (dirBlue === 1) ? 'По часовой' : 'Против часовой';
      }

      // Сохранение текущих параметров
      function saveParams() {
        const red = {
          a: parseFloat(a1.value),
          k: parseFloat(k1.value),
          len: parseFloat(len1.value),
          angle: parseFloat(angle1.value),
          dir: dirRed
        };
        const blue = {
          a: parseFloat(a2.value),
          k: parseFloat(k2.value),
          len: parseFloat(len2.value),
          angle: parseFloat(angle2.value),
          dir: dirBlue
        };
        localStorage.setItem(STORAGE_KEY_RED, JSON.stringify(red));
        localStorage.setItem(STORAGE_KEY_BLUE, JSON.stringify(blue));
      }

      // Начальные позиции центров (проценты)
      const INIT_RED_Y = 0.72;
      const INIT_BLUE_Y = 0.29;

      function resizeCanvas() {
        const titleHeight = document.querySelector('h2').offsetHeight;
        const controlsHeight = document.querySelector('.controls').offsetHeight;
        const maxWidth = Math.min(window.innerWidth - 16, 700);
        const maxHeight = window.innerHeight - titleHeight - controlsHeight - 30;
        const size = Math.min(maxWidth, maxHeight);

        canvas.width = size;
        canvas.height = size;

        if (!dragging && centerRed.x === 0 && centerRed.y === 0) {
          centerRed = { x: size * 0.5, y: size * INIT_RED_Y };
          centerBlue = { x: size * 0.5, y: size * INIT_BLUE_Y };
        } else {
          const oldSize = canvas.width === size ? size : canvas.width;
          centerRed.x = (centerRed.x / oldSize) * size;
          centerRed.y = (centerRed.y / oldSize) * size;
          centerBlue.x = (centerBlue.x / oldSize) * size;
          centerBlue.y = (centerBlue.y / oldSize) * size;
        }
        draw();
      }

      // Рисование спирали Бернулли r = A * exp(K * phi)
      function drawSpiral(cx, cy, A, K, maxPhi, angleDeg, dir, color) {
        const angleRad = angleDeg * Math.PI / 180;
        const step = 0.03;
        const steps = Math.floor(maxPhi / step);

        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
          const phi = i * step;
          if (phi > maxPhi) break;
          const r = A * Math.exp(K * phi);
          const theta = dir * phi + angleRad;
          const x = cx + r * Math.cos(theta);
          const y = cy + r * Math.sin(theta);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = color;
        ctx.shadowBlur = 15;
        ctx.stroke();
      }

      function draw() {
        const redA = parseFloat(a1.value);
        const redK = parseFloat(k1.value);
        const redLen = parseFloat(len1.value);
        const redAngle = parseFloat(angle1.value);
        const blueA = parseFloat(a2.value);
        const blueK = parseFloat(k2.value);
        const blueLen = parseFloat(len2.value);
        const blueAngle = parseFloat(angle2.value);

        a1Val.textContent = redA.toFixed(1);
        k1Val.textContent = redK.toFixed(3);
        len1Val.textContent = redLen;
        angle1Val.textContent = redAngle;
        a2Val.textContent = blueA.toFixed(1);
        k2Val.textContent = blueK.toFixed(3);
        len2Val.textContent = blueLen;
        angle2Val.textContent = blueAngle;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Очень маленькие центры (радиус 4px), без свечения, просто яркие точки
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff3366';
        ctx.beginPath();
        ctx.arc(centerRed.x, centerRed.y, 4, 0, 2 * Math.PI);
        ctx.fill();

        ctx.fillStyle = '#3388ff';
        ctx.beginPath();
        ctx.arc(centerBlue.x, centerBlue.y, 4, 0, 2 * Math.PI);
        ctx.fill();

        drawSpiral(centerRed.x, centerRed.y, redA, redK, redLen, redAngle, dirRed, '#ff3366');
        drawSpiral(centerBlue.x, centerBlue.y, blueA, blueK, blueLen, blueAngle, dirBlue, '#3388ff');

        ctx.shadowBlur = 0;
      }

      window.toggleDir = function(n) {
        if (n === 1) {
          dirRed *= -1;
          dirBtn1.textContent = (dirRed === 1) ? 'По часовой' : 'Против часовой';
        } else {
          dirBlue *= -1;
          dirBtn2.textContent = (dirBlue === 1) ? 'По часовой' : 'Против часовой';
        }
        saveParams();
        draw();
      };

      function onSliderChange() {
        saveParams();
        draw();
      }

      [a1, k1, len1, angle1, a2, k2, len2, angle2].forEach(inp => {
        inp.addEventListener('input', onSliderChange);
      });

      // Универсальные координаты из события (мышь/тач)
      function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: clientX - rect.left,
          y: clientY - rect.top
        };
      }

      // Обработчики указателя с улучшенной механикой
      function onPointerDown(e) {
        // Предотвращаем стандартное поведение только когда попали в точку
        const { x, y } = getCanvasCoords(e);
        const dRed = Math.hypot(x - centerRed.x, y - centerRed.y);
        const dBlue = Math.hypot(x - centerBlue.x, y - centerBlue.y);
        const hitRadius = 40; // большая зона захвата для удобства

        if (dRed < hitRadius) {
          dragging = 'red';
          e.preventDefault(); // блокируем скролл только при перетаскивании
        } else if (dBlue < hitRadius) {
          dragging = 'blue';
          e.preventDefault();
        }
        // Иначе не мешаем скроллу страницы
      }

      function onPointerMove(e) {
        if (!dragging) return;
        e.preventDefault(); // важный вызов, чтобы не скроллилось при перетаскивании
        const { x, y } = getCanvasCoords(e);
        if (dragging === 'red') {
          centerRed = { x, y };
        } else if (dragging === 'blue') {
          centerBlue = { x, y };
        }
        draw();
      }

      function onPointerUp() {
        dragging = null;
      }

      // Используем Pointer Events (современный стандарт)
      canvas.addEventListener('pointerdown', onPointerDown);
      canvas.addEventListener('pointermove', onPointerMove);
      canvas.addEventListener('pointerup', onPointerUp);
      canvas.addEventListener('pointerleave', onPointerUp); // на случай ухода за пределы
      canvas.addEventListener('pointercancel', onPointerUp);

      // Для старых браузеров оставим touch fallback (но pointer включает тач)
      // Дублируем для надежности:
      canvas.addEventListener('touchstart', function(e) {
        // если pointer не сработал, используем тач
        if (dragging) return;
        const { x, y } = getCanvasCoords(e);
        const dRed = Math.hypot(x - centerRed.x, y - centerRed.y);
        const dBlue = Math.hypot(x - centerBlue.x, y - centerBlue.y);
        if (dRed < 40) {
          dragging = 'red';
          e.preventDefault();
        } else if (dBlue < 40) {
          dragging = 'blue';
          e.preventDefault();
        }
      }, { passive: false });

      canvas.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        e.preventDefault();
        const { x, y } = getCanvasCoords(e);
        if (dragging === 'red') {
          centerRed = { x, y };
        } else if (dragging === 'blue') {
          centerBlue = { x, y };
        }
        draw();
      }, { passive: false });

      canvas.addEventListener('touchend', onPointerUp);

      // Инициализация
      loadParams();
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      saveParams(); // чтобы сохранить дефолты при первом запуске
    })();
  </script>
</body>
</html>
