<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌀 Две спирали Бернулли</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #05070f;
      color: #0ff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 8px;
      touch-action: pan-x pan-y;
    }
    h2 {
      font-weight: 400;
      letter-spacing: 2px;
      margin: 0 0 8px;
      font-size: 1.2rem;
    }
    canvas {
      display: block;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #000;
      width: 100%;
      max-width: 700px;
      aspect-ratio: 1 / 1;
      touch-action: none;
      margin-bottom: 8px;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 700px;
    }
    .control-block {
      background: rgba(10, 25, 45, 0.95);
      border-radius: 12px;
      padding: 6px 8px;
      border: 1px solid;
      flex: 1 1 0;
      min-width: 130px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    .control-block h3 {
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .control-block button {
      padding: 4px 6px;
      margin-bottom: 6px;
      background: #112;
      color: #0ff;
      border: 1px solid #0ff;
      border-radius: 6px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .control-block button:active {
      background: #0ff;
      color: #000;
    }
    .param {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: #8ff;
      margin: 3px 0 1px;
    }
    .param span {
      color: #0ff;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      margin-bottom: 5px;
      background: #0a1929;
      height: 4px;
      border-radius: 2px;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #0ff;
      border-radius: 50%;
      border: 2px solid #000;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>🌀 Две спирали Бернулли</h2>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <!-- Красная – Копчик -->
    <div class="control-block" style="border-color:#ff3366;">
      <h3 style="color:#ff3366;">🔴 Копчик</h3>
      <button id="dirBtn1" onclick="toggleDir(1)">По часовой</button>
      <div class="param">A <span id="a1_val">5.0</span></div>
      <input type="range" id="a1" min="2" max="20" value="5" step="0.5">
      <div class="param">K <span id="k1_val">0.12</span></div>
      <input type="range" id="k1" min="0.03" max="0.25" value="0.12" step="0.001">
      <div class="param">Длина <span id="len1_val">25</span></div>
      <input type="range" id="len1" min="5" max="50" value="25" step="1">
      <div class="param">Angle (°) <span id="angle1_val">270</span></div>
      <input type="range" id="angle1" min="0" max="360" value="270" step="1">
    </div>

    <!-- Синяя – Сердце -->
    <div class="control-block" style="border-color:#3388ff;">
      <h3 style="color:#3388ff;">🔵 Сердце</h3>
      <button id="dirBtn2" onclick="toggleDir(2)">По часовой</button>
      <div class="param">A <span id="a2_val">5.0</span></div>
      <input type="range" id="a2" min="2" max="20" value="5" step="0.5">
      <div class="param">K <span id="k2_val">0.12</span></div>
      <input type="range" id="k2" min="0.03" max="0.25" value="0.12" step="0.001">
      <div class="param">Длина <span id="len2_val">25</span></div>
      <input type="range" id="len2" min="5" max="50" value="25" step="1">
      <div class="param">Angle (°) <span id="angle2_val">0</span></div>
      <input type="range" id="angle2" min="0" max="360" value="0" step="1">
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // Перетаскиваемые центры (начальные значения переопределятся в resize)
      let centerRed = { x: 0, y: 0 };
      let centerBlue = { x: 0, y: 0 };
      let dragging = null;

      // Направления вращения
      let dirRed = 1;   // 1 - по часовой, -1 - против
      let dirBlue = 1;

      // Привязка к DOM
      const a1 = document.getElementById('a1');
      const k1 = document.getElementById('k1');
      const len1 = document.getElementById('len1');
      const angle1 = document.getElementById('angle1');
      const a1Val = document.getElementById('a1_val');
      const k1Val = document.getElementById('k1_val');
      const len1Val = document.getElementById('len1_val');
      const angle1Val = document.getElementById('angle1_val');

      const a2 = document.getElementById('a2');
      const k2 = document.getElementById('k2');
      const len2 = document.getElementById('len2');
      const angle2 = document.getElementById('angle2');
      const a2Val = document.getElementById('a2_val');
      const k2Val = document.getElementById('k2_val');
      const len2Val = document.getElementById('len2_val');
      const angle2Val = document.getElementById('angle2_val');

      const dirBtn1 = document.getElementById('dirBtn1');
      const dirBtn2 = document.getElementById('dirBtn2');

      // Позиции по умолчанию (проценты от размера холста)
      const RED_Y = 0.72;
      const BLUE_Y = 0.29;

      function resizeCanvas() {
        const maxSize = Math.min(window.innerWidth - 16, 700);
        canvas.width = maxSize;
        canvas.height = maxSize;

        // Если ещё не перетаскивали – ставим центры по умолчанию
        if (!dragging && centerRed.x === 0 && centerRed.y === 0) {
          centerRed = { x: maxSize * 0.5, y: maxSize * RED_Y };
          centerBlue = { x: maxSize * 0.5, y: maxSize * BLUE_Y };
        } else {
          // Сохраняем относительные координаты при изменении размера
          const oldSize = canvas.width === maxSize ? maxSize : canvas.width;
          centerRed.x = (centerRed.x / oldSize) * maxSize;
          centerRed.y = (centerRed.y / oldSize) * maxSize;
          centerBlue.x = (centerBlue.x / oldSize) * maxSize;
          centerBlue.y = (centerBlue.y / oldSize) * maxSize;
        }
        draw();
      }

      // Рисование спирали Бернулли: r = A * exp(K * phi)
      function drawSpiral(cx, cy, A, K, maxPhi, angleDeg, dir, color) {
        const angleRad = angleDeg * Math.PI / 180;
        const step = 0.03;          // маленький шаг для плавности
        const steps = Math.floor(maxPhi / step);

        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
          const phi = i * step;
          if (phi > maxPhi) break;
          const r = A * Math.exp(K * phi);
          const theta = dir * phi + angleRad;
          const x = cx + r * Math.cos(theta);
          const y = cy + r * Math.sin(theta);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;          // тонкая изящная линия
        ctx.shadowBlur = 0;         // никакого размытия, чтобы не было толстых кругов
        ctx.stroke();
      }

      function draw() {
        // Чтение значений
        const redA = parseFloat(a1.value);
        const redK = parseFloat(k1.value);
        const redLen = parseFloat(len1.value);
        const redAngle = parseFloat(angle1.value);
        const blueA = parseFloat(a2.value);
        const blueK = parseFloat(k2.value);
        const blueLen = parseFloat(len2.value);
        const blueAngle = parseFloat(angle2.value);

        // Обновление подписей
        a1Val.textContent = redA.toFixed(1);
        k1Val.textContent = redK.toFixed(3);
        len1Val.textContent = redLen;
        angle1Val.textContent = redAngle;
        a2Val.textContent = blueA.toFixed(1);
        k2Val.textContent = blueK.toFixed(3);
        len2Val.textContent = blueLen;
        angle2Val.textContent = blueAngle;

        // Очистка
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Рисуем маленькие яркие центры
        ctx.fillStyle = '#ff3366';
        ctx.beginPath();
        ctx.arc(centerRed.x, centerRed.y, 6, 0, 2 * Math.PI);
        ctx.fill();

        ctx.fillStyle = '#3388ff';
        ctx.beginPath();
        ctx.arc(centerBlue.x, centerBlue.y, 6, 0, 2 * Math.PI);
        ctx.fill();

        // Спирали
        drawSpiral(centerRed.x, centerRed.y, redA, redK, redLen, redAngle, dirRed, '#ff3366');
        drawSpiral(centerBlue.x, centerBlue.y, blueA, blueK, blueLen, blueAngle, dirBlue, '#3388ff');
      }

      // Переключение направления
      window.toggleDir = function(n) {
        if (n === 1) {
          dirRed *= -1;
          dirBtn1.textContent = (dirRed === 1) ? 'По часовой' : 'Против часовой';
        } else {
          dirBlue *= -1;
          dirBtn2.textContent = (dirBlue === 1) ? 'По часовой' : 'Против часовой';
        }
        draw();
      };

      // Перетаскивание центров (только touch)
      canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;

        const distRed = Math.hypot(tx - centerRed.x, ty - centerRed.y);
        const distBlue = Math.hypot(tx - centerBlue.x, ty - centerBlue.y);

        if (distRed < 40) dragging = 'red';
        else if (distBlue < 40) dragging = 'blue';
      }, { passive: false });

      canvas.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;

        if (dragging === 'red') {
          centerRed = { x: tx, y: ty };
        } else if (dragging === 'blue') {
          centerBlue = { x: tx, y: ty };
        }
        draw();
      }, { passive: false });

      canvas.addEventListener('touchend', () => { dragging = null; });

      // Слушатели ползунков
      [a1, k1, len1, angle1, a2, k2, len2, angle2].forEach(input => {
        input.addEventListener('input', draw);
      });

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    })();
  </script>
</body>
</html>
