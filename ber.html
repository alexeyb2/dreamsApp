<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🌀 Две спирали Бернулли</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      background: #05070f;
      color: #0ff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px;
    }
    h2 {
      font-weight: 400;
      letter-spacing: 2px;
      margin: 0 0 4px;
      font-size: clamp(1rem, 4vw, 1.3rem);
      flex-shrink: 0;
    }
    canvas {
      flex: 1 1 auto;
      width: 100%;
      max-width: 700px;
      border: 2px solid #0ff;
      border-radius: 20px;
      background: #000;
      touch-action: none;
      margin-bottom: 8px;
      min-height: 0;
    }
    .controls {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 700px;
      padding-bottom: 4px;
    }
    .control-block {
      background: rgba(10, 25, 45, 0.95);
      border-radius: 12px;
      padding: 6px 8px;
      border: 1px solid;
      flex: 1 1 0;
      min-width: 130px;
      display: flex;
      flex-direction: column;
    }
    .control-block h3 {
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 4px;
      font-weight: 600;
    }
    .control-block button {
      padding: 4px 6px;
      margin-bottom: 6px;
      background: #112;
      color: #0ff;
      border: 1px solid #0ff;
      border-radius: 6px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .control-block button:active {
      background: #0ff;
      color: #000;
    }
    .param {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: #8ff;
      margin: 3px 0 1px;
    }
    .param span {
      color: #0ff;
      font-weight: bold;
    }
    input[type="range"] {
      width: 100%;
      margin-bottom: 5px;
      background: #0a1929;
      height: 4px;
      border-radius: 2px;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #0ff;
      border-radius: 50%;
      border: 2px solid #000;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>🌀 Две спирали Бернулли</h2>
  <canvas id="canvas"></canvas>

  <div class="controls">
    <!-- Красная – Копчик -->
    <div class="control-block" style="border-color:#ff3366;">
      <h3 style="color:#ff3366;">🔴 Копчик</h3>
      <button id="dirBtn1" onclick="toggleDir(1)">По часовой</button>
      <div class="param">A <span id="a1_val">2.0</span></div>
      <input type="range" id="a1" min="0.5" max="15" value="2" step="0.1">
      <div class="param">K <span id="k1_val">0.150</span></div>
      <input type="range" id="k1" min="0.05" max="0.30" value="0.150" step="0.001">
      <div class="param">Длина <span id="len1_val">40</span></div>
      <input type="range" id="len1" min="10" max="100" value="40" step="0.5">
      <div class="param">Angle (°) <span id="angle1_val">270</span></div>
      <input type="range" id="angle1" min="0" max="360" value="270" step="1">
    </div>

    <!-- Синяя – Сердце -->
    <div class="control-block" style="border-color:#3388ff;">
      <h3 style="color:#3388ff;">🔵 Сердце</h3>
      <button id="dirBtn2" onclick="toggleDir(2)">По часовой</button>
      <div class="param">A <span id="a2_val">2.0</span></div>
      <input type="range" id="a2" min="0.5" max="15" value="2" step="0.1">
      <div class="param">K <span id="k2_val">0.150</span></div>
      <input type="range" id="k2" min="0.05" max="0.30" value="0.150" step="0.001">
      <div class="param">Длина <span id="len2_val">40</span></div>
      <input type="range" id="len2" min="10" max="100" value="40" step="0.5">
      <div class="param">Angle (°) <span id="angle2_val">0</span></div>
      <input type="range" id="angle2" min="0" max="360" value="0" step="1">
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      // Абсолютные координаты центров (пиксели)
      let centerRed = { x: 0, y: 0 };
      let centerBlue = { x: 0, y: 0 };

      // Относительные координаты (0..1) для сохранения
      let redRelX = 0.5, redRelY = 0.72;
      let blueRelX = 0.5, blueRelY = 0.29;

      let dragging = null; // 'red' или 'blue'

      // Направления вращения
      let dirRed = 1;
      let dirBlue = 1;

      // DOM‑элементы
      const a1 = document.getElementById('a1');
      const k1 = document.getElementById('k1');
      const len1 = document.getElementById('len1');
      const angle1 = document.getElementById('angle1');
      const a1Val = document.getElementById('a1_val');
      const k1Val = document.getElementById('k1_val');
      const len1Val = document.getElementById('len1_val');
      const angle1Val = document.getElementById('angle1_val');

      const a2 = document.getElementById('a2');
      const k2 = document.getElementById('k2');
      const len2 = document.getElementById('len2');
      const angle2 = document.getElementById('angle2');
      const a2Val = document.getElementById('a2_val');
      const k2Val = document.getElementById('k2_val');
      const len2Val = document.getElementById('len2_val');
      const angle2Val = document.getElementById('angle2_val');

      const dirBtn1 = document.getElementById('dirBtn1');
      const dirBtn2 = document.getElementById('dirBtn2');

      const STORAGE_KEY_RED = 'spiral_red_params';
      const STORAGE_KEY_BLUE = 'spiral_blue_params';

      // Значения по умолчанию
      const defaultParamsRed = { a: 2, k: 0.15, len: 40, angle: 270, dir: 1, cx: 0.5, cy: 0.72 };
      const defaultParamsBlue = { a: 2, k: 0.15, len: 40, angle: 0, dir: 1, cx: 0.5, cy: 0.29 };

      function loadParams() {
        function load(key, defaults) {
          try {
            const saved = localStorage.getItem(key);
            if (saved) {
              const p = JSON.parse(saved);
              const cx = (typeof p.cx === 'number' && p.cx >= 0 && p.cx <= 1) ? p.cx : defaults.cx;
              const cy = (typeof p.cy === 'number' && p.cy >= 0 && p.cy <= 1) ? p.cy : defaults.cy;
              return {
                a: p.a ?? defaults.a,
                k: p.k ?? defaults.k,
                len: p.len ?? defaults.len,
                angle: p.angle ?? defaults.angle,
                dir: p.dir ?? defaults.dir,
                cx,
                cy
              };
            }
          } catch (e) {}
          return defaults;
        }

        const red = load(STORAGE_KEY_RED, defaultParamsRed);
        const blue = load(STORAGE_KEY_BLUE, defaultParamsBlue);

        a1.value = red.a;
        k1.value = red.k;
        len1.value = red.len;
        angle1.value = red.angle;
        dirRed = red.dir;
        dirBtn1.textContent = (dirRed === 1) ? 'По часовой' : 'Против часовой';
        redRelX = red.cx;
        redRelY = red.cy;

        a2.value = blue.a;
        k2.value = blue.k;
        len2.value = blue.len;
        angle2.value = blue.angle;
        dirBlue = blue.dir;
        dirBtn2.textContent = (dirBlue === 1) ? 'По часовой' : 'Против часовой';
        blueRelX = blue.cx;
        blueRelY = blue.cy;
      }

      function saveParams() {
        if (canvas.width === 0 || canvas.height === 0) return;

        const redCx = centerRed.x / canvas.width;
        const redCy = centerRed.y / canvas.height;
        const blueCx = centerBlue.x / canvas.width;
        const blueCy = centerBlue.y / canvas.height;

        const red = {
          a: parseFloat(a1.value),
          k: parseFloat(k1.value),
          len: parseFloat(len1.value),
          angle: parseFloat(angle1.value),
          dir: dirRed,
          cx: redCx,
          cy: redCy
        };
        const blue = {
          a: parseFloat(a2.value),
          k: parseFloat(k2.value),
          len: parseFloat(len2.value),
          angle: parseFloat(angle2.value),
          dir: dirBlue,
          cx: blueCx,
          cy: blueCy
        };

        localStorage.setItem(STORAGE_KEY_RED, JSON.stringify(red));
        localStorage.setItem(STORAGE_KEY_BLUE, JSON.stringify(blue));
      }

      function updateCentersFromRel() {
        const w = canvas.width;
        const h = canvas.height;
        if (w === 0 || h === 0) return;
        centerRed.x = w * redRelX;
        centerRed.y = h * redRelY;
        centerBlue.x = w * blueRelX;
        centerBlue.y = h * blueRelY;
      }

      function resizeCanvas() {
        const titleH = document.querySelector('h2').offsetHeight;
        const ctrlH = document.querySelector('.controls').offsetHeight;
        const maxW = Math.min(window.innerWidth - 16, 700);
        const maxH = window.innerHeight - titleH - ctrlH - 30;
        const size = Math.min(maxW, maxH);

        // Сохраняем старые относительные координаты (на случай повторного ресайза)
        if (canvas.width > 0 && canvas.height > 0) {
          redRelX = centerRed.x / canvas.width;
          redRelY = centerRed.y / canvas.height;
          blueRelX = centerBlue.x / canvas.width;
          blueRelY = centerBlue.y / canvas.height;
        }

        canvas.width = size;
        canvas.height = size;
        updateCentersFromRel();
        draw();
      }

      // Рисование логарифмической спирали: r = A * exp(K * phi)
      function drawSpiral(cx, cy, A, K, maxPhi, angleDeg, dir, color) {
        const angleRad = angleDeg * Math.PI / 180;
        const step = 0.03;
        const steps = Math.floor(maxPhi / step);

        ctx.beginPath();
        for (let i = 0; i <= steps; i++) {
          const phi = i * step;
          if (phi > maxPhi) break;
          const r = A * Math.exp(K * phi);
          const theta = dir * phi + angleRad;
          const x = cx + r * Math.cos(theta);
          const y = cy + r * Math.sin(theta);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.shadowColor = color;
        ctx.shadowBlur = 15;
        ctx.stroke();
      }

      function draw() {
        if (canvas.width === 0 || canvas.height === 0) return;

        const redA = parseFloat(a1.value);
        const redK = parseFloat(k1.value);
        const redLen = parseFloat(len1.value);
        const redAngle = parseFloat(angle1.value);
        const blueA = parseFloat(a2.value);
        const blueK = parseFloat(k2.value);
        const blueLen = parseFloat(len2.value);
        const blueAngle = parseFloat(angle2.value);

        a1Val.textContent = redA.toFixed(1);
        k1Val.textContent = redK.toFixed(3);
        len1Val.textContent = redLen.toFixed(1);
        angle1Val.textContent = redAngle;
        a2Val.textContent = blueA.toFixed(1);
        k2Val.textContent = blueK.toFixed(3);
        len2Val.textContent = blueLen.toFixed(1);
        angle2Val.textContent = blueAngle;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Маленькие яркие центры
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff3366';
        ctx.beginPath();
        ctx.arc(centerRed.x, centerRed.y, 4, 0, 2 * Math.PI);
        ctx.fill();

        ctx.fillStyle = '#3388ff';
        ctx.beginPath();
        ctx.arc(centerBlue.x, centerBlue.y, 4, 0, 2 * Math.PI);
        ctx.fill();

        drawSpiral(centerRed.x, centerRed.y, redA, redK, redLen, redAngle, dirRed, '#ff3366');
        drawSpiral(centerBlue.x, centerBlue.y, blueA, blueK, blueLen, blueAngle, dirBlue, '#3388ff');

        ctx.shadowBlur = 0;
      }

      window.toggleDir = function(n) {
        if (n === 1) {
          dirRed *= -1;
          dirBtn1.textContent = (dirRed === 1) ? 'По часовой' : 'Против часовой';
        } else {
          dirBlue *= -1;
          dirBtn2.textContent = (dirBlue === 1) ? 'По часовой' : 'Против часовой';
        }
        saveParams();
        draw();
      };

      function onSliderChange() {
        saveParams();
        draw();
      }

      [a1, k1, len1, angle1, a2, k2, len2, angle2].forEach(inp => {
        inp.addEventListener('input', onSliderChange);
      });

      // Получение координат относительно canvas
      function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top
        };
      }

      // Перетаскивание через Pointer Events
      canvas.addEventListener('pointerdown', function(e) {
        const { x, y } = getCanvasCoords(e);
        const dRed = Math.hypot(x - centerRed.x, y - centerRed.y);
        const dBlue = Math.hypot(x - centerBlue.x, y - centerBlue.y);
        const hitRadius = 50;

        if (dRed < hitRadius) {
          dragging = 'red';
          canvas.setPointerCapture(e.pointerId);
          e.preventDefault();
        } else if (dBlue < hitRadius) {
          dragging = 'blue';
          canvas.setPointerCapture(e.pointerId);
          e.preventDefault();
        }
      });

      canvas.addEventListener('pointermove', function(e) {
        if (!dragging) return;
        e.preventDefault();
        const { x, y } = getCanvasCoords(e);
        if (dragging === 'red') {
          centerRed.x = x;
          centerRed.y = y;
        } else if (dragging === 'blue') {
          centerBlue.x = x;
          centerBlue.y = y;
        }
        draw();
      });

      function onPointerUp(e) {
        if (dragging) {
          if (canvas.width > 0 && canvas.height > 0) {
            redRelX = centerRed.x / canvas.width;
            redRelY = centerRed.y / canvas.height;
            blueRelX = centerBlue.x / canvas.width;
            blueRelY = centerBlue.y / canvas.height;
          }
          saveParams();
          dragging = null;
        }
      }

      canvas.addEventListener('pointerup', onPointerUp);
      canvas.addEventListener('pointerleave', onPointerUp);
      canvas.addEventListener('pointercancel', onPointerUp);

      // Инициализация
      loadParams();
      resizeCanvas();
      saveParams(); // чтобы дефолтные координаты попали в localStorage

      window.addEventListener('resize', resizeCanvas);
    })();
  </script>
</body>
</html>
