<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 Две спирали Бернулли</title>
<style>
  body { margin:0; padding:15px; background:#05070f; color:#0ff; font-family:sans-serif; text-align:center; touch-action:none; }
  canvas { border:2px solid #0ff; border-radius:16px; background:#000; max-width:100%; touch-action:none; display:block; margin:10px auto; }
  .controls { max-width:700px; margin:15px auto; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .card { background:rgba(10,25,45,0.95); padding:15px; border-radius:14px; border:1px solid #0ff; flex: 1 1 250px; min-width:220px; }
  .label { color:#8ff; margin:8px 0 4px; font-size:15px; }
  .value { color:#0ff; font-weight:bold; }
  button { padding:10px 16px; margin:5px 3px; background:#112; color:#0ff; border:1px solid #0ff; border-radius:8px; font-size:14px; }
  button.active { background:#0ff; color:#000; }
</style>
</head>
<body>

<h1>🌀 Две спирали Бернулли</h1>
<canvas id="c"></canvas>

<div class="controls">
  <div class="card" style="border-color:#ff3366;">
    <div style="color:#ff3366; font-size:18px; font-weight:bold;">🔴 Красная — Копчик</div>
    <div class="label">Сила старта (a) <span class="value" id="a1_val">11.0</span></div>
    <input type="range" id="a1" min="3" max="28" value="11" step="0.1">
    <div class="label">Угол α (°) <span class="value" id="angle1_val">84</span></div>
    <input type="range" id="angle1" min="1" max="89" value="84" step="0.5">
    <button onclick="toggleDir(1)" id="dir1">По часовой</button>
  </div>

  <div class="card" style="border-color:#3388ff;">
    <div style="color:#3388ff; font-size:18px; font-weight:bold;">🔵 Синяя — Сердце</div>
    <div class="label">Сила старта (a) <span class="value" id="a2_val">11.0</span></div>
    <input type="range" id="a2" min="3" max="28" value="11" step="0.1">
    <div class="label">Угол α (°) <span class="value" id="angle2_val">84</span></div>
    <input type="range" id="angle2" min="1" max="89" value="84" step="0.5">
    <button onclick="toggleDir(2)" id="dir2">По часовой</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let centerRed = {x:400, y:550};
let centerBlue = {x:400, y:250};
let dragging = null;
let dir1 = 1;
let dir2 = 1;

function resize() {
  const size = Math.min(window.innerWidth - 30, 750);
  canvas.width = size;
  canvas.height = size;
  centerRed = {x: size/2, y: size * 0.72};
  centerBlue = {x: size/2, y: size * 0.29};
}

function draw() {
  const a1 = parseFloat(document.getElementById('a1').value);
  const angle1 = parseFloat(document.getElementById('angle1').value);
  const k1 = 1 / Math.tan(angle1 * Math.PI / 180);
  const a2 = parseFloat(document.getElementById('a2').value);
  const angle2 = parseFloat(document.getElementById('angle2').value);
  const k2 = 1 / Math.tan(angle2 * Math.PI / 180);

  document.getElementById('a1_val').textContent = a1.toFixed(1);
  document.getElementById('angle1_val').textContent = angle1.toFixed(1);
  document.getElementById('a2_val').textContent = a2.toFixed(1);
  document.getElementById('angle2_val').textContent = angle2.toFixed(1);

  ctx.fillStyle = '#05070f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.shadowBlur = 30;

  // Центры
  ctx.fillStyle = '#ff3366';
  ctx.shadowColor = '#ff3366';
  ctx.beginPath();
  ctx.arc(centerRed.x, centerRed.y, 18, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#3388ff';
  ctx.shadowColor = '#3388ff';
  ctx.beginPath();
  ctx.arc(centerBlue.x, centerBlue.y, 18, 0, Math.PI*2);
  ctx.fill();

  // Красная спираль
  ctx.strokeStyle = '#ff3366';
  ctx.lineWidth = 5;
  ctx.shadowBlur = 35;
  ctx.shadowColor = '#ff3366';
  ctx.beginPath();
  for(let i = 0; i < 340; i++) {
    const t = i * 0.03;
    const r = a1 * Math.pow(Math.E, k1 * t);
    const x = centerRed.x + r * Math.sin(t * dir1);
    const y = centerRed.y - r * Math.cos(t * dir1) - t*3.2;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Синяя спираль
  ctx.strokeStyle = '#3388ff';
  ctx.shadowColor = '#3388ff';
  ctx.beginPath();
  for(let i = 0; i < 340; i++) {
    const t = i * 0.03;
    const r = a2 * Math.pow(Math.E, k2 * t);
    const x = centerBlue.x + r * Math.cos(t * dir2);
    const y = centerBlue.y + r * Math.sin(t * dir2);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();
}

function toggleDir(n) {
  if (n === 1) {
    dir1 *= -1;
    document.getElementById('dir1').textContent = dir1 === 1 ? "По часовой" : "Против часовой";
  } else {
    dir2 *= -1;
    document.getElementById('dir2').textContent = dir2 === 1 ? "По часовой" : "Против часовой";
  }
  draw();
}

canvas.addEventListener('touchstart', e => {
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;

  const distRed = Math.hypot(tx - centerRed.x, ty - centerRed.y);
  const distBlue = Math.hypot(tx - centerBlue.x, ty - centerBlue.y);

  if (distRed < 60) dragging = 1;
  else if (distBlue < 60) dragging = 2;
});

canvas.addEventListener('touchmove', e => {
  if (!dragging) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;

  if (dragging === 1) centerRed = {x: tx, y: ty};
  if (dragging === 2) centerBlue = {x: tx, y: ty};
  draw();
});

canvas.addEventListener('touchend', () => dragging = null);

document.querySelectorAll('input').forEach(sl => sl.addEventListener('input', draw));

resize();
draw();
window.addEventListener('resize', () => { resize(); draw(); });
</script>
</body>
</html>
