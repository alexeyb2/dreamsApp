<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 Две спирали Бернулли</title>
<style>
  body { margin:0; padding:15px; background:#05070f; color:#0ff; font-family:sans-serif; text-align:center; touch-action:none; }
  canvas { border:2px solid #0ff; border-radius:16px; background:#000; max-width:100%; touch-action:none; display:block; margin:10px auto; }
  .controls { max-width:800px; margin:15px auto; display:flex; flex-wrap:nowrap; gap:10px; justify-content:center; overflow-x:auto; }
  .card { background:rgba(10,25,45,0.95); padding:12px; border-radius:14px; border:1px solid #0ff; flex: 1 1 0; min-width:220px; }
  .label { color:#8ff; margin:6px 0 2px; font-size:14px; }
  .value { color:#0ff; font-weight:bold; }
  button { padding:10px 16px; margin:5px 3px; background:#112; color:#0ff; border:1px solid #0ff; border-radius:8px; font-size:14px; cursor:pointer; }
  button.active { background:#0ff; color:#000; }
  @media (max-width: 520px) {
    .controls { flex-wrap:wrap; }
  }
</style>
</head>
<body>

<h1>🌀 Две спирали Бернулли</h1>
<canvas id="c"></canvas>

<div class="controls">
  <!-- Красная спираль -->
  <div class="card" style="border-color:#ff3366;">
    <div style="color:#ff3366; font-size:18px; font-weight:bold;">🔴 Копчик</div>
    <div class="label">Центр X (%) <span class="value" id="x1_val">50</span></div>
    <input type="range" id="x1" min="0" max="100" value="50" step="0.5">
    <div class="label">Центр Y (%) <span class="value" id="y1_val">72</span></div>
    <input type="range" id="y1" min="0" max="100" value="72" step="0.5">
    <div class="label">Сила старта a <span class="value" id="a1_val">11.0</span></div>
    <input type="range" id="a1" min="3" max="28" value="11" step="0.1">
    <div class="label">Угол α (°) <span class="value" id="angle1_val">84</span></div>
    <input type="range" id="angle1" min="1" max="89" value="84" step="0.5">
    <button onclick="toggleDir(1)" id="dir1">По часовой</button>
  </div>

  <!-- Синяя спираль -->
  <div class="card" style="border-color:#3388ff;">
    <div style="color:#3388ff; font-size:18px; font-weight:bold;">🔵 Сердце</div>
    <div class="label">Центр X (%) <span class="value" id="x2_val">50</span></div>
    <input type="range" id="x2" min="0" max="100" value="50" step="0.5">
    <div class="label">Центр Y (%) <span class="value" id="y2_val">29</span></div>
    <input type="range" id="y2" min="0" max="100" value="29" step="0.5">
    <div class="label">Сила старта a <span class="value" id="a2_val">11.0</span></div>
    <input type="range" id="a2" min="3" max="28" value="11" step="0.1">
    <div class="label">Угол α (°) <span class="value" id="angle2_val">84</span></div>
    <input type="range" id="angle2" min="1" max="89" value="84" step="0.5">
    <button onclick="toggleDir(2)" id="dir2">По часовой</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Процентные координаты центров (будут синхронизированы)
let pRedX = 50, pRedY = 72;
let pBlueX = 50, pBlueY = 29;

let centerRed = {x:0, y:0};
let centerBlue = {x:0, y:0};
let dragging = null;
let dir1 = 1, dir2 = 1;

function resize() {
  const size = Math.min(window.innerWidth - 30, 750);
  canvas.width = size;
  canvas.height = size;
  updateCentersFromPercent();
}

function updateCentersFromPercent() {
  const w = canvas.width;
  const h = canvas.height;
  centerRed = {x: w * pRedX / 100, y: h * pRedY / 100};
  centerBlue = {x: w * pBlueX / 100, y: h * pBlueY / 100};
}

function syncSlidersFromCenters() {
  const w = canvas.width;
  const h = canvas.height;
  // Обновляем процентные значения
  pRedX = (centerRed.x / w) * 100;
  pRedY = (centerRed.y / h) * 100;
  pBlueX = (centerBlue.x / w) * 100;
  pBlueY = (centerBlue.y / h) * 100;

  document.getElementById('x1').value = pRedX;
  document.getElementById('y1').value = pRedY;
  document.getElementById('x2').value = pBlueX;
  document.getElementById('y2').value = pBlueY;

  document.getElementById('x1_val').textContent = pRedX.toFixed(1);
  document.getElementById('y1_val').textContent = pRedY.toFixed(1);
  document.getElementById('x2_val').textContent = pBlueX.toFixed(1);
  document.getElementById('y2_val').textContent = pBlueY.toFixed(1);
}

function draw() {
  // Параметры красной
  const a1 = parseFloat(document.getElementById('a1').value);
  const angle1 = parseFloat(document.getElementById('angle1').value);
  const k1 = 1 / Math.tan(angle1 * Math.PI / 180);
  // Параметры синей
  const a2 = parseFloat(document.getElementById('a2').value);
  const angle2 = parseFloat(document.getElementById('angle2').value);
  const k2 = 1 / Math.tan(angle2 * Math.PI / 180);

  document.getElementById('a1_val').textContent = a1.toFixed(1);
  document.getElementById('angle1_val').textContent = angle1.toFixed(1);
  document.getElementById('a2_val').textContent = a2.toFixed(1);
  document.getElementById('angle2_val').textContent = angle2.toFixed(1);

  // Синхронизируем слайдеры центра с текущими координатами (на случай перетаскивания)
  syncSlidersFromCenters();

  ctx.fillStyle = '#05070f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.shadowBlur = 30;

  // Рисуем точки центров
  ctx.fillStyle = '#ff3366';
  ctx.shadowColor = '#ff3366';
  ctx.beginPath();
  ctx.arc(centerRed.x, centerRed.y, 18, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#3388ff';
  ctx.shadowColor = '#3388ff';
  ctx.beginPath();
  ctx.arc(centerBlue.x, centerBlue.y, 18, 0, Math.PI*2);
  ctx.fill();

  // Красная спираль
  ctx.strokeStyle = '#ff3366';
  ctx.lineWidth = 5;
  ctx.shadowBlur = 35;
  ctx.shadowColor = '#ff3366';
  ctx.beginPath();
  for(let i = 0; i < 340; i++) {
    const t = i * 0.03;
    const r = a1 * Math.pow(Math.E, k1 * t);
    const x = centerRed.x + r * Math.sin(t * dir1);
    const y = centerRed.y - r * Math.cos(t * dir1) - t*3.2;
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();

  // Синяя спираль
  ctx.strokeStyle = '#3388ff';
  ctx.shadowColor = '#3388ff';
  ctx.beginPath();
  for(let i = 0; i < 340; i++) {
    const t = i * 0.03;
    const r = a2 * Math.pow(Math.E, k2 * t);
    const x = centerBlue.x + r * Math.cos(t * dir2);
    const y = centerBlue.y + r * Math.sin(t * dir2);
    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();
}

function toggleDir(n) {
  if (n === 1) {
    dir1 *= -1;
    document.getElementById('dir1').textContent = dir1 === 1 ? "По часовой" : "Против часовой";
  } else {
    dir2 *= -1;
    document.getElementById('dir2').textContent = dir2 === 1 ? "По часовой" : "Против часовой";
  }
  draw();
}

// Обработчики ползунков координат
function setupCoordSliders() {
  const sliders = ['x1','y1','x2','y2'];
  sliders.forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      // Обновляем процентные значения
      pRedX = parseFloat(document.getElementById('x1').value);
      pRedY = parseFloat(document.getElementById('y1').value);
      pBlueX = parseFloat(document.getElementById('x2').value);
      pBlueY = parseFloat(document.getElementById('y2').value);
      updateCentersFromPercent();
      draw();
    });
  });
}

// Перетаскивание центров
canvas.addEventListener('touchstart', e => {
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;

  const distRed = Math.hypot(tx - centerRed.x, ty - centerRed.y);
  const distBlue = Math.hypot(tx - centerBlue.x, ty - centerBlue.y);

  if (distRed < 60) dragging = 1;
  else if (distBlue < 60) dragging = 2;
});

canvas.addEventListener('touchmove', e => {
  if (!dragging) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const tx = touch.clientX - rect.left;
  const ty = touch.clientY - rect.top;

  if (dragging === 1) centerRed = {x: tx, y: ty};
  if (dragging === 2) centerBlue = {x: tx, y: ty};
  draw();  // draw() внутри вызовет syncSlidersFromCenters, обновив ползунки
});

canvas.addEventListener('touchend', () => dragging = null);

// Остальные слайдеры
document.querySelectorAll('input').forEach(sl => {
  if (!['x1','y1','x2','y2'].includes(sl.id)) {
    sl.addEventListener('input', draw);
  }
});

setupCoordSliders();
resize();
draw();
window.addEventListener('resize', () => { resize(); draw(); });
</script>
</body>
</html>
