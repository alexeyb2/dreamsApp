<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Конструктор Сил</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; font-family: system-ui, sans-serif; }
        #canvas { 
            position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            display: block; cursor: grab; 
            background: radial-gradient(circle at center, #131022 0%, #08060e 100%);
        }
        #ui-panel {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 10px; pointer-events: none;
        }
        .btn-group {
            background: rgba(22,17,39,0.85); 
            padding: 10px 20px; border-radius: 40px;
            backdrop-filter: blur(8px); border: 1px solid #3a2f5a;
            display: flex; gap: 12px; pointer-events: auto;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff;
            padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .stats-panel {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
            background: rgba(22,17,39,0.85); padding: 8px 16px; border-radius: 40px;
            backdrop-filter: blur(8px); border: 1px solid #3a2f5a; pointer-events: auto;
        }
        .tag { font-size: 13px; font-weight: 500; padding: 2px 10px; border-radius: 12px; background: rgba(0,0,0,0.3); white-space: nowrap; }
        .center-info { color: #ffcc00; font-weight: bold; }
        
        #hint { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); 
                color: rgba(255,255,255,0.5); font-size: 14px; pointer-events: none; 
                background: rgba(0,0,0,0.4); padding: 4px 16px; border-radius: 30px; }

        #edit-panel {
            display: none;
            background: rgba(16, 13, 30, 0.95); backdrop-filter: blur(12px);
            border: 1px solid #3a2f5a; border-radius: 30px; padding: 12px 18px;
            width: 90%; max-width: 420px; pointer-events: auto;
            flex-direction: column; gap: 10px;
        }
        #edit-panel input, #edit-panel select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            color: #fff; padding: 6px 10px; font-size: 14px; outline: none;
        }
        #edit-panel select { cursor: pointer; }
        #edit-panel input[type="color"] { width: 40px; height: 40px; padding: 2px; border-radius: 50%; cursor: pointer; }
        #edit-panel input[type="range"] { flex: 1; accent-color: #6f52c4; }
        .edit-label { font-size: 11px; opacity: 0.6; margin-right: -4px; }
        .edit-row { display: flex; gap: 8px; align-items: center; width: 100%; justify-content: space-between; }
        .btn-del { background: #a03a3a; color: #fff; border-radius: 50%; width: 32px; height: 32px; border: none; cursor: pointer; }

        @media (max-width: 600px) { #edit-panel { padding: 10px; } }
    </style>
</head>
<body>
    <div id="hint">👆 Привяжи силу к зоне. Кольцо сместится, якорь останется на месте.</div>
    <canvas id="canvas"></canvas>

    <div id="ui-panel">
        <div class="stats-panel">
            <span class="center-info">⚖️ Центр: <span id="center-coords">(0.0, 0.0)</span></span>
            <span class="tag" id="total-points">Точек: 0</span>
        </div>

        <div id="edit-panel">
            <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:5px;">
                <span style="font-size:14px; color:#b8a6ff;">⚙️ Редактирование</span>
                <button id="close-edit-btn" style="background:transparent; border:none; color:#fff; font-size:18px; cursor:pointer; margin-top:-4px;">✖</button>
            </div>
            <div class="edit-row">
                <input type="text" id="edit-emoji" placeholder="😈" style="width: 45px; text-align: center;" />
                <input type="text" id="edit-name" placeholder="Имя силы" style="flex: 1;" />
                <input type="color" id="edit-color" />
                <button class="btn-del" id="del-point-btn">✕</button>
            </div>
            <div class="edit-row">
                <span class="edit-label">📍 Зона</span>
                <select id="edit-bodypart">
                    <option value="">— Свободная —</option>
                    <option value="голова">🟣 Голова</option>
                    <option value="шея">🔵 Шея</option>
                    <option value="грудь">🟢 Грудь</option>
                    <option value="живот">🟠 Живот</option>
                </select>
            </div>
            <div class="edit-row">
                <span class="edit-label">🔮 Размер (Сила)</span>
                <input type="range" id="edit-size" min="10" max="80" value="30" />
                <span id="edit-size-val" style="min-width: 30px; text-align: center;">30</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn" id="edit-toggle-btn">⚙️ Правка</button>
            <button class="btn" id="add-pair-btn">➕ Пара</button>
            <button class="btn" id="reset-btn">🔄 Сброс</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let w, h, cx, cy;
        let points = [];
        let pointIdCounter = 0;
        let center = { x: 0, y: 0 };
        
        let isDragging = false;
        let draggedPoint = null;
        let startMouse = { x: 0, y: 0 };
        let startPointPos = { x: 0, y: 0 };

        let selectedPoint = null;
        let isEditPanelVisible = false;

        const editPanel = document.getElementById('edit-panel');
        const closeEditBtn = document.getElementById('close-edit-btn');
        const editToggleBtn = document.getElementById('edit-toggle-btn');
        const editEmoji = document.getElementById('edit-emoji');
        const editName = document.getElementById('edit-name');
        const editColor = document.getElementById('edit-color');
        const editBodypart = document.getElementById('edit-bodypart');
        const editSize = document.getElementById('edit-size');
        const editSizeVal = document.getElementById('edit-size-val');
        const delBtn = document.getElementById('del-point-btn');

        // 1. Статические якоря и подвижные кольца
        let bodyZones = [
            { id: 'голова', anchorX: 0, anchorY: -0.35, x: 0, y: -0.35, color: '#9b59b6', outerR: 0.1, innerR: 0.045, attached: [] },
            { id: 'шея', anchorX: 0, anchorY: -0.18, x: 0, y: -0.18, color: '#5dade2', outerR: 0.08, innerR: 0.035, attached: [] },
            { id: 'грудь', anchorX: 0, anchorY: 0, x: 0, y: 0, color: '#2ecc71', outerR: 0.1, innerR: 0.045, attached: [] },
            { id: 'живот', anchorX: 0, anchorY: 0.18, x: 0, y: 0.18, color: '#e67e22', outerR: 0.09, innerR: 0.04, attached: [] }
        ];

        function getBodyCoord(bodyPart) {
            const found = bodyZones.find(m => m.id === bodyPart);
            return found || null;
        }

        function getNewPair() {
            const id1 = pointIdCounter++;
            const id2 = pointIdCounter++;
            const hue1 = Math.random() * 360;
            const hue2 = (hue1 + 180) % 360;
            return [
                { id: id1, x: -80, y: -20, color: `hsl(${hue1}, 80%, 60%)`, emoji: '🔥', label: 'Сила 1', radius: 30, bodyPart: '' },
                { id: id2, x: 80, y: 20, color: `hsl(${hue2}, 80%, 60%)`, emoji: '💧', label: 'Сила 2', radius: 30, bodyPart: '' }
            ];
        }

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            cx = w / 2;
            cy = h / 2;
            if (!center.x && !center.y) { center.x = cx; center.y = cy; }
            draw();
        }

        function updateBodyZones() {
            bodyZones.forEach(z => z.attached = []);
            points.forEach(p => { if (p.bodyPart) { const zone = bodyZones.find(z => z.id === p.bodyPart); if (zone) zone.attached.push(p); } });

            bodyZones.forEach(z => {
                let totalWeight = 0;
                let dispX = 0, dispY = 0;
                
                z.attached.forEach(p => {
                    const px = (p.x - cx) / w;
                    const py = (p.y - cy) / h;
                    const weight = p.radius / 30;
                    dispX += (px - z.anchorX) * weight;
                    dispY += (py - z.anchorY) * weight;
                    totalWeight += weight;
                });

                let targetX = z.anchorX, targetY = z.anchorY;
                if (totalWeight > 0) {
                    // Кольцо смещается от якоря в сторону сил
                    const avgX = dispX / totalWeight;
                    const avgY = dispY / totalWeight;
                    // Ограничиваем максимальное смещение кольца, чтобы оно не улетало далеко
                    const maxOffset = 0.15; 
                    const dist = Math.sqrt(avgX*avgX + avgY*avgY);
                    const limitedX = dist > maxOffset ? (avgX / dist) * maxOffset : avgX;
                    const limitedY = dist > maxOffset ? (avgY / dist) * maxOffset : avgY;
                    targetX = z.anchorX + limitedX;
                    targetY = z.anchorY + limitedY;
                } else {
                    // Если сил нет, мягко возвращаемся строго на якорь
                    targetX = z.anchorX;
                    targetY = z.anchorY;
                }

                // Плавная физика движения к цели
                z.x += (targetX - z.x) * 0.06;
                z.y += (targetY - z.y) * 0.06;
            });
        }

        function drawZones() {
            bodyZones.forEach(z => {
                const ax = cx + z.anchorX * w;
                const ay = cy + z.anchorY * h;
                const mx = cx + z.x * w;
                const my = cy + z.y * h;
                const outer = z.outerR * Math.min(w, h);
                const inner = z.innerR * Math.min(w, h);

                // 1. Рисуем подвижное кольцо (шар с дыркой)
                ctx.beginPath();
                ctx.arc(mx, my, outer, 0, Math.PI * 2, false);
                ctx.arc(mx, my, inner, 0, Math.PI * 2, true);
                ctx.closePath();
                
                ctx.fillStyle = z.color;
                ctx.shadowColor = z.color;
                ctx.shadowBlur = 30;
                ctx.globalAlpha = 0.5;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;

                // Подпись зоны над кольцом
                ctx.font = 'bold 11px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.fillText(z.id.charAt(0).toUpperCase() + z.id.slice(1), mx, my - outer - 6);

                // 2. Рисуем неподвижный якорь (белая точка, которая не двигается)
                ctx.beginPath();
                ctx.arc(ax, ay, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            drawZones();

            points.forEach(p => {
                ctx.beginPath();
                ctx.moveTo(center.x, center.y);
                ctx.lineTo(p.x, p.y);
                ctx.strokeStyle = p.color;
                ctx.globalAlpha = 0.2 + (p.radius / 100);
                ctx.lineWidth = 1.5 + (p.radius / 30);
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            });

            points.forEach(p => {
                const isSelected = (selectedPoint && selectedPoint.id === p.id);
                const radius = p.radius;

                if (isSelected) {
                    ctx.shadowColor = '#fff';
                    ctx.shadowBlur = 30;
                }

                const grad = ctx.createRadialGradient(p.x - 5, p.y - 5, 0, p.x, p.y, radius + 12);
                grad.addColorStop(0, p.color);
                grad.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius + 10, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.shadowBlur = 0;

                const fontSize = Math.max(20, radius * 1.2);
                ctx.font = `${fontSize}px "Segoe UI Emoji", "Apple Color Emoji"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.emoji, p.x, p.y - 4);

                ctx.font = 'bold 12px system-ui';
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(0,0,0,0.9)';
                ctx.shadowBlur = 8;
                ctx.fillText(p.label, p.x, p.y + radius + 14);
                ctx.shadowBlur = 0;
            });

            ctx.shadowColor = 'rgba(255, 204, 0, 0.8)';
            ctx.shadowBlur = 40;
            ctx.beginPath();
            ctx.arc(center.x, center.y, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc00';
            ctx.fill();
            ctx.shadowBlur = 0;

            document.getElementById('center-coords').textContent = 
                `(${Math.round(center.x - cx)}, ${Math.round(center.y - cy)})`;
            document.getElementById('total-points').textContent = `Точек: ${points.length}`;
        }

        function updatePhysics() {
            if (points.length === 0) return;
            let totalWeight = 0;
            let weightedX = 0;
            let weightedY = 0;
            points.forEach(p => {
                const dx = p.x - center.x;
                const dy = p.y - center.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const strength = Math.max(0, dist - 10) * (p.radius / 25);
                weightedX += p.x * strength;
                weightedY += p.y * strength;
                totalWeight += strength;
            });
            if (totalWeight > 0) {
                const targetX = weightedX / totalWeight;
                const targetY = weightedY / totalWeight;
                center.x += (targetX - center.x) * 0.04;
                center.y += (targetY - center.y) * 0.04;
            }
        }

        function physicsLoop() {
            updateBodyZones();
            updatePhysics();
            draw();
            requestAnimationFrame(physicsLoop);
        }

        // ============= ИНТЕРАКТИВНОСТЬ =============
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function checkHit(pointer) {
            for (let i = points.length - 1; i >= 0; i--) {
                const p = points[i];
                const dist = Math.hypot(pointer.x - p.x, pointer.y - p.y);
                if (dist < p.radius + 20) return p;
            }
            return null;
        }

        canvas.addEventListener('pointerdown', (e) => {
            const pos = getPointerPos(e);
            const hit = checkHit(pos);
            if (hit) {
                isDragging = true;
                draggedPoint = hit;
                startMouse = pos;
                startPointPos = { x: hit.x, y: hit.y };
                canvas.style.cursor = 'grabbing';
                selectPoint(hit);
            } else { selectPoint(null); }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging || !draggedPoint) return;
            const pos = getPointerPos(e);
            const dx = pos.x - startMouse.x;
            const dy = pos.y - startMouse.y;
            draggedPoint.x = Math.max(10, Math.min(w - 10, startPointPos.x + dx));
            draggedPoint.y = Math.max(10, Math.min(h - 10, startPointPos.y + dy));
            if (draggedPoint.bodyPart) {
                draggedPoint.bodyPart = '';
                if (isEditPanelVisible && selectedPoint && selectedPoint.id === draggedPoint.id) {
                    editBodypart.value = '';
                }
            }
            saveToLocal();
        });

        window.addEventListener('pointerup', () => {
            if (isDragging) {
                isDragging = false;
                draggedPoint = null;
                canvas.style.cursor = 'grab';
                saveToLocal();
            }
        });

        // ============= РЕДАКТИРОВАНИЕ =============
        function selectPoint(point) {
            selectedPoint = point;
            if (point && isEditPanelVisible) {
                editEmoji.value = point.emoji;
                editName.value = point.label;
                editColor.value = point.color;
                editBodypart.value = point.bodyPart || '';
                editSize.value = point.radius;
                editSizeVal.textContent = point.radius;
            } else {
                isEditPanelVisible = false;
                editPanel.style.display = 'none';
            }
        }

        function updateSelectedPoint() {
            if (!selectedPoint) return;
            selectedPoint.emoji = editEmoji.value.trim() || '👾';
            selectedPoint.label = editName.value.trim() || 'Без имени';
            selectedPoint.color = editColor.value;
            selectedPoint.radius = parseInt(editSize.value);
            editSizeVal.textContent = selectedPoint.radius;
            const newBodyPart = editBodypart.value;
            if (newBodyPart !== selectedPoint.bodyPart) {
                selectedPoint.bodyPart = newBodyPart;
                if (newBodyPart) {
                    const zone = getBodyCoord(newBodyPart);
                    if (zone) {
                        // Привязываем ровно к текущему положению кольца (чтобы не было скачка)
                        selectedPoint.x = cx + zone.x * w;
                        selectedPoint.y = cy + zone.y * h;
                    }
                }
            }
            saveToLocal();
        }

        editToggleBtn.addEventListener('click', () => {
            if (!selectedPoint) { alert('Сначала коснитесь точки!'); return; }
            isEditPanelVisible = !isEditPanelVisible;
            editPanel.style.display = isEditPanelVisible ? 'flex' : 'none';
            if (isEditPanelVisible) {
                editEmoji.value = selectedPoint.emoji;
                editName.value = selectedPoint.label;
                editColor.value = selectedPoint.color;
                editBodypart.value = selectedPoint.bodyPart || '';
                editSize.value = selectedPoint.radius;
                editSizeVal.textContent = selectedPoint.radius;
            }
        });

        closeEditBtn.addEventListener('click', () => { isEditPanelVisible = false; editPanel.style.display = 'none'; });
        editEmoji.addEventListener('input', updateSelectedPoint);
        editName.addEventListener('input', updateSelectedPoint);
        editColor.addEventListener('input', updateSelectedPoint);
        editBodypart.addEventListener('change', updateSelectedPoint);
        editSize.addEventListener('input', updateSelectedPoint);

        delBtn.addEventListener('click', () => {
            if (!selectedPoint) return;
            const index = points.findIndex(p => p.id === selectedPoint.id);
            if (index !== -1) {
                points.splice(index, 1);
                selectPoint(null);
                isEditPanelVisible = false;
                editPanel.style.display = 'none';
                saveToLocal();
            }
        });

        // ============= ДОБАВЛЕНИЕ И СОХРАНЕНИЕ =============
        function addPair() {
            const newPoints = getNewPair();
            newPoints[0].x = center.x - 90; newPoints[0].y = center.y - (Math.random() * 40 - 20);
            newPoints[1].x = center.x + 90; newPoints[1].y = center.y - (Math.random() * 40 - 20);
            points.push(...newPoints);
            saveToLocal();
        }

        function resetAll() {
            if (confirm('Сбросить все точки?')) {
                localStorage.removeItem('dreams_state_0');
                localStorage.removeItem('dreams_config');
                location.reload();
            }
        }

        function saveToLocal() {
            const data = { points, centerX: center.x, centerY: center.y, idCounter: pointIdCounter };
            localStorage.setItem('dreams_state_0', JSON.stringify(data));
        }

        function loadFromLocal() {
            const raw = localStorage.getItem('dreams_state_0');
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                points = data.points || [];
                center.x = data.centerX || w/2;
                center.y = data.centerY || h/2;
                pointIdCounter = data.idCounter || 0;
                return true;
            } catch { return false; }
        }

        function loadFromOnboarding() {
            const raw = localStorage.getItem('dreams_config');
            if (!raw) return false;
            try {
                const config = JSON.parse(raw);
                const id1 = pointIdCounter++; const id2 = pointIdCounter++;
                const zone = getBodyCoord(config.bodyPart) || getBodyCoord('грудь');
                const x1 = cx + (zone?.anchorX || 0) * w;
                const y1 = cy + (zone?.anchorY || 0) * h;
                const p1 = { id: id1, x: x1, y: y1, color: '#4d8bff', emoji: config.emoji || '😌', label: config.feeling || 'Чувство', radius: Math.min(30 + config.power / 4, 60), bodyPart: config.bodyPart || 'грудь' };
                const p2 = { id: id2, x: cx + (zone?.anchorX ? -zone.anchorX : 0) * w + 60, y: cy + (zone?.anchorY ? -zone.anchorY : 0) * h - 40, color: '#ff4d4d', emoji: config.oppEmoji || '😰', label: config.opposite || 'Противоположность', radius: 30, bodyPart: '' };
                points.push(p1, p2);
                return true;
            } catch { return false; }
        }

        document.getElementById('add-pair-btn').addEventListener('click', addPair);
        document.getElementById('reset-btn').addEventListener('click', resetAll);
        setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 8000);
        window.addEventListener('resize', resize);
        resize();
        if (!loadFromLocal()) { if (!loadFromOnboarding()) addPair(); saveToLocal(); }
        physicsLoop();
    </script>
</body>
</html>
