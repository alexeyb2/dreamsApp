<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Уровень 7: Квадрат Сознания (2D)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center;
            touch-action: none; user-select: none;
        }
        #app {
            width: 100%; max-width: 600px; height: 100vh; display: flex; flex-direction: column;
            position: relative; background: radial-gradient(circle at center, #131022 0%, #08060e 100%);
        }
        #canvas {
            flex: 1; width: 100%; display: block; cursor: grab; touch-action: none;
        }
        #canvas:active { cursor: grabbing; }
        #ui {
            position: absolute; bottom: 30px; left: 0; right: 0; display: flex;
            flex-direction: column; align-items: center; gap: 10px; pointer-events: none;
        }
        #balance-bar {
            width: 80%; height: 8px; background: #1a1530; border-radius: 10px;
            overflow: hidden; border: 1px solid #3a2f5a;
        }
        #balance-fill {
            height: 100%; width: 50%; background: #6f52c4; border-radius: 10px;
            transition: width 0.1s;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff;
            padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 14px;
            cursor: pointer; pointer-events: auto; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
    </style>
</head>
<body>
<div id="app">
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div id="balance-bar"><div id="balance-fill"></div></div>
        <button class="btn" id="reset-btn">🔄 Сброс</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const balanceFill = document.getElementById('balance-fill');

    let w, h, cx, cy;
    
    // 4 силы: Верх теперь 🎈, низ 🎱, лево 🔵, право 🔴
    let forces = {
        up:    { x: 0, y: -150, label: 'Вверх', emoji: '🎈', color: '#ff4d4d' },
        down:  { x: 0, y: 150,  label: 'Вниз',  emoji: '🎱', color: '#4d8bff' },
        left:  { x: -150, y: 0,  label: 'Влево', emoji: '🔵', color: '#4d8bff' },
        right: { x: 150, y: 0,   label: 'Вправо', emoji: '🔴', color: '#ff4d4d' }
    };
    
    let isDragging = false;
    let draggedKey = null;
    let dragStart = { x: 0, y: 0 };
    let startPos = { x: 0, y: 0 };

    // Зелёный шар в центре (подвижный)
    let centerBall = { x: 0, y: 0, radius: 20, color: '#2ecc71' };

    // ============= СОХРАНЕНИЕ =============
    function saveState() {
        const data = {};
        for (let key in forces) {
            data[key] = { x: forces[key].x, y: forces[key].y };
        }
        localStorage.setItem('highmind_level7_2d', JSON.stringify(data));
    }

    function loadState() {
        const raw = localStorage.getItem('highmind_level7_2d');
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            for (let key in data) {
                if (forces[key]) {
                    forces[key].x = data[key].x;
                    forces[key].y = data[key].y;
                }
            }
            return true;
        } catch(e) { return false; }
    }

    function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        w = canvas.width; h = canvas.height;
        cx = w / 2; cy = h / 2;

        if (!loadState()) {
            forces.up.x = cx; forces.up.y = cy - 150;
            forces.down.x = cx; forces.down.y = cy + 150;
            forces.left.x = cx - 150; forces.left.y = cy;
            forces.right.x = cx + 150; forces.right.y = cy;
            saveState();
        } else {
            for (let key in forces) {
                forces[key].x = Math.max(30, Math.min(w-30, forces[key].x));
                forces[key].y = Math.max(30, Math.min(h-30, forces[key].y));
            }
        }
        updateCenterPosition();
    }
    window.addEventListener('resize', resize);

    // ============= ФИЗИКА ЦЕНТРА =============
    function updateCenterPosition() {
        centerBall.x = (forces.up.x + forces.down.x + forces.left.x + forces.right.x) / 4;
        centerBall.y = (forces.up.y + forces.down.y + forces.left.y + forces.right.y) / 4;
    }

    // ============= СТЕКЛЯННЫЕ ПЕТЛИ (Плавные овалы, стиль Apple) =============
    function drawGlassLoop(points) {
        if (points.length < 4) return;

        // Слой 1: Мягкое свечение
        ctx.save();
        ctx.shadowColor = 'rgba(255, 255, 255, 0.15)';
        ctx.shadowBlur = 40;
        ctx.lineWidth = 6;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        ctx.quadraticCurveTo(points[1].x, points[1].y, points[2].x, points[2].y);
        ctx.quadraticCurveTo(points[3].x, points[3].y, points[0].x, points[0].y);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();

        // Слой 2: Основной прозрачный овал
        ctx.save();
        ctx.shadowColor = 'rgba(255, 255, 255, 0.2)';
        ctx.shadowBlur = 20;
        ctx.lineWidth = 3;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        ctx.quadraticCurveTo(points[1].x, points[1].y, points[2].x, points[2].y);
        ctx.quadraticCurveTo(points[3].x, points[3].y, points[0].x, points[0].y);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();

        // Слой 3: Тонкая кайма (глянец)
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        ctx.quadraticCurveTo(points[1].x, points[1].y, points[2].x, points[2].y);
        ctx.quadraticCurveTo(points[3].x, points[3].y, points[0].x, points[0].y);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }

    // ============= ОТРИСОВКА =============
    function drawRoundedBall(x, y, radius, color) {
        const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, 5, x, y, radius);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.15, color);
        grad.addColorStop(1, '#000000');
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.shadowBlur = 20;
        ctx.shadowColor = color;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    function drawEmojiBall(x, y, radius, emoji, color) {
        // Сначала рисуем подложку, чтобы эмодзи смотрелся как шар
        ctx.shadowBlur = 20;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = color + '44';
        ctx.fill();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.shadowBlur = 0;
        // Теперь сам эмодзи
        ctx.font = `${radius * 1.2}px system-ui`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, x, y - 2);
    }

    function draw() {
        updateCenterPosition();
        ctx.clearRect(0, 0, w, h);

        const size = Math.min(w, h) * 0.45;
        const u = forces.up, d = forces.down, l = forces.left, r = forces.right;
        const cX = centerBall.x, cY = centerBall.y;
        const loopWidth = Math.min(w, h) * 0.10; // Ширина петель

        // 1. Сетка (квадрат, диагонали, оси)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.lineWidth = 1;
        ctx.strokeRect(cx - size/2, cy - size/2, size, size);
        ctx.beginPath(); ctx.moveTo(cx - size/2, cy - size/2); ctx.lineTo(cx + size/2, cy + size/2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + size/2, cy - size/2); ctx.lineTo(cx - size/2, cy + size/2); ctx.stroke();
        ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke(); ctx.setLineDash([]);

        // 2. Гладкие стеклянные петли (Вертикальная и Горизонтальная)
        // Вертикальная: U -> (влево от центра) -> D -> (вправо от центра)
        const verticalLoop = [
            { x: u.x, y: u.y },
            { x: cX - loopWidth, y: (u.y + d.y) / 2 },
            { x: d.x, y: d.y },
            { x: cX + loopWidth, y: (u.y + d.y) / 2 }
        ];
        drawGlassLoop(verticalLoop);

        // Горизонтальная: L -> (снизу от центра) -> R -> (сверху от центра)
        const horizontalLoop = [
            { x: l.x, y: l.y },
            { x: (l.x + r.x) / 2, y: cY + loopWidth },
            { x: r.x, y: r.y },
            { x: (l.x + r.x) / 2, y: cY - loopWidth }
        ];
        drawGlassLoop(horizontalLoop);

        // 3. Линии от сил к центру
        for (let key in forces) {
            const f = forces[key];
            ctx.beginPath(); ctx.moveTo(f.x, f.y); ctx.lineTo(cX, cY);
            ctx.strokeStyle = f.color + '55'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);
        }

        // 4. Зелёный центр (внутри петель)
        ctx.shadowBlur = 40; ctx.shadowColor = 'rgba(255, 255, 255, 0.2)';
        ctx.beginPath(); ctx.arc(cX, cY, centerBall.radius + 8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.fill();
        ctx.shadowBlur = 0;
        ctx.shadowBlur = 30; ctx.shadowColor = '#2ecc71';
        ctx.beginPath(); ctx.arc(cX, cY, centerBall.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#2ecc71'; ctx.fill(); ctx.shadowBlur = 0;

        // 5. Четыре силы (с уникальной прорисовкой)
        const radius = 40;
        for (let key in forces) {
            const f = forces[key];
            if (key === 'up') {
                drawEmojiBall(f.x, f.y, radius, f.emoji, f.color);
            } else if (key === 'down') {
                // Шар 8 (особая отрисовка)
                const grad = ctx.createRadialGradient(f.x - radius*0.3, f.y - radius*0.3, 5, f.x, f.y, radius);
                grad.addColorStop(0, '#444'); grad.addColorStop(0.5, '#111'); grad.addColorStop(1, '#000');
                ctx.beginPath(); ctx.arc(f.x, f.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = grad; ctx.shadowBlur = 20; ctx.shadowColor = '#4d8bff'; ctx.fill(); ctx.shadowBlur = 0;
                const innerR = radius * 0.6;
                ctx.beginPath(); ctx.arc(f.x, f.y, innerR, 0, Math.PI * 2); ctx.fillStyle = '#f0f0f0'; ctx.fill();
                ctx.fillStyle = '#111'; ctx.font = `bold ${innerR * 1.3}px sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('8', f.x, f.y + 2);
            } else {
                drawRoundedBall(f.x, f.y, radius, f.color);
            }
            // Подпись
            ctx.font = '14px system-ui'; ctx.fillStyle = '#e0d6ff';
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.fillText(f.label, f.x, f.y + radius + 8);
        }

        // 6. Баланс
        const dist = Math.hypot(cX - cx, cY - cy);
        const maxDist = Math.min(w, h) * 0.4;
        const balance = Math.max(0, 100 - (dist / maxDist) * 100);
        balanceFill.style.width = balance + '%';
        balanceFill.style.backgroundColor = balance > 80 ? '#2ecc71' : balance > 50 ? '#ffcc00' : '#ff4d4d';

        if (balance > 95) {
            ctx.shadowBlur = 60; ctx.shadowColor = '#ffffff';
            ctx.beginPath(); ctx.arc(cX, cY, centerBall.radius+5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fill(); ctx.shadowBlur = 0;
        }
    }

    // ============= ИНТЕРАКТИВНОСТЬ =============
    function getPointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function hitTest(pos) {
        const tolerance = 45;
        for (let key in forces) {
            const f = forces[key];
            if (Math.hypot(pos.x - f.x, pos.y - f.y) < tolerance) return key;
        }
        return null;
    }

    canvas.addEventListener('pointerdown', (e) => {
        e.preventDefault(); const pos = getPointerPos(e); const hit = hitTest(pos);
        if (hit) { isDragging = true; draggedKey = hit; dragStart = pos; startPos = { x: forces[hit].x, y: forces[hit].y }; canvas.style.cursor = 'grabbing'; }
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging || !draggedKey) return; e.preventDefault();
        const pos = getPointerPos(e); const dx = pos.x - dragStart.x; const dy = pos.y - dragStart.y;
        forces[draggedKey].x = Math.max(30, Math.min(w-30, startPos.x + dx));
        forces[draggedKey].y = Math.max(30, Math.min(h-30, startPos.y + dy));
        saveState(); draw();
    });

    window.addEventListener('pointerup', () => {
        if (isDragging) { isDragging = false; draggedKey = null; canvas.style.cursor = 'grab'; }
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
        forces.up.x = cx; forces.up.y = cy - 150;
        forces.down.x = cx; forces.down.y = cy + 150;
        forces.left.x = cx - 150; forces.left.y = cy;
        forces.right.x = cx + 150; forces.right.y = cy;
        saveState(); draw();
    });

    function loop() { draw(); requestAnimationFrame(loop); }
    resize(); loop();
    console.log('🟣🦅 Уровень 7: Квадрат Сознания (гладкие овалы + 🎈) загружено!');
</script>
</body>
</html>
