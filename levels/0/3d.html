<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Уровень 7: Куб Сознания (3D)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; font-family: system-ui, sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; background: #0b0814; }
        #ui { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
        #balance-bar { width: 80%; max-width: 400px; height: 8px; background: #1a1530; border-radius: 10px; overflow: hidden; border: 1px solid #3a2f5a; }
        #balance-fill { height: 100%; width: 50%; background: #6f52c4; border-radius: 10px; transition: width 0.1s; }
        .btn { border: none; background: #2a2348; color: #b8a6ff; padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; pointer-events: auto; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui">
    <div id="balance-bar"><div id="balance-fill"></div></div>
    <button class="btn" id="reset-btn">🔄 Сброс</button>
</div>

<script>
    // ============= СЦЕНА =============
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0814);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(7, 5, 9);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);
    controls.minDistance = 3;
    controls.maxDistance = 20;

    // Освещение
    scene.add(new THREE.AmbientLight(0x404060));
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Сетка пола
    const gridHelper = new THREE.GridHelper(10, 10, 0x6f52c4, 0x3a2f5a);
    gridHelper.position.y = -2.5;
    scene.add(gridHelper);

    // ============= КУБ И ДИАГОНАЛИ =============
    const cubeSize = 5.5;
    const cubeGeom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
    const cubeEdges = new THREE.EdgesGeometry(cubeGeom);
    const cubeMat = new THREE.LineBasicMaterial({ color: 0x444466, transparent: true, opacity: 0.2 });
    const cubeWireframe = new THREE.LineSegments(cubeEdges, cubeMat);
    cubeWireframe.position.set(0, 0, 0);
    scene.add(cubeWireframe);

    const half = cubeSize / 2;
    const diagPoints = [
        [new THREE.Vector3(-half, -half, -half), new THREE.Vector3(half, half, half)],
        [new THREE.Vector3(-half, half, -half), new THREE.Vector3(half, -half, half)],
        [new THREE.Vector3(half, -half, -half), new THREE.Vector3(-half, half, half)],
        [new THREE.Vector3(half, half, -half), new THREE.Vector3(-half, -half, half)]
    ];
    diagPoints.forEach(pair => {
        const geom = new THREE.BufferGeometry().setFromPoints(pair);
        const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
        const line = new THREE.Line(geom, mat);
        scene.add(line);
    });

    // ============= ТРЕУГОЛЬНИКИ И ШАРЫ =============
    const STORAGE_KEY = 'highmind_level7_3d';

    // 3 вершины нижнего треугольника (земля)
    const lowerTriangle = [
        { x: -1.5, y: -2.5, z: 0 },
        { x: 1.5, y: -2.5, z: 0 },
        { x: 0, y: -2.5, z: 1.5 }
    ];
    // 3 вершины верхнего треугольника (небо)
    const upperTriangle = [
        { x: -1.5, y: 2.5, z: 0 },
        { x: 1.5, y: 2.5, z: 0 },
        { x: 0, y: 2.5, z: 1.5 }
    ];

    // Шары: 🎱 (нижний) и 🎈 (верхний)
    const ballDown = { x: 0, y: -1.0, z: 0, emoji: '🎱', color: '#4d8bff', label: 'Вниз' };
    const ballUp = { x: 0, y: 1.0, z: 0, emoji: '🎈', color: '#ff4d4d', label: 'Вверх' };

    let centerPos = new THREE.Vector3(0, 0, 0);

    // ============= СОХРАНЕНИЕ =============
    function saveState() {
        const data = {
            lower: lowerTriangle.map(p => ({ x: p.x, y: p.y, z: p.z })),
            upper: upperTriangle.map(p => ({ x: p.x, y: p.y, z: p.z })),
            ballDown: { x: ballDown.x, y: ballDown.y, z: ballDown.z },
            ballUp: { x: ballUp.x, y: ballUp.y, z: ballUp.z }
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            if (data.lower) {
                data.lower.forEach((p, i) => {
                    if (i < lowerTriangle.length) {
                        lowerTriangle[i].x = p.x;
                        lowerTriangle[i].y = p.y;
                        lowerTriangle[i].z = p.z;
                    }
                });
            }
            if (data.upper) {
                data.upper.forEach((p, i) => {
                    if (i < upperTriangle.length) {
                        upperTriangle[i].x = p.x;
                        upperTriangle[i].y = p.y;
                        upperTriangle[i].z = p.z;
                    }
                });
            }
            if (data.ballDown) {
                ballDown.x = data.ballDown.x;
                ballDown.y = data.ballDown.y;
                ballDown.z = data.ballDown.z;
            }
            if (data.ballUp) {
                ballUp.x = data.ballUp.x;
                ballUp.y = data.ballUp.y;
                ballUp.z = data.ballUp.z;
            }
            return true;
        } catch(e) { return false; }
    }

    if (!loadState()) {
        saveState();
    }

    // ============= СОЗДАНИЕ 3D ОБЪЕКТОВ =============
    // Спрайты для вершин треугольников (маленькие эмодзи)
    function createPointSprite(emoji, color) {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.font = '80px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = color; ctx.shadowBlur = 20;
        ctx.fillText(emoji, 64, 64);
        ctx.shadowBlur = 0;
        return new THREE.CanvasTexture(canvas);
    }

    // Вершины треугольников – спрайты
    const lowerSprites = [];
    const upperSprites = [];
    const triangleColor = '#88bbff';

    lowerTriangle.forEach((p, i) => {
        const tex = createPointSprite('🔺', triangleColor);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(0.6, 0.6, 1);
        sprite.position.set(p.x, p.y, p.z);
        scene.add(sprite);
        lowerSprites.push(sprite);
    });

    upperTriangle.forEach((p, i) => {
        const tex = createPointSprite('🔻', triangleColor);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(0.6, 0.6, 1);
        sprite.position.set(p.x, p.y, p.z);
        scene.add(sprite);
        upperSprites.push(sprite);
    });

    // Шары – крупные спрайты
    function createBallSprite(emoji, color, label) {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 256, 256);
        ctx.font = '110px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = color; ctx.shadowBlur = 25;
        ctx.fillText(emoji, 128, 110);
        ctx.shadowBlur = 0;
        ctx.font = 'bold 24px sans-serif';
        ctx.fillStyle = '#e0d6ff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
        ctx.fillText(label, 128, 240);
        return new THREE.CanvasTexture(canvas);
    }

    const ballDownTex = createBallSprite(ballDown.emoji, ballDown.color, ballDown.label);
    const ballDownMat = new THREE.SpriteMaterial({ map: ballDownTex, transparent: true });
    const ballDownSprite = new THREE.Sprite(ballDownMat);
    ballDownSprite.scale.set(1.6, 1.6, 1);
    ballDownSprite.position.set(ballDown.x, ballDown.y, ballDown.z);
    scene.add(ballDownSprite);

    const ballUpTex = createBallSprite(ballUp.emoji, ballUp.color, ballUp.label);
    const ballUpMat = new THREE.SpriteMaterial({ map: ballUpTex, transparent: true });
    const ballUpSprite = new THREE.Sprite(ballUpMat);
    ballUpSprite.scale.set(1.6, 1.6, 1);
    ballUpSprite.position.set(ballUp.x, ballUp.y, ballUp.z);
    scene.add(ballUpSprite);

    // Центральный зелёный шар
    function createCenterSprite() {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 100);
        grad.addColorStop(0, '#2ecc71');
        grad.addColorStop(1, 'rgba(46, 204, 113, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(128, 128, 100, 0, Math.PI * 2); ctx.fill();
        ctx.font = '60px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🟢', 128, 128);
        return new THREE.CanvasTexture(canvas);
    }
    const centerMat = new THREE.SpriteMaterial({ map: createCenterSprite(), transparent: true });
    const centerSprite = new THREE.Sprite(centerMat);
    centerSprite.scale.set(0.8, 0.8, 1);
    centerSprite.position.copy(centerPos);
    scene.add(centerSprite);

    // ============= ЛИНИИ СВЯЗЕЙ =============
    // 🎱 (нижний) соединён с верхним треугольником
    // 🎈 (верхний) соединён с нижним треугольником
    let lineMeshes = [];

    function updateLines() {
        // Удаляем старые линии
        lineMeshes.forEach(line => scene.remove(line));
        lineMeshes = [];

        // Линии от 🎱 к каждой вершине верхнего треугольника
        upperTriangle.forEach(p => {
            const start = new THREE.Vector3(ballDown.x, ballDown.y, ballDown.z);
            const end = new THREE.Vector3(p.x, p.y, p.z);
            const geom = new THREE.BufferGeometry().setFromPoints([start, end]);
            const mat = new THREE.LineBasicMaterial({ color: 0x4d8bff, transparent: true, opacity: 0.4 });
            const line = new THREE.Line(geom, mat);
            scene.add(line);
            lineMeshes.push(line);
        });

        // Линии от 🎈 к каждой вершине нижнего треугольника
        lowerTriangle.forEach(p => {
            const start = new THREE.Vector3(ballUp.x, ballUp.y, ballUp.z);
            const end = new THREE.Vector3(p.x, p.y, p.z);
            const geom = new THREE.BufferGeometry().setFromPoints([start, end]);
            const mat = new THREE.LineBasicMaterial({ color: 0xff4d4d, transparent: true, opacity: 0.4 });
            const line = new THREE.Line(geom, mat);
            scene.add(line);
            lineMeshes.push(line);
        });
    }

    // ============= ОБНОВЛЕНИЕ ПОЗИЦИЙ =============
    function updatePositions() {
        // Обновляем позиции спрайтов вершин треугольников
        lowerTriangle.forEach((p, i) => {
            lowerSprites[i].position.set(p.x, p.y, p.z);
        });
        upperTriangle.forEach((p, i) => {
            upperSprites[i].position.set(p.x, p.y, p.z);
        });

        // Обновляем шары
        ballDownSprite.position.set(ballDown.x, ballDown.y, ballDown.z);
        ballUpSprite.position.set(ballUp.x, ballUp.y, ballUp.z);

        // Вычисляем центр как среднее всех 8 точек (3 нижних + 3 верхних + 2 шара)
        centerPos.set(0, 0, 0);
        lowerTriangle.forEach(p => { centerPos.x += p.x; centerPos.y += p.y; centerPos.z += p.z; });
        upperTriangle.forEach(p => { centerPos.x += p.x; centerPos.y += p.y; centerPos.z += p.z; });
        centerPos.x += ballDown.x + ballUp.x;
        centerPos.y += ballDown.y + ballUp.y;
        centerPos.z += ballDown.z + ballUp.z;
        centerPos.divideScalar(8);
        centerSprite.position.copy(centerPos);

        // Обновляем линии
        updateLines();

        // Баланс: расстояние центра от начала координат
        const dist = centerPos.length();
        const maxDist = 3.5;
        const balance = Math.max(0, 100 - (dist / maxDist) * 100);
        document.getElementById('balance-fill').style.width = balance + '%';
        document.getElementById('balance-fill').style.backgroundColor = balance > 80 ? '#2ecc71' : balance > 50 ? '#ffcc00' : '#ff4d4d';
        
        if (balance > 95) {
            centerSprite.scale.set(1.0, 1.0, 1);
            centerSprite.material.opacity = 1.0;
        } else {
            centerSprite.scale.set(0.8, 0.8, 1);
            centerSprite.material.opacity = 0.9;
        }
    }

    // ============= ИНТЕРАКТИВНОСТЬ (ПЕРЕТАСКИВАНИЕ) =============
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let isDragging = false;
    let draggedKey = null; // строка: 'lower0', 'upper0', 'ballDown', 'ballUp'
    let dragOffset = new THREE.Vector3();
    let intersectPlane = new THREE.Plane();

    // Создаём список всех перетаскиваемых спрайтов с их ключами
    const draggableObjects = [];
    lowerTriangle.forEach((p, i) => {
        draggableObjects.push({ key: `lower${i}`, sprite: lowerSprites[i], data: p });
    });
    upperTriangle.forEach((p, i) => {
        draggableObjects.push({ key: `upper${i}`, sprite: upperSprites[i], data: p });
    });
    draggableObjects.push({ key: 'ballDown', sprite: ballDownSprite, data: ballDown });
    draggableObjects.push({ key: 'ballUp', sprite: ballUpSprite, data: ballUp });

    function getPointerNDC(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    }

    renderer.domElement.addEventListener('pointerdown', (e) => {
        getPointerNDC(e);
        raycaster.setFromCamera(pointer, camera);

        const sprites = draggableObjects.map(o => o.sprite);
        const intersects = raycaster.intersectObjects(sprites);
        if (intersects.length > 0) {
            const hitSprite = intersects[0].object;
            const found = draggableObjects.find(o => o.sprite === hitSprite);
            if (found) {
                draggedKey = found.key;
                isDragging = true;
                controls.enabled = false;
                renderer.domElement.style.cursor = 'grabbing';
                const point = intersects[0].point;
                dragOffset.copy(point).sub(found.sprite.position);
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                intersectPlane.setFromNormalAndCoplanarPoint(camDir, point);
            }
        }
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging || !draggedKey) return;
        getPointerNDC(e);
        raycaster.setFromCamera(pointer, camera);
        const intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(intersectPlane, intersectPoint);
        if (intersectPoint) {
            const newPos = intersectPoint.clone().sub(dragOffset);
            const limit = 3.5;
            newPos.x = Math.max(-limit, Math.min(limit, newPos.x));
            newPos.y = Math.max(-limit, Math.min(limit, newPos.y));
            newPos.z = Math.max(-limit, Math.min(limit, newPos.z));

            // Находим соответствующий объект данных
            if (draggedKey.startsWith('lower')) {
                const idx = parseInt(draggedKey.replace('lower', ''));
                lowerTriangle[idx].x = newPos.x;
                lowerTriangle[idx].y = newPos.y;
                lowerTriangle[idx].z = newPos.z;
            } else if (draggedKey.startsWith('upper')) {
                const idx = parseInt(draggedKey.replace('upper', ''));
                upperTriangle[idx].x = newPos.x;
                upperTriangle[idx].y = newPos.y;
                upperTriangle[idx].z = newPos.z;
            } else if (draggedKey === 'ballDown') {
                ballDown.x = newPos.x;
                ballDown.y = newPos.y;
                ballDown.z = newPos.z;
            } else if (draggedKey === 'ballUp') {
                ballUp.x = newPos.x;
                ballUp.y = newPos.y;
                ballUp.z = newPos.z;
            }
            saveState();
            updatePositions();
        }
    });

    window.addEventListener('pointerup', () => {
        if (isDragging) {
            isDragging = false;
            draggedKey = null;
            controls.enabled = true;
            renderer.domElement.style.cursor = 'default';
            saveState();
            updatePositions();
        }
    });

    // ============= СБРОС =============
    document.getElementById('reset-btn').addEventListener('click', () => {
        lowerTriangle[0] = { x: -1.5, y: -2.5, z: 0 };
        lowerTriangle[1] = { x: 1.5, y: -2.5, z: 0 };
        lowerTriangle[2] = { x: 0, y: -2.5, z: 1.5 };
        upperTriangle[0] = { x: -1.5, y: 2.5, z: 0 };
        upperTriangle[1] = { x: 1.5, y: 2.5, z: 0 };
        upperTriangle[2] = { x: 0, y: 2.5, z: 1.5 };
        ballDown.x = 0; ballDown.y = -1.0; ballDown.z = 0;
        ballUp.x = 0; ballUp.y = 1.0; ballUp.z = 0;
        saveState();
        updatePositions();
    });

    // ============= АНИМАЦИЯ =============
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // ============= ИНИЦИАЛИЗАЦИЯ =============
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    updatePositions();
    animate();
    console.log('🟣🦅 Уровень 7: Куб Сознания (треугольники и шары) загружено!');
</script>
</body>
</html>
