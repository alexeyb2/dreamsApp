<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Уровень 7: Куб Сознания (3D)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; font-family: system-ui, sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; background: #0b0814; }
        #ui { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
        #balance-bar { width: 80%; max-width: 400px; height: 8px; background: #1a1530; border-radius: 10px; overflow: hidden; border: 1px solid #3a2f5a; }
        #balance-fill { height: 100%; width: 50%; background: #6f52c4; border-radius: 10px; transition: width 0.1s; }
        .btn { border: none; background: #2a2348; color: #b8a6ff; padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; pointer-events: auto; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui">
    <div id="balance-bar"><div id="balance-fill"></div></div>
    <button class="btn" id="reset-btn">🔄 Сброс</button>
</div>

<script>
    // ============= СЦЕНА =============
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0814);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(7, 4, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);
    controls.minDistance = 3;
    controls.maxDistance = 20;

    // Освещение
    scene.add(new THREE.AmbientLight(0x404060));
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Сетка пола (прозрачная)
    const gridHelper = new THREE.GridHelper(10, 10, 0x6f52c4, 0x3a2f5a);
    gridHelper.position.y = -2.5;
    scene.add(gridHelper);

    // ============= КУБ И ДИАГОНАЛИ (статика) =============
    const cubeSize = 5.5;
    const cubeGeom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
    const cubeEdges = new THREE.EdgesGeometry(cubeGeom);
    const cubeMat = new THREE.LineBasicMaterial({ color: 0x444466, transparent: true, opacity: 0.2 });
    const cubeWireframe = new THREE.LineSegments(cubeEdges, cubeMat);
    cubeWireframe.position.set(0, 0, 0);
    scene.add(cubeWireframe);

    const half = cubeSize / 2;
    const diagPoints = [
        [new THREE.Vector3(-half, -half, -half), new THREE.Vector3(half, half, half)],
        [new THREE.Vector3(-half, half, -half), new THREE.Vector3(half, -half, half)],
        [new THREE.Vector3(half, -half, -half), new THREE.Vector3(-half, half, half)],
        [new THREE.Vector3(half, half, -half), new THREE.Vector3(-half, -half, half)]
    ];
    diagPoints.forEach(pair => {
        const geom = new THREE.BufferGeometry().setFromPoints(pair);
        const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
        const line = new THREE.Line(geom, mat);
        scene.add(line);
    });

    // ============= ДАННЫЕ И СОХРАНЕНИЕ =============
    const STORAGE_KEY = 'highmind_level7_3d';

    // Вершины тетраэдров (перетаскиваемые)
    // Верхний тетраэдр (🔻): 🟦 слева, 🟥 справа, 🟣 сзади
    const topLeft  = { x: -1.2, y: 1.0, z: 1.2 }; // 🟦
    const topRight = { x: 1.2, y: 1.0, z: 1.2 }; // 🟥
    const topBack  = { x: 0,   y: 1.0, z: -1.2 }; // 🟣

    // Нижний тетраэдр (🔺): 🔵 слева-сзади, 🔴 справа-сзади, 🟠 спереди
    const botLeft  = { x: -1.2, y: -2.5, z: -1.2 }; // 🔵
    const botRight = { x: 1.2, y: -2.5, z: -1.2 }; // 🔴
    const botFront = { x: 0,   y: -2.5, z: 1.2 }; // 🟠

    // Шары 🎱 (внизу) и 🎈 (вверху)
    const ballDown = { x: 0, y: -1.0, z: 0, emoji: '🎱', color: '#4d8bff' };
    const ballUp   = { x: 0, y: 1.0, z: 0, emoji: '🎈', color: '#ff4d4d' };

    let centerPos = new THREE.Vector3(0, 0, 0);

    function saveState() {
        const data = {
            topLeft, topRight, topBack,
            botLeft, botRight, botFront,
            ballDown: { x: ballDown.x, y: ballDown.y, z: ballDown.z },
            ballUp:   { x: ballUp.x, y: ballUp.y, z: ballUp.z }
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            if (data.topLeft)  { topLeft.x  = data.topLeft.x;  topLeft.y  = data.topLeft.y;  topLeft.z  = data.topLeft.z; }
            if (data.topRight) { topRight.x = data.topRight.x; topRight.y = data.topRight.y; topRight.z = data.topRight.z; }
            if (data.topBack)  { topBack.x  = data.topBack.x;  topBack.y  = data.topBack.y;  topBack.z  = data.topBack.z; }
            if (data.botLeft)  { botLeft.x  = data.botLeft.x;  botLeft.y  = data.botLeft.y;  botLeft.z  = data.botLeft.z; }
            if (data.botRight) { botRight.x = data.botRight.x; botRight.y = data.botRight.y; botRight.z = data.botRight.z; }
            if (data.botFront) { botFront.x = data.botFront.x; botFront.y = data.botFront.y; botFront.z = data.botFront.z; }
            if (data.ballDown) { ballDown.x = data.ballDown.x; ballDown.y = data.ballDown.y; ballDown.z = data.ballDown.z; }
            if (data.ballUp)   { ballUp.x   = data.ballUp.x;   ballUp.y   = data.ballUp.y;   ballUp.z   = data.ballUp.z; }
            return true;
        } catch(e) { return false; }
    }

    if (!loadState()) {
        saveState();
    }

    // ============= СОЗДАНИЕ 3D ОБЪЕКТОВ =============
    function createSprite(emoji, color, scale = 0.6) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.font = '80px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = color; ctx.shadowBlur = 20;
        ctx.fillText(emoji, 64, 64);
        ctx.shadowBlur = 0;
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(scale, scale, 1);
        return sprite;
    }

    function createBallSprite(emoji, color, scale = 1.6) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.font = '120px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = color; ctx.shadowBlur = 30;
        ctx.fillText(emoji, 128, 128);
        ctx.shadowBlur = 0;
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(scale, scale, 1);
        return sprite;
    }

    // Маппинг для перетаскивания
    const draggableObjects = [];

    const topLeftSprite  = createSprite('🟦', '#4d8bff'); topLeftSprite.position.set(topLeft.x, topLeft.y, topLeft.z); scene.add(topLeftSprite); draggableObjects.push({ key: 'topLeft',  sprite: topLeftSprite,  data: topLeft });
    const topRightSprite = createSprite('🟥', '#ff4d4d'); topRightSprite.position.set(topRight.x, topRight.y, topRight.z); scene.add(topRightSprite); draggableObjects.push({ key: 'topRight', sprite: topRightSprite, data: topRight });
    const topBackSprite  = createSprite('🟣', '#9b59b6'); topBackSprite.position.set(topBack.x, topBack.y, topBack.z); scene.add(topBackSprite); draggableObjects.push({ key: 'topBack',  sprite: topBackSprite,  data: topBack });

    const botLeftSprite  = createSprite('🔵', '#4d8bff'); botLeftSprite.position.set(botLeft.x, botLeft.y, botLeft.z); scene.add(botLeftSprite); draggableObjects.push({ key: 'botLeft',  sprite: botLeftSprite,  data: botLeft });
    const botRightSprite = createSprite('🔴', '#ff4d4d'); botRightSprite.position.set(botRight.x, botRight.y, botRight.z); scene.add(botRightSprite); draggableObjects.push({ key: 'botRight', sprite: botRightSprite, data: botRight });
    const botFrontSprite = createSprite('🟠', '#e67e22'); botFrontSprite.position.set(botFront.x, botFront.y, botFront.z); scene.add(botFrontSprite); draggableObjects.push({ key: 'botFront', sprite: botFrontSprite, data: botFront });

    const ballDownSprite = createBallSprite('🎱', '#4d8bff'); ballDownSprite.position.set(ballDown.x, ballDown.y, ballDown.z); scene.add(ballDownSprite); draggableObjects.push({ key: 'ballDown', sprite: ballDownSprite, data: ballDown });
    const ballUpSprite   = createBallSprite('🎈', '#ff4d4d'); ballUpSprite.position.set(ballUp.x, ballUp.y, ballUp.z); scene.add(ballUpSprite); draggableObjects.push({ key: 'ballUp',   sprite: ballUpSprite,   data: ballUp });

    // Центральный зелёный шар (не перетаскивается, он "держится" структурой)
    const centerSprite = createSprite('🟢', '#2ecc71', 0.7);
    centerSprite.position.copy(centerPos);
    scene.add(centerSprite);

    // ============= ЛИНИИ СВЯЗЕЙ (ДИНАМИЧЕСКИЕ) =============
    let lineMeshes = [];

    function updateLines() {
        lineMeshes.forEach(l => scene.remove(l));
        lineMeshes = [];

        const addLine = (p1, color) => {
            const geom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(p1.x, p1.y, p1.z), centerPos]);
            const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
            const line = new THREE.Line(geom, mat);
            scene.add(line);
            lineMeshes.push(line);
        };

        const addLineBetween = (p1, p2, color) => {
            const geom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(p1.x, p1.y, p1.z), new THREE.Vector3(p2.x, p2.y, p2.z)]);
            const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
            const line = new THREE.Line(geom, mat);
            scene.add(line);
            lineMeshes.push(line);
        };

        // Вертикальный луч жизни: 🎱 -> 🟢 -> 🎈
        addLine(ballDown, '#4d8bff');
        addLine(ballUp, '#ff4d4d');

        // Верхний тетраэдр (🎱 с верхними точками)
        addLineBetween(ballDown, topLeft, '#4d8bff');
        addLineBetween(ballDown, topRight, '#ff4d4d');
        addLineBetween(ballDown, topBack, '#9b59b6');

        // Нижний тетраэдр (🎈 с нижними точками)
        addLineBetween(ballUp, botLeft, '#4d8bff');
        addLineBetween(ballUp, botRight, '#ff4d4d');
        addLineBetween(ballUp, botFront, '#e67e22');

        // Перекрестные связи (X)
        // 🟦 (верх-лево) -> 🔴 (низ-право) = синяя
        addLineBetween(topLeft, botRight, '#4d8bff');
        // 🟥 (верх-право) -> 🔵 (низ-лево) = красная
        addLineBetween(topRight, botLeft, '#ff4d4d');
        // 🟣 (верх-сзади) -> 🟠 (низ-спереди) = фиолетово-оранжевая (для симметрии)
        addLineBetween(topBack, botFront, '#9b59b6');
    }

    // ============= ОБНОВЛЕНИЕ ПОЗИЦИЙ =============
    function updatePositions() {
        // Обновляем позиции спрайтов
        topLeftSprite.position.set(topLeft.x, topLeft.y, topLeft.z);
        topRightSprite.position.set(topRight.x, topRight.y, topRight.z);
        topBackSprite.position.set(topBack.x, topBack.y, topBack.z);
        botLeftSprite.position.set(botLeft.x, botLeft.y, botLeft.z);
        botRightSprite.position.set(botRight.x, botRight.y, botRight.z);
        botFrontSprite.position.set(botFront.x, botFront.y, botFront.z);
        ballDownSprite.position.set(ballDown.x, ballDown.y, ballDown.z);
        ballUpSprite.position.set(ballUp.x, ballUp.y, ballUp.z);

        // Вычисляем центр (среднее всех 8 точек)
        centerPos.set(0, 0, 0);
        [topLeft, topRight, topBack, botLeft, botRight, botFront, ballDown, ballUp].forEach(p => {
            centerPos.x += p.x; centerPos.y += p.y; centerPos.z += p.z;
        });
        centerPos.divideScalar(8);
        centerSprite.position.copy(centerPos);

        updateLines();

        // Баланс
        const dist = centerPos.length();
        const maxDist = 3.5;
        const balance = Math.max(0, 100 - (dist / maxDist) * 100);
        document.getElementById('balance-fill').style.width = balance + '%';
        document.getElementById('balance-fill').style.backgroundColor = balance > 80 ? '#2ecc71' : balance > 50 ? '#ffcc00' : '#ff4d4d';

        if (balance > 95) {
            centerSprite.scale.set(1.0, 1.0, 1);
            centerSprite.material.opacity = 1.0;
        } else {
            centerSprite.scale.set(0.8, 0.8, 1);
            centerSprite.material.opacity = 0.9;
        }
    }

    // ============= ИНТЕРАКТИВНОСТЬ (ПЕРЕТАСКИВАНИЕ) =============
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let isDragging = false;
    let draggedKey = null;
    let dragOffset = new THREE.Vector3();
    let intersectPlane = new THREE.Plane();

    function getPointerNDC(e) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    }

    renderer.domElement.addEventListener('pointerdown', (e) => {
        getPointerNDC(e);
        raycaster.setFromCamera(pointer, camera);
        const sprites = draggableObjects.map(o => o.sprite);
        const intersects = raycaster.intersectObjects(sprites);
        if (intersects.length > 0) {
            const hitSprite = intersects[0].object;
            const found = draggableObjects.find(o => o.sprite === hitSprite);
            if (found) {
                draggedKey = found.key;
                isDragging = true;
                controls.enabled = false;
                renderer.domElement.style.cursor = 'grabbing';
                const point = intersects[0].point;
                dragOffset.copy(point).sub(found.sprite.position);
                const camDir = new THREE.Vector3();
                camera.getWorldDirection(camDir);
                intersectPlane.setFromNormalAndCoplanarPoint(camDir, point);
            }
        }
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging || !draggedKey) return;
        getPointerNDC(e);
        raycaster.setFromCamera(pointer, camera);
        const intersectPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(intersectPlane, intersectPoint);
        if (intersectPoint) {
            const newPos = intersectPoint.clone().sub(dragOffset);
            const limit = 3.5;
            newPos.x = Math.max(-limit, Math.min(limit, newPos.x));
            newPos.y = Math.max(-limit, Math.min(limit, newPos.y));
            newPos.z = Math.max(-limit, Math.min(limit, newPos.z));

            // Обновляем данные
            if (draggedKey === 'topLeft')  { topLeft.x  = newPos.x; topLeft.y  = newPos.y; topLeft.z  = newPos.z; }
            else if (draggedKey === 'topRight') { topRight.x = newPos.x; topRight.y = newPos.y; topRight.z = newPos.z; }
            else if (draggedKey === 'topBack')  { topBack.x  = newPos.x; topBack.y  = newPos.y; topBack.z  = newPos.z; }
            else if (draggedKey === 'botLeft')  { botLeft.x  = newPos.x; botLeft.y  = newPos.y; botLeft.z  = newPos.z; }
            else if (draggedKey === 'botRight') { botRight.x = newPos.x; botRight.y = newPos.y; botRight.z = newPos.z; }
            else if (draggedKey === 'botFront') { botFront.x = newPos.x; botFront.y = newPos.y; botFront.z = newPos.z; }
            else if (draggedKey === 'ballDown') { ballDown.x = newPos.x; ballDown.y = newPos.y; ballDown.z = newPos.z; }
            else if (draggedKey === 'ballUp')   { ballUp.x   = newPos.x; ballUp.y   = newPos.y; ballUp.z   = newPos.z; }

            saveState();
            updatePositions();
        }
    });

    window.addEventListener('pointerup', () => {
        if (isDragging) {
            isDragging = false;
            draggedKey = null;
            controls.enabled = true;
            renderer.domElement.style.cursor = 'default';
            saveState();
            updatePositions();
        }
    });

    // ============= СБРОС =============
    document.getElementById('reset-btn').addEventListener('click', () => {
        topLeft.x  = -1.2; topLeft.y  = 1.0; topLeft.z  = 1.2;
        topRight.x = 1.2;  topRight.y = 1.0; topRight.z = 1.2;
        topBack.x  = 0;    topBack.y  = 1.0; topBack.z  = -1.2;
        botLeft.x  = -1.2; botLeft.y  = -2.5; botLeft.z  = -1.2;
        botRight.x = 1.2;  botRight.y = -2.5; botRight.z = -1.2;
        botFront.x = 0;    botFront.y = -2.5; botFront.z = 1.2;
        ballDown.x = 0; ballDown.y = -1.0; ballDown.z = 0;
        ballUp.x   = 0; ballUp.y   = 1.0; ballUp.z   = 0;
        saveState();
        updatePositions();
    });

    // ============= АНИМАЦИЯ И КАЧАНИЕ =============
    let time = 0;

    function animate() {
        requestAnimationFrame(animate);
        controls.update();

        // Плавное покачивание всей конструкции (вращение вокруг Y)
        time += 0.002;
        const pivotGroup = new THREE.Group();
        // Чтобы не пересоздавать всю сцену, мы можем просто вращать куб и линии? Нет, они статичны.
        // Мы можем вращать сами спрайты, но это сложно. Проще добавить вращение для всей сцены, но тогда камера тоже вращается.
        // Вместо этого я добавлю вращение для центрального шара и небольшое смещение для всех точек?
        // Или просто оставлю вращение всей сцены, как раньше.
        // Я добавлю мягкое вращение всей сцены, чтобы имитировать покачивание.
        scene.rotation.y = Math.sin(time * 0.5) * 0.05;

        renderer.render(scene, camera);
    }

    // ============= ИНИЦИАЛИЗАЦИЯ =============
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    updatePositions();
    animate();
    console.log('🟣🦅 Уровень 7: Куб Сознания (точная геометрия тетраэдров с перекрестными связями) загружено!');
</script>
</body>
</html>
