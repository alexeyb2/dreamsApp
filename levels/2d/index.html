<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>👁️ Древо Жизни (2D)</title>
    
    <meta property="og:title" content="👁️ Древо Жизни (2D)" />
    <meta property="og:description" content="Почувствуй пульс вселенной в 2D. Перемещай узлы и наблюдай за перетеканием синих и красных нитей." />
    <meta property="og:image" content="logo.png" />
    <meta property="og:type" content="website" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="logo.png" />
    

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            touch-action: none; -webkit-tap-highlight-color: transparent; overflow: hidden;
        }
        #app { 
            width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; position: relative; margin: 0 auto;
        }
        #game-canvas {
            flex: 1; width: 100%; display: block;
            background: #0b0814; border-radius: 20px; border: 1px solid #2a2248; touch-action: none; cursor: grab;
            min-height: 0; 
        }
        #game-canvas:active { cursor: grabbing; }

        .controls {
            display: flex; justify-content: space-between; gap: 10px; padding: 10px 20px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background: rgba(22,17,39,0.9); backdrop-filter: blur(8px);
            border-top: 1px solid #2a2248; border-radius: 20px 20px 0 0; margin-top: -10px;
            position: relative; z-index: 10;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff; padding: 8px 14px;
            border-radius: 20px; font-weight: 600; font-size: 13px; cursor: pointer; touch-action: manipulation;
            transition: 0.2s; white-space: nowrap;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-icon { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; background: transparent; border: 1px solid #3a2f5a; }
        .btn-icon:active { background: #6f52c4; }

        #dropdown-menu {
            display: none; position: absolute; bottom: 110%; right: 0;
            background: #161127; border: 1px solid #3a2f5a; border-radius: 20px;
            padding: 12px; width: 200px; flex-direction: column; gap: 8px; z-index: 20;
            backdrop-filter: blur(10px);
        }
        #dropdown-menu.open { display: flex; }
        .menu-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 12px; border-radius: 12px; cursor: pointer; touch-action: manipulation;
            background: #2a2348; color: #b8a6ff; font-size: 13px; font-weight: 600; transition: 0.2s;
        }
        .menu-item:active { background: #6f52c4; color: #fff; }
        .menu-item .toggle { font-size: 16px; }
        .menu-item.speed-control {
            flex-direction: column; align-items: stretch; gap: 4px; padding: 8px 12px;
        }
        .menu-item.speed-control .header {
            display: flex; justify-content: space-between; width: 100%;
        }
        #energy-speed {
            width: 100%; height: 4px; -webkit-appearance: none; background: #3a2f5a; border-radius: 4px; outline: none; margin-top: 2px;
        }
        #energy-speed::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #6f52c4; cursor: pointer;
        }

        #add-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #add-modal.open { display: flex; }
        .add-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 30px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 16px;
        }
        .add-box h3 { color: #b8a6ff; text-align: center; font-size: 22px; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 14px; color: #8f78e6; font-weight: 500; }
        .input-group input, .input-group select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px;
            padding: 12px 14px; font-size: 16px; color: #fff; outline: none; touch-action: manipulation;
            font-family: inherit;
        }
        .add-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; touch-action: manipulation; }

        @media (max-width: 600px) {
            .controls { padding: 8px 12px; gap: 6px; }
            .btn { padding: 6px 10px; font-size: 12px; }
            .btn-icon { width: 32px; height: 32px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <canvas id="game-canvas"></canvas>

        <div class="controls">
            <button class="btn" id="add-btn">➕</button>
            <button class="btn" id="switch-3d-btn">3D</button>
            <button class="btn btn-icon" id="menu-btn">⚙️</button>
            <div id="dropdown-menu">
                <div class="menu-item speed-control">
                    <div class="header">
                        <span>⚡ Скорость</span>
                        <span id="speed-val">5</span>
                    </div>
                    <input type="range" id="energy-speed" min="1" max="10" value="5" step="1" />
                </div>
                <div class="menu-item" id="reset-btn" style="color:#ff4d4d;">
                    <span>🔄 Сброс</span>
                </div>
                <div class="menu-item" id="toggle-energy-menu" style="display:flex; justify-content:space-between;">
                    <span>🌀 Энергия</span>
                    <span class="toggle" id="energy-status-menu">Вкл</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления -->
    <div id="add-modal">
        <div class="add-box">
            <h3 id="add-title">➕ Добавить</h3>
            <div class="input-group">
                <label>Тип</label>
                <select id="input-type">
                    <option value="cloud">☁️ Мысль</option>
                    <option value="feeling">🧱 Чувство</option>
                </select>
            </div>
            <div class="input-group">
                <label>Смайл</label>
                <input type="text" id="input-emoji" placeholder="Например: ☁️" />
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="input-name" placeholder="Введите название" />
            </div>
            <div class="add-actions">
                <button class="btn" id="add-save-btn" style="background:#6f52c4; color:#fff; flex:1; border:none; border-radius:20px; padding:12px; cursor:pointer;">✅ Посадить</button>
                <button class="btn-cancel" id="add-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // ============= ИНИЦИАЛИЗАЦИЯ =============
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let w = Math.max(1, window.innerWidth);
        let h = Math.max(1, window.innerHeight);
        let cx = w / 2;
        let cy = h / 2;

        let energyEnabled = true;
        let energySpeed = 5;
        let energyProgress = 0;
        let energyDirection = 1;

        let clouds = [], feelings = [];
        let nextId = 1;

        let skyEnd, feelingEnd;

        // ============= УЗЛЫ (С ИХ ДЕФОЛТНЫМИ КООРДИНАТАМИ) =============
        const defaultNodes = {
            leftLeg:  { x: 0, y: 0, emoji: '🟦', label: 'Левая нога' },
            rightLeg: { x: 0, y: 0, emoji: '🟥', label: 'Правая нога' },
            leftHand: { x: 0, y: 0, emoji: '🔵', label: 'Левая рука' },
            rightHand: { x: 0, y: 0, emoji: '🔴', label: 'Правая рука' },
            heart:    { x: 0, y: 0, emoji: '🟢', label: 'Сердце' },
            center:   { x: 0, y: 0, emoji: '🟠', label: 'Живот' }
        };

        let nodes = JSON.parse(JSON.stringify(defaultNodes));
        let sunPos = { x: cx, y: 40 };

        // ============= ОБЩЕЕ ХРАНИЛИЩЕ =============
        const STORAGE_KEY = 'dreams_tree_shared';

        function saveSharedState() {
            const data = {
                leftLeg:  { x: nodes.leftLeg.x,  y: nodes.leftLeg.y },
                rightLeg: { x: nodes.rightLeg.x, y: nodes.rightLeg.y },
                center:   { x: nodes.center.x,   y: nodes.center.y },
                heart:    { x: nodes.heart.x,    y: nodes.heart.y },
                head:     { x: sunPos.x,         y: sunPos.y },
                clouds:   clouds,
                feelings: feelings,
                nextId:   nextId,
                energyEnabled: energyEnabled,
                energySpeed:   energySpeed
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadSharedState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                if (data.leftLeg)  { nodes.leftLeg.x  = data.leftLeg.x;  nodes.leftLeg.y  = data.leftLeg.y; }
                if (data.rightLeg) { nodes.rightLeg.x = data.rightLeg.x; nodes.rightLeg.y = data.rightLeg.y; }
                if (data.center)   { nodes.center.x   = data.center.x;   nodes.center.y   = data.center.y; }
                if (data.heart)    { nodes.heart.x    = data.heart.x;    nodes.heart.y    = data.heart.y; }
                if (data.head)     { sunPos.x         = data.head.x;     sunPos.y         = data.head.y; }
                if (data.clouds)   { clouds = data.clouds; }
                if (data.feelings) { feelings = data.feelings; }
                if (data.nextId)   { nextId = data.nextId; }
                if (data.energyEnabled !== undefined) energyEnabled = data.energyEnabled;
                if (data.energySpeed !== undefined)   energySpeed = data.energySpeed;
                return true;
            } catch(e) {
                return false;
            }
        }

        // ============= МАСШТАБИРОВАНИЕ =============
        function resize() {
            const rect = canvas.getBoundingClientRect();
            const wPx = Math.max(1, Math.round(rect.width));
            const hPx = Math.max(1, Math.round(rect.height));
            canvas.width = wPx; canvas.height = hPx;
            w = canvas.width; h = canvas.height;
            cx = w / 2; cy = h / 2;

            skyEnd = h * 0.33;
            feelingEnd = h * 0.66;

            const dx = w * 0.12;
            const dy = h * 0.10;

            // Если координаты ещё не заданы, ставим дефолтные
            if (nodes.leftLeg.x === 0 && nodes.leftLeg.y === 0) {
                nodes.leftLeg  = { x: cx - dx, y: feelingEnd + dy, emoji: '🟦', label: 'Левая нога' };
                nodes.rightLeg = { x: cx + dx, y: feelingEnd + dy, emoji: '🟥', label: 'Правая нога' };
                nodes.leftHand = { x: cx - dx, y: feelingEnd - dy, emoji: '🔵', label: 'Левая рука' };
                nodes.rightHand = { x: cx + dx, y: feelingEnd - dy, emoji: '🔴', label: 'Правая рука' };
                nodes.heart = { x: cx, y: feelingEnd - dy, emoji: '🟢', label: 'Сердце' };
                nodes.center = { x: cx, y: feelingEnd, emoji: '🟠', label: 'Живот' };
                sunPos = { x: cx, y: 40 };
                // Сразу сохраняем дефолтные позиции
                saveSharedState();
            }
        }

        // ============= ЛОГИКА ДВИЖЕНИЯ =============
        function updateGeometry() {
            const lx = nodes.leftLeg.x, ly = nodes.leftLeg.y;
            const rx = nodes.rightLeg.x, ry = nodes.rightLeg.y;
            const cxCenter = nodes.center.x, cyCenter = nodes.center.y;

            // Правая рука зависит от левой ноги (через живот)
            nodes.rightHand.x = 2 * cxCenter - lx;
            nodes.rightHand.y = 2 * cyCenter - ly;

            // Левая рука зависит от правой ноги (через живот)
            nodes.leftHand.x = 2 * cxCenter - rx;
            nodes.leftHand.y = 2 * cyCenter - ry;

            // Сердце — по центру между руками
            nodes.heart.x = cxCenter;
            nodes.heart.y = (nodes.leftHand.y + nodes.rightHand.y) / 2;

            // Глаз (солнце) остаётся на своём месте (пользователь сам его двигает)
        }

        // ============= ЧАСТИЦЫ И ПОТОКИ =============
        function getPointOnPath2D(path, progress) {
            if (!path || path.length < 2) return {x:0, y:0};
            let totalLen = 0;
            let segmentLens = [];
            for (let i = 0; i < path.length - 1; i++) {
                const dx = path[i+1].x - path[i].x;
                const dy = path[i+1].y - path[i].y;
                const len = Math.sqrt(dx*dx + dy*dy);
                segmentLens.push(len);
                totalLen += len;
            }
            if (totalLen === 0) return path[0];
            let targetDist = progress * totalLen;
            let accumulated = 0;
            for (let i = 0; i < segmentLens.length; i++) {
                if (targetDist <= accumulated + segmentLens[i]) {
                    const t = (targetDist - accumulated) / segmentLens[i];
                    return {
                        x: path[i].x + (path[i+1].x - path[i].x) * t,
                        y: path[i].y + (path[i+1].y - path[i].y) * t
                    };
                }
                accumulated += segmentLens[i];
            }
            return path[path.length - 1];
        }

        function updateParticles() {
            const h = nodes.heart, lH = nodes.leftHand, rH = nodes.rightHand;
            const lL = nodes.leftLeg, rL = nodes.rightLeg, c = nodes.center, s = sunPos;
            
            const pathRed  = [h, rH, c, lL, s];
            const pathBlue = [h, lH, c, rL, s];

            if (energyEnabled) {
                const speed = 0.006 * (energySpeed / 5);
                energyProgress += speed * energyDirection;
                if (energyProgress >= 1.0) { energyProgress = 1.0; energyDirection = -1; }
                else if (energyProgress <= 0.0) { energyProgress = 0.0; energyDirection = 1; }
            }

            // Рисуем частицы
            const redPos = getPointOnPath2D(pathRed, energyProgress);
            const bluePos = getPointOnPath2D(pathBlue, energyProgress);

            if (redPos && bluePos) {
                // Красная
                ctx.beginPath(); ctx.arc(redPos.x, redPos.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#ff4d4d'; ctx.shadowColor = '#ff4d4d'; ctx.shadowBlur = 30; ctx.fill(); ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.arc(redPos.x, redPos.y, 22, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 77, 77, 0.2)'; ctx.fill();

                // Синяя
                ctx.beginPath(); ctx.arc(bluePos.x, bluePos.y, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#4d8bff'; ctx.shadowColor = '#4d8bff'; ctx.shadowBlur = 30; ctx.fill(); ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.arc(bluePos.x, bluePos.y, 22, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(77, 139, 255, 0.2)'; ctx.fill();
            }
        }

        // ============= ОТРИСОВКА =============
        function drawZones() {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, skyEnd);
            skyGrad.addColorStop(0, '#1a2a4a'); skyGrad.addColorStop(1, 'rgba(26, 42, 74, 0)');
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, w, skyEnd);

            // Глаз
            ctx.font = '70px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 50;
            ctx.fillText('👁️', sunPos.x, sunPos.y);
            ctx.shadowBlur = 0;

            const feelGrad = ctx.createLinearGradient(0, skyEnd, 0, feelingEnd);
            feelGrad.addColorStop(0, 'rgba(46, 204, 113, 0)'); feelGrad.addColorStop(1, 'rgba(46, 204, 113, 0.2)');
            ctx.fillStyle = feelGrad; ctx.fillRect(0, skyEnd, w, feelingEnd - skyEnd);

            const earthGrad = ctx.createLinearGradient(0, feelingEnd, 0, h);
            earthGrad.addColorStop(0, 'rgba(60, 40, 20, 0.2)'); earthGrad.addColorStop(1, 'rgba(60, 40, 20, 0.6)');
            ctx.fillStyle = earthGrad; ctx.fillRect(0, feelingEnd, w, h - feelingEnd);
            
            ctx.beginPath(); ctx.moveTo(0, feelingEnd); ctx.lineTo(w, feelingEnd);
            ctx.strokeStyle = 'rgba(255, 165, 0, 0.3)'; ctx.lineWidth = 2; ctx.stroke();
        }

        function drawStaticLines() {
            if (!sunPos || isNaN(sunPos.x) || isNaN(sunPos.y)) return;

            // 🌞 -> 🟦 Левая нога
            ctx.beginPath(); ctx.moveTo(sunPos.x, sunPos.y); ctx.lineTo(nodes.leftLeg.x, nodes.leftLeg.y);
            ctx.strokeStyle = 'rgba(77, 139, 255, 0.3)'; ctx.lineWidth = 2; ctx.stroke();

            // 🌞 -> 🟥 Правая нога
            ctx.beginPath(); ctx.moveTo(sunPos.x, sunPos.y); ctx.lineTo(nodes.rightLeg.x, nodes.rightLeg.y);
            ctx.strokeStyle = 'rgba(255, 77, 77, 0.3)'; ctx.lineWidth = 2; ctx.stroke();

            // 🟦 Левая нога -> 🟠 Живот -> 🔴 Правая рука
            ctx.beginPath(); ctx.moveTo(nodes.leftLeg.x, nodes.leftLeg.y); ctx.lineTo(nodes.center.x, nodes.center.y); ctx.lineTo(nodes.rightHand.x, nodes.rightHand.y);
            ctx.strokeStyle = 'rgba(77, 139, 255, 0.3)'; ctx.lineWidth = 2; ctx.stroke();

            // 🟥 Правая нога -> 🟠 Живот -> 🔵 Левая рука
            ctx.beginPath(); ctx.moveTo(nodes.rightLeg.x, nodes.rightLeg.y); ctx.lineTo(nodes.center.x, nodes.center.y); ctx.lineTo(nodes.leftHand.x, nodes.leftHand.y);
            ctx.strokeStyle = 'rgba(255, 77, 77, 0.3)'; ctx.lineWidth = 2; ctx.stroke();

            // 🟢 Сердце -> 🔵 Левая рука
            ctx.beginPath(); ctx.moveTo(nodes.heart.x, nodes.heart.y); ctx.lineTo(nodes.leftHand.x, nodes.leftHand.y);
            ctx.strokeStyle = 'rgba(77, 139, 255, 0.4)'; ctx.stroke();

            // 🟢 Сердце -> 🔴 Правая рука
            ctx.beginPath(); ctx.moveTo(nodes.heart.x, nodes.heart.y); ctx.lineTo(nodes.rightHand.x, nodes.rightHand.y);
            ctx.strokeStyle = 'rgba(255, 77, 77, 0.4)'; ctx.stroke();

            // Жёлтые линии: Живот → Сердце → Глаз
            ctx.beginPath(); ctx.moveTo(nodes.center.x, nodes.center.y); ctx.lineTo(nodes.heart.x, nodes.heart.y);
            ctx.strokeStyle = 'rgba(255, 204, 0, 0.5)'; ctx.lineWidth = 2; ctx.stroke();

            ctx.beginPath(); ctx.moveTo(nodes.heart.x, nodes.heart.y); ctx.lineTo(sunPos.x, sunPos.y);
            ctx.strokeStyle = 'rgba(255, 204, 0, 0.5)'; ctx.lineWidth = 2; ctx.stroke();
        }

        function drawNode(node, radius = 50, isSquare = false) {
            if (isNaN(node.x) || isNaN(node.y)) return;
            ctx.shadowBlur = 20; ctx.shadowColor = 'rgba(255, 255, 255, 0.15)';
            if (isSquare) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(node.x - radius, node.y - radius, radius * 2, radius * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 3;
                ctx.strokeRect(node.x - radius, node.y - radius, radius * 2, radius * 2);
            } else {
                ctx.beginPath(); ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)'; ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 3; ctx.stroke();
            }
            ctx.shadowBlur = 0;
            ctx.font = '42px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(node.emoji, node.x, node.y - 8);
            ctx.font = '14px system-ui'; ctx.fillStyle = '#e0d6ff';
            ctx.fillText(node.label, node.x, node.y + 35);
        }

        function drawCloudsAndFeelings() {
            // Облака (мысли)
            clouds.forEach(c => {
                const r = 45;
                ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)'; ctx.lineWidth = 3;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.3)'; ctx.shadowBlur = 20;
                ctx.stroke(); ctx.shadowBlur = 0;
                ctx.font = '34px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(c.emoji || '☁️', c.x, c.y - 6);
                ctx.font = '13px system-ui'; ctx.fillStyle = '#e0d6ff';
                ctx.fillText(c.name || '', c.x, c.y + 30);
            });

            // Чувства
            feelings.forEach(f => {
                const r = 45; const isHeavy = f.type === 'heavy';
                ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI * 2);
                ctx.fillStyle = isHeavy ? 'rgba(255, 80, 80, 0.3)' : 'rgba(80, 255, 80, 0.3)'; ctx.fill();
                ctx.strokeStyle = isHeavy ? '#ff4d4d' : '#4dff4d'; ctx.lineWidth = 3;
                ctx.shadowColor = isHeavy ? 'rgba(255, 77, 77, 0.5)' : 'rgba(77, 255, 77, 0.5)'; ctx.shadowBlur = 25;
                ctx.stroke(); ctx.shadowBlur = 0;
                ctx.font = '34px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(f.emoji || (isHeavy ? '🏋️' : '🎈'), f.x, f.y - 8);
                ctx.font = '13px system-ui'; ctx.fillStyle = '#e0d6ff';
                ctx.fillText(f.name || '', f.x, f.y + 25);
            });
        }

        function gameLoop() {
            if (!w || !h || w < 10 || h < 10) { resize(); requestAnimationFrame(gameLoop); return; }
            if (isNaN(skyEnd) || isNaN(feelingEnd)) resize();

            // Строгая геометрия
            updateGeometry();

            ctx.clearRect(0, 0, w, h);
            drawZones();
            drawStaticLines();
            drawCloudsAndFeelings();

            drawNode(nodes.leftLeg, 45, true);
            drawNode(nodes.rightLeg, 45, true);
            drawNode(nodes.center, 55, false);
            drawNode(nodes.leftHand, 50, false);
            drawNode(nodes.rightHand, 50, false);
            drawNode(nodes.heart, 50, false);

            // Частицы поверх всего
            updateParticles();

            requestAnimationFrame(gameLoop);
        }

        // ============= ИНТЕРАКТИВНОСТЬ =============
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function checkHit(pointer) {
            // Проверяем попадание в узлы (в порядке приоритета)
            if (Math.hypot(pointer.x - nodes.leftLeg.x, pointer.y - nodes.leftLeg.y) < 60) return { type: 'node', key: 'leftLeg' };
            if (Math.hypot(pointer.x - nodes.rightLeg.x, pointer.y - nodes.rightLeg.y) < 60) return { type: 'node', key: 'rightLeg' };
            if (Math.hypot(pointer.x - sunPos.x, pointer.y - sunPos.y) < 60) return { type: 'eye' };
            if (Math.hypot(pointer.x - nodes.heart.x, pointer.y - nodes.heart.y) < 60) return { type: 'node', key: 'heart' };
            if (Math.hypot(pointer.x - nodes.center.x, pointer.y - nodes.center.y) < 60) return { type: 'node', key: 'center' };
            // Проверяем облака и чувства
            for (let i = clouds.length - 1; i >= 0; i--) {
                const c = clouds[i];
                if (Math.hypot(pointer.x - c.x, pointer.y - c.y) < 55) return { type: 'cloud', item: c };
            }
            for (let i = feelings.length - 1; i >= 0; i--) {
                const f = feelings[i];
                if (Math.hypot(pointer.x - f.x, pointer.y - f.y) < 55) return { type: 'feeling', item: f };
            }
            return null;
        }

        let isDragging = false, draggedNode = null, startMouse = {x:0, y:0}, startNodePos = {x:0, y:0};
        let pendingTap = null, hasMoved = false;

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            const pos = getPointerPos(e);
            const hit = checkHit(pos);
            if (!hit) return;

            pendingTap = null; hasMoved = false;

            if (hit.type === 'eye') {
                isDragging = true; draggedNode = sunPos;
                startMouse = pos; startNodePos = { x: sunPos.x, y: sunPos.y }; return;
            }
            if (hit.type === 'node') {
                isDragging = true; draggedNode = nodes[hit.key];
                startMouse = pos; startNodePos = { x: draggedNode.x, y: draggedNode.y }; return;
            }
            if (hit.type === 'cloud' || hit.type === 'feeling') {
                pendingTap = { item: hit.item, type: hit.type };
                isDragging = true; draggedNode = hit.item;
                startMouse = pos; startNodePos = { x: hit.item.x, y: hit.item.y };
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging || !draggedNode) return;
            e.preventDefault();
            const pos = getPointerPos(e);
            const dx = pos.x - startMouse.x;
            const dy = pos.y - startMouse.y;
            if (Math.hypot(dx, dy) > 5) hasMoved = true;

            draggedNode.x = Math.max(20, Math.min(w - 20, startNodePos.x + dx));
            draggedNode.y = Math.max(20, Math.min(h - 20, startNodePos.y + dy));
            saveSharedState();
        });

        window.addEventListener('pointerup', (e) => {
            if (pendingTap && !hasMoved) {
                // Открываем модалку для добавления
                openAddModal();
                pendingTap = null;
            }
            if (isDragging) {
                isDragging = false; draggedNode = null; saveSharedState();
            }
        });

        // ============= МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ =============
        const addModal = document.getElementById('add-modal');
        const addTitle = document.getElementById('add-title');
        const inputEmoji = document.getElementById('input-emoji');
        const inputName = document.getElementById('input-name');
        const inputType = document.getElementById('input-type');
        const addSaveBtn = document.getElementById('add-save-btn');
        const addCloseBtn = document.getElementById('add-close-btn');

        function openAddModal() {
            inputEmoji.value = ''; inputName.value = '';
            addTitle.textContent = '➕ Добавить мысль или чувство';
            addModal.classList.add('open');
        }

        function closeAddModal() { addModal.classList.remove('open'); }

        function saveAddItem() {
            const type = inputType.value; // 'cloud' или 'feeling'
            const emoji = inputEmoji.value.trim() || (type === 'cloud' ? '☁️' : '🧱');
            const name = inputName.value.trim() || 'Элемент';
            
            const newItem = {
                id: nextId++,
                emoji,
                name,
                type, // для чувств: 'heavy' или 'light'? В оригинале чувства имели тип 'heavy' или 'light', но здесь мы используем тип 'feeling' и тяжесть определяется отдельно? В оригинале чувства имели подтип 'heavy'/'light'. Но в этом коде я упростил: чувства всегда одного типа. Если нужно, можно добавить выбор тяжести, но пока оставлю как есть.
                x: cx + (Math.random() - 0.5) * 300,
                y: 40 + Math.random() * 80 // для облаков
            };
            if (type === 'cloud') {
                newItem.y = 40 + Math.random() * 80;
                clouds.push(newItem);
            } else {
                newItem.y = skyEnd + 30 + Math.random() * (feelingEnd - skyEnd - 60);
                // В оригинале чувства имели свойство 'type' = 'heavy' или 'light'. Добавим случайный.
                newItem.type = Math.random() > 0.5 ? 'heavy' : 'light';
                feelings.push(newItem);
            }
            saveSharedState();
            closeAddModal();
        }

        // Обработчики модалки
        document.getElementById('add-close-btn').addEventListener('click', closeAddModal);
        document.getElementById('add-save-btn').addEventListener('click', saveAddItem);
        addModal.addEventListener('click', (e) => { if (e.target === addModal) closeAddModal(); });

        // ============= КНОПКИ УПРАВЛЕНИЯ =============
        const addBtn = document.getElementById('add-btn');
        const menuBtn = document.getElementById('menu-btn');
        const dropdown = document.getElementById('dropdown-menu');
        const resetBtn = document.getElementById('reset-btn');
        const speedSlider = document.getElementById('energy-speed');
        const speedVal = document.getElementById('speed-val');
        const switch3DBtn = document.getElementById('switch-3d-btn');
        const toggleEnergyMenu = document.getElementById('toggle-energy-menu');
        const energyStatusMenu = document.getElementById('energy-status-menu');

        // Кнопка "+"
        addBtn.addEventListener('click', () => {
            openAddModal();
        });

        // Энергия (в меню)
        toggleEnergyMenu.addEventListener('click', () => {
            energyEnabled = !energyEnabled;
            energyStatusMenu.textContent = energyEnabled ? 'Вкл' : 'Выкл';
            saveSharedState();
            dropdown.classList.remove('open');
        });

        // Меню
        menuBtn.addEventListener('click', () => { dropdown.classList.toggle('open'); });
        document.addEventListener('click', (e) => {
            if (!dropdown.contains(e.target) && e.target !== menuBtn) dropdown.classList.remove('open');
        });

        // Сброс
        resetBtn.addEventListener('click', () => {
            dropdown.classList.remove('open');
            if (confirm('Сбросить положение всех узлов?')) {
                // Возвращаем дефолтные координаты
                nodes.leftLeg = { ...defaultNodes.leftLeg };
                nodes.rightLeg = { ...defaultNodes.rightLeg };
                nodes.center = { ...defaultNodes.center };
                nodes.heart = { ...defaultNodes.heart };
                nodes.leftHand = { ...defaultNodes.leftHand };
                nodes.rightHand = { ...defaultNodes.rightHand };
                sunPos = { x: cx, y: 40 };
                // Пересчитываем геометрию
                updateGeometry();
                saveSharedState();
                // Мгновенно обновляем отрисовку
                drawStaticLines();
            }
        });

        // Скорость
        speedSlider.addEventListener('input', () => {
            energySpeed = parseInt(speedSlider.value);
            speedVal.textContent = energySpeed;
            saveSharedState();
        });

        // Переход на 3D
        switch3DBtn.addEventListener('click', () => {
            saveSharedState(); // перед уходом сохраняем всё
            window.location.href = '../3d/';
        });

        // ============= ЗАПУСК =============
        window.addEventListener('resize', resize);
        resize();

        // Загружаем состояние из общего хранилища
        loadSharedState();

        // Устанавливаем значения в UI
        energyStatusMenu.textContent = energyEnabled ? 'Вкл' : 'Выкл';
        speedSlider.value = energySpeed;
        speedVal.textContent = energySpeed;

        // Запускаем игровой цикл
        gameLoop();

        console.log('🟣🦅 Древо Жизни 2D (с кнопкой +, синхронизация) загружено!');
    </script>
</body>
</html>
