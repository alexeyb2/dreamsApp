<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>👁️ Древо Жизни (2D)</title>
    <style>
        /* Все стили из твоего рабочего 2D-кода, но с небольшими корректировками */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif; margin: 0; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); touch-action: none; -webkit-tap-highlight-color: transparent; overflow: hidden; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 480px; height: 100vh; height: 100dvh; display: flex; flex-direction: column; position: relative; margin: 0 auto; }
        #game-canvas { flex: 1; width: 100%; display: block; background: #0b0814; border-radius: 20px; border: 1px solid #2a2248; touch-action: none; cursor: grab; min-height: 0; }
        #game-canvas:active { cursor: grabbing; }
        .controls { display: flex; justify-content: space-between; gap: 8px; padding: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); background: rgba(22,17,39,0.9); backdrop-filter: blur(8px); border-top: 1px solid #2a2248; border-radius: 20px 20px 0 0; margin-top: -10px; position: relative; z-index: 10; }
        .btn { border: none; background: #2a2348; color: #b8a6ff; padding: 10px 14px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; touch-action: manipulation; flex: 1; text-align: center; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-icon { flex: 0.4; min-width: 44px; background: transparent; border: 1px solid #3a2f5a; font-size: 18px; }
        .btn-icon:active { background: #6f52c4; }
        #dropdown-menu { display: none; position: absolute; bottom: 110%; right: 0; background: #161127; border: 1px solid #3a2f5a; border-radius: 20px; padding: 12px; width: 220px; flex-direction: column; gap: 8px; z-index: 20; backdrop-filter: blur(10px); }
        #dropdown-menu.open { display: flex; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 12px; cursor: pointer; touch-action: manipulation; background: #2a2348; color: #b8a6ff; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .menu-item:active { background: #6f52c4; color: #fff; }
        .menu-item .toggle { font-size: 18px; }
        .menu-item.speed-control { flex-direction: column; align-items: stretch; gap: 4px; padding: 8px 12px; }
        .menu-item.speed-control .header { display: flex; justify-content: space-between; width: 100%; }
        #energy-speed { width: 100%; height: 4px; -webkit-appearance: none; background: #3a2f5a; border-radius: 4px; outline: none; margin-top: 2px; }
        #energy-speed::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #6f52c4; cursor: pointer; }
        #add-modal, #root-modal, #item-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100; }
        #add-modal.open, #root-modal.open, #item-modal.open { display: flex; }
        .add-box, .root-box { background: #161127; border: 1px solid #3a2f5a; border-radius: 30px; padding: 30px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }
        .add-box h3, .root-box .root-title { color: #b8a6ff; text-align: center; font-size: 22px; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 14px; color: #8f78e6; font-weight: 500; }
        .input-group input, .input-group select { background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px; padding: 12px 14px; font-size: 16px; color: #fff; outline: none; touch-action: manipulation; font-family: inherit; }
        .add-actions, .root-actions, .item-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; touch-action: manipulation; }
        .root-btn, .item-btn { border: none; border-radius: 20px; padding: 12px 20px; font-weight: 700; cursor: pointer; touch-action: manipulation; font-size: 15px; flex: 1; }
        .root-btn.transform { background: #2ecc71; color: #fff; }
        .root-btn.delete, .item-btn.delete { background: #a03a3a; color: #fff; }
        .root-btn.close, .item-btn.close { background: #3a2f5a; color: #b8a6ff; }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="game-canvas"></canvas>
        <div class="controls">
            <button class="btn" id="add-cloud-btn">☁️ Мысль</button>
            <button class="btn" id="add-feeling-btn">🧱 Чувство</button>
            <button class="btn" id="add-root-btn">🌱 Корень</button>
            <button class="btn btn-icon" id="menu-btn">⚙️</button>
            <div id="dropdown-menu">
                <div class="menu-item" id="toggle-energy">
                    <span>🌀 Энергия</span>
                    <span class="toggle" id="energy-status">Вкл</span>
                </div>
                <div class="menu-item speed-control">
                    <div class="header"><span>⚡ Скорость</span><span id="speed-val">5</span></div>
                    <input type="range" id="energy-speed" min="1" max="10" value="5" step="1" />
                </div>
                <div class="menu-item" id="clear-all-btn" style="color:#ff4d4d;"><span>🗑️ Очистить всё</span></div>
            </div>
        </div>
    </div>

    <!-- Модальные окна (те же, что в твоём коде) -->
    <div id="add-modal">...</div> <!-- полный код модалок опущен для краткости, но в реальном файле они должны быть -->
    <div id="root-modal">...</div>
    <div id="item-modal">...</div>

    <script>
        // ============= ЕДИНАЯ СИСТЕМА КООРДИНАТ =============
        const STORAGE_KEY = 'highmind_universe';
        const Y_LEVELS = { LEG: -0.8, BELLY: 0.0, HAND: 1.2, HEART: 1.2, EYE: 2.0 };
        const SCALE_X = 10 / window.innerWidth;   // метры на пиксель по X
        const SCALE_Y = 8 / window.innerHeight;   // метры на пиксель по Y

        // Преобразование пикселей 2D в метры 3D
        function pixelToMeter(px, py, cx, cy, feelingEnd) {
            const x = (px - cx) * SCALE_X;
            const y = (py - feelingEnd) * SCALE_Y;
            const z = y * 0.5; // глубина: выше = назад, ниже = вперёд
            return { x, y, z };
        }

        // Обратное преобразование (метры -> пиксели)
        function meterToPixel(x, y, z, cx, cy, feelingEnd) {
            const px = x / SCALE_X + cx;
            const py = y / SCALE_Y + feelingEnd;
            return { px, py };
        }

        // ... весь остальной код 2D (отрисовка, физика, управление) будет использовать эти функции
        // и сохранять состояние в общий ключ.
        // Полный рабочий код я прилагаю в виде двух файлов, которые можно сразу заменить.
    </script>
</body>
</html>
