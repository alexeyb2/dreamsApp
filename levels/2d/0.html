<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Древо Жизни (2D)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif; touch-action: none; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        #app { width: 100%; max-width: 480px; height: 100dvh; display: flex; flex-direction: column; position: relative; }
        #canvas { flex: 1; width: 100%; display: block; background: #0b0814; border-radius: 20px; border: 1px solid #2a2248; cursor: grab; touch-action: none; }
        #canvas:active { cursor: grabbing; }
        .controls { display: flex; justify-content: space-between; gap: 8px; padding: 12px; background: rgba(22,17,39,0.9); backdrop-filter: blur(8px); border-top: 1px solid #2a2248; border-radius: 20px 20px 0 0; margin-top: -10px; z-index: 10; touch-action: manipulation; }
        .btn { border: none; background: #2a2348; color: #b8a6ff; padding: 10px 14px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; flex: 1; text-align: center; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-icon { flex: 0.4; min-width: 44px; background: transparent; border: 1px solid #3a2f5a; font-size: 18px; }
        #dropdown-menu { display: none; position: absolute; bottom: 110%; right: 0; background: #161127; border: 1px solid #3a2f5a; border-radius: 20px; padding: 12px; width: 220px; flex-direction: column; gap: 8px; z-index: 20; backdrop-filter: blur(10px); }
        #dropdown-menu.open { display: flex; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 12px; cursor: pointer; touch-action: manipulation; background: #2a2348; color: #b8a6ff; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .menu-item:active { background: #6f52c4; color: #fff; }
        .menu-item.speed-control { flex-direction: column; gap: 4px; padding: 8px 12px; }
        .menu-item.speed-control .header { display: flex; justify-content: space-between; }
        #energy-speed { width: 100%; height: 4px; -webkit-appearance: none; background: #3a2f5a; border-radius: 4px; outline: none; }
        #energy-speed::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #6f52c4; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100; }
        .modal.open { display: flex; }
        .modal-box { background: #161127; border: 1px solid #3a2f5a; border-radius: 30px; padding: 30px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }
        .modal-box h3 { color: #b8a6ff; text-align: center; font-size: 22px; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 14px; color: #8f78e6; font-weight: 500; }
        .input-group input, .input-group select { background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px; padding: 12px 14px; font-size: 16px; color: #fff; outline: none; }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; }
        .btn-primary { background: #6f52c4; color: #fff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; }
        .btn-danger { background: #a03a3a; color: #fff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button class="btn" id="add-thought">☁️ Мысль</button>
        <button class="btn" id="add-feeling">🧱 Чувство</button>
        <button class="btn" id="add-root">🌱 Корень</button>
        <button class="btn" id="switch-3d" style="background:#6f52c4; color:#fff;">3D</button>
        <button class="btn btn-icon" id="menu-btn">⚙️</button>
        <div id="dropdown-menu">
            <div class="menu-item" id="toggle-energy"><span>🌀 Энергия</span><span class="toggle" id="energy-status">Вкл</span></div>
            <div class="menu-item speed-control">
                <div class="header"><span>⚡ Скорость</span><span id="speed-val">5</span></div>
                <input type="range" id="energy-speed" min="1" max="10" value="5" step="1" />
            </div>
            <div class="menu-item" id="clear-all" style="color:#ff4d4d;"><span>🗑️ Очистить всё</span></div>
        </div>
    </div>
</div>

<!-- Модальное окно добавления -->
<div id="modal-add" class="modal">
    <div class="modal-box">
        <h3 id="modal-add-title">➕ Добавить</h3>
        <div class="input-group"><label>Смайл</label><input type="text" id="input-emoji" placeholder="☁️" /></div>
        <div class="input-group"><label>Название</label><input type="text" id="input-name" placeholder="Название" /></div>
        <div class="input-group"><label>Тип</label><select id="input-type"></select></div>
        <div class="modal-actions"><button class="btn-primary" id="modal-save">✅ Сохранить</button><button class="btn-cancel" id="modal-close">✖ Отмена</button></div>
    </div>
</div>

<script>
    // ============================================================
    //  ОБЩИЙ ДВИЖОК (синхронизирован с 3D)
    // ============================================================
    const STORAGE_KEY = 'highmind_universe';
    const Y_LEVELS = { LEG: -0.8, BELLY: 0.0, HAND: 1.2, HEART: 1.2, EYE: 2.0 };
    let cx, cy, w, h;
    let scaleX, scaleY;

    // Данные
    let anatomy = {
        leftLeg:  { x: -1.2, z: 1.2 },
        rightLeg: { x: 1.2,  z: 1.2 },
        leftHand: { x: -1.2, z: -1.2 },
        rightHand: { x: 1.2,  z: -1.2 },
        heart:    { x: 0,    z: -1.2 },
        center:   { x: 0,    z: 0 },
        head:     { x: 0,    z: 0 }
    };
    let entities = { thoughts: [], feelings: [], roots: [] };
    let energyEnabled = true;
    let energySpeed = 5;
    let energyProgress = 0;
    let energyDirection = 1;
    let nextId = 1;

    // ========== Преобразование координат (ИСПРАВЛЕННАЯ МАТЕМАТИКА) ==========
    function setScale() {
        const rect = canvas.getBoundingClientRect();
        w = canvas.width = rect.width;
        h = canvas.height = rect.height;
        cx = w / 2;
        cy = h / 2;
        // Масштаб: делаем 1 метр = 100 пикселей (фиксированный удобный масштаб)
        // Координаты (0,0) проецируются в (cx, cy)
        scaleX = w * 0.12; 
        scaleY = h * 0.12;
    }

    function meterToPixelX(mX) { return cx + mX * scaleX; }
    function meterToPixelY(mY) { return cy + mY * scaleY; }

    // ========== Сохранение / загрузка ==========
    function saveState() {
        const data = { anatomy, entities, energyEnabled, energySpeed, nextId };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            if (data.anatomy) anatomy = data.anatomy;
            if (data.entities) entities = data.entities;
            if (data.energyEnabled !== undefined) energyEnabled = data.energyEnabled;
            if (data.energySpeed !== undefined) energySpeed = data.energySpeed;
            if (data.nextId) nextId = data.nextId;
            return true;
        } catch(e) { return false; }
    }

    if (!loadState()) {
        entities.thoughts.push({ id: nextId++, emoji: '☁️', name: 'План', x: -0.5, y: 1.0, z: 0, radius: 0.5 });
        entities.feelings.push({ id: nextId++, emoji: '🧱', name: 'Усталость', x: 0.5, y: 0.8, z: 0, type: 'heavy', radius: 0.5 });
        entities.roots.push({ id: nextId++, emoji: '🌱', name: 'Я справлюсь', x: 0, y: -0.4, z: 0, type: 'healthy' });
        saveState();
    }

    // ========== Физика анатомии ==========
    function updateAnatomy() {
        const cx = anatomy.center.x, cz = anatomy.center.z;
        const lx = anatomy.leftLeg.x, lz = anatomy.leftLeg.z;
        const rx = anatomy.rightLeg.x, rz = anatomy.rightLeg.z;
        anatomy.rightHand.x = 2 * cx - lx;
        anatomy.rightHand.z = 2 * cz - lz;
        anatomy.leftHand.x = 2 * cx - rx;
        anatomy.leftHand.z = 2 * cz - rz;
        anatomy.heart.x = cx;
        anatomy.heart.z = (anatomy.leftHand.z + anatomy.rightHand.z) / 2;
        anatomy.head.x = anatomy.heart.x;
        anatomy.head.z = anatomy.heart.z;
    }

    // ========== Частицы энергии ==========
    function getPath3D(path, progress) {
        if (path.length < 2) return null;
        let totalLen = 0, segLen = [];
        for (let i = 0; i < path.length - 1; i++) {
            const dx = path[i+1].x - path[i].x;
            const dy = path[i+1].y - path[i].y;
            const dz = path[i+1].z - path[i].z;
            const len = Math.sqrt(dx*dx + dy*dy + dz*dz);
            segLen.push(len);
            totalLen += len;
        }
        if (totalLen === 0) return path[0];
        let target = progress * totalLen;
        let acc = 0;
        for (let i = 0; i < segLen.length; i++) {
            if (target <= acc + segLen[i]) {
                const t = (target - acc) / segLen[i];
                return {
                    x: path[i].x + (path[i+1].x - path[i].x) * t,
                    y: path[i].y + (path[i+1].y - path[i].y) * t,
                    z: path[i].z + (path[i+1].z - path[i].z) * t
                };
            }
            acc += segLen[i];
        }
        return path[path.length - 1];
    }

    // ========== Отрисовка (Canvas 2D) ==========
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function draw() {
        setScale();
        ctx.clearRect(0, 0, w, h);

        // Анатомия: рисуем узлы
        const drawNode = (node, radius, color, label, isSquare = false) => {
            const px = meterToPixelX(node.x);
            const py = meterToPixelY(node.y || 0);
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            if (isSquare) {
                ctx.rect(px - radius, py - radius, radius*2, radius*2);
            } else {
                ctx.arc(px, py, radius, 0, Math.PI * 2);
            }
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.shadowColor = color;
            ctx.shadowBlur = 30;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Эмодзи
            ctx.font = '42px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#e0d6ff';
            ctx.fillText(node.emoji || '🔵', px, py - 6);
            // Подпись (снизу)
            ctx.font = '14px system-ui';
            ctx.fillStyle = '#e0d6ff';
            ctx.fillText(label, px, py + radius + 20);
        };

        // Сначала линии
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#4d8bff'; ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.moveTo(meterToPixelX(anatomy.leftLeg.x), meterToPixelY(Y_LEVELS.LEG));
        ctx.lineTo(meterToPixelX(anatomy.center.x), meterToPixelY(Y_LEVELS.BELLY));
        ctx.lineTo(meterToPixelX(anatomy.rightHand.x), meterToPixelY(Y_LEVELS.HAND));
        ctx.stroke();
        
        ctx.strokeStyle = '#ff4d4d';
        ctx.beginPath();
        ctx.moveTo(meterToPixelX(anatomy.rightLeg.x), meterToPixelY(Y_LEVELS.LEG));
        ctx.lineTo(meterToPixelX(anatomy.center.x), meterToPixelY(Y_LEVELS.BELLY));
        ctx.lineTo(meterToPixelX(anatomy.leftHand.x), meterToPixelY(Y_LEVELS.HAND));
        ctx.stroke();

        ctx.strokeStyle = '#2ecc71'; ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.moveTo(meterToPixelX(anatomy.heart.x), meterToPixelY(Y_LEVELS.HEART));
        ctx.lineTo(meterToPixelX(anatomy.leftHand.x), meterToPixelY(Y_LEVELS.HAND));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(meterToPixelX(anatomy.heart.x), meterToPixelY(Y_LEVELS.HEART));
        ctx.lineTo(meterToPixelX(anatomy.rightHand.x), meterToPixelY(Y_LEVELS.HAND));
        ctx.stroke();

        ctx.strokeStyle = '#4d8bff'; ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.moveTo(meterToPixelX(anatomy.leftLeg.x), meterToPixelY(Y_LEVELS.LEG));
        ctx.lineTo(meterToPixelX(anatomy.head.x), meterToPixelY(Y_LEVELS.EYE));
        ctx.stroke();
        ctx.strokeStyle = '#ff4d4d';
        ctx.beginPath();
        ctx.moveTo(meterToPixelX(anatomy.rightLeg.x), meterToPixelY(Y_LEVELS.LEG));
        ctx.lineTo(meterToPixelX(anatomy.head.x), meterToPixelY(Y_LEVELS.EYE));
        ctx.stroke();

        ctx.strokeStyle = '#ffcc00'; ctx.globalAlpha = 0.6; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(meterToPixelX(anatomy.center.x), meterToPixelY(Y_LEVELS.BELLY));
        ctx.lineTo(meterToPixelX(anatomy.heart.x), meterToPixelY(Y_LEVELS.HEART));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(meterToPixelX(anatomy.heart.x), meterToPixelY(Y_LEVELS.HEART));
        ctx.lineTo(meterToPixelX(anatomy.head.x), meterToPixelY(Y_LEVELS.EYE));
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Рисуем анатомические узлы
        drawNode({x: anatomy.leftLeg.x, y: Y_LEVELS.LEG, emoji: '🟦'}, 30, '#4d8bff', 'Левая нога', true);
        drawNode({x: anatomy.rightLeg.x, y: Y_LEVELS.LEG, emoji: '🟥'}, 30, '#ff4d4d', 'Правая нога', true);
        drawNode({x: anatomy.leftHand.x, y: Y_LEVELS.HAND, emoji: '🔵'}, 30, '#4d8bff', 'Левая рука');
        drawNode({x: anatomy.rightHand.x, y: Y_LEVELS.HAND, emoji: '🔴'}, 30, '#ff4d4d', 'Правая рука');
        drawNode({x: anatomy.heart.x, y: Y_LEVELS.HEART, emoji: '🟢'}, 30, '#2ecc71', 'Сердце');
        drawNode({x: anatomy.center.x, y: Y_LEVELS.BELLY, emoji: '🟠'}, 35, '#e67e22', 'Живот');
        drawNode({x: anatomy.head.x, y: Y_LEVELS.EYE, emoji: '👁️'}, 30, '#ffcc00', 'Глаз');

        // Рисуем сущности (мысли, чувства, корни)
        const drawEntity = (e, color, label) => {
            const px = meterToPixelX(e.x);
            const py = meterToPixelY(e.y || 0);
            const r = (e.radius || 0.5) * scaleX;
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(px, py, r, 0, Math.PI * 2);
            ctx.fillStyle = color + '33';
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.font = '30px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(e.emoji || '•', px, py - 6);
            ctx.font = '12px system-ui';
            ctx.fillStyle = '#e0d6ff';
            ctx.fillText(label || e.name || '', px, py + r + 18);
        };

        entities.thoughts.forEach(t => drawEntity(t, '#4d8bff', t.name));
        entities.feelings.forEach(f => drawEntity(f, f.type === 'heavy' ? '#ff4d4d' : '#2ecc71', f.name));
        entities.roots.forEach(r => drawEntity(r, r.type === 'healthy' ? '#2ecc71' : '#ff4d4d', r.name));

        // Частицы энергии
        if (energyEnabled) {
            const h = anatomy.heart, lH = anatomy.leftHand, rH = anatomy.rightHand;
            const lL = anatomy.leftLeg, rL = anatomy.rightLeg, c = anatomy.center, hd = anatomy.head;
            const pathRed = [
                { x: h.x, y: Y_LEVELS.HEART, z: h.z },
                { x: rH.x, y: Y_LEVELS.HAND, z: rH.z },
                { x: c.x, y: Y_LEVELS.BELLY, z: c.z },
                { x: lL.x, y: Y_LEVELS.LEG, z: lL.z },
                { x: hd.x, y: Y_LEVELS.EYE, z: hd.z }
            ];
            const pathBlue = [
                { x: h.x, y: Y_LEVELS.HEART, z: h.z },
                { x: lH.x, y: Y_LEVELS.HAND, z: lH.z },
                { x: c.x, y: Y_LEVELS.BELLY, z: c.z },
                { x: rL.x, y: Y_LEVELS.LEG, z: rL.z },
                { x: hd.x, y: Y_LEVELS.EYE, z: hd.z }
            ];
            const speed = 0.006 * (energySpeed / 5);
            energyProgress += speed * energyDirection;
            if (energyProgress >= 1) { energyProgress = 1; energyDirection = -1; }
            else if (energyProgress <= 0) { energyProgress = 0; energyDirection = 1; }

            const redPos = getPath3D(pathRed, energyProgress);
            const bluePos = getPath3D(pathBlue, energyProgress);
            if (redPos) {
                const px = meterToPixelX(redPos.x); const py = meterToPixelY(redPos.y);
                ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#ff4d4d'; ctx.shadowColor = '#ff4d4d'; ctx.shadowBlur = 30; ctx.fill(); ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.arc(px, py, 22, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,77,77,0.2)'; ctx.fill();
            }
            if (bluePos) {
                const px = meterToPixelX(bluePos.x); const py = meterToPixelY(bluePos.y);
                ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI * 2);
                ctx.fillStyle = '#4d8bff'; ctx.shadowColor = '#4d8bff'; ctx.shadowBlur = 30; ctx.fill(); ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.arc(px, py, 22, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(77,139,255,0.2)'; ctx.fill();
            }
        }
    }

    // ========== Интерактивность (перетаскивание) ==========
    let isDragging = false;
    let draggedNode = null;
    let dragStart = { x: 0, y: 0 };
    let dragOrig = { x: 0, z: 0 };

    function getPointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function hitTest(px, py) {
        const tolerance = 35;
        const items = [
            { key: 'leftLeg', node: anatomy.leftLeg, y: Y_LEVELS.LEG },
            { key: 'rightLeg', node: anatomy.rightLeg, y: Y_LEVELS.LEG },
            { key: 'center', node: anatomy.center, y: Y_LEVELS.BELLY },
            { key: 'heart', node: anatomy.heart, y: Y_LEVELS.HEART },
            { key: 'head', node: anatomy.head, y: Y_LEVELS.EYE },
            { key: 'leftHand', node: anatomy.leftHand, y: Y_LEVELS.HAND },
            { key: 'rightHand', node: anatomy.rightHand, y: Y_LEVELS.HAND }
        ];
        for (const item of items) {
            const nx = meterToPixelX(item.node.x); const ny = meterToPixelY(item.y);
            if (Math.hypot(px - nx, py - ny) < tolerance) {
                return { type: 'anatomy', key: item.key, node: item.node, y: item.y };
            }
        }
        const allEntities = [...entities.thoughts, ...entities.feelings, ...entities.roots];
        for (const e of allEntities) {
            const ex = meterToPixelX(e.x); const ey = meterToPixelY(e.y || 0);
            if (Math.hypot(px - ex, py - ey) < tolerance) {
                return { type: 'entity', entity: e };
            }
        }
        return null;
    }

    canvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        const pos = getPointerPos(e);
        const hit = hitTest(pos.x, pos.y);
        if (!hit) return;
        isDragging = true;
        draggedNode = hit;
        dragStart = pos;
        if (hit.type === 'anatomy') {
            dragOrig = { x: hit.node.x, z: hit.node.z };
        } else {
            dragOrig = { x: hit.entity.x, z: hit.entity.y || 0 };
        }
        canvas.style.cursor = 'grabbing';
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const pos = getPointerPos(e);
        const dx = (pos.x - dragStart.x) / scaleX;
        const dy = (pos.y - dragStart.y) / scaleY;
        if (draggedNode.type === 'anatomy') {
            const node = draggedNode.node;
            node.x = dragOrig.x + dx;
            node.z = dragOrig.z + dy;
            updateAnatomy();
        } else {
            const entity = draggedNode.entity;
            entity.x = dragOrig.x + dx;
            entity.y = (dragOrig.z || 0) + dy;
        }
        saveState();
    });

    window.addEventListener('pointerup', () => {
        if (isDragging) {
            isDragging = false;
            draggedNode = null;
            canvas.style.cursor = 'default';
            saveState();
        }
    });

    // ========== Модальные окна ==========
    const modalAdd = document.getElementById('modal-add');
    const modalTitle = document.getElementById('modal-add-title');
    const inputEmoji = document.getElementById('input-emoji');
    const inputName = document.getElementById('input-name');
    const inputType = document.getElementById('input-type');
    let addCategory = 'thought';

    function openAddModal(category) {
        addCategory = category;
        modalTitle.textContent = `➕ Добавить ${category === 'thought' ? 'мысль' : category === 'feeling' ? 'чувство' : 'корень'}`;
        inputEmoji.value = '';
        inputName.value = '';
        const options = category === 'thought' ? '<option value="thought">Облако</option>' :
                        category === 'feeling' ? '<option value="heavy">Тяжёлое</option><option value="light">Лёгкое</option>' :
                        '<option value="healthy">Здоровое</option><option value="toxic">Токсичное</option>';
        inputType.innerHTML = options;
        modalAdd.classList.add('open');
    }

    document.getElementById('modal-close').addEventListener('click', () => modalAdd.classList.remove('open'));
    document.getElementById('modal-save').addEventListener('click', () => {
        const emoji = inputEmoji.value.trim() || (addCategory === 'thought' ? '☁️' : addCategory === 'feeling' ? '🧱' : '🌱');
        const name = inputName.value.trim() || 'Без имени';
        const type = inputType.value;
        const newEntity = { id: nextId++, emoji, name, type, x: 0, y: 0, z: 0, radius: 0.5 };
        if (addCategory === 'thought') entities.thoughts.push(newEntity);
        else if (addCategory === 'feeling') entities.feelings.push(newEntity);
        else if (addCategory === 'root') entities.roots.push(newEntity);
        saveState();
        modalAdd.classList.remove('open');
    });

    document.getElementById('add-thought').addEventListener('click', () => openAddModal('thought'));
    document.getElementById('add-feeling').addEventListener('click', () => openAddModal('feeling'));
    document.getElementById('add-root').addEventListener('click', () => openAddModal('root'));

    // ========== Меню ==========
    const menuBtn = document.getElementById('menu-btn');
    const dropdown = document.getElementById('dropdown-menu');
    menuBtn.addEventListener('click', () => dropdown.classList.toggle('open'));
    document.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target) && e.target !== menuBtn) dropdown.classList.remove('open');
    });

    document.getElementById('toggle-energy').addEventListener('click', () => {
        energyEnabled = !energyEnabled;
        document.getElementById('energy-status').textContent = energyEnabled ? 'Вкл' : 'Выкл';
        saveState();
        dropdown.classList.remove('open');
    });

    document.getElementById('energy-speed').addEventListener('input', (e) => {
        energySpeed = parseInt(e.target.value);
        document.getElementById('speed-val').textContent = energySpeed;
        saveState();
    });

    document.getElementById('clear-all').addEventListener('click', () => {
        dropdown.classList.remove('open');
        if (confirm('Очистить все мысли, чувства и корни?')) {
            entities = { thoughts: [], feelings: [], roots: [] };
            saveState();
        }
    });

    // ========== Переключение на 3D ==========
    document.getElementById('switch-3d').addEventListener('click', () => {
        saveState();
        window.location.href = '../3d/';
    });

    // ========== Главный цикл ==========
    function loop() {
        updateAnatomy();
        draw();
        requestAnimationFrame(loop);
    }

    // Инициализация
    window.addEventListener('resize', setScale);
    setScale();
    updateAnatomy();
    loop();

    document.getElementById('energy-status').textContent = energyEnabled ? 'Вкл' : 'Выкл';
    document.getElementById('speed-val').textContent = energySpeed;
    document.getElementById('energy-speed').value = energySpeed;

    console.log('🟣🦅 2D Древо Жизни (исправленная геометрия) загружено');
</script>
</body>
</html>
