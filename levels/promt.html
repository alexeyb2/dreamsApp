<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HighMind — Полный Генератор Промта</title>
    
    <meta property="og:title" content="HighMind — Твой внутренний чертёж" />
    <meta property="og:description" content="Сгенерируй точный AI-промт на основе всех данных твоего Древа (анатомия, мысли, чувства, корни)." />
    <meta property="og:image" content="logo.png" />
    <meta property="og:type" content="website" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        #app { max-width: 600px; width: 100%; background: #161127; border-radius: 30px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 20px; }
        h1 { font-size: 24px; color: #b8a6ff; text-align: center; }
        .card { background: #221b38; border-radius: 20px; padding: 16px; border: 1px solid #3a2f5a; }
        .card-title { font-size: 14px; color: #8f78e6; font-weight: 600; margin-bottom: 8px; }
        
        #state-display { font-size: 13px; line-height: 1.6; color: #b8a6ff; background: #100d1e; padding: 12px; border-radius: 12px; font-family: monospace; white-space: pre-wrap; max-height: 150px; overflow-y: auto; }
        
        textarea { width: 100%; background: #100d1e; border: 1px solid #3a2f5a; border-radius: 12px; color: #e0d6ff; padding: 12px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 220px; outline: none; }
        textarea:focus { border-color: #6f52c4; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 13px; color: #b8a6ff; margin-bottom: 4px; font-weight: 500; }
        input[type="text"] { width: 100%; background: #100d1e; border: 1px solid #3a2f5a; border-radius: 12px; color: #e0d6ff; padding: 12px; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: #6f52c4; }

        .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn { background: #2a2348; color: #b8a6ff; border: none; padding: 12px 20px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; text-decoration: none; text-align: center; flex: 1; transition: 0.2s; min-width: 100px; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #6f52c4; color: #fff; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-blue { background: #4d8bff; color: #fff; }
        .status-badge { font-size: 12px; color: #8f78e6; text-align: center; padding: 8px; background: #100d1e; border-radius: 12px; }
    </style>
</head>
<body>

<div id="app">
    <h1>👁️ Полный Генератор Промта</h1>
    
    <div class="card">
        <div class="card-title">📐 Слепок состояния (Анатомия, Мысли, Чувства, Корни)</div>
        <div id="state-display">Загрузка данных...</div>
    </div>

    <div class="card">
        <div class="card-title">🧠 Анкета для ИИ (Триединство)</div>
        <div class="input-group">
            <label>1. Что ты чувствуешь сейчас?</label>
            <input type="text" id="input-feeling" placeholder="Например: Разбалансировку, тревогу..." />
        </div>
        <div class="input-group">
            <label>2. Что ты думаешь по этому поводу?</label>
            <input type="text" id="input-thought" placeholder="Например: Я считаю, что это из-за внешнего давления..." />
        </div>
        <div class="input-group">
            <label>3. Чего ты хочешь вместо того, что есть сейчас?</label>
            <input type="text" id="input-desire" placeholder="Например: Я хочу вернуть устойчивость и ясность..." />
        </div>
    </div>

    <div class="card">
        <div class="card-title">🤖 Итоговый Промт для ИИ</div>
        <textarea id="prompt-output" placeholder="Нажми «Сгенерировать», чтобы создать промт..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" id="generate-btn">🔄 Сгенерировать</button>
        <button class="btn btn-success" id="copy-btn">📋 Скопировать</button>
    </div>

    <div class="btn-group" style="margin-top: 10px; border-top: 1px solid #2a2248; padding-top: 16px;">
        <a href="../2d/" class="btn btn-blue" target="_blank">🌐 2D Древо</a>
        <a href="../3d/" class="btn btn-blue" target="_blank">🌐 3D Древо</a>
    </div>
    
    <div class="status-badge" id="status-msg">Готов к генерации</div>
</div>

<script>
    // ============= СБОР ВСЕХ ДАННЫХ (Анатомия + Мысли + Чувства + Корни) =============
    function getFullTreeData() {
        let data = { anatomy: null, thoughts: [], feelings: [], roots: [] };

        // 1. Загружаем анатомию из 3D ключа
        const raw3d = localStorage.getItem('dreams_tree_3d');
        if (raw3d) {
            try { data.anatomy = JSON.parse(raw3d); } catch(e) {}
        }

        // 2. Загружаем Мысли, Чувства и Корни из 2D ключа
        const rawShared = localStorage.getItem('dreams_shared_state');
        if (rawShared) {
            try {
                const shared = JSON.parse(rawShared);
                // Если это уровень 5 (Древо), там есть отдельные массивы
                const raw5 = localStorage.getItem('dreams_level5_tree');
                if (raw5) {
                    try {
                        const tree5 = JSON.parse(raw5);
                        if (tree5.clouds) data.thoughts = tree5.clouds;
                        if (tree5.feelings) data.feelings = tree5.feelings;
                        if (tree5.roots) data.roots = tree5.roots;
                    } catch(e) {}
                }
                // Если же это общий shared_state с точками, конвертируем
                if (shared.points && data.thoughts.length === 0) {
                    shared.points.forEach(p => {
                        if (p.type === 'cloud') data.thoughts.push(p);
                        else if (p.type && (p.type === 'heavy' || p.type === 'light')) data.feelings.push(p);
                        else if (p.type === 'healthy' || p.type === 'toxic') data.roots.push(p);
                    });
                }
            } catch(e) {}
        }
        return data;
    }

    // ============= ГЕНЕРАЦИЯ ПРОМТА (ВКЛЮЧАЯ СПИСКИ) =============
    function generatePromptFromFullData(fullData, feeling, thought, desire) {
        let n = fullData.anatomy || {
            leftLeg: { x: -1.2, z: 1.2 }, rightLeg: { x: 1.2, z: 1.2 },
            leftHand: { x: -1.2, z: -1.2 }, rightHand: { x: 1.2, z: -1.2 },
            heart: { x: 0, z: -1.2 }, center: { x: 0, z: 0 },
            head: { x: 0, z: 0 }
        };

        const Y_LEVELS = { LEG: -0.8, BELLY: 0.0, HAND: 1.2, HEART: 1.2, EYE: 2.0 };

        // Формируем текстовый блок для Мыслей, Чувств и Корней
        let entitiesBlock = "";
        if (fullData.thoughts.length > 0) {
            entitiesBlock += `\nМЫСЛИ (Облака):\n`;
            fullData.thoughts.forEach(t => entitiesBlock += `   - ${t.emoji || '☁️'} "${t.name || 'Без имени'}" (сила/вес: ${Math.round(t.radius || 0)})\n`);
        }
        if (fullData.feelings.length > 0) {
            entitiesBlock += `\nЧУВСТВА (Тяжелые/Легкие):\n`;
            fullData.feelings.forEach(f => entitiesBlock += `   - ${f.emoji || '🧱'} "${f.name || 'Без имени'}" (тип: ${f.type === 'heavy' ? 'Тяжелое' : 'Легкое'})\n`);
        }
        if (fullData.roots.length > 0) {
            entitiesBlock += `\nКОРНИ (Глубинные убеждения):\n`;
            fullData.roots.forEach(r => entitiesBlock += `   - ${r.emoji || '🌱'} "${r.name || 'Убеждение'}" (состояние: ${r.type === 'healthy' ? '✅ Здоровое' : '❌ Токсичное'})\n`);
        }
        if (!entitiesBlock) entitiesBlock = "\nПользователь пока не посадил мыслей, чувств или корней. Анализируй только анатомию тела.";

        // Анкета пользователя
        let userContext = "";
        if (feeling?.trim()) userContext += `- Чувства: «${feeling.trim()}»\n`;
        if (thought?.trim()) userContext += `- Мысли: «${thought.trim()}»\n`;
        if (desire?.trim()) userContext += `- Намерение/Желание: «${desire.trim()}»\n`;
        if (!userContext) userContext = "- Пользователь не указал конкретных состояний. Проанализируй только геометрию и список сущностей.";

        // Итоговый промт
        return `Ты — глубинный наставник, анализирующий внутреннее состояние человека через систему «Древо Жизни».

СИСТЕМА КООРДИНАТ: (Центр 0,0,0 = Живот)
Ось X: Право (+) / Лево (-).
Ось Y: Вверх (+) / Вниз (-).
Ось Z: Вперед (+) / Назад (-).

1. АНАТОМИЯ (3D метры):
   - Левая нога (🟦): X=${n.leftLeg.x.toFixed(2)}, Y=${Y_LEVELS.LEG.toFixed(2)}, Z=${n.leftLeg.z.toFixed(2)}
   - Правая нога (🟥): X=${n.rightLeg.x.toFixed(2)}, Y=${Y_LEVELS.LEG.toFixed(2)}, Z=${n.rightLeg.z.toFixed(2)}
   - Живот (🟠): X=${n.center.x.toFixed(2)}, Y=${Y_LEVELS.BELLY.toFixed(2)}, Z=${n.center.z.toFixed(2)}
   - Сердце (🟢): X=${n.heart.x.toFixed(2)}, Y=${Y_LEVELS.HEART.toFixed(2)}, Z=${n.heart.z.toFixed(2)}
   - Левая рука (🔵): X=${n.leftHand.x.toFixed(2)}, Y=${Y_LEVELS.HAND.toFixed(2)}, Z=${n.leftHand.z.toFixed(2)}
   - Правая рука (🔴): X=${n.rightHand.x.toFixed(2)}, Y=${Y_LEVELS.HAND.toFixed(2)}, Z=${n.rightHand.z.toFixed(2)}
   - Глаз (👁️): X=${n.head.x.toFixed(2)}, Y=${Y_LEVELS.EYE.toFixed(2)}, Z=${n.head.z.toFixed(2)}

2. АРХИТЕКТУРА СВЯЗЕЙ (Потоки):
   - Синий луч: Левая нога 🟦 → Живот 🟠 → Правая рука 🔴.
   - Красный луч: Правая нога 🟥 → Живот 🟠 → Левая рука 🔵.
   - Желтый луч: Живот 🟠 → Сердце 🟢 → Глаз 👁️.
   - Лучи от ног к глазу: Левая нога 🟦 → Глаз 👁️; Правая нога 🟥 → Глаз 👁️.

3. СУЩНОСТИ В СИСТЕМЕ (Мысли, Чувства, Корни):${entitiesBlock}

4. СОСТОЯНИЕ ПОЛЬЗОВАТЕЛЯ:
${userContext}

ЗАДАЧА ДЛЯ ТЕБЯ:
Учитывая геометрию тела, существующие мысли/чувства/корни и текущее состояние пользователя:
1. Где в этой системе наблюдается перекос? Какая сущность или анатомическая часть смещена относительно идеального баланса?
2. Если есть дисбаланс, какое новое глубинное убеждение (Корень) стоит посадить, чтобы вернуть гармонию?
3. Если баланс идеален, какое следующее действие или мысль поможет укрепить это состояние?
4. Дай ответ в виде красивой метафоры, связывая анатомию, сущности и состояние пользователя.

Ответ напиши на русском языке.`;
    }

    // ============= UI =============
    const stateDisplay = document.getElementById('state-display');
    const promptOutput = document.getElementById('prompt-output');
    const inputFeeling = document.getElementById('input-feeling');
    const inputThought = document.getElementById('input-thought');
    const inputDesire = document.getElementById('input-desire');
    const generateBtn = document.getElementById('generate-btn');
    const copyBtn = document.getElementById('copy-btn');
    const statusMsg = document.getElementById('status-msg');

    function loadAndRender() {
        const fullData = getFullTreeData();
        stateDisplay.textContent = JSON.stringify(fullData, null, 2);
        return fullData;
    }

    function generateAndDisplay() {
        const fullData = getFullTreeData();
        const promptText = generatePromptFromFullData(
            fullData, 
            inputFeeling.value, 
            inputThought.value, 
            inputDesire.value
        );
        promptOutput.value = promptText;
        statusMsg.textContent = "✅ Промт с полной структурой (3D + Мысли/Чувства/Корни) сгенерирован!";
    }

    generateBtn.addEventListener('click', generateAndDisplay);
    copyBtn.addEventListener('click', async () => {
        if (!promptOutput.value) { statusMsg.textContent = "⚠️ Сначала сгенерируйте промт!"; return; }
        try {
            await navigator.clipboard.writeText(promptOutput.value);
            statusMsg.textContent = "✅ Промт скопирован в буфер обмена!";
        } catch (err) {
            promptOutput.select();
            document.execCommand('copy');
            statusMsg.textContent = "✅ Промт скопирован (через выделение)!";
        }
    });

    document.addEventListener('DOMContentLoaded', () => { loadAndRender(); generateAndDisplay(); });
</script>
</body>
</html>
