<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HighMind — Генератор Промтов</title>
    
    <meta property="og:title" content="HighMind — Твой внутренний чертёж" />
    <meta property="og:description" content="Сгенерируй точный AI-промт на основе геометрии твоего Древа Жизни, чтобы посадить новый корень." />
    <meta property="og:image" content="logo.png" />
    <meta property="og:type" content="website" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            padding: 20px; display: flex; justify-content: center; min-height: 100vh;
        }
        #app {
            max-width: 600px; width: 100%; background: #161127; border-radius: 30px;
            padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; gap: 20px;
        }
        h1 { font-size: 24px; color: #b8a6ff; text-align: center; }
        
        .card {
            background: #221b38; border-radius: 20px; padding: 16px;
            border: 1px solid #3a2f5a;
        }
        .card-title { font-size: 14px; color: #8f78e6; font-weight: 600; margin-bottom: 8px; }
        
        #state-display {
            font-size: 13px; line-height: 1.6; color: #b8a6ff; background: #100d1e;
            padding: 12px; border-radius: 12px; font-family: monospace; white-space: pre-wrap;
        }
        
        textarea {
            width: 100%; background: #100d1e; border: 1px solid #3a2f5a;
            border-radius: 12px; color: #e0d6ff; padding: 12px; font-size: 14px;
            font-family: inherit; resize: vertical; min-height: 150px; outline: none;
        }
        textarea:focus { border-color: #6f52c4; }

        .btn-group {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
        }
        .btn {
            background: #2a2348; color: #b8a6ff; border: none; padding: 12px 20px;
            border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer;
            text-decoration: none; text-align: center; flex: 1; transition: 0.2s; min-width: 100px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #6f52c4; color: #fff; }
        .btn-primary:active { background: #5d43a8; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-blue { background: #4d8bff; color: #fff; }

        .status-badge {
            font-size: 12px; color: #8f78e6; text-align: center; padding: 8px;
            background: #100d1e; border-radius: 12px;
        }
    </style>
</head>
<body>

<div id="app">
    <h1>👁️ Генератор Промта</h1>
    
    <div class="card">
        <div class="card-title">📐 Текущая архитектура Древа</div>
        <div id="state-display">Загрузка данных...</div>
    </div>

    <div class="card">
        <div class="card-title">🤖 Промт для ИИ (на основе геометрии)</div>
        <textarea id="prompt-output" placeholder="Сгенерируйте промт, нажав кнопку ниже..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" id="generate-btn">🔄 Сгенерировать промт</button>
        <button class="btn btn-success" id="copy-btn">📋 Скопировать</button>
    </div>

    <div class="btn-group" style="margin-top: 10px; border-top: 1px solid #2a2248; padding-top: 16px;">
        <a href="../2d/" class="btn btn-blue" target="_blank">🌐 Перейти в 2D</a>
        <a href="../3d/" class="btn btn-blue" target="_blank">🌐 Перейти в 3D</a>
    </div>
    
    <div class="status-badge" id="status-msg">Данные загружены из localStorage</div>
</div>

<script>
    // ============= СБОР ДАННЫХ ИЗ LOCALSTORAGE =============
    function getTreeNodeData() {
        let data = null;
        // Пытаемся достать из 3D ключа (там точные координаты X, Z)
        const raw3d = localStorage.getItem('dreams_tree_3d');
        if (raw3d) {
            try { data = JSON.parse(raw3d); } catch(e) {}
        }
        // Если нет 3D, пробуем общий ключ (используется в 2D)
        if (!data) {
            const rawShared = localStorage.getItem('dreams_shared_state');
            if (rawShared) {
                try {
                    const shared = JSON.parse(rawShared);
                    if (shared.points) {
                        // Преобразуем список точек в узлы
                        data = { points: shared.points };
                    }
                } catch(e) {}
            }
        }
        return data;
    }

    // ============= ГЕНЕРАЦИЯ ПРОМТА =============
    function generatePromptFromTree(nodeData) {
        if (!nodeData) {
            return "Древо не найдено. Пожалуйста, откройте уровень 2D или 3D, переместите узлы, чтобы создать структуру, и вернитесь на эту страницу для генерации промта.";
        }

        // Если данные из 3D (ключи leftLeg, rightLeg и т.д.)
        const nodes = nodeData;
        let prompt = "Я создаю карту внутреннего состояния на основе Древа Жизни.\n\n";

        // Проверяем, есть ли у нас узлы
        if (nodes.leftLeg || nodes.rightLeg || nodes.heart || nodes.head) {
            // Описываем слои (этажи)
            prompt += `1. Уровень Ног (Земля, базовые убеждения):\n`;
            if (nodes.leftLeg) prompt += `   - Левая нога (Синий 🟦): x=${nodes.leftLeg.x.toFixed(2)}, z=${nodes.leftLeg.z.toFixed(2)} (Принятие, интуиция)\n`;
            if (nodes.rightLeg) prompt += `   - Правая нога (Красный 🟥): x=${nodes.rightLeg.x.toFixed(2)}, z=${nodes.rightLeg.z.toFixed(2)} (Действие, логика)\n`;

            prompt += `\n2. Центр Воли (Живот, точка опоры):\n`;
            if (nodes.center) prompt += `   - Живот (Оранжевый 🟠): x=${nodes.center.x.toFixed(2)}, z=${nodes.center.z.toFixed(2)} (Воля, центр, баланс)\n`;
            if (nodes.heart) prompt += `   - Сердце (Зелёный 🟢): x=${nodes.heart.x.toFixed(2)}, z=${nodes.heart.z.toFixed(2)} (Эмоции, связь)\n`;

            prompt += `\n3. Уровень Рук (Действия и проявления):\n`;
            if (nodes.leftHand) prompt += `   - Левая рука (Синий): x=${nodes.leftHand.x.toFixed(2)}, z=${nodes.leftHand.z.toFixed(2)}\n`;
            if (nodes.rightHand) prompt += `   - Правая рука (Красный): x=${nodes.rightHand.x.toFixed(2)}, z=${nodes.rightHand.z.toFixed(2)}\n`;

            prompt += `\n4. Уровень Наблюдателя (Разум, ясность):\n`;
            if (nodes.head) prompt += `   - Глаз (Жёлтый 👁️): x=${nodes.head.x.toFixed(2)}, z=${nodes.head.z.toFixed(2)} (Осознанность, наблюдение)\n`;

            // Опишем связи
            prompt += `\n5. Архитектура связей (Потоки энергии):\n`;
            prompt += `   - Жёлтая вертикаль: Живот 🟠 -> Сердце 🟢 -> Глаз 👁️ (путь внутренней истины).\n`;
            prompt += `   - Синий диагональный путь: Левая нога 🟦 -> Живот 🟠 -> Правая рука 🔴.\n`;
            prompt += `   - Красный диагональный путь: Правая нога 🟥 -> Живот 🟠 -> Левая рука 🔵.\n`;
            prompt += `   - Горизонталь Сердца: Сердце 🟢 соединяется с левой 🔵 и правой 🔴 руками.\n`;
            prompt += `   - Лучи от ног: Левая 🟦 и правая 🟥 ноги соединены прямыми линиями с Глазом 👁️.\n`;

            prompt += `\n6. Запрос для ИИ:\n`;
            prompt += `Пользователь чувствует текущее расположение этих узлов. Посмотри на координаты. Если какая-то часть смещена относительно центра или симметрия нарушена, предложи новое глубинное убеждение (Корень), которое поможет вернуть равновесие. Также, исходя из этой архитектуры, предложи самый сильный вопрос к Вселенной, который стоит задать этому человеку прямо сейчас.`;

        } else if (nodes.points) {
            // Если данные из 2D (список точек: мысли, чувства, корни)
            const list = nodes.points;
            prompt += `Текущее состояние системы (Мысли, Чувства, Корни):\n`;
            list.forEach(p => {
                const type = p.type || 'неизвестно';
                prompt += `- ${p.emoji || '⚡'} ${p.label || 'Без имени'} (${type}), сила: ${Math.round(p.radius || 0)}, x=${(p.x || 0).toFixed(2)}, y=${(p.y || 0).toFixed(2)}\n`;
            });
            prompt += `\nНа основе этих данных, сформулируй утверждение, которое объединяет этот список в единое намерение.`;
        }

        return prompt;
    }

    // ============= UI ЛОГИКА =============
    const stateDisplay = document.getElementById('state-display');
    const promptOutput = document.getElementById('prompt-output');
    const generateBtn = document.getElementById('generate-btn');
    const copyBtn = document.getElementById('copy-btn');
    const statusMsg = document.getElementById('status-msg');

    function loadAndRender() {
        const data = getTreeNodeData();
        if (data) {
            stateDisplay.textContent = JSON.stringify(data, null, 2);
        } else {
            stateDisplay.textContent = "⚠️ Данные не найдены. Откройте 2D или 3D уровень, чтобы сохранить конфигурацию, и вернитесь сюда.";
        }
        return data;
    }

    function generateAndDisplay() {
        const data = getTreeNodeData();
        const promptText = generatePromptFromTree(data);
        promptOutput.value = promptText;
        statusMsg.textContent = "✅ Промт сгенерирован на основе текущего Древа!";
    }

    generateBtn.addEventListener('click', generateAndDisplay);

    copyBtn.addEventListener('click', async () => {
        if (!promptOutput.value) {
            statusMsg.textContent = "⚠️ Сначала сгенерируйте промт!";
            return;
        }
        try {
            await navigator.clipboard.writeText(promptOutput.value);
            statusMsg.textContent = "✅ Промт скопирован в буфер обмена!";
        } catch (err) {
            // Fallback для старых браузеров
            promptOutput.select();
            document.execCommand('copy');
            statusMsg.textContent = "✅ Промт скопирован (через выделение)!";
        }
    });

    // При загрузке показываем текущее состояние и сразу генерируем промт
    document.addEventListener('DOMContentLoaded', () => {
        loadAndRender();
        generateAndDisplay();
    });
</script>
</body>
</html>
