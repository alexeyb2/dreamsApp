<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>HighMind — Генератор 3D Промта</title>
    
    <meta property="og:title" content="HighMind — Твой внутренний чертёж" />
    <meta property="og:description" content="Сгенерируй точный AI-промт на основе 3D геометрии твоего Древа Жизни." />
    <meta property="og:image" content="logo.png" />
    <meta property="og:type" content="website" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        #app { max-width: 600px; width: 100%; background: #161127; border-radius: 30px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 20px; }
        h1 { font-size: 24px; color: #b8a6ff; text-align: center; }
        .card { background: #221b38; border-radius: 20px; padding: 16px; border: 1px solid #3a2f5a; }
        .card-title { font-size: 14px; color: #8f78e6; font-weight: 600; margin-bottom: 8px; }
        
        #state-display { font-size: 13px; line-height: 1.6; color: #b8a6ff; background: #100d1e; padding: 12px; border-radius: 12px; font-family: monospace; white-space: pre-wrap; }
        
        textarea { width: 100%; background: #100d1e; border: 1px solid #3a2f5a; border-radius: 12px; color: #e0d6ff; padding: 12px; font-size: 14px; font-family: inherit; resize: vertical; min-height: 180px; outline: none; }
        textarea:focus { border-color: #6f52c4; }
        input[type="text"] { width: 100%; background: #100d1e; border: 1px solid #3a2f5a; border-radius: 12px; color: #e0d6ff; padding: 12px; font-size: 14px; outline: none; margin-top: 4px; }
        input[type="text"]:focus { border-color: #6f52c4; }

        .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .btn { background: #2a2348; color: #b8a6ff; border: none; padding: 12px 20px; border-radius: 30px; font-weight: 700; font-size: 14px; cursor: pointer; text-decoration: none; text-align: center; flex: 1; transition: 0.2s; min-width: 100px; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #6f52c4; color: #fff; }
        .btn-primary:active { background: #5d43a8; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-blue { background: #4d8bff; color: #fff; }
        .status-badge { font-size: 12px; color: #8f78e6; text-align: center; padding: 8px; background: #100d1e; border-radius: 12px; }
    </style>
</head>
<body>

<div id="app">
    <h1>👁️ Генератор 3D Промта</h1>
    
    <div class="card">
        <div class="card-title">📐 Текущая архитектура Древа (Центр: Живот 0,0,0)</div>
        <div id="state-display">Загрузка данных...</div>
    </div>

    <div class="card">
        <div class="card-title">✍️ Что ты чувствуешь прямо сейчас?</div>
        <input type="text" id="feeling-input" placeholder="Например: Я чувствую разбалансировку в левой стороне, мне не хватает опоры..." />
    </div>

    <div class="card">
        <div class="card-title">🤖 Итоговый Промт для ИИ</div>
        <textarea id="prompt-output" placeholder="Нажми «Сгенерировать», чтобы создать промт..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" id="generate-btn">🔄 Сгенерировать</button>
        <button class="btn btn-success" id="copy-btn">📋 Скопировать</button>
    </div>

    <div class="btn-group" style="margin-top: 10px; border-top: 1px solid #2a2248; padding-top: 16px;">
        <a href="../2d/" class="btn btn-blue" target="_blank">🌐 2D Древо</a>
        <a href="../3d/" class="btn btn-blue" target="_blank">🌐 3D Древо</a>
    </div>
    
    <div class="status-badge" id="status-msg">Готов к генерации</div>
</div>

<script>
    // ============= СБОР ДАННЫХ ИЗ LOCALSTORAGE =============
    function getTreeNodeData() {
        let data = null;
        // Пытаемся достать из 3D ключа (там точные координаты X, Z)
        const raw3d = localStorage.getItem('dreams_tree_3d');
        if (raw3d) {
            try { data = JSON.parse(raw3d); } catch(e) {}
        }
        // Если нет 3D, пробуем общий ключ (используется в 2D)
        if (!data) {
            const rawShared = localStorage.getItem('dreams_shared_state');
            if (rawShared) {
                try {
                    const shared = JSON.parse(rawShared);
                    if (shared.points) {
                        // Преобразуем список точек в узлы (для унификации)
                        data = { points: shared.points };
                    }
                } catch(e) {}
            }
        }
        return data;
    }

    // ============= ГЕНЕРАЦИЯ ПРОМТА (ТОЧНАЯ 3D МЕТРИКА) =============
    function generatePromptFromTree(nodeData, userFeeling) {
        // Если данных нет, используем эталонную идеальную геометрию, чтобы промт всё равно работал
        const defaultNodes = {
            leftLeg:  { x: -1.2, z: 1.2 },
            rightLeg: { x: 1.2,  z: 1.2 },
            leftHand: { x: -1.2, z: -1.2 },
            rightHand: { x: 1.2,  z: -1.2 },
            heart:    { x: 0,    z: -1.2 },
            center:   { x: 0,    z: 0 },
            head:     { x: 0,    z: 0 }
        };

        // Загружаем данные, если они есть
        let n = defaultNodes;
        let has3D = false;
        if (nodeData && (nodeData.leftLeg || nodeData.rightLeg || nodeData.heart)) {
            // Если данные из 3D хранилища
            n = nodeData;
            has3D = true;
        }

        // Строгие Y-координаты (наша абсолютная метрика: 0,0,0 = Живот)
        const Y_LEVELS = {
            LEG: -0.8,
            BELLY: 0.0,
            HAND: 1.2,
            HEART: 1.2,
            EYE: 2.0
        };

        // Формируем строку с чувствами
        const feelingPart = userFeeling && userFeeling.trim() 
            ? `\n\nМое текущее состояние/мысль: "${userFeeling.trim()}"` 
            : `\n\nМое текущее состояние: Я наблюдаю за картой и хочу найти точку дисбаланса.`;

        // Создаем структурированный промт для ИИ (ChatGPT, Claude, Gemini)
        let prompt = `Ты — глубинный наставник, работающий с картой внутреннего состояния человека на основе системы «Древо Жизни».

СИСТЕМА КООРДИНАТ:
Центр (0, 0, 0) = Живот (точка опоры и воли).
Ось X: Право (+) / Лево (-).
Ось Y: Вверх (+) / Вниз (-) от живота.
Ось Z: Вперед (+) / Назад (-) от живота.

ТЕКУЩАЯ КАРТА (в метрах):
1. Нижний уровень (Ноги, Заземление):
   - Левая нога (Синий 🟦): X=${n.leftLeg.x.toFixed(2)}, Y=${Y_LEVELS.LEG.toFixed(2)}, Z=${n.leftLeg.z.toFixed(2)}
   - Правая нога (Красный 🟥): X=${n.rightLeg.x.toFixed(2)}, Y=${Y_LEVELS.LEG.toFixed(2)}, Z=${n.rightLeg.z.toFixed(2)}

2. Центр силы (Живот, опора):
   - Живот (Оранжевый 🟠): X=${n.center.x.toFixed(2)}, Y=${Y_LEVELS.BELLY.toFixed(2)}, Z=${n.center.z.toFixed(2)}

3. Эмоциональный мост:
   - Сердце (Зеленый 🟢): X=${n.heart.x.toFixed(2)}, Y=${Y_LEVELS.HEART.toFixed(2)}, Z=${n.heart.z.toFixed(2)}

4. Уровень проявления (Руки):
   - Левая рука (Синий 🔵): X=${n.leftHand.x.toFixed(2)}, Y=${Y_LEVELS.HAND.toFixed(2)}, Z=${n.leftHand.z.toFixed(2)}
   - Правая рука (Красный 🔴): X=${n.rightHand.x.toFixed(2)}, Y=${Y_LEVELS.HAND.toFixed(2)}, Z=${n.rightHand.z.toFixed(2)}

5. Уровень наблюдателя:
   - Глаз (Желтый 👁️): X=${n.head.x.toFixed(2)}, Y=${Y_LEVELS.EYE.toFixed(2)}, Z=${n.head.z.toFixed(2)}

АРХИТЕКТУРА СВЯЗЕЙ (Потоки энергии):
- Синий луч: Левая нога 🟦 — Живот 🟠 — Правая рука 🔴.
- Красный луч: Правая нога 🟥 — Живот 🟠 — Левая рука 🔵.
- Желтый восходящий луч: Живот 🟠 → Сердце 🟢 → Глаз 👁️ (путь истины).
- Лучи от ног к глазу: Левая нога 🟦 → Глаз 👁️; Правая нога 🟥 → Глаз 👁️.
- Горизонталь сердца: Сердце 🟢 — Левая рука 🔵 и Сердце 🟢 — Правая рука 🔴.${feelingPart}

ЗАДАЧА ДЛЯ ТЕБЯ:
1. Проанализируй геометрию этой карты. Где нарушена симметрия? Какая точка смещена относительно нуля?
2. Если в геометрии есть перекос, какое новое глубинное убеждение (Корень) человеку нужно посадить, чтобы вернуть баланс в эту систему?
3. Если баланс идеален (все узлы на своих местах), какое следующее действие или намерение поможет человеку укрепить этот покой?
4. Сформулируй свой ответ в виде метафоры, используя образы из этой карты.

Ответ напиши на русском языке.`;

        return prompt;
    }

    // ============= UI ЛОГИКА =============
    const stateDisplay = document.getElementById('state-display');
    const promptOutput = document.getElementById('prompt-output');
    const feelingInput = document.getElementById('feeling-input');
    const generateBtn = document.getElementById('generate-btn');
    const copyBtn = document.getElementById('copy-btn');
    const statusMsg = document.getElementById('status-msg');

    function loadAndRender() {
        const data = getTreeNodeData();
        if (data) {
            stateDisplay.textContent = JSON.stringify(data, null, 2);
        } else {
            stateDisplay.textContent = "⚠️ Данные не найдены. Промт будет сгенерирован на основе идеальной симметрии.";
        }
        return data;
    }

    function generateAndDisplay() {
        const data = getTreeNodeData();
        const feeling = feelingInput.value;
        const promptText = generatePromptFromTree(data, feeling);
        promptOutput.value = promptText;
        statusMsg.textContent = "✅ Промт с 3D координатами сгенерирован!";
    }

    generateBtn.addEventListener('click', generateAndDisplay);

    copyBtn.addEventListener('click', async () => {
        if (!promptOutput.value) {
            statusMsg.textContent = "⚠️ Сначала сгенерируйте промт!";
            return;
        }
        try {
            await navigator.clipboard.writeText(promptOutput.value);
            statusMsg.textContent = "✅ Промт скопирован в буфер обмена!";
        } catch (err) {
            promptOutput.select();
            document.execCommand('copy');
            statusMsg.textContent = "✅ Промт скопирован (через выделение)!";
        }
    });

    // При загрузке показываем текущее состояние и сразу генерируем промт
    document.addEventListener('DOMContentLoaded', () => {
        loadAndRender();
        generateAndDisplay();
    });
</script>
</body>
</html>
