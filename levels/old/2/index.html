<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Конструктор Предметов</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; display: flex; justify-content: center; padding: 20px;
            touch-action: pan-y;
        }
        #app {
            width: 100%; max-width: 480px; padding-bottom: 80px;
        }

        h1 { text-align: center; font-size: 24px; margin-bottom: 20px; color: #b8a6ff; }
        
        .header-actions {
            display: flex; justify-content: space-between; margin-bottom: 15px; gap: 10px;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff;
            padding: 12px 20px; border-radius: 30px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            flex: 1; text-align: center;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-primary { background: #6f52c4; color: #fff; }
        .btn-del-group { background: #5a2a2a; color: #ff8a8a; flex: 0.3; }

        /* Карточка места (группы) */
        .group-card {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 24px;
            padding: 16px; margin-bottom: 16px;
        }
        .group-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .group-name { font-size: 18px; font-weight: 700; color: #ffffff; }
        
        /* Карточка предмета */
        .item-card {
            display: flex; justify-content: space-between; align-items: center;
            background: #100d1e; border-radius: 16px; padding: 12px 16px;
            margin-bottom: 8px; border-left: 4px solid #6f52c4;
        }
        .item-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .item-emoji { font-size: 28px; }
        .item-text { display: flex; flex-direction: column; }
        .item-name { font-size: 16px; font-weight: 600; color: #ffffff; }
        .item-property { font-size: 13px; color: #8f78e6; }
        
        .item-actions { display: flex; gap: 8px; }
        .btn-del-item {
            background: #3a1a1a; border: none; color: #ff6b6b; 
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
        }

        .empty-state {
            text-align: center; padding: 40px 20px; color: #635a82;
        }

        /* Модальное окно добавления */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #b8a6ff; font-weight: 500; }
        .input-group input {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 12px 14px; font-size: 16px; color: #ffffff; outline: none;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; }
        
        @media (max-width: 600px) {
            .group-card { padding: 12px; }
            .item-card { padding: 10px 12px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>🗂️ Конструктор предметов</h1>
        
        <div class="header-actions">
            <button class="btn btn-primary" id="add-group-btn">➕ Добавить место</button>
            <button class="btn btn-del-group" id="reset-all-btn">✖ Сброс</button>
        </div>

        <div id="groups-container">
            <div class="empty-state">
                Создай место (например, «Ванна»), чтобы начать собирать предметы.
            </div>
        </div>

        <!-- Модальное окно добавления предмета -->
        <div id="modal-overlay">
            <div class="modal-box">
                <h3>Добавить предмет</h3>
                <div class="input-group">
                    <label>Смайл</label>
                    <input type="text" id="input-emoji" placeholder="Например: 🪒" />
                </div>
                <div class="input-group">
                    <label>Название</label>
                    <input type="text" id="input-name" placeholder="Например: Бритва" />
                </div>
                <div class="input-group">
                    <label>Свойство</label>
                    <input type="text" id="input-property" placeholder="Например: Освобождение" />
                </div>
                <div class="modal-actions">
                    <button class="btn btn-primary" id="modal-save-btn">✅ Добавить</button>
                    <button class="btn btn-cancel" id="modal-close-btn">✖ Отмена</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ И ХРАНИЛИЩЕ ==========
        let data = { groups: [] };
        let currentGroupId = null;

        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level_2');
                if (raw) data = JSON.parse(raw);
                if (!data.groups) data.groups = [];
            } catch(e) {}
        }
        function saveData() {
            localStorage.setItem('dreams_level_2', JSON.stringify(data));
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            const container = document.getElementById('groups-container');
            container.innerHTML = '';

            if (data.groups.length === 0) {
                container.innerHTML = `<div class="empty-state">Создай место (например, «Ванна»), чтобы начать собирать предметы.</div>`;
                return;
            }

            data.groups.forEach((group, idx) => {
                const card = document.createElement('div');
                card.className = 'group-card';
                
                // Заголовок группы
                const header = document.createElement('div');
                header.className = 'group-header';
                header.innerHTML = `
                    <span class="group-name">📍 ${group.name}</span>
                    <button class="btn-del-group" onclick="deleteGroup(${idx})">✕</button>
                `;
                card.appendChild(header);

                // Список предметов
                if (group.items.length === 0) {
                    const emptyMsg = document.createElement('p');
                    emptyMsg.style.cssText = 'color: #635a82; text-align: center; padding: 10px;';
                    emptyMsg.textContent = 'Пока нет предметов.';
                    card.appendChild(emptyMsg);
                } else {
                    group.items.forEach((item, iIdx) => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'item-card';
                        itemDiv.innerHTML = `
                            <div class="item-info">
                                <span class="item-emoji">${item.emoji || '📦'}</span>
                                <div class="item-text">
                                    <span class="item-name">${item.name || 'Предмет'}</span>
                                    <span class="item-property">✨ ${item.property || 'Без свойства'}</span>
                                </div>
                            </div>
                            <div class="item-actions">
                                <button class="btn-del-item" onclick="deleteItem(${idx}, ${iIdx})">✕</button>
                            </div>
                        `;
                        card.appendChild(itemDiv);
                    });
                }

                // Кнопка добавления предмета в эту группу
                const addItemBtn = document.createElement('button');
                addItemBtn.className = 'btn';
                addItemBtn.style.cssText = 'width: 100%; margin-top: 12px; background: #221b38;';
                addItemBtn.textContent = '➕ Добавить предмет';
                addItemBtn.onclick = () => openModal(idx);
                card.appendChild(addItemBtn);

                container.appendChild(card);
            });
        }

        // ========== ЛОГИКА (CRUD) ==========
        function addGroup() {
            const name = prompt('Введите название места (например: Ванна, Кухня, Рабочий стол):');
            if (name && name.trim() !== '') {
                data.groups.push({ name: name.trim(), items: [] });
                saveData();
                render();
            }
        }

        function deleteGroup(index) {
            if (confirm('Удалить это место и все его предметы?')) {
                data.groups.splice(index, 1);
                saveData();
                render();
            }
        }

        function deleteItem(groupIndex, itemIndex) {
            data.groups[groupIndex].items.splice(itemIndex, 1);
            saveData();
            render();
        }

        // ========== МОДАЛЬНОЕ ОКНО ==========
        const overlay = document.getElementById('modal-overlay');
        const inputEmoji = document.getElementById('input-emoji');
        const inputName = document.getElementById('input-name');
        const inputProperty = document.getElementById('input-property');
        
        function openModal(groupIdx) {
            currentGroupId = groupIdx;
            inputEmoji.value = '';
            inputName.value = '';
            inputProperty.value = '';
            overlay.classList.add('open');
        }

        function closeModal() {
            overlay.classList.remove('open');
            currentGroupId = null;
        }

        function saveItem() {
            if (currentGroupId === null) return;
            
            const emoji = inputEmoji.value.trim() || '📦';
            const name = inputName.value.trim() || 'Предмет';
            const property = inputProperty.value.trim() || 'Без свойства';

            if (!inputName.value.trim() && !inputProperty.value.trim() && !inputEmoji.value.trim()) {
                alert('Пожалуйста, введите хотя бы название, смайл или свойство!');
                return;
            }

            data.groups[currentGroupId].items.push({
                emoji: emoji,
                name: name,
                property: property
            });

            saveData();
            render();
            closeModal();
        }

        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
        document.getElementById('add-group-btn').addEventListener('click', addGroup);
        document.getElementById('reset-all-btn').addEventListener('click', () => {
            if (confirm('Сбросить все места и предметы?')) {
                data.groups = [];
                saveData();
                render();
            }
        });

        document.getElementById('modal-save-btn').addEventListener('click', saveItem);
        document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        
        // Закрытие по клику на фон
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeModal();
        });

        // Enter для быстрого сохранения
        document.getElementById('input-property').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') saveItem();
        });

        // ========== ЗАПУСК ==========
        loadData();
        render();
        
        console.log('🟣🦅 Уровень 2: Конструктор предметов запущен.');
    </script>
</body>
</html>
