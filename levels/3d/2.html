<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Уровень 7: Куб Сознания (3D)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; font-family: system-ui, sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; background: #0b0814; }
        #ui { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; z-index: 10; }
        #balance-bar { width: 80%; max-width: 400px; height: 8px; background: #1a1530; border-radius: 10px; overflow: hidden; border: 1px solid #3a2f5a; }
        #balance-fill { height: 100%; width: 50%; background: #6f52c4; border-radius: 10px; transition: width 0.1s; }
        .btn-group { background: rgba(22,17,39,0.85); padding: 10px 20px; border-radius: 40px; backdrop-filter: blur(8px); border: 1px solid #3a2f5a; display: flex; gap: 12px; pointer-events: auto; }
        .btn { border: none; background: #2a2348; color: #b8a6ff; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        #dropdown-menu { display: none; position: absolute; bottom: 110%; right: 0; background: #161127; border: 1px solid #3a2f5a; border-radius: 20px; padding: 12px; width: 240px; flex-direction: column; gap: 8px; z-index: 20; backdrop-filter: blur(10px); }
        #dropdown-menu.open { display: flex; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; border-radius: 12px; cursor: pointer; background: #2a2348; color: #b8a6ff; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .menu-item:active { background: #6f52c4; color: #fff; }
        .menu-item input[type="color"] { width: 30px; height: 30px; border: none; padding: 0; background: transparent; cursor: pointer; }
        @media (max-width: 600px) { #ui { bottom: 15px; padding: 8px; } .btn-group { padding: 6px 12px; gap: 6px; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
</head>
<body>
<div id="canvas-container"></div>

<div id="ui">
    <div id="balance-bar"><div id="balance-fill"></div></div>
    <div class="btn-group">
        <button class="btn" id="reset-btn">🔄 Сброс</button>
        <button class="btn btn-icon" id="menu-btn" style="width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid #3a2f5a;font-size:18px;">⚙️</button>
    </div>
    <div id="dropdown-menu">
        <div class="menu-item">
            <span>🎨 Цвет центра</span>
            <input type="color" id="center-color-picker" value="#ffcc00" />
        </div>
        <div class="menu-item" id="toggle-energy" style="justify-content:center;">
            <span id="energy-status">🌀 Энергия: Вкл</span>
        </div>
    </div>
</div>

<script>
    // ============= СЦЕНА =============
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0814);

    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(0, 1, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const labelRenderer = new THREE.CSS2DRenderer();
    labelRenderer.setSize(container.clientWidth, container.clientHeight);
    labelRenderer.domElement.style.position = 'absolute';
    labelRenderer.domElement.style.top = '0';
    labelRenderer.domElement.style.left = '0';
    labelRenderer.domElement.style.pointerEvents = 'none';
    container.appendChild(labelRenderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0); controls.minDistance = 3; controls.maxDistance = 20;

    scene.add(new THREE.AmbientLight(0x404060));
    const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5); dirLight.position.set(5, 10, 7); dirLight.castShadow = true; scene.add(dirLight);
    const gridHelper = new THREE.GridHelper(10, 10, 0x6f52c4, 0x3a2f5a); gridHelper.position.y = -2.5; scene.add(gridHelper);

    // ============= ГРУППА ДЛЯ КАЧАНИЯ =============
    const pivotGroup = new THREE.Group(); 
    scene.add(pivotGroup);

    // ============= КУБ И ДИАГОНАЛИ =============
    const cubeSize = 5.5;
    const cubeGeom = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
    const cubeEdges = new THREE.EdgesGeometry(cubeGeom);
    const cubeMat = new THREE.LineBasicMaterial({ color: 0x444466, transparent: true, opacity: 0.2 });
    const cubeWireframe = new THREE.LineSegments(cubeEdges, cubeMat);
    cubeWireframe.position.set(0, 0, 0);
    pivotGroup.add(cubeWireframe);

    const half = cubeSize / 2;
    const diagPoints = [
        [new THREE.Vector3(-half, -half, -half), new THREE.Vector3(half, half, half)],
        [new THREE.Vector3(-half, half, -half), new THREE.Vector3(half, -half, half)],
        [new THREE.Vector3(half, -half, -half), new THREE.Vector3(-half, half, half)],
        [new THREE.Vector3(half, half, -half), new THREE.Vector3(-half, -half, half)]
    ];
    diagPoints.forEach(pair => {
        const geom = new THREE.BufferGeometry().setFromPoints(pair);
        const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
        const line = new THREE.Line(geom, mat);
        pivotGroup.add(line);
    });

    // ============= ДАННЫЕ И СОХРАНЕНИЕ =============
    const STORAGE_KEY = 'highmind_level7_3d';
    let centerColor = '#ffcc00';
    let energyEnabled = true;
    let time = 0;

    // Базовые позиции (7 точек, которые влияют на центр)
    const baseNodes = {
        botBackLeft:  { x: -1.2, y: -2.5, z: -1.2 }, // 🟦
        botBackRight: { x: 1.2, y: -2.5, z: -1.2 }, // 🟥
        botFront:     { x: 0,   y: -2.5, z: 1.2 },  // 🔺
        topFrontLeft: { x: -1.2, y: 1.0, z: 1.2 },  // 🔵
        topFrontRight: { x: 1.2, y: 1.0, z: 1.2 },  // 🔴
        topBack:      { x: 0,   y: 1.0, z: -1.2 },  // 🔻
        ballUp:       { x: 0,   y: 1.0, z: 0 }       // 🎈
    };

    const currentNodes = JSON.parse(JSON.stringify(baseNodes));
    
    // Переменные маятника (гиря 🎱)
    const ballDown = { x: 0, y: -1.0, z: 0 };
    const pendulumVel = { x: 0, y: 0, z: 0 };

    let centerPos = new THREE.Vector3(0, 0, 0);
    let isCenterDragged = false;
    let draggedCenterPos = { x: 0, y: 0, z: 0 };
    const pendulumLength = 1.0; // длина верёвки

    function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(baseNodes));
    }
    function loadState() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            Object.assign(baseNodes, data);
            return true;
        } catch(e) { return false; }
    }
    if (!loadState()) saveState();

    // ============= СОЗДАНИЕ 3D ОБЪЕКТОВ =============
    function createSprite(emoji, color, scale = 0.6) {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.font = '100px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowColor = color; ctx.shadowBlur = 20;
        ctx.fillText(emoji, 128, 128);
        ctx.shadowBlur = 0;
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(scale, scale, 1);
        return sprite;
    }

    function createLabel(text, parentPos, offsetY = -0.6) {
        const div = document.createElement('div');
        div.textContent = text;
        div.style.color = '#b8a6ff';
        div.style.fontSize = '16px';
        div.style.fontWeight = '600';
        div.style.textShadow = '0 0 10px rgba(0,0,0,0.9)';
        div.style.background = 'rgba(22,17,39,0.7)';
        div.style.padding = '2px 12px';
        div.style.borderRadius = '12px';
        div.style.border = '1px solid #3a2f5a';
        div.style.backdropFilter = 'blur(4px)';
        const label = new THREE.CSS2DObject(div);
        label.position.set(parentPos.x, parentPos.y + offsetY, parentPos.z);
        return label;
    }

    const sprites = {};
    const createNode = (key, emoji, color, data) => {
        const s = createSprite(emoji, color, key === 'ballUp' ? 1.6 : 0.6);
        s.position.set(data.x, data.y, data.z);
        pivotGroup.add(s);
        sprites[key] = s;
    };
    createNode('botBackLeft', '🟦', '#4d8bff', currentNodes.botBackLeft);
    createNode('botBackRight', '🟥', '#ff4d4d', currentNodes.botBackRight);
    createNode('botFront', '🔺', '#e67e22', currentNodes.botFront);
    createNode('topFrontLeft', '🔵', '#4d8bff', currentNodes.topFrontLeft);
    createNode('topFrontRight', '🔴', '#ff4d4d', currentNodes.topFrontRight);
    createNode('topBack', '🔻', '#9b59b6', currentNodes.topBack);
    createNode('ballUp', '🎈', '#ff4d4d', currentNodes.ballUp);

    // Гиря 🎱 (маятник)
    const ballDownSprite = createSprite('🎱', '#4d8bff', 1.6);
    ballDownSprite.position.set(ballDown.x, ballDown.y, ballDown.z);
    pivotGroup.add(ballDownSprite);

    // Подписи (CSS2DRenderer)
    const labelTop = createLabel('Верхний тетраэдр', currentNodes.ballUp, -0.7);
    pivotGroup.add(labelTop);
    const labelBottom = createLabel('Нижний тетраэдр', ballDown, -0.7);
    pivotGroup.add(labelBottom);

    // Центр 🟡 (можно перетаскивать)
    let centerSprite = createSprite('🟡', centerColor, 0.7);
    centerSprite.position.copy(centerPos); pivotGroup.add(centerSprite);

    function updateCenterSpriteColor(newColor) {
        pivotGroup.remove(centerSprite);
        centerSprite = createSprite('🟡', newColor, 0.7);
        centerSprite.position.copy(centerPos);
        pivotGroup.add(centerSprite);
    }

    // ============= ГЕОМЕТРИЯ ТЕТРАЭДРОВ (ГРАНИ + КАРКАС) И ЛИНИЙ =============
    let dynamicMeshes = [];

    function buildTetra(apex, baseVerts, color) {
        const v = [apex, baseVerts[0], baseVerts[1], baseVerts[2]];
        const pos = [
            v[1].x, v[1].y, v[1].z, v[2].x, v[2].y, v[2].z, v[3].x, v[3].y, v[3].z,
            v[0].x, v[0].y, v[0].z, v[1].x, v[1].y, v[1].z, v[2].x, v[2].y, v[2].z,
            v[0].x, v[0].y, v[0].z, v[2].x, v[2].y, v[2].z, v[3].x, v[3].y, v[3].z,
            v[0].x, v[0].y, v[0].z, v[3].x, v[3].y, v[3].z, v[1].x, v[1].y, v[1].z
        ];
        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        geom.computeVertexNormals();
        
        // 1. Стеклянные грани (полупрозрачные)
        const glassMat = new THREE.MeshBasicMaterial({
            color: color,
            transparent: true,
            opacity: 0.2,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const glassMesh = new THREE.Mesh(geom.clone(), glassMat);
        
        // 2. Проволочный каркас (рёбра)
        const wireMat = new THREE.MeshBasicMaterial({
            color: color,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const wireMesh = new THREE.Mesh(geom.clone(), wireMat);
        
        return [glassMesh, wireMesh];
    }

    function updateStructure() {
        dynamicMeshes.forEach(m => pivotGroup.remove(m));
        dynamicMeshes = [];

        // === ТЕТРАЭДРЫ ===
        // Нижний тетраэдр: apex = 🎱 (ballDown), base = 🟦, 🟥, 🔺
        const apex1 = new THREE.Vector3(ballDown.x, ballDown.y, ballDown.z);
        const base1 = [
            new THREE.Vector3(currentNodes.botBackLeft.x, currentNodes.botBackLeft.y, currentNodes.botBackLeft.z),
            new THREE.Vector3(currentNodes.botBackRight.x, currentNodes.botBackRight.y, currentNodes.botBackRight.z),
            new THREE.Vector3(currentNodes.botFront.x, currentNodes.botFront.y, currentNodes.botFront.z)
        ];
        const tetra1 = buildTetra(apex1, base1, 0x4d8bff);
        tetra1.forEach(m => { pivotGroup.add(m); dynamicMeshes.push(m); });

        // Верхний тетраэдр: apex = 🎈 (ballUp), base = 🔵, 🔴, 🔻
        const apex2 = new THREE.Vector3(currentNodes.ballUp.x, currentNodes.ballUp.y, currentNodes.ballUp.z);
        const base2 = [
            new THREE.Vector3(currentNodes.topFrontLeft.x, currentNodes.topFrontLeft.y, currentNodes.topFrontLeft.z),
            new THREE.Vector3(currentNodes.topFrontRight.x, currentNodes.topFrontRight.y, currentNodes.topFrontRight.z),
            new THREE.Vector3(currentNodes.topBack.x, currentNodes.topBack.y, currentNodes.topBack.z)
        ];
        const tetra2 = buildTetra(apex2, base2, 0xff4d4d);
        tetra2.forEach(m => { pivotGroup.add(m); dynamicMeshes.push(m); });

        // === ТОЛСТЫЕ ЛИНИИ (цилиндры) ===
        const createThickLine = (start, end, color, opacity = 0.9) => {
            const dir = new THREE.Vector3().copy(end).sub(start);
            const length = dir.length();
            if (length < 0.01) return;
            const mid = new THREE.Vector3().copy(start).add(end).multiplyScalar(0.5);
            const geom = new THREE.CylinderGeometry(0.12, 0.12, length, 4);
            const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.copy(mid);
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
            pivotGroup.add(mesh);
            dynamicMeshes.push(mesh);
        };

        const addThroughCenter = (p1, p2, color, opacity = 0.9) => {
            const cPos = centerPos.clone();
            createThickLine(new THREE.Vector3(p1.x, p1.y, p1.z), cPos, color, opacity);
            createThickLine(cPos, new THREE.Vector3(p2.x, p2.y, p2.z), color, opacity);
        };

        const goldColor = new THREE.Color(centerColor);
        addThroughCenter(ballDown, currentNodes.ballUp, goldColor, 0.9);
        addThroughCenter(currentNodes.botBackRight, currentNodes.topFrontLeft, 0xff4d4d, 0.8);
        addThroughCenter(currentNodes.botBackLeft, currentNodes.topFrontRight, 0x4d8bff, 0.8);
        addThroughCenter(currentNodes.botFront, currentNodes.topBack, 0xffcc00, 0.8);
    }

    // ============= ФИЗИКА МАЯТНИКА =============
    function updatePendulum(deltaTime) {
        const pivot = centerPos;
        const mass = new THREE.Vector3(ballDown.x, ballDown.y, ballDown.z);
        const r = new THREE.Vector3().copy(mass).sub(pivot);
        const dist = r.length();
        if (dist < 0.001) { r.set(0, -1, 0); }
        const target = new THREE.Vector3().copy(pivot).add(r.clone().normalize().multiplyScalar(pendulumLength));

        const stiffness = 10.0;
        const damping = 2.0;
        const force = new THREE.Vector3().copy(target).sub(mass).multiplyScalar(stiffness);
        const vel = new THREE.Vector3(pendulumVel.x, pendulumVel.y, pendulumVel.z);
        force.sub(vel.clone().multiplyScalar(damping));

        vel.add(force.multiplyScalar(deltaTime));
        const maxSpeed = 5.0;
        if (vel.length() > maxSpeed) vel.normalize().multiplyScalar(maxSpeed);

        mass.add(vel.clone().multiplyScalar(deltaTime));

        const newR = new THREE.Vector3().copy(mass).sub(pivot);
        const newDist = newR.length();
        if (newDist > 0.001) {
            const correction = newR.clone().normalize().multiplyScalar(newDist - pendulumLength);
            mass.sub(correction);
            const perp = newR.clone().normalize();
            const vPerp = vel.dot(perp);
            vel.sub(perp.clone().multiplyScalar(vPerp));
        }

        ballDown.x = mass.x; ballDown.y = mass.y; ballDown.z = mass.z;
        pendulumVel.x = vel.x; pendulumVel.y = vel.y; pendulumVel.z = vel.z;
    }

    // ============= ОБНОВЛЕНИЕ ПОЗИЦИЙ =============
    function updatePositions(deltaTime) {
        // Копируем базовые позиции в текущие
        currentNodes.botBackLeft.x = baseNodes.botBackLeft.x;
        currentNodes.botBackRight.x = baseNodes.botBackRight.x;
        currentNodes.botFront.x = baseNodes.botFront.x;
        currentNodes.topFrontLeft.x = baseNodes.topFrontLeft.x;
        currentNodes.topFrontRight.x = baseNodes.topFrontRight.x;
        currentNodes.topBack.x = baseNodes.topBack.x;
        currentNodes.ballUp.x = baseNodes.ballUp.x;

        sprites['botBackLeft'].position.set(currentNodes.botBackLeft.x, currentNodes.botBackLeft.y, currentNodes.botBackLeft.z);
        sprites['botBackRight'].position.set(currentNodes.botBackRight.x, currentNodes.botBackRight.y, currentNodes.botBackRight.z);
        sprites['botFront'].position.set(currentNodes.botFront.x, currentNodes.botFront.y, currentNodes.botFront.z);
        sprites['topFrontLeft'].position.set(currentNodes.topFrontLeft.x, currentNodes.topFrontLeft.y, currentNodes.topFrontLeft.z);
        sprites['topFrontRight'].position.set(currentNodes.topFrontRight.x, currentNodes.topFrontRight.y, currentNodes.topFrontRight.z);
        sprites['topBack'].position.set(currentNodes.topBack.x, currentNodes.topBack.y, currentNodes.topBack.z);
        sprites['ballUp'].position.set(currentNodes.ballUp.x, currentNodes.ballUp.y, currentNodes.ballUp.z);
        labelTop.position.set(currentNodes.ballUp.x, currentNodes.ballUp.y - 0.7, currentNodes.ballUp.z);

        // ВЫЧИСЛЯЕМ ЦЕНТР ТОЛЬКО ИЗ 7 ТОЧЕК (ИСКЛЮЧАЯ МАЯТНИК)
        if (!isCenterDragged) {
            const allPoints = [
                currentNodes.botBackLeft, currentNodes.botBackRight, currentNodes.botFront,
                currentNodes.topFrontLeft, currentNodes.topFrontRight, currentNodes.topBack,
                currentNodes.ballUp
            ];
            centerPos.set(0, 0, 0);
            allPoints.forEach(p => {
                centerPos.x += p.x; centerPos.y += p.y; centerPos.z += p.z;
            });
            centerPos.divideScalar(allPoints.length);
        } else {
            centerPos.set(draggedCenterPos.x, draggedCenterPos.y, draggedCenterPos.z);
        }
        centerSprite.position.copy(centerPos);

        // Обновляем физику маятника на основе нового центра
        updatePendulum(deltaTime);
        ballDownSprite.position.set(ballDown.x, ballDown.y, ballDown.z);
        labelBottom.position.set(ballDown.x, ballDown.y - 0.7, ballDown.z);

        // Перестраиваем геометрию
        updateStructure();

        // Баланс: расстояние центра от (0,0,0)
        const dist = centerPos.length();
        const maxDist = 3.0;
        const balance = Math.max(0, 100 - (dist / maxDist) * 100);
        document.getElementById('balance-fill').style.width = balance + '%';
        document.getElementById('balance-fill').style.backgroundColor = balance > 80 ? '#2ecc71' : balance > 50 ? '#ffcc00' : '#ff4d4d';

        if (balance > 95) {
            centerSprite.scale.set(1.2, 1.2, 1);
            centerSprite.material.opacity = 1.0;
        } else {
            centerSprite.scale.set(0.8, 0.8, 1);
            centerSprite.material.opacity = 0.9;
        }
    }

    // ============= ИНТЕРАКТИВНОСТЬ (ПЕРЕТАСКИВАНИЕ) =============
    const raycaster = new THREE.Raycaster(); const pointer = new THREE.Vector2();
    let isDragging = false, draggedKey = null, dragOffset = new THREE.Vector3(), intersectPlane = new THREE.Plane();

    function getPointerNDC(e) { const rect = renderer.domElement.getBoundingClientRect(); pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1; pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1; }

    const draggableList = [
        { key: 'topFrontLeft', data: baseNodes.topFrontLeft },
        { key: 'topFrontRight', data: baseNodes.topFrontRight },
        { key: 'topBack', data: baseNodes.topBack },
        { key: 'botBackLeft', data: baseNodes.botBackLeft },
        { key: 'botBackRight', data: baseNodes.botBackRight },
        { key: 'botFront', data: baseNodes.botFront },
        { key: 'ballUp', data: baseNodes.ballUp },
        { key: 'center', data: draggedCenterPos }
    ];
    const spriteMap = {
        'topFrontLeft': sprites.topFrontLeft, 'topFrontRight': sprites.topFrontRight,
        'topBack': sprites.topBack, 'botBackLeft': sprites.botBackLeft,
        'botBackRight': sprites.botBackRight, 'botFront': sprites.botFront,
        'ballUp': sprites.ballUp, 'center': centerSprite
    };

    renderer.domElement.addEventListener('pointerdown', (e) => {
        getPointerNDC(e); raycaster.setFromCamera(pointer, camera);
        const allSprites = Object.values(spriteMap);
        const intersects = raycaster.intersectObjects(allSprites);
        if (intersects.length > 0) {
            const hitSprite = intersects[0].object;
            const found = draggableList.find(item => spriteMap[item.key] === hitSprite);
            if (found) {
                draggedKey = found.key; isDragging = true; controls.enabled = false; renderer.domElement.style.cursor = 'grabbing';
                const point = intersects[0].point; dragOffset.copy(point).sub(hitSprite.position);
                const camDir = new THREE.Vector3(); camera.getWorldDirection(camDir);
                intersectPlane.setFromNormalAndCoplanarPoint(camDir, point);
                if (draggedKey === 'center') isCenterDragged = true;
            }
        }
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging || !draggedKey) return;
        getPointerNDC(e); raycaster.setFromCamera(pointer, camera);
        const intersectPoint = new THREE.Vector3(); raycaster.ray.intersectPlane(intersectPlane, intersectPoint);
        if (intersectPoint) {
            const newPos = intersectPoint.clone().sub(dragOffset);
            const limit = 3.5;
            newPos.x = Math.max(-limit, Math.min(limit, newPos.x));
            newPos.y = Math.max(-limit, Math.min(limit, newPos.y));
            newPos.z = Math.max(-limit, Math.min(limit, newPos.z));
            const data = draggableList.find(item => item.key === draggedKey).data;
            Object.assign(data, newPos);
            saveState();
        }
    });
    window.addEventListener('pointerup', () => {
        if (isDragging) {
            if (draggedKey === 'center') {
                isCenterDragged = true; // фиксируем вручную
            }
            isDragging = false; draggedKey = null; controls.enabled = true; renderer.domElement.style.cursor = 'default'; saveState();
        }
    });

    // ============= УПРАВЛЕНИЕ =============
    document.getElementById('reset-btn').addEventListener('click', () => {
        Object.assign(baseNodes.botBackLeft, { x: -1.2, y: -2.5, z: -1.2 });
        Object.assign(baseNodes.botBackRight, { x: 1.2, y: -2.5, z: -1.2 });
        Object.assign(baseNodes.botFront, { x: 0, y: -2.5, z: 1.2 });
        Object.assign(baseNodes.topFrontLeft, { x: -1.2, y: 1.0, z: 1.2 });
        Object.assign(baseNodes.topFrontRight, { x: 1.2, y: 1.0, z: 1.2 });
        Object.assign(baseNodes.topBack, { x: 0, y: 1.0, z: -1.2 });
        Object.assign(baseNodes.ballUp, { x: 0, y: 1.0, z: 0 });
        isCenterDragged = false;
        draggedCenterPos.x = 0; draggedCenterPos.y = 0; draggedCenterPos.z = 0;
        ballDown.x = 0; ballDown.y = -1.0; ballDown.z = 0;
        pendulumVel.x = 0; pendulumVel.y = 0; pendulumVel.z = 0;
        saveState();
    });

    const menuBtn = document.getElementById('menu-btn'); const dropdown = document.getElementById('dropdown-menu');
    menuBtn.addEventListener('click', () => dropdown.classList.toggle('open'));
    document.addEventListener('click', (e) => { if (!dropdown.contains(e.target) && e.target !== menuBtn) dropdown.classList.remove('open'); });

    document.getElementById('toggle-energy').addEventListener('click', () => {
        energyEnabled = !energyEnabled;
        document.getElementById('energy-status').textContent = energyEnabled ? '🌀 Энергия: Вкл' : '🌀 Энергия: Выкл';
        dropdown.classList.remove('open');
    });

    const colorPicker = document.getElementById('center-color-picker');
    colorPicker.value = centerColor;
    colorPicker.addEventListener('input', (e) => {
        centerColor = e.target.value;
        updateCenterSpriteColor(centerColor);
    });

    // ============= АНИМАЦИЯ И ЗАПУСК =============
    let prevTime = performance.now();

    function animate(currentTime) {
        requestAnimationFrame(animate);
        const delta = Math.min((currentTime - prevTime) / 1000, 0.05);
        prevTime = currentTime;

        time += delta;
        pivotGroup.rotation.y = Math.sin(time * 0.3) * 0.04;

        updatePositions(delta);

        controls.update();
        renderer.render(scene, camera);
        labelRenderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        labelRenderer.setSize(container.clientWidth, container.clientHeight);
    });

    updatePositions(0.016);
    animate(performance.now());

    console.log('🟣🦅 Уровень 7: Куб Сознания (исправлены грани и маятник) загружено!');
</script>
</body>
</html>
