<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Древо Жизни</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        #app {
            width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column;
            position: relative;
        }

        h1 { text-align: center; font-size: 22px; color: #b8a6ff; padding: 10px 0; margin: 0; }

        /* Холст для дерева */
        #game-canvas {
            flex: 1; width: 100%; display: block; background: radial-gradient(circle at center, #131022 0%, #08060e 100%);
            border-radius: 20px; border: 1px solid #2a2248; touch-action: none; cursor: grab;
        }
        #game-canvas:active { cursor: grabbing; }

        /* Панель управления */
        .controls {
            display: flex; justify-content: center; gap: 12px; padding: 12px 0;
            background: rgba(22,17,39,0.8); backdrop-filter: blur(8px);
            border-top: 1px solid #2a2248; border-radius: 20px 20px 0 0; margin-top: -10px;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff; padding: 10px 20px;
            border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; touch-action: manipulation;
            flex: 1; text-align: center; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-feeling { background: #4a2a4a; color: #ff99cc; }
        .btn-feeling:active { background: #6f52c4; color: #fff; }
        .btn-thought { background: #2a3a5a; color: #99ccff; }
        .btn-thought:active { background: #6f52c4; color: #fff; }

        /* Модальное окно */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 14px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #8f78e6; font-weight: 500; }
        .input-group input, .input-group select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px;
            padding: 10px 12px; font-size: 15px; color: #fff; outline: none; touch-action: manipulation;
            font-family: inherit;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; touch-action: manipulation; }

        @media (max-width: 500px) {
            h1 { font-size: 18px; padding: 5px 0; }
            .btn { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>🌳 Древо Жизни</h1>
        <canvas id="game-canvas"></canvas>
        
        <div class="controls">
            <button class="btn btn-feeling" id="add-feeling-btn">🧱 Чувство</button>
            <button class="btn btn-thought" id="add-thought-btn">☁️ Мысль</button>
            <button class="btn" id="reset-btn" style="background:#5a2a2a; color:#ff8a8a; flex:0.5;">✖</button>
        </div>
    </div>

    <!-- Модальное окно добавления -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">Добавить элемент</h3>
            <div class="input-group">
                <label>Смайл</label>
                <input type="text" id="input-emoji" placeholder="Например: ❤️" />
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="input-name" placeholder="Введите название" />
            </div>
            <div class="input-group" id="type-group">
                <label>Тип</label>
                <select id="input-type"></select>
            </div>
            <div class="modal-actions">
                <button class="btn" id="modal-save-btn" style="background:#6f52c4; color:#fff; flex:1; border:none; border-radius:20px; padding:12px; cursor:pointer;">✅ Посадить</button>
                <button class="btn-cancel" id="modal-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let w, h, cx, cy;
        let feelings = [];
        let thoughts = [];
        let nextId = 1;
        let growth = 0.5; // 0..1 высота роста
        let targetGrowth = 0.5;

        // Для перетаскивания
        let isDragging = false;
        let draggedItem = null;
        let startMouse = { x: 0, y: 0 };
        let startItemPos = { x: 0, y: 0 };
        let isDraggingFeeling = false;

        const addFeelingBtn = document.getElementById('add-feeling-btn');
        const addThoughtBtn = document.getElementById('add-thought-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Модалка
        const modal = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const inputEmoji = document.getElementById('input-emoji');
        const inputName = document.getElementById('input-name');
        const inputType = document.getElementById('input-type');
        const modalSave = document.getElementById('modal-save-btn');
        const modalClose = document.getElementById('modal-close-btn');

        // ========== СОХРАНЕНИЕ ==========
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level5');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    feelings = parsed.feelings || [];
                    thoughts = parsed.thoughts || [];
                    growth = parsed.growth || 0.5;
                    nextId = parsed.nextId || 1;
                }
            } catch(e) {}
            feelings.forEach(f => { if (f.id >= nextId) nextId = f.id + 1; });
            thoughts.forEach(t => { if (t.id >= nextId) nextId = t.id + 1; });
        }
        function saveData() {
            localStorage.setItem('dreams_level5', JSON.stringify({ feelings, thoughts, growth, nextId }));
        }

        // ========== РАЗМЕРЫ ==========
        function resize() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * (window.devicePixelRatio || 1);
            canvas.height = rect.height * (window.devicePixelRatio || 1);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            w = canvas.width;
            h = canvas.height;
            cx = w / 2;
            cy = h / 2;
            // Масштабируем координаты
            ctx.scale(1, 1);
        }

        // ========== ОТРИСОВКА ДЕРЕВА ==========
        function drawTree(progress, bendX) {
            const maxHeight = h * 0.6;
            const currentHeight = maxHeight * progress;
            const startX = cx + bendX;
            const startY = h - 20;

            ctx.save();
            ctx.shadowColor = 'rgba(111, 82, 196, 0.5)';
            ctx.shadowBlur = 20;

            // Ствол
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            const midY = startY - currentHeight * 0.6;
            const endY = startY - currentHeight;
            const bendOffset = bendX * 0.5;
            ctx.quadraticCurveTo(cx + bendOffset, midY, cx + bendX * 0.3, endY);
            ctx.lineWidth = 10 + 20 * (1 - progress);
            ctx.strokeStyle = '#6f52c4';
            ctx.stroke();

            // Крона (ветви)
            if (progress > 0.2) {
                const branchLen = currentHeight * 0.3;
                const branches = 5 + Math.floor(progress * 10);
                ctx.lineWidth = 4 + 6 * (1 - progress);
                for (let i = 0; i < branches; i++) {
                    const t = i / branches;
                    const y = startY - currentHeight * (0.2 + t * 0.7);
                    const angle = Math.sin(t * Math.PI * 4 + Date.now() / 5000) * 0.6;
                    const xOffset = Math.sin(t * Math.PI * 2 + Date.now() / 3000) * 20 * (1 - progress);
                    const x = cx + bendX * 0.5 + xOffset;
                    
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.quadraticCurveTo(x + Math.sin(angle + 1) * branchLen * 0.5, y - 20, x + Math.sin(angle) * branchLen, y - 40);
                    ctx.strokeStyle = `hsl(${120 + t * 40}, 60%, ${40 + t * 20}%)`;
                    ctx.stroke();
                }
            }
            ctx.restore();

            // Заземление
            ctx.beginPath();
            ctx.ellipse(cx, h - 10, w * 0.3, 20, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(111, 82, 196, 0.2)';
            ctx.shadowBlur = 40;
            ctx.shadowColor = 'rgba(111, 82, 196, 0.3)';
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // ========== ОТРИСОВКА ЭЛЕМЕНТОВ ==========
        function drawFeelings() {
            feelings.forEach(f => {
                const radius = 30;
                const isHeavy = f.type === 'heavy';
                ctx.shadowColor = isHeavy ? 'rgba(255, 50, 50, 0.5)' : 'rgba(50, 255, 50, 0.5)';
                ctx.shadowBlur = 20;
                
                // Кирпич / блок
                ctx.beginPath();
                ctx.roundRect(f.x - radius, f.y - radius, radius*2, radius*2, 10);
                ctx.fillStyle = isHeavy ? '#4a1a1a' : '#1a4a1a';
                ctx.fill();
                ctx.strokeStyle = isHeavy ? '#ff6b6b' : '#6bff6b';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Эмодзи и текст
                ctx.font = '24px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(f.emoji || '🧱', f.x, f.y - 12);
                ctx.font = '10px system-ui';
                ctx.fillStyle = '#e0d6ff';
                ctx.fillText(f.name || '', f.x, f.y + 18);
            });
        }

        function drawThoughts() {
            thoughts.forEach(t => {
                const radius = 20 + Math.sin(Date.now() / 2000 + t.id) * 5;
                const isHelpful = t.type === 'helpful';
                ctx.shadowColor = isHelpful ? 'rgba(50, 200, 255, 0.6)' : 'rgba(200, 50, 50, 0.6)';
                ctx.shadowBlur = 30;

                // Облако (пузырёк)
                ctx.beginPath();
                ctx.arc(t.x, t.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = isHelpful ? 'rgba(50, 150, 255, 0.3)' : 'rgba(150, 50, 50, 0.3)';
                ctx.fill();
                ctx.strokeStyle = isHelpful ? 'rgba(100, 200, 255, 0.8)' : 'rgba(200, 100, 100, 0.8)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Эмодзи и текст
                ctx.font = '20px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(t.emoji || '☁️', t.x, t.y - 8);
                ctx.font = '9px system-ui';
                ctx.fillStyle = '#e0d6ff';
                ctx.fillText(t.name || '', t.x, t.y + 16);
            });
        }

        // ========== ФИЗИКА РОСТА И ИЗГИБА ==========
        function updatePhysics() {
            let growthSpeed = 0;
            let totalBend = 0;

            // Чувства: тяжёлые давят, лёгкие поднимают
            feelings.forEach(f => {
                if (f.type === 'heavy') {
                    growthSpeed -= 0.005;
                    totalBend += (f.x - cx) * 0.5;
                } else {
                    growthSpeed += 0.005;
                    totalBend += (f.x - cx) * -0.3;
                }
            });

            // Мысли: помогают или охлаждают
            thoughts.forEach(t => {
                if (t.type === 'helpful') {
                    growthSpeed += 0.003;
                } else {
                    growthSpeed -= 0.003;
                }
            });

            targetGrowth = Math.max(0.1, Math.min(0.95, targetGrowth + growthSpeed * 0.1));
            growth += (targetGrowth - growth) * 0.02;

            // Ограничение изгиба
            const maxBend = w * 0.15;
            totalBend = Math.max(-maxBend, Math.min(maxBend, totalBend * 0.02));

            // Анимация облаков (мыслей) - они плавают
            thoughts.forEach(t => {
                t.x += Math.sin(Date.now() / 3000 + t.id) * 0.3;
                t.y += Math.cos(Date.now() / 4000 + t.id) * 0.2;
                t.x = Math.max(10, Math.min(w - 10, t.x));
                t.y = Math.max(10, Math.min(h - 10, t.y));
            });

            return totalBend;
        }

        // ========== ГЛАВНЫЙ ЦИКЛ ==========
        function gameLoop() {
            const bend = updatePhysics();
            ctx.clearRect(0, 0, w, h);
            
            // Рисуем слои
            drawFeelings();
            drawTree(growth, bend);
            drawThoughts();

            requestAnimationFrame(gameLoop);
        }

        // ========== ИНТЕРАКТИВНОСТЬ (ПЕРЕТАСКИВАНИЕ) ==========
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX - rect.left) * (w / rect.width), y: (e.clientY - rect.top) * (h / rect.height) };
        }

        function checkHit(pointer) {
            // Сначала проверяем чувства (они визуально выше)
            for (let i = feelings.length - 1; i >= 0; i--) {
                const f = feelings[i];
                const dist = Math.hypot(pointer.x - f.x, pointer.y - f.y);
                if (dist < 40) return { item: f, type: 'feeling' };
            }
            // Затем мысли
            for (let i = thoughts.length - 1; i >= 0; i--) {
                const t = thoughts[i];
                const dist = Math.hypot(pointer.x - t.x, pointer.y - t.y);
                if (dist < 30) return { item: t, type: 'thought' };
            }
            return null;
        }

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            const pos = getPointerPos(e);
            const hit = checkHit(pos);
            if (hit) {
                isDragging = true;
                draggedItem = hit.item;
                isDraggingFeeling = hit.type === 'feeling';
                startMouse = pos;
                startItemPos = { x: hit.item.x, y: hit.item.y };
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging || !draggedItem) return;
            e.preventDefault();
            const pos = getPointerPos(e);
            const dx = pos.x - startMouse.x;
            const dy = pos.y - startMouse.y;
            draggedItem.x = Math.max(20, Math.min(w - 20, startItemPos.x + dx));
            draggedItem.y = Math.max(20, Math.min(h - 20, startItemPos.y + dy));
            saveData();
        });

        window.addEventListener('pointerup', () => {
            if (isDragging) {
                isDragging = false;
                draggedItem = null;
                saveData();
            }
        });

        // ========== ДОБАВЛЕНИЕ ЧЕРЕЗ МОДАЛКУ ==========
        function openModal(type) {
            const isFeeling = type === 'feeling';
            modalTitle.textContent = isFeeling ? '🧱 Добавить чувство' : '☁️ Добавить мысль';
            inputEmoji.value = isFeeling ? '❤️' : '💡';
            inputName.value = '';
            
            inputType.innerHTML = '';
            if (isFeeling) {
                inputType.innerHTML = `
                    <option value="light">Светлое / Наполняет 🌱</option>
                    <option value="heavy">Тяжёлое / Мешает 🪨</option>
                `;
            } else {
                inputType.innerHTML = `
                    <option value="helpful">Помогает / Свет ☀️</option>
                    <option value="harmful">Охлаждает / Тень 🌑</option>
                `;
            }
            modal.dataset.type = type;
            modal.classList.add('open');
        }

        function closeModal() { modal.classList.remove('open'); }

        function saveModalItem() {
            const emoji = inputEmoji.value.trim() || '🧩';
            const name = inputName.value.trim() || 'Элемент';
            const type = inputType.value;
            const itemType = modal.dataset.type;

            const newItem = {
                id: nextId++,
                emoji: emoji,
                name: name,
                type: type,
                x: cx + (Math.random() - 0.5) * 200,
                y: h * 0.4 + Math.random() * 200
            };

            if (itemType === 'feeling') feelings.push(newItem);
            else thoughts.push(newItem);

            saveData();
            closeModal();
        }

        addFeelingBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); openModal('feeling'); });
        addThoughtBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); openModal('thought'); });
        modalSave.addEventListener('pointerdown', (e) => { e.preventDefault(); saveModalItem(); });
        modalClose.addEventListener('pointerdown', (e) => { e.preventDefault(); closeModal(); });
        modal.addEventListener('pointerdown', (e) => { if (e.target === modal) closeModal(); });

        // ========== СБРОС ==========
        resetBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (confirm('Сбросить всё и очистить пространство?')) {
                feelings = [];
                thoughts = [];
                growth = 0.5;
                targetGrowth = 0.5;
                saveData();
            }
        });

        // ========== ЗАПУСК ==========
        window.addEventListener('resize', resize);
        resize();
        loadData();
        // Отрисовка roundRect (полифил для старых браузеров)
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }
        gameLoop();
        console.log('🟣🦅 Уровень 5: Древо Жизни загружено!');
    </script>
</body>
</html>
