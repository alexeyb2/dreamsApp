<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Древо Жизни</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px;
            touch-action: none; -webkit-tap-highlight-color: transparent; overflow: hidden;
        }
        #app { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; position: relative; }

        h1 { text-align: center; font-size: 22px; color: #b8a6ff; padding: 10px 0; margin: 0; }

        #game-canvas {
            flex: 1; width: 100%; display: block;
            background: radial-gradient(circle at center, #131022 0%, #08060e 100%);
            border-radius: 20px; border: 1px solid #2a2248; touch-action: none; cursor: grab;
        }
        #game-canvas:active { cursor: grabbing; }

        /* Панель управления */
        .controls {
            display: flex; justify-content: center; gap: 12px; padding: 12px 0;
            background: rgba(22,17,39,0.8); backdrop-filter: blur(8px);
            border-top: 1px solid #2a2248; border-radius: 20px 20px 0 0; margin-top: -10px;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff; padding: 10px 20px;
            border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; touch-action: manipulation;
            flex: 1; text-align: center; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-feeling { background: #4a2a4a; color: #ff99cc; }
        .btn-feeling:active { background: #6f52c4; color: #fff; }
        .btn-thought { background: #2a3a5a; color: #99ccff; }
        .btn-thought:active { background: #6f52c4; color: #fff; }
        .btn-action { background: #4a2a2a; color: #ff9999; }
        .btn-action:active { background: #6f52c4; color: #fff; }

        /* Модальное окно просмотра мысли */
        #thought-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #thought-modal.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 14px;
            align-items: center;
        }
        .modal-box .big-emoji { font-size: 64px; }
        .modal-box .big-name { font-size: 20px; font-weight: bold; color: #ffffff; }
        .modal-box .btn-close-modal {
            background: #3a2f5a; border: none; border-radius: 20px; padding: 10px 24px;
            color: #b8a6ff; cursor: pointer; touch-action: manipulation; font-weight: 600;
        }

        /* Модальное окно добавления */
        #add-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 101;
        }
        #add-modal.open { display: flex; }
        .add-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 14px;
        }
        .add-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #8f78e6; font-weight: 500; }
        .input-group input, .input-group select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px;
            padding: 10px 12px; font-size: 15px; color: #fff; outline: none; touch-action: manipulation;
            font-family: inherit;
        }
        .add-actions { display: flex; gap: 10px; margin-top: 4px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; touch-action: manipulation; }

        @media (max-width: 500px) {
            h1 { font-size: 18px; padding: 5px 0; }
            .btn { padding: 8px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>🌳 Древо Жизни</h1>
        <canvas id="game-canvas"></canvas>
        
        <div class="controls">
            <button class="btn btn-feeling" id="add-feeling-btn">🧱 Чувство</button>
            <button class="btn btn-thought" id="add-thought-btn">☁️ Мысль</button>
            <button class="btn btn-action" id="add-action-btn">⚡ Действие</button>
        </div>
    </div>

    <!-- Модальное окно просмотра мысли -->
    <div id="thought-modal">
        <div class="modal-box">
            <div class="big-emoji" id="thought-emoji">☁️</div>
            <div class="big-name" id="thought-name">Название</div>
            <button class="btn-close-modal" id="close-thought-btn">Закрыть</button>
        </div>
    </div>

    <!-- Модальное окно добавления -->
    <div id="add-modal">
        <div class="add-box">
            <h3 id="add-title">➕ Добавить элемент</h3>
            <div class="input-group">
                <label>Смайл</label>
                <input type="text" id="input-emoji" placeholder="Например: ❤️" />
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="input-name" placeholder="Введите название" />
            </div>
            <div class="add-actions">
                <button class="btn" id="add-save-btn" style="background:#6f52c4; color:#fff; flex:1; border:none; border-radius:20px; padding:12px; cursor:pointer;">✅ Посадить</button>
                <button class="btn-cancel" id="add-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let w, h, cx, cy;
        let thoughts = [];
        let feelings = [];
        let actions = [];
        let nextId = 1;

        // ========== РАЗМЕРЫ ==========
        function resize() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * (window.devicePixelRatio || 1);
            canvas.height = rect.height * (window.devicePixelRatio || 1);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            w = canvas.width; h = canvas.height;
            cx = w / 2; cy = h / 2;
            ctx.scale(1, 1);
        }

        // ========== СОХРАНЕНИЕ ==========
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level5_tree');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    thoughts = parsed.thoughts || [];
                    feelings = parsed.feelings || [];
                    actions = parsed.actions || [];
                    nextId = parsed.nextId || 1;
                }
            } catch(e) {}
            thoughts.forEach(t => { if (t.id >= nextId) nextId = t.id + 1; });
            feelings.forEach(f => { if (f.id >= nextId) nextId = f.id + 1; });
            actions.forEach(a => { if (a.id >= nextId) nextId = a.id + 1; });
        }
        function saveData() {
            localStorage.setItem('dreams_level5_tree', JSON.stringify({ thoughts, feelings, actions, nextId }));
        }

        // ========== ОТРИСОВКА ==========
        function drawTreeBase() {
            const rootX = cx, rootY = h - 20;

            // 1. Зелёные корни (внизу)
            ctx.beginPath();
            ctx.moveTo(cx - 40, rootY);
            ctx.quadraticCurveTo(cx - 60, rootY + 30, cx - 20, rootY + 40);
            ctx.strokeStyle = '#2ecc71';
            ctx.lineWidth = 6;
            ctx.shadowColor = 'rgba(46, 204, 113, 0.3)';
            ctx.shadowBlur = 15;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(cx + 40, rootY);
            ctx.quadraticCurveTo(cx + 60, rootY + 30, cx + 20, rootY + 40);
            ctx.stroke();

            ctx.shadowBlur = 0;

            // 2. Центральный столб (позвоночник)
            const grad = ctx.createLinearGradient(cx, rootY, cx, cy - h*0.4);
            grad.addColorStop(0, '#6f52c4');
            grad.addColorStop(1, '#4d8bff');
            ctx.beginPath();
            ctx.moveTo(cx, rootY);
            ctx.lineTo(cx, cy - h*0.4);
            ctx.strokeStyle = grad;
            ctx.lineWidth = 6;
            ctx.shadowColor = 'rgba(111, 82, 196, 0.5)';
            ctx.shadowBlur = 20;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 3. Чакры
            // Живот (нижний)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.roundRect(cx - 60, cy + 40, 120, 60, 10);
            ctx.fill();
            ctx.stroke();

            // Сердце (средняя)
            ctx.beginPath();
            ctx.arc(cx, cy - 20, 55, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(46, 204, 113, 0.2)';
            ctx.fill();
            ctx.strokeStyle = '#2ecc71';
            ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(46, 204, 113, 0.5)';
            ctx.shadowBlur = 30;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Голова (верхняя)
            ctx.beginPath();
            ctx.arc(cx, cy - 130, 55, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(77, 139, 255, 0.2)';
            ctx.fill();
            ctx.strokeStyle = '#4d8bff';
            ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(77, 139, 255, 0.5)';
            ctx.shadowBlur = 30;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 4. Пересекающиеся потоки (Действия 🔴 и Мысли 🔵)
            // Правая нога -> Левая рука (Красный поток)
            ctx.beginPath();
            ctx.moveTo(cx + 140, h - 30);
            ctx.quadraticCurveTo(cx + 50, cy + 40, cx - 100, cy - 120);
            ctx.strokeStyle = 'rgba(255, 77, 77, 0.6)';
            ctx.lineWidth = 4;
            ctx.shadowColor = 'rgba(255, 77, 77, 0.8)';
            ctx.shadowBlur = 20;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Левая нога (под землёй) -> Правая рука (Синий поток)
            ctx.beginPath();
            ctx.moveTo(cx - 140, h - 30);
            ctx.quadraticCurveTo(cx - 50, cy + 40, cx + 100, cy - 120);
            ctx.strokeStyle = 'rgba(77, 139, 255, 0.6)';
            ctx.lineWidth = 4;
            ctx.shadowColor = 'rgba(77, 139, 255, 0.8)';
            ctx.shadowBlur = 20;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Точки-источники потоков
            const drawNode = (x, y, color, label) => {
                ctx.beginPath();
                ctx.arc(x, y, 12, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 30;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.font = '10px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillStyle = '#ffffff';
                ctx.fillText(label, x, y - 16);
            };

            drawNode(cx + 140, h - 30, '#ff4d4d', 'Правая нога');
            drawNode(cx - 100, cy - 120, '#ff4d4d', 'Левая рука');
            drawNode(cx - 140, h - 30, '#4d8bff', 'Левая нога');
            drawNode(cx + 100, cy - 120, '#4d8bff', 'Правая рука');
        }

        function drawThoughts() {
            thoughts.forEach(t => {
                const radius = 30;
                // Парящее облако
                ctx.beginPath();
                ctx.arc(t.x, t.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.2)';
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Эмодзи внутри
                ctx.font = '30px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(t.emoji || '☁️', t.x, t.y - 6);
                
                // Имя
                ctx.font = '10px system-ui';
                ctx.fillStyle = '#e0d6ff';
                ctx.fillText(t.name || '', t.x, t.y + 18);
            });
        }

        function drawFeelings() {
            feelings.forEach(f => {
                ctx.beginPath();
                ctx.arc(f.x, f.y, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 153, 204, 0.2)';
                ctx.fill();
                ctx.strokeStyle = '#ff99cc';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(255, 153, 204, 0.5)';
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.font = '24px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(f.emoji || '🧱', f.x, f.y - 6);
                ctx.font = '10px system-ui';
                ctx.fillStyle = '#e0d6ff';
                ctx.fillText(f.name || '', f.x, f.y + 18);
            });
        }

        function drawActions() {
            actions.forEach(a => {
                ctx.beginPath();
                ctx.arc(a.x, a.y, 25, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 153, 153, 0.2)';
                ctx.fill();
                ctx.strokeStyle = '#ff9999';
                ctx.lineWidth = 2;
                ctx.shadowColor = 'rgba(255, 153, 153, 0.5)';
                ctx.shadowBlur = 15;
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.font = '24px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(a.emoji || '⚡', a.x, a.y - 6);
                ctx.font = '10px system-ui';
                ctx.fillStyle = '#e0d6ff';
                ctx.fillText(a.name || '', a.x, a.y + 18);
            });
        }

        function gameLoop() {
            ctx.clearRect(0, 0, w, h);
            drawTreeBase();
            drawFeelings();
            drawActions();
            drawThoughts();
            requestAnimationFrame(gameLoop);
        }

        // ========== ИНТЕРАКТИВНОСТЬ (ПЕРЕТАСКИВАНИЕ И КЛИК) ==========
        let isDragging = false;
        let draggedItem = null;
        let startMouse = { x: 0, y: 0 };
        let startItemPos = { x: 0, y: 0 };

        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX - rect.left) * (w / rect.width), y: (e.clientY - rect.top) * (h / rect.height) };
        }

        function checkHit(pointer) {
            // Проверяем облака мыслей
            for (let i = thoughts.length - 1; i >= 0; i--) {
                const t = thoughts[i];
                if (Math.hypot(pointer.x - t.x, pointer.y - t.y) < 40) return { item: t, type: 'thought' };
            }
            // Проверяем чувства
            for (let i = feelings.length - 1; i >= 0; i--) {
                const f = feelings[i];
                if (Math.hypot(pointer.x - f.x, pointer.y - f.y) < 35) return { item: f, type: 'feeling' };
            }
            // Проверяем действия
            for (let i = actions.length - 1; i >= 0; i--) {
                const a = actions[i];
                if (Math.hypot(pointer.x - a.x, pointer.y - a.y) < 35) return { item: a, type: 'action' };
            }
            return null;
        }

        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            const pos = getPointerPos(e);
            const hit = checkHit(pos);
            if (hit) {
                if (hit.type === 'thought') {
                    // Открываем модалку с мыслью
                    openThoughtModal(hit.item);
                } else {
                    // Включаем перетаскивание
                    isDragging = true;
                    draggedItem = hit.item;
                    startMouse = pos;
                    startItemPos = { x: hit.item.x, y: hit.item.y };
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging || !draggedItem) return;
            e.preventDefault();
            const pos = getPointerPos(e);
            const dx = pos.x - startMouse.x;
            const dy = pos.y - startMouse.y;
            draggedItem.x = Math.max(20, Math.min(w - 20, startItemPos.x + dx));
            draggedItem.y = Math.max(20, Math.min(h - 20, startItemPos.y + dy));
            saveData();
        });

        window.addEventListener('pointerup', () => {
            if (isDragging) {
                isDragging = false;
                draggedItem = null;
                saveData();
            }
        });

        // ========== МОДАЛЬНОЕ ОКНО МЫСЛИ ==========
        const thoughtModal = document.getElementById('thought-modal');
        const thoughtEmoji = document.getElementById('thought-emoji');
        const thoughtName = document.getElementById('thought-name');
        const closeThoughtBtn = document.getElementById('close-thought-btn');

        function openThoughtModal(item) {
            thoughtEmoji.textContent = item.emoji || '☁️';
            thoughtName.textContent = item.name || 'Мысль';
            thoughtModal.classList.add('open');
        }
        closeThoughtBtn.addEventListener('click', () => thoughtModal.classList.remove('open'));
        thoughtModal.addEventListener('click', (e) => { if (e.target === thoughtModal) thoughtModal.classList.remove('open'); });

        // ========== МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ ==========
        const addModal = document.getElementById('add-modal');
        const addTitle = document.getElementById('add-title');
        const inputEmoji = document.getElementById('input-emoji');
        const inputName = document.getElementById('input-name');
        const addSaveBtn = document.getElementById('add-save-btn');
        const addCloseBtn = document.getElementById('add-close-btn');
        let addType = 'thought';

        function openAddModal(type) {
            addType = type;
            if (type === 'thought') addTitle.textContent = '☁️ Новая мысль';
            else if (type === 'feeling') addTitle.textContent = '🧱 Новое чувство';
            else if (type === 'action') addTitle.textContent = '⚡ Новое действие';
            inputEmoji.value = '';
            inputName.value = '';
            addModal.classList.add('open');
        }

        function closeAddModal() { addModal.classList.remove('open'); }

        function saveAddItem() {
            const emoji = inputEmoji.value.trim() || (addType === 'thought' ? '☁️' : addType === 'feeling' ? '🧱' : '⚡');
            const name = inputName.value.trim() || 'Элемент';
            const newItem = {
                id: nextId++,
                emoji: emoji,
                name: name,
                x: cx + (Math.random() - 0.5) * 200,
                y: cy + (Math.random() - 0.5) * 300
            };
            if (addType === 'thought') thoughts.push(newItem);
            else if (addType === 'feeling') feelings.push(newItem);
            else if (addType === 'action') actions.push(newItem);
            saveData();
            closeAddModal();
        }

        document.getElementById('add-thought-btn').addEventListener('click', () => openAddModal('thought'));
        document.getElementById('add-feeling-btn').addEventListener('click', () => openAddModal('feeling'));
        document.getElementById('add-action-btn').addEventListener('click', () => openAddModal('action'));
        addSaveBtn.addEventListener('click', saveAddItem);
        addCloseBtn.addEventListener('click', closeAddModal);
        addModal.addEventListener('click', (e) => { if (e.target === addModal) closeAddModal(); });

        // ========== ЗАПУСК ==========
        window.addEventListener('resize', resize);
        resize();
        loadData();
        // Полифил roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }
        gameLoop();
        console.log('🟣🦅 Уровень 5: Древо Жизни (потоки) загружено!');
    </script>
</body>
</html>
