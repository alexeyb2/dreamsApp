<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Древо Жизни</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px;
            touch-action: none; -webkit-tap-highlight-color: transparent; overflow: hidden;
        }
        #app { width: 100%; max-width: 480px; height: 100vh; display: flex; flex-direction: column; position: relative; }

        h1 { text-align: center; font-size: 22px; color: #b8a6ff; padding: 10px 0; margin: 0; }

        #game-canvas {
            flex: 1; width: 100%; display: block;
            background: #0b0814;
            border-radius: 20px; border: 1px solid #2a2248; touch-action: none; cursor: grab;
        }
        #game-canvas:active { cursor: grabbing; }

        .controls {
            display: flex; justify-content: center; gap: 12px; padding: 12px 0;
            background: rgba(22,17,39,0.85); backdrop-filter: blur(8px);
            border-top: 1px solid #2a2248; border-radius: 20px 20px 0 0; margin-top: -10px;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff; padding: 12px 20px;
            border-radius: 30px; font-weight: 700; font-size: 15px; cursor: pointer; touch-action: manipulation;
            flex: 1; text-align: center; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-sun { background: #4a4a1a; color: #ffcc00; }
        .btn-feeling { background: #4a2a4a; color: #ff99cc; }
        .btn-root { background: #2a4a2a; color: #66cc66; }

        #add-modal, #root-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #add-modal.open, #root-modal.open { display: flex; }
        .add-box, .root-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 30px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 16px;
        }
        .add-box h3, .root-box .root-title { color: #b8a6ff; text-align: center; font-size: 22px; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 14px; color: #8f78e6; font-weight: 500; }
        .input-group input, .input-group select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px;
            padding: 12px 14px; font-size: 16px; color: #fff; outline: none; touch-action: manipulation;
            font-family: inherit;
        }
        .add-actions, .root-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; touch-action: manipulation; }
        .root-btn { border: none; border-radius: 20px; padding: 12px 20px; font-weight: 700; cursor: pointer; touch-action: manipulation; font-size: 15px; flex: 1;}
        .root-btn.transform { background: #2ecc71; color: #fff; }
        .root-btn.delete { background: #a03a3a; color: #fff; }
        .root-btn.close { background: #3a2f5a; color: #b8a6ff; }

        @media (max-width: 500px) {
            h1 { font-size: 18px; }
            .btn { font-size: 13px; padding: 10px 14px; }
            .add-box, .root-box { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>🌳 Древо Жизни</h1>
        <canvas id="game-canvas"></canvas>
        
        <div class="controls">
            <button class="btn btn-sun" id="add-cloud-btn">☁️ Мысль</button>
            <button class="btn btn-feeling" id="add-feeling-btn">🧱 Чувство</button>
            <button class="btn btn-root" id="add-root-btn">🌱 Корень</button>
        </div>
    </div>

    <!-- Модальное окно добавления -->
    <div id="add-modal">
        <div class="add-box">
            <h3 id="add-title">➕ Добавить</h3>
            <div class="input-group">
                <label>Смайл</label>
                <input type="text" id="input-emoji" placeholder="Например: ☁️" />
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="input-name" placeholder="Введите название" />
            </div>
            <div class="input-group">
                <label>Тип</label>
                <select id="input-type"></select>
            </div>
            <div class="add-actions">
                <button class="btn" id="add-save-btn" style="background:#6f52c4; color:#fff; flex:1; border:none; border-radius:20px; padding:12px; cursor:pointer;">✅ Посадить</button>
                <button class="btn-cancel" id="add-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно корня (преобразование/удаление) -->
    <div id="root-modal">
        <div class="root-box">
            <div class="root-title">🌱 Редактировать корень</div>
            <div class="root-emoji" id="root-emoji">🌱</div>
            <div class="root-name" id="root-name">Убеждение</div>
            <div class="root-actions">
                <button class="root-btn transform" id="root-transform">✨ Преобразовать</button>
                <button class="root-btn delete" id="root-delete">🗑️ Убрать</button>
                <button class="root-btn close" id="root-close">✖ Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        let w, h, cx, cy;
        let clouds = [];
        let feelings = [];
        let roots = [];
        let nextId = 1;
        let dashOffset = 0; // Для анимации течения энергии

        // Координаты зон (границы)
        let skyEnd, feelingEnd, earthStart;

        // ========== УЗЛЫ ЭНЕРГИИ (ПЕРЕКРЕСТНЫЕ ПОТОКИ) ==========
        let nodes = {
            // Ноги (квадраты, ими управляем)
            leftLeg: { x: 0, y: 0, emoji: '🟦', label: 'Левая нога' },
            rightLeg: { x: 0, y: 0, emoji: '🟥', label: 'Правая нога' },
            
            // Руки (круги, двигаются зеркально ногам)
            leftHand: { x: 0, y: 0, emoji: '🔵', label: 'Левая рука' },
            rightHand: { x: 0, y: 0, emoji: '🔴', label: 'Правая рука' },
            
            // Сердце (зелёный центр, притягивается к балансу рук)
            heart: { x: 0, y: 0, emoji: '🟢', label: 'Сердце' },
            
            // Живот (граница земли и чувств)
            center: { x: 0, y: 0, emoji: '🟠', label: 'Живот' }
        };
        
        let isDragging = false;
        let draggedNode = null;
        let startMouse = { x: 0, y: 0 };
        let startNodePos = { x: 0, y: 0 };
        let draggedIsNode = false;

        // ========== МАСШТАБИРОВАНИЕ И ИНИЦИАЛИЗАЦИЯ ==========
        function resize() {
            const rect = canvas.getBoundingClientRect();
            // Работаем в CSS-пикселях напрямую (безопасно для Safari)
            canvas.width = Math.max(1, rect.width);
            canvas.height = Math.max(1, rect.height);
            w = canvas.width;
            h = canvas.height;
            cx = w / 2;
            cy = h / 2;

            // Три равные горизонтальные зоны
            skyEnd = h * 0.33;
            feelingEnd = h * 0.66;

            // Инициализация узлов при первом запуске
            if (nodes.leftLeg.x === 0 && nodes.leftLeg.y === 0) {
                // Ноги внизу
                nodes.leftLeg = { x: cx - 120, y: h - 70, emoji: '🟦', label: 'Левая нога' };
                nodes.rightLeg = { x: cx + 120, y: h - 70, emoji: '🟥', label: 'Правая нога' };
                // Руки наверху (зеркально ногам)
                nodes.leftHand = { x: cx - 120, y: 80, emoji: '🔵', label: 'Левая рука' };
                nodes.rightHand = { x: cx + 120, y: 80, emoji: '🔴', label: 'Правая рука' };
                // Сердце
                nodes.heart = { x: cx, y: cy - 40, emoji: '🟢', label: 'Сердце' };
                // Живот строго на границе
                nodes.center = { x: cx, y: feelingEnd, emoji: '🟠', label: 'Живот' };
            }
        }

        // ========== СОХРАНЕНИЕ ==========
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level5_tree');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    clouds = parsed.clouds || [];
                    feelings = parsed.feelings || [];
                    roots = parsed.roots || [];
                    if (parsed.nodes) nodes = parsed.nodes;
                    nextId = parsed.nextId || 1;
                }
            } catch(e) {}
            clouds.forEach(t => { if (t.id >= nextId) nextId = t.id + 1; });
            feelings.forEach(f => { if (f.id >= nextId) nextId = f.id + 1; });
            roots.forEach(r => { if (r.id >= nextId) nextId = r.id + 1; });
        }
        function saveData() {
            localStorage.setItem('dreams_level5_tree', JSON.stringify({ clouds, feelings, roots, nodes, nextId }));
        }

        // ========== ОТРИСОВКА ==========
        function drawZones() {
            // 1. Небо (верхняя треть)
            const skyGrad = ctx.createLinearGradient(0, 0, 0, skyEnd);
            skyGrad.addColorStop(0, '#1a2a4a');
            skyGrad.addColorStop(1, 'rgba(26, 42, 74, 0)');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, skyEnd);

            // Солнце
            ctx.save();
            ctx.shadowColor = '#ffcc00';
            ctx.shadowBlur = 80;
            ctx.beginPath();
            ctx.arc(cx, 50, 50, 0, Math.PI * 2);
            ctx.fillStyle = '#ffcc00';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.restore();
            ctx.font = '48px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('☀️', cx, 50);

            // 2. Зона чувств (средняя треть)
            const feelGrad = ctx.createLinearGradient(0, skyEnd, 0, feelingEnd);
            feelGrad.addColorStop(0, 'rgba(46, 204, 113, 0)');
            feelGrad.addColorStop(1, 'rgba(46, 204, 113, 0.2)');
            ctx.fillStyle = feelGrad;
            ctx.fillRect(0, skyEnd, w, feelingEnd - skyEnd);

            // 3. Земля (нижняя треть)
            const earthGrad = ctx.createLinearGradient(0, feelingEnd, 0, h);
            earthGrad.addColorStop(0, 'rgba(60, 40, 20, 0.2)');
            earthGrad.addColorStop(1, 'rgba(60, 40, 20, 0.6)');
            ctx.fillStyle = earthGrad;
            ctx.fillRect(0, feelingEnd, w, h - feelingEnd);
            
            // Граница (для опоры)
            ctx.beginPath();
            ctx.moveTo(0, feelingEnd);
            ctx.lineTo(w, feelingEnd);
            ctx.strokeStyle = 'rgba(255, 165, 0, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawSunRays() {
            ctx.shadowBlur = 0;
            // От солнца к синей ноге
            ctx.beginPath();
            ctx.moveTo(cx, 50);
            ctx.lineTo(nodes.leftLeg.x, nodes.leftLeg.y);
            ctx.strokeStyle = 'rgba(77, 139, 255, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
            // От солнца к красной ноге
            ctx.beginPath();
            ctx.moveTo(cx, 50);
            ctx.lineTo(nodes.rightLeg.x, nodes.rightLeg.y);
            ctx.strokeStyle = 'rgba(255, 77, 77, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawClouds() {
            clouds.forEach(c => {
                const r = 45;
                ctx.beginPath();
                ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 3;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.3)';
                ctx.shadowBlur = 20;
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.font = '34px system-ui';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(c.emoji || '☁️', c.x, c.y - 6);
                ctx.font = '13px system-ui';
                ctx.fillStyle = '#e0d6ff';
                ctx.fillText(c.name || '', c.x, c.y + 30);
            });
        }

        // ========== ГЛАВНЫЕ ПЕРЕКРЕСТНЫЕ ПОТОКИ (ПРЯМЫЕ ЛИНИИ) ==========
        function drawFlows() {
            // Защита от NaN в Safari
            if (!nodes.leftLeg || !nodes.rightHand || !nodes.rightLeg || !nodes.leftHand) return;

            // --- Поток 1: Синий луч из 🟦 Левая нога -> 🔴 Правая рука (через центр) ---
            ctx.beginPath();
            ctx.moveTo(nodes.leftLeg.x, nodes.leftLeg.y);
            ctx.lineTo(nodes.rightHand.x, nodes.rightHand.y);
            ctx.strokeStyle = 'rgba(77, 139, 255, 0.7)';
            ctx.lineWidth = 4;
            ctx.shadowColor = 'rgba(77, 139, 255, 0.5)';
            ctx.shadowBlur = 15;
            ctx.setLineDash([10, 20]);
            ctx.lineDashOffset = -dashOffset;
            ctx.stroke();

            // --- Поток 2: Красный луч из 🟥 Правая нога -> 🔵 Левая рука (через центр) ---
            ctx.beginPath();
            ctx.moveTo(nodes.rightLeg.x, nodes.rightLeg.y);
            ctx.lineTo(nodes.leftHand.x, nodes.leftHand.y);
            ctx.strokeStyle = 'rgba(255, 77, 77, 0.7)';
            ctx.lineWidth = 4;
            ctx.shadowColor = 'rgba(255, 77, 77, 0.5)';
            ctx.shadowBlur = 15;
            ctx.setLineDash([10, 20]);
            ctx.lineDashOffset = -dashOffset;
            ctx.stroke();

            // Сброс стиля пунктира
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;
        }

        function drawNode(node, radius = 50, isSquare = false) {
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.15)';
            
            if (isSquare) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(node.x - radius, node.y - radius, radius * 2, radius * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 3;
                ctx.strokeRect(node.x - radius, node.y - radius, radius * 2, radius * 2);
            } else {
                ctx.beginPath();
                ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255,
