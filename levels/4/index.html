<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Каталог состояний</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; padding: 20px; touch-action: pan-y;
            -webkit-tap-highlight-color: transparent;
        }
        #app { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }

        h1 { text-align: center; font-size: 24px; color: #b8a6ff; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .header-actions {
            display: flex; justify-content: center; margin-bottom: 20px;
        }
        .btn {
            border: none; background: #6f52c4; color: #fff; padding: 12px 24px;
            border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: 0.2s; touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.95); background: #5d43a8; }
        .btn-danger { background: #a03a3a; }

        /* Список записей */
        .entry-list {
            display: flex; flex-direction: column; gap: 12px;
        }
        .entry-card {
            background: #161127; border-radius: 16px; padding: 16px;
            border-left: 4px solid #6f52c4; display: flex; flex-direction: column; gap: 6px;
            position: relative;
        }
        .entry-card .type {
            display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px;
            color: #8f78e6;
        }
        .entry-card .text { font-size: 16px; line-height: 1.5; color: #fff; }
        .entry-card .time {
            font-size: 12px; color: #4a3f6a; margin-top: 4px;
        }
        .entry-card .delete-btn {
            position: absolute; top: 12px; right: 12px;
            background: transparent; border: none; color: #ff6b6b;
            font-size: 18px; cursor: pointer; touch-action: manipulation;
        }

        /* Модальное окно добавления */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #b8a6ff; font-weight: 500; }
        .input-group input, .input-group select, .input-group textarea {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 12px 14px; font-size: 15px; color: #fff; outline: none; touch-action: manipulation;
            font-family: inherit;
        }
        .input-group textarea { resize: vertical; min-height: 80px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; touch-action: manipulation; }

        @media (max-width: 500px) {
            .entry-card .delete-btn { top: 8px; right: 8px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>🗂️ Каталог состояний</h1>

        <div class="header-actions">
            <button class="btn" id="add-btn">➕ Добавить запись</button>
        </div>

        <div class="entry-list" id="entry-list">
            <!-- Записи будут здесь -->
        </div>
    </div>

    <!-- Модальное окно добавления -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3>📝 Новая запись</h3>
            <div class="input-group">
                <label>Что произошло?</label>
                <textarea id="input-text" placeholder="Опиши событие..."></textarea>
            </div>
            <div class="input-group">
                <label>Тип</label>
                <select id="input-type">
                    <option value="action">⚡ Сделал</option>
                    <option value="feeling">💓 Почувствовал</option>
                    <option value="thought">💭 Подумал</option>
                    <option value="idea">💡 Увидел / Придумал</option>
                </select>
            </div>
            <div class="input-group">
                <label>Время</label>
                <input type="datetime-local" id="input-time" />
            </div>
            <div class="modal-actions">
                <button class="btn" id="modal-save-btn" style="flex:1;">✅ Сохранить</button>
                <button class="btn-cancel" id="modal-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let entries = [];
        let nextId = 1;

        // Типы событий и их эмодзи
        const TYPE_MAP = {
            action: { emoji: '⚡', label: 'Сделал' },
            feeling: { emoji: '💓', label: 'Почувствовал' },
            thought: { emoji: '💭', label: 'Подумал' },
            idea: { emoji: '💡', label: 'Увидел / Придумал' }
        };

        // DOM
        const entryList = document.getElementById('entry-list');
        const addBtn = document.getElementById('add-btn');
        const modal = document.getElementById('modal-overlay');
        const inputText = document.getElementById('input-text');
        const inputType = document.getElementById('input-type');
        const inputTime = document.getElementById('input-time');
        const modalSave = document.getElementById('modal-save-btn');
        const modalClose = document.getElementById('modal-close-btn');

        // ========== ЗАГРУЗКА ==========
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level4');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    entries = parsed.entries || [];
                    nextId = parsed.nextId || 1;
                }
            } catch(e) {}
            entries.forEach(entry => { if (entry.id >= nextId) nextId = entry.id + 1; });
        }

        function saveData() {
            localStorage.setItem('dreams_level4', JSON.stringify({ entries, nextId }));
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            entryList.innerHTML = '';
            if (entries.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'text-align: center; color: #4a3f6a; padding: 40px 0;';
                empty.textContent = 'Пока нет записей. Нажми «➕ Добавить запись»';
                entryList.appendChild(empty);
                return;
            }

            // Сортируем от новых к старым (по времени)
            const sorted = [...entries].sort((a, b) => new Date(b.time) - new Date(a.time));

            sorted.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'entry-card';
                card.style.borderLeftColor = getColorForType(entry.type);

                const typeInfo = TYPE_MAP[entry.type] || { emoji: '📌', label: 'Событие' };

                // Форматирование времени
                let timeStr = '';
                try {
                    const date = new Date(entry.time);
                    timeStr = date.toLocaleString('ru-RU', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch { timeStr = entry.time || '—'; }

                card.innerHTML = `
                    <div class="type">${typeInfo.emoji} ${typeInfo.label}</div>
                    <div class="text">${escapeHtml(entry.text)}</div>
                    <div class="time">🕒 ${timeStr}</div>
                    <button class="delete-btn" data-id="${entry.id}">✕</button>
                `;
                entryList.appendChild(card);
            });

            // Обработчики удаления
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onpointerdown = (e) => {
                    e.preventDefault();
                    const id = parseInt(btn.dataset.id);
                    const idx = entries.findIndex(e => e.id === id);
                    if (idx !== -1) {
                        entries.splice(idx, 1);
                        saveData();
                        render();
                    }
                };
            });
        }

        function getColorForType(type) {
            switch(type) {
                case 'action': return '#ff4d4d';   // красный
                case 'feeling': return '#2ecc71';  // зелёный
                case 'thought': return '#4d8bff';  // синий
                case 'idea': return '#f1c40f';     // жёлтый
                default: return '#6f52c4';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== МОДАЛЬНОЕ ОКНО ==========
        function openModal() {
            inputText.value = '';
            // Устанавливаем текущее время в локальный формат datetime-local
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            inputTime.value = now.toISOString().slice(0, 16);
            modal.classList.add('open');
        }

        function closeModal() {
            modal.classList.remove('open');
        }

        function saveEntry() {
            const text = inputText.value.trim();
            if (!text) {
                alert('Пожалуйста, опиши событие.');
                return;
            }
            const type = inputType.value;
            const time = inputTime.value || new Date().toISOString();

            const newEntry = {
                id: nextId++,
                text: text,
                type: type,
                time: time
            };
            entries.push(newEntry);
            saveData();
            render();
            closeModal();
        }

        // События
        addBtn.onpointerdown = (e) => { e.preventDefault(); openModal(); };
        modalSave.onpointerdown = (e) => { e.preventDefault(); saveEntry(); };
        modalClose.onpointerdown = (e) => { e.preventDefault(); closeModal(); };
        modal.onpointerdown = (e) => { if (e.target === modal) closeModal(); };

        // ========== ЗАПУСК ==========
        loadData();
        render();
        console.log('🟣🦅 Уровень 4: Каталог состояний загружен.');
    </script>
</body>
</html>
