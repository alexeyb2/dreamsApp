<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Игра состояний</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; padding: 20px; touch-action: pan-y;
            -webkit-tap-highlight-color: transparent;
        }
        #app { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }

        h1 { text-align: center; font-size: 24px; color: #b8a6ff; margin-bottom: 20px; }

        .header-actions {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff;
            padding: 10px 20px; border-radius: 30px; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: 0.2s; touch-action: manipulation;
            flex: 1; min-width: 90px; text-align: center;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: #6f52c4; color: #fff; }
        .btn-danger { background: #a03a3a; color: #fff; }

        /* Каталоги */
        .catalog-section { margin-bottom: 20px; }
        .catalog-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; display: flex; gap: 8px; align-items: center; }
        
        .items-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        }
        @media (max-width: 500px) { .items-grid { grid-template-columns: 1fr; } }

        .item-card {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .item-info { display: flex; align-items: center; gap: 10px; flex: 1; }
        .item-emoji { font-size: 24px; }
        .item-name { font-weight: 500; color: #fff; }
        .item-weight { font-weight: 700; color: #ffcc00; background: #221b38; padding: 2px 10px; border-radius: 12px; font-size: 14px; }
        
        .item-actions { display: flex; gap: 6px; }
        .wt-btn {
            border: none; background: #2a2348; color: #b8a6ff;
            width: 30px; height: 30px; border-radius: 50%; font-size: 18px; cursor: pointer; touch-action: manipulation;
        }
        .wt-btn:active { background: #6f52c4; color: #fff; }
        .wt-btn.minus:active { background: #a03a3a; color: #fff; }

        /* Лента событий */
        .event-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .event-card {
            background: #100d1e; border-radius: 16px; padding: 14px; border-left: 4px solid #ffcc00;
            display: flex; flex-direction: column; gap: 6px;
        }
        .event-card .time { font-size: 12px; color: #4a3f6a; display: flex; justify-content: space-between; }
        .event-card .desc { color: #fff; font-size: 15px; }
        .event-card .triggered { font-size: 13px; color: #8f78e6; display: flex; flex-wrap: wrap; gap: 4px; }
        .event-card .triggered span { background: #221b38; padding: 2px 8px; border-radius: 12px; }

        /* Модальное окно */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #8f78e6; font-weight: 500; }
        .input-group textarea, .input-group input {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px;
            padding: 10px 12px; font-size: 15px; color: #fff; outline: none; touch-action: manipulation;
            font-family: inherit; resize: vertical; min-height: 40px;
        }
        .modal-checkboxes {
            max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
            background: #100d1e; border-radius: 12px; padding: 10px;
        }
        .modal-checkboxes label {
            display: flex; align-items: center; gap: 8px; font-size: 14px; color: #e0d6ff; cursor: pointer; touch-action: manipulation;
        }
        .modal-checkboxes input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: #6f52c4; cursor: pointer;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; touch-action: manipulation; }

        @media (max-width: 500px) {
            .items-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>🧠 Игра состояний</h1>

        <div class="header-actions">
            <button class="btn btn-primary" id="add-event-btn">📝 Событие</button>
            <button class="btn" id="add-thought-btn">➕ Мысль</button>
            <button class="btn" id="add-feeling-btn">➕ Чувство</button>
        </div>

        <!-- Каталог Мыслей -->
        <div class="catalog-section">
            <div class="catalog-title">💭 Мои мысли</div>
            <div class="items-grid" id="thoughts-grid"></div>
        </div>

        <!-- Каталог Чувств -->
        <div class="catalog-section">
            <div class="catalog-title">💓 Мои чувства</div>
            <div class="items-grid" id="feelings-grid"></div>
        </div>

        <h2 style="font-size:18px; margin-top:20px; color:#b8a6ff;">⚙️ Лента событий</h2>
        <div class="event-list" id="event-list"></div>
    </div>

    <!-- Модальное окно добавления события -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3>📝 Что произошло?</h3>
            
            <div class="input-group">
                <label>Событие / Видение</label>
                <textarea id="event-desc" placeholder="Например: Увидел закат над морем..."></textarea>
            </div>

            <div class="input-group">
                <label>Какие мысли это усилило?</label>
                <div class="modal-checkboxes" id="thought-checkboxes"></div>
            </div>

            <div class="input-group">
                <label>Какие чувства это усилило?</label>
                <div class="modal-checkboxes" id="feeling-checkboxes"></div>
            </div>

            <div class="input-group">
                <label>🕒 Время</label>
                <input type="datetime-local" id="input-time" />
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary" id="modal-save-btn" style="flex:1;">✅ Усилить</button>
                <button class="btn-cancel" id="modal-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let thoughts = [];
        let feelings = [];
        let events = [];
        let nextId = 1;

        // DOM
        const thoughtsGrid = document.getElementById('thoughts-grid');
        const feelingsGrid = document.getElementById('feelings-grid');
        const eventList = document.getElementById('event-list');
        const addEventBtn = document.getElementById('add-event-btn');
        const addThoughtBtn = document.getElementById('add-thought-btn');
        const addFeelingBtn = document.getElementById('add-feeling-btn');

        const modal = document.getElementById('modal-overlay');
        const eventDesc = document.getElementById('event-desc');
        const thoughtCheckboxes = document.getElementById('thought-checkboxes');
        const feelingCheckboxes = document.getElementById('feeling-checkboxes');
        const inputTime = document.getElementById('input-time');
        const modalSave = document.getElementById('modal-save-btn');
        const modalClose = document.getElementById('modal-close-btn');

        // ========== ЗАГРУЗКА ==========
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_game_state');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    thoughts = parsed.thoughts || [];
                    feelings = parsed.feelings || [];
                    events = parsed.events || [];
                    nextId = parsed.nextId || 1;
                }
            } catch(e) {}
            thoughts.forEach(t => { if (t.id >= nextId) nextId = t.id + 1; });
            feelings.forEach(f => { if (f.id >= nextId) nextId = f.id + 1; });
            events.forEach(e => { if (e.id >= nextId) nextId = e.id + 1; });
        }

        function saveData() {
            localStorage.setItem('dreams_game_state', JSON.stringify({ thoughts, feelings, events, nextId }));
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            // Мысли
            thoughtsGrid.innerHTML = '';
            if (thoughts.length === 0) {
                thoughtsGrid.innerHTML = `<span style="color:#4a3f6a; padding:10px; text-align:center;">Добавьте свою первую мысль</span>`;
            } else {
                thoughts.forEach(t => {
                    thoughtsGrid.appendChild(createItemCard(t, 'thought'));
                });
            }

            // Чувства
            feelingsGrid.innerHTML = '';
            if (feelings.length === 0) {
                feelingsGrid.innerHTML = `<span style="color:#4a3f6a; padding:10px; text-align:center;">Добавьте своё первое чувство</span>`;
            } else {
                feelings.forEach(f => {
                    feelingsGrid.appendChild(createItemCard(f, 'feeling'));
                });
            }

            // События
            eventList.innerHTML = '';
            if (events.length === 0) {
                eventList.innerHTML = `<span style="color:#4a3f6a; text-align:center; padding:20px; display:block;">Пока нет событий. Создайте первое!</span>`;
            } else {
                const sorted = [...events].sort((a, b) => new Date(b.time) - new Date(a.time));
                sorted.forEach(e => {
                    const card = document.createElement('div');
                    card.className = 'event-card';

                    let timeStr = '';
                    try {
                        const date = new Date(e.time);
                        timeStr = date.toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                    } catch { timeStr = e.time || '—'; }

                    let triggeredHTML = '';
                    const tNames = e.thoughts.map(id => thoughts.find(t => t.id === id)?.name).filter(Boolean);
                    const fNames = e.feelings.map(id => feelings.find(f => f.id === id)?.name).filter(Boolean);
                    const all = [...tNames, ...fNames];
                    if (all.length > 0) {
                        triggeredHTML = `<div class="triggered">Усилило: ${all.map(n => `<span>${n}</span>`).join(' ')}</div>`;
                    }

                    card.innerHTML = `
                        <div class="time"><span>🕒 ${timeStr}</span></div>
                        <div class="desc">${escapeHtml(e.desc)}</div>
                        ${triggeredHTML}
                    `;
                    eventList.appendChild(card);
                });
            }
        }

        function createItemCard(item, type) {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.innerHTML = `
                <div class="item-info">
                    <span class="item-emoji">${item.emoji || '🧩'}</span>
                    <span class="item-name">${item.name}</span>
                </div>
                <div class="item-actions">
                    <span class="item-weight">${item.weight || 0}</span>
                    <button class="wt-btn plus" data-id="${item.id}" data-type="${type}">+</button>
                    <button class="wt-btn minus" data-id="${item.id}" data-type="${type}">−</button>
                </div>
            `;
            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== ОБНОВЛЕНИЕ ВЕСА ==========
        function updateWeight(id, type, delta) {
            let item = null;
            if (type === 'thought') item = thoughts.find(t => t.id === id);
            else if (type === 'feeling') item = feelings.find(f => f.id === id);
            if (item) {
                item.weight = Math.max(0, (item.weight || 0) + delta);
                saveData();
                render();
            }
        }

        // ========== ДОБАВЛЕНИЕ МЫСЛИ / ЧУВСТВА ==========
        function addCatalogItem(type) {
            const name = prompt(`Введите название ${type === 'thought' ? 'мысли' : 'чувства'}:`);
            if (name && name.trim() !== '') {
                const emoji = prompt('Введите смайл (например: 🌟):') || '🧩';
                const newItem = { id: nextId++, name: name.trim(), emoji: emoji.trim() || '🧩', weight: 0 };
                if (type === 'thought') thoughts.push(newItem);
                else feelings.push(newItem);
                saveData();
                render();
            }
        }

        addThoughtBtn.onpointerdown = (e) => { e.preventDefault(); addCatalogItem('thought'); };
        addFeelingBtn.onpointerdown = (e) => { e.preventDefault(); addCatalogItem('feeling'); };

        // Делегирование событий для кнопок + и -
        document.addEventListener('pointerdown', (e) => {
            const btn = e.target.closest('.wt-btn');
            if (btn) {
                e.preventDefault();
                const id = parseInt(btn.dataset.id);
                const type = btn.dataset.type;
                const delta = btn.classList.contains('plus') ? 1 : -1;
                updateWeight(id, type, delta);
            }
        });

        // ========== МОДАЛЬНОЕ ОКНО СОБЫТИЯ ==========
        function openEventModal() {
            eventDesc.value = '';
            // Заполняем чекбоксы мыслей
            thoughtCheckboxes.innerHTML = '';
            thoughts.forEach(t => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="checkbox" value="${t.id}"> ${t.emoji} ${t.name}`;
                thoughtCheckboxes.appendChild(label);
            });
            if (thoughts.length === 0) thoughtCheckboxes.innerHTML = '<span style="color:#4a3f6a;">Нет мыслей. Добавьте сначала!</span>';

            // Заполняем чекбоксы чувств
            feelingCheckboxes.innerHTML = '';
            feelings.forEach(f => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="checkbox" value="${f.id}"> ${f.emoji} ${f.name}`;
                feelingCheckboxes.appendChild(label);
            });
            if (feelings.length === 0) feelingCheckboxes.innerHTML = '<span style="color:#4a3f6a;">Нет чувств. Добавьте сначала!</span>';

            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            inputTime.value = now.toISOString().slice(0, 16);
            modal.classList.add('open');
        }

        function closeModal() { modal.classList.remove('open'); }

        function saveEvent() {
            const desc = eventDesc.value.trim();
            if (!desc) return alert('Опишите событие!');

            const selectedThoughts = [];
            thoughtCheckboxes.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
                selectedThoughts.push(parseInt(cb.value));
            });
            const selectedFeelings = [];
            feelingCheckboxes.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
                selectedFeelings.push(parseInt(cb.value));
            });

            if (selectedThoughts.length === 0 && selectedFeelings.length === 0) {
                return alert('Выберите хотя бы одну мысль или чувство, которое усилилось!');
            }

            const time = inputTime.value || new Date().toISOString();

            // Добавляем вес выбранным
            selectedThoughts.forEach(id => { const t = thoughts.find(t => t.id === id); if (t) t.weight = (t.weight || 0) + 1; });
            selectedFeelings.forEach(id => { const f = feelings.find(f => f.id === id); if (f) f.weight = (f.weight || 0) + 1; });

            // Сохраняем событие
            events.push({ id: nextId++, time, desc, thoughts: selectedThoughts, feelings: selectedFeelings });

            saveData();
            render();
            closeModal();
        }

        addEventBtn.onpointerdown = (e) => { e.preventDefault(); openEventModal(); };
        modalSave.onpointerdown = (e) => { e.preventDefault(); saveEvent(); };
        modalClose.onpointerdown = (e) => { e.preventDefault(); closeModal(); };
        modal.onpointerdown = (e) => { if (e.target === modal) closeModal(); };

        // ========== ЗАПУСК ==========
        loadData();
        render();
        console.log('🟣🦅 Уровень 4: Игра состояний загружена!');
    </script>
</body>
</html>
