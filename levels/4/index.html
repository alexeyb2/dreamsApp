<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Каталог состояний</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; padding: 20px; touch-action: pan-y;
            -webkit-tap-highlight-color: transparent;
        }
        #app { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }

        h1 { text-align: center; font-size: 24px; color: #b8a6ff; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }

        .header-actions { display: flex; justify-content: center; margin-bottom: 20px; }
        .btn {
            border: none; background: #6f52c4; color: #fff; padding: 12px 24px;
            border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: 0.2s; touch-action: manipulation;
        }
        .btn:active { transform: scale(0.95); background: #5d43a8; }
        .btn-danger { background: #a03a3a; }

        /* Список записей */
        .entry-list { display: flex; flex-direction: column; gap: 12px; }
        .entry-card {
            background: #161127; border-radius: 16px; padding: 16px;
            border-left: 4px solid #ffcc00; display: flex; flex-direction: column; gap: 8px;
            position: relative;
        }
        .entry-card .time {
            font-size: 12px; color: #4a3f6a; margin-bottom: 4px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .entry-card .facet {
            display: flex; align-items: flex-start; gap: 10px; font-size: 15px; line-height: 1.4; color: #fff;
        }
        .entry-card .facet .emoji { font-size: 18px; margin-top: 1px; }
        .entry-card .delete-btn {
            background: transparent; border: none; color: #ff6b6b;
            font-size: 18px; cursor: pointer; touch-action: manipulation;
        }

        /* Модальное окно */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #8f78e6; font-weight: 500; }
        .input-group textarea, .input-group input {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px;
            padding: 10px 12px; font-size: 15px; color: #fff; outline: none; touch-action: manipulation;
            font-family: inherit; resize: vertical; min-height: 40px;
        }
        .input-group textarea { min-height: 50px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; border: none; border-radius: 20px; padding: 12px; cursor: pointer; touch-action: manipulation; }

        @media (max-width: 500px) {
            .entry-card .facet { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>🗂️ Снимок состояния</h1>

        <div class="header-actions">
            <button class="btn" id="add-btn">➕ Добавить снимок</button>
        </div>

        <div class="entry-list" id="entry-list">
            <!-- Карточки будут здесь -->
        </div>
    </div>

    <!-- Модальное окно добавления -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3>📝 Что произошло?</h3>
            
            <div class="input-group">
                <label>⚡ Что я сделал?</label>
                <textarea id="f-action" placeholder="Например: Пошёл в душ"></textarea>
            </div>
            <div class="input-group">
                <label>💭 Что я подумал?</label>
                <textarea id="f-thought" placeholder="Например: Вода смывает усталость"></textarea>
            </div>
            <div class="input-group">
                <label>💓 Что я почувствовал?</label>
                <textarea id="f-feeling" placeholder="Например: Спокойствие и тепло"></textarea>
            </div>
            <div class="input-group">
                <label>💡 Что я увидел / придумал?</label>
                <textarea id="f-vision" placeholder="Например: Увидел отражение пара в зеркале"></textarea>
            </div>

            <div class="input-group">
                <label>🕒 Время</label>
                <input type="datetime-local" id="input-time" />
            </div>

            <div class="modal-actions">
                <button class="btn" id="modal-save-btn" style="flex:1;">✅ Сохранить</button>
                <button class="btn-cancel" id="modal-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        let entries = [];
        let nextId = 1;

        // DOM
        const entryList = document.getElementById('entry-list');
        const addBtn = document.getElementById('add-btn');
        const modal = document.getElementById('modal-overlay');
        const fAction = document.getElementById('f-action');
        const fThought = document.getElementById('f-thought');
        const fFeeling = document.getElementById('f-feeling');
        const fVision = document.getElementById('f-vision');
        const inputTime = document.getElementById('input-time');
        const modalSave = document.getElementById('modal-save-btn');
        const modalClose = document.getElementById('modal-close-btn');

        // ========== ЗАГРУЗКА ==========
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level4');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    entries = parsed.entries || [];
                    nextId = parsed.nextId || 1;
                }
            } catch(e) {}
            entries.forEach(entry => { if (entry.id >= nextId) nextId = entry.id + 1; });
        }

        function saveData() {
            localStorage.setItem('dreams_level4', JSON.stringify({ entries, nextId }));
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            entryList.innerHTML = '';
            if (entries.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'text-align: center; color: #4a3f6a; padding: 40px 0;';
                empty.textContent = 'Пока нет записей. Нажми «➕ Добавить снимок»';
                entryList.appendChild(empty);
                return;
            }

            const sorted = [...entries].sort((a, b) => new Date(b.time) - new Date(a.time));

            sorted.forEach(entry => {
                const card = document.createElement('div');
                card.className = 'entry-card';
                card.style.borderLeftColor = '#ffcc00';

                let timeStr = '';
                try {
                    const date = new Date(entry.time);
                    timeStr = date.toLocaleString('ru-RU', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch { timeStr = entry.time || '—'; }

                let html = `
                    <div class="time">
                        <span>🕒 ${timeStr}</span>
                        <button class="delete-btn" data-id="${entry.id}">✕</button>
                    </div>
                `;

                // Добавляем только заполненные грани
                if (entry.action) html += `<div class="facet"><span class="emoji">⚡</span> <span>${escapeHtml(entry.action)}</span></div>`;
                if (entry.thought) html += `<div class="facet"><span class="emoji">💭</span> <span>${escapeHtml(entry.thought)}</span></div>`;
                if (entry.feeling) html += `<div class="facet"><span class="emoji">💓</span> <span>${escapeHtml(entry.feeling)}</span></div>`;
                if (entry.vision) html += `<div class="facet"><span class="emoji">💡</span> <span>${escapeHtml(entry.vision)}</span></div>`;

                card.innerHTML = html;
                entryList.appendChild(card);
            });

            // Обработчики удаления
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onpointerdown = (e) => {
                    e.preventDefault();
                    const id = parseInt(btn.dataset.id);
                    const idx = entries.findIndex(e => e.id === id);
                    if (idx !== -1) {
                        entries.splice(idx, 1);
                        saveData();
                        render();
                    }
                };
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== МОДАЛЬНОЕ ОКНО ==========
        function openModal() {
            fAction.value = '';
            fThought.value = '';
            fFeeling.value = '';
            fVision.value = '';
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            inputTime.value = now.toISOString().slice(0, 16);
            modal.classList.add('open');
        }

        function closeModal() {
            modal.classList.remove('open');
        }

        function saveEntry() {
            const action = fAction.value.trim();
            const thought = fThought.value.trim();
            const feeling = fFeeling.value.trim();
            const vision = fVision.value.trim();
            const time = inputTime.value || new Date().toISOString();

            // Должно быть заполнено хотя бы одно поле
            if (!action && !thought && !feeling && !vision) {
                alert('Заполните хотя бы одну грань из 4-х!');
                return;
            }

            const newEntry = {
                id: nextId++,
                time: time,
                action: action,
                thought: thought,
                feeling: feeling,
                vision: vision
            };
            entries.push(newEntry);
            saveData();
            render();
            closeModal();
        }

        // События
        addBtn.onpointerdown = (e) => { e.preventDefault(); openModal(); };
        modalSave.onpointerdown = (e) => { e.preventDefault(); saveEntry(); };
        modalClose.onpointerdown = (e) => { e.preventDefault(); closeModal(); };
        modal.onpointerdown = (e) => { if (e.target === modal) closeModal(); };

        // ========== ЗАПУСК ==========
        loadData();
        render();
        console.log('🟣🦅 Уровень 4: Снимок состояния загружен.');
    </script>
</body>
</html>
