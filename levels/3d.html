<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>👁️ Древо Жизни (3D)</title>
    
    <meta property="og:title" content="👁️ Древо Жизни (3D)" />
    <meta property="og:description" content="Почувствуй пульс вселенной в 3D. Перемещай узлы и наблюдай за перетеканием синих и красных нитей." />
    <meta property="og:image" content="logo.png" />
    <meta property="og:type" content="website" />

    <style>
        body { margin: 0; overflow: hidden; background: #0b0814; touch-action: none; font-family: system-ui, sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: block; background: #0b0814; }
        #ui-panel { position: absolute; bottom: 30px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 10px; pointer-events: none; z-index: 10; }
        .btn-group { background: rgba(22,17,39,0.85); padding: 10px 20px; border-radius: 40px; backdrop-filter: blur(8px); border: 1px solid #3a2f5a; display: flex; gap: 12px; pointer-events: auto; flex-wrap: wrap; justify-content: center; }
        .btn { border: none; background: #2a2348; color: #b8a6ff; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .stats-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; background: rgba(22,17,39,0.85); padding: 6px 16px; border-radius: 30px; backdrop-filter: blur(8px); border: 1px solid #3a2f5a; pointer-events: auto; font-size: 14px; color: #b8a6ff; }
        @media (max-width: 600px) { #ui-panel { bottom: 15px; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <div class="stats-panel">
            <span id="energy-status">🌀 Энергия: Вкл</span>
        </div>
        <div class="btn-group">
            <button class="btn" id="toggle-energy">🔁 Выкл. энергию</button>
            <button class="btn" id="reset-btn">🔄 Сброс</button>
            <button class="btn" id="switch-2d" style="background:#6f52c4; color:#fff;">2D</button>
        </div>
    </div>

    <script>
        // ============= БАЗОВАЯ НАСТРОЙКА СЦЕНЫ =============
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0814);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(6, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);
        controls.minDistance = 3; controls.maxDistance = 20;

        // ============= ОСВЕЩЕНИЕ И ПОЛ =============
        scene.add(new THREE.AmbientLight(0x404060));
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        dirLight.position.set(5, 15, 7);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const gridHelper = new THREE.GridHelper(10, 10, 0x6f52c4, 0x3a2f5a);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // ============= ДАННЫЕ И ФИЗИКА (СИММЕТРИЯ ТЕЛА) =============
        let energyEnabled = true;
        let energyProgress = 0;
        let energyDirection = 1;

        // Строгая анатомическая симметрия: Голова и Ступни на равном расстоянии от Живота
        const Y_LEVELS = {
            HEAD: 1.8,    // Солнце (Голова) сверху
            HAND: 0.9,    // Руки и Сердце (выше живота)
            CENTER: 0.0,  // Живот (в центре)
            LEG: -1.8     // Ноги (ступни) снизу
        };

        let nodes = {
            leftLeg:  { x: -1.2, z: 1.2, color: '#4d8bff', isSquare: true },
            rightLeg: { x: 1.2,  z: 1.2, color: '#ff4d4d', isSquare: true },
            leftHand: { x: -1.2, z: -1.2, color: '#4d8bff' },
            rightHand: { x: 1.2,  z: -1.2, color: '#ff4d4d' },
            heart:    { x: 0,    z: -1.2, color: '#2ecc71' },
            center:   { x: 0,    z: 0,    color: '#e67e22' },
            head:     { x: 0,    z: 0,    color: '#ffcc00' }
        };

        function updateGeometry() {
            const lx = nodes.leftLeg.x, lz = nodes.leftLeg.z;
            const rx = nodes.rightLeg.x, rz = nodes.rightLeg.z;
            const cx = nodes.center.x, cz = nodes.center.z;

            // 🔴 Правая рука зависит ТОЛЬКО от Левой ноги (🟦)
            nodes.rightHand.x = 2 * cx - lx;
            nodes.rightHand.z = 2 * cz - lz;

            // 🔵 Левая рука зависит ТОЛЬКО от Правой ноги (🟥)
            nodes.leftHand.x = 2 * cx - rx;
            nodes.leftHand.z = 2 * cz - rz;

            // 🟢 Сердце строго по центру между руками
            nodes.heart.x = cx;
            nodes.heart.z = (nodes.leftHand.z + nodes.rightHand.z) / 2;

            // Голова (Солнце) всегда над центром
            nodes.head.x = cx;
            nodes.head.z = cz;
        }

        // ============= СОЗДАНИЕ 3D ОБЪЕКТОВ =============
        let meshMap = {};
        let lineSegments = [];
        let particleMeshes = [];

        function getYForNode(node) {
            if (node === nodes.head) return Y_LEVELS.HEAD;
            if (node === nodes.leftLeg || node === nodes.rightLeg) return Y_LEVELS.LEG;
            if (node === nodes.center) return Y_LEVELS.CENTER;
            if (node === nodes.heart || node === nodes.leftHand || node === nodes.rightHand) return Y_LEVELS.HAND;
            return 0;
        }

        function get3DPos(node) {
            return new THREE.Vector3(node.x, getYForNode(node), node.z);
        }

        function createNodeMesh(key, node) {
            const color = new THREE.Color(node.color);
            let geom, mat;
            const size = 0.8;
            if (node.isSquare) {
                geom = new THREE.BoxGeometry(size, size, size);
                mat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
            } else {
                geom = new THREE.SphereGeometry(size / 2, 32, 32);
                mat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.3, transparent: true, opacity: 0.9 });
            }
            const mesh = new THREE.Mesh(geom, mat);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            meshMap[key] = mesh;
        }

        function buildScene() {
            if (Object.keys(meshMap).length > 0) return;

            createNodeMesh('leftLeg', nodes.leftLeg);
            createNodeMesh('rightLeg', nodes.rightLeg);
            createNodeMesh('leftHand', nodes.leftHand);
            createNodeMesh('rightHand', nodes.rightHand);
            createNodeMesh('heart', nodes.heart);
            createNodeMesh('center', nodes.center);
            createNodeMesh('head', nodes.head);

            // Линии связей (строго как в 2D: без лучей от головы к рукам)
            const connections = [
                // 🟦 Левая нога -> 🟠 Живот -> 🔴 Правая рука
                [nodes.leftLeg, nodes.center, nodes.rightHand],
                // 🟥 Правая нога -> 🟠 Живот -> 🔵 Левая рука
                [nodes.rightLeg, nodes.center, nodes.leftHand],
                // 🟢 Сердце -> 🔵 Левая рука
                [nodes.heart, nodes.leftHand],
                // 🟢 Сердце -> 🔴 Правая рука
                [nodes.heart, nodes.rightHand],
                // 🟦 ЛЕВАЯ НОГА -> 👁️ ГОЛОВА (синий луч)
                [nodes.leftLeg, nodes.head],
                // 🟥 ПРАВАЯ НОГА -> 👁️ ГОЛОВА (красный луч)
                [nodes.rightLeg, nodes.head]
            ];

            connections.forEach(pair => {
                for (let i = 0; i < pair.length - 1; i++) {
                    const start = pair[i], end = pair[i+1];
                    const startY = getYForNode(start), endY = getYForNode(end);
                    const geom = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(start.x, startY, start.z),
                        new THREE.Vector3(end.x, endY, end.z)
                    ]);
                    const color = new THREE.Color(start.color);
                    const mat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
                    const line = new THREE.Line(geom, mat);
                    scene.add(line);
                    lineSegments.push({ line, startNode: start, endNode: end });
                }
            });

            // Частицы (синяя, красная)
            const colors = ['#4d8bff', '#ff4d4d'];
            for (let i = 0; i < 2; i++) {
                const geom = new THREE.SphereGeometry(0.2, 16, 16);
                const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(colors[i]) });
                const mesh = new THREE.Mesh(geom, mat);
                mesh.material.transparent = true; mesh.material.opacity = 0.9;
                scene.add(mesh);
                particleMeshes.push(mesh);
            }
        }

        function updatePositions() {
            updateGeometry();

            for (let key in meshMap) {
                const mesh = meshMap[key];
                const node = nodes[key];
                const yPos = getYForNode(node);
                if (mesh && node) {
                    mesh.position.set(node.x, yPos, node.z);
                }
            }

            lineSegments.forEach(item => {
                const start = item.startNode, end = item.endNode;
                const startY = getYForNode(start), endY = getYForNode(end);
                const pos = item.line.geometry.attributes.position.array;
                pos[0] = start.x; pos[1] = startY; pos[2] = start.z;
                pos[3] = end.x; pos[4] = endY; pos[5] = end.z;
                item.line.geometry.attributes.position.needsUpdate = true;
            });
        }

        // ============= ПОТОКИ ЭНЕРГИИ (ТОЧНЫЕ 3D-ТРАЕКТОРИИ) =============
        function getPointOnPath3D(path, progress) {
            if (!path || path.length < 2) return null;
            
            // Получаем 3D позиции всех точек пути
            const points3D = path.map(p => get3DPos(p));
            let totalLen = 0;
            let segmentLens = [];
            for (let i = 0; i < points3D.length - 1; i++) {
                const dx = points3D[i+1].x - points3D[i].x;
                const dy = points3D[i+1].y - points3D[i].y;
                const dz = points3D[i+1].z - points3D[i].z;
                const len = Math.sqrt(dx*dx + dy*dy + dz*dz);
                segmentLens.push(len);
                totalLen += len;
            }
            if (totalLen === 0) return points3D[0];
            
            let targetDist = progress * totalLen;
            let accumulated = 0;
            for (let i = 0; i < segmentLens.length; i++) {
                if (targetDist <= accumulated + segmentLens[i]) {
                    const t = (targetDist - accumulated) / segmentLens[i];
                    return new THREE.Vector3(
                        points3D[i].x + (points3D[i+1].x - points3D[i].x) * t,
                        points3D[i].y + (points3D[i+1].y - points3D[i].y) * t,
                        points3D[i].z + (points3D[i+1].z - points3D[i].z) * t
                    );
                }
                accumulated += segmentLens[i];
            }
            return points3D[points3D.length - 1];
        }

        function updateParticles() {
            const h = nodes.heart, lH = nodes.leftHand, rH = nodes.rightHand;
            const lL = nodes.leftLeg, rL = nodes.rightLeg, c = nodes.center, hd = nodes.head;
            
            // Точные маршруты из 2D: Сердце -> Рука -> Живот -> Нога -> Голова
            const pathRed  = [h, rH, c, lL, hd];
            const pathBlue = [h, lH, c, rL, hd];

            if (energyEnabled) {
                const speed = 0.006;
                energyProgress += speed * energyDirection;
                if (energyProgress >= 1.0) { energyProgress = 1.0; energyDirection = -1; }
                else if (energyProgress <= 0.0) { energyProgress = 0.0; energyDirection = 1; }
            }

            const redPos = getPointOnPath3D(pathRed, energyProgress);
            const bluePos = getPointOnPath3D(pathBlue, energyProgress);

            if (redPos && bluePos) {
                particleMeshes[0].position.copy(bluePos); // Синяя
                particleMeshes[1].position.copy(redPos);  // Красная
            }
        }

        // ============= ИНТЕРАКТИВНОСТЬ (ТЯНЕМ ОБЕ НОГИ) =============
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let isDragging = false;
        let draggedNodeKey = null;
        let startMouse = { x: 0, y: 0 };
        let startPointPos = { x: 0, z: 0 };

        function getPointer(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        }

        renderer.domElement.addEventListener('pointerdown', (e) => {
            getPointer(e);
            raycaster.setFromCamera(pointer, camera);
            
            const hitLeft = meshMap['leftLeg'] ? raycaster.intersectObject(meshMap['leftLeg']) : [];
            const hitRight = meshMap['rightLeg'] ? raycaster.intersectObject(meshMap['rightLeg']) : [];

            if (hitLeft.length > 0) {
                isDragging = true; draggedNodeKey = 'leftLeg';
                startMouse = { x: e.clientX, y: e.clientY };
                startPointPos = { x: nodes.leftLeg.x, z: nodes.leftLeg.z };
                controls.enabled = false; renderer.domElement.style.cursor = 'grabbing'; return;
            }
            if (hitRight.length > 0) {
                isDragging = true; draggedNodeKey = 'rightLeg';
                startMouse = { x: e.clientX, y: e.clientY };
                startPointPos = { x: nodes.rightLeg.x, z: nodes.rightLeg.z };
                controls.enabled = false; renderer.domElement.style.cursor = 'grabbing'; return;
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging || !draggedNodeKey) return;
            getPointer(e);
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), Y_LEVELS.LEG);
            const intersectPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, intersectPoint);
            if (intersectPoint) {
                const dx = intersectPoint.x - startPointPos.x;
                const dz = intersectPoint.z - startPointPos.z;
                nodes[draggedNodeKey].x = Math.max(-3, Math.min(3, startPointPos.x + dx));
                nodes[draggedNodeKey].z = Math.max(-3, Math.min(3, startPointPos.z + dz));
                updatePositions();
            }
        });

        window.addEventListener('pointerup', () => {
            if (isDragging) {
                isDragging = false; draggedNodeKey = null;
                controls.enabled = true; renderer.domElement.style.cursor = 'default';
            }
        });

        // ============= КНОПКИ УПРАВЛЕНИЯ =============
        document.getElementById('toggle-energy').addEventListener('click', () => {
            energyEnabled = !energyEnabled;
            document.getElementById('energy-status').textContent = energyEnabled ? '🌀 Энергия: Вкл' : '🌀 Энергия: Выкл';
            document.getElementById('toggle-energy').textContent = energyEnabled ? '🔁 Выкл. энергию' : '🔁 Вкл. энергию';
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('Сбросить положение всех узлов?')) {
                nodes.leftLeg.x = -1.2; nodes.leftLeg.z = 1.2;
                nodes.rightLeg.x = 1.2; nodes.rightLeg.z = 1.2;
                updatePositions();
            }
        });

        document.getElementById('switch-2d').addEventListener('click', () => {
            window.location.href = '../2d/';
        });

        // ============= АНИМАЦИЯ И ЗАПУСК =============
        function animate() {
            requestAnimationFrame(animate);
            updatePositions();
            updateParticles();
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });

        buildScene();
        updatePositions();
        animate();

        console.log('🟣🦅 Древо Жизни 3D (идеальная анатомия и точные 3D-траектории) загружено!');
    </script>
</body>
</html>
