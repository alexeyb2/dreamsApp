<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Карта Желаний</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; padding: 20px; touch-action: pan-y;
        }
        #app { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }

        h1 { text-align: center; font-size: 24px; color: #b8a6ff; margin-bottom: 20px; }

        /* Заголовок и кнопки */
        .header-actions {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff;
            padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.2s; flex: 1; min-width: 80px; text-align: center;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-primary { background: #6f52c4; color: #fff; }
        .btn-shuffle { background: #e67e22; color: #fff; }

        /* Блок Желания */
        .desire-block {
            background: #161127; border-radius: 24px; padding: 16px; margin-bottom: 20px;
            border: 1px solid #3a2f5a;
        }
        .desire-block label { font-size: 14px; font-weight: 600; color: #8f78e6; display: block; margin-bottom: 4px; }
        .desire-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
        .desire-row input, .desire-row select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 8px 12px; color: #fff; font-size: 15px; outline: none; flex: 1; min-width: 100px;
        }
        .desire-row input[type="range"] { flex: 2; padding: 0; height: 6px; accent-color: #6f52c4; }
        .desire-row .percent-val { min-width: 40px; text-align: center; font-weight: bold; color: #b8a6ff; }

        /* Блок Мыслей */
        .thoughts-block { margin-bottom: 20px; }
        .level-card {
            background: #100d1e; border-radius: 16px; padding: 12px; margin-bottom: 12px;
            border-left: 4px solid #6f52c4;
        }
        .level-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
        }
        .level-name { font-weight: 700; color: #ffffff; font-size: 16px; }
        .thoughts-container { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
        .thought-tag {
            background: #2a2348; border: 1px solid #4a3f6a; border-radius: 20px;
            padding: 4px 12px; display: flex; align-items: center; gap: 6px; cursor: pointer;
            transition: 0.2s; font-size: 14px;
        }
        .thought-tag:active { transform: scale(0.95); background: #6f52c4; }
        .thought-tag .emoji { font-size: 16px; }
        .thought-tag .name { color: #fff; font-weight: 500; }

        .empty { color: #4a3f6a; font-size: 13px; padding: 4px 0; }

        /* Блоки чувств и действий */
        .two-col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        @media (max-width: 500px) { .two-col-grid { grid-template-columns: 1fr; } }
        .col-card {
            background: #100d1e; border-radius: 16px; padding: 12px; border: 1px solid #2a2248;
        }
        .col-title { font-weight: 700; color: #b8a6ff; font-size: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .items-container { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
        .item-tag {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 20px;
            padding: 4px 12px; display: flex; align-items: center; gap: 6px; font-size: 14px;
        }
        .item-tag .emoji { font-size: 16px; }
        .item-tag .name { color: #e0d6ff; }
        .item-tag .del { background: transparent; border: none; color: #ff6b6b; cursor: pointer; margin-left: 4px; font-size: 14px; }

        /* Модальное окно добавления */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #b8a6ff; font-weight: 500; }
        .input-group input, .input-group select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 10px 12px; font-size: 15px; color: #fff; outline: none;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; }

        /* Модальное окно перемещения мысли */
        #move-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 101;
        }
        #move-modal.open { display: flex; }
        .move-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 20px; width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 12px;
        }
        .move-box h4 { color: #ffffff; text-align: center; margin: 0; }
        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .move-btn {
            background: #221b38; border: 1px solid #3a2f5a; border-radius: 12px; padding: 10px;
            color: #b8a6ff; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .move-btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .move-close { background: #3a2f5a; border: none; border-radius: 20px; padding: 10px; color: #b8a6ff; cursor: pointer; }

        @media (max-width: 600px) { .two-col-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="app">
        <h1>🧠 Карта Желаний</h1>

        <div class="header-actions">
            <button class="btn btn-primary" id="add-thought-btn">➕ Мысль</button>
            <button class="btn btn-shuffle" id="shuffle-btn">🌀 Перемешать</button>
            <button class="btn" id="reset-btn" style="background:#5a2a2a; color:#ff8a8a;">✖ Сброс</button>
        </div>

        <!-- Блок Желания -->
        <div class="desire-block">
            <label>💡 Чего ты хочешь?</label>
            <input type="text" id="desire-input" placeholder="Например: стать свободным" style="width:100%; margin-top:4px;" />
            <div class="desire-row">
                <label style="font-size:13px;">Где:</label>
                <select id="desire-where">
                    <option value="в уме">в уме</option>
                    <option value="в реальности">в реальности</option>
                </select>
                <label style="font-size:13px; margin-left:8px;">Процент:</label>
                <input type="range" id="desire-percent" min="0" max="100" value="50" />
                <span class="percent-val" id="percent-display">50%</span>
            </div>
        </div>

        <!-- Мысли -->
        <div class="thoughts-block" id="thoughts-container">
            <div class="level-card" data-level="think">
                <div class="level-header">
                    <span class="level-name">🤔 Думаю</span>
                    <button class="btn-add-thought" data-level="think" style="background:#221b38; border:none; color:#b8a6ff; width:28px; height:28px; border-radius:50%; font-size:18px; cursor:pointer;">+</button>
                </div>
                <div class="thoughts-container" data-level="think"></div>
            </div>
            <div class="level-card" data-level="believe">
                <div class="level-header">
                    <span class="level-name">🙏 Верю</span>
                    <button class="btn-add-thought" data-level="believe" style="background:#221b38; border:none; color:#b8a6ff; width:28px; height:28px; border-radius:50%; font-size:18px; cursor:pointer;">+</button>
                </div>
                <div class="thoughts-container" data-level="believe"></div>
            </div>
            <div class="level-card" data-level="know">
                <div class="level-header">
                    <span class="level-name">✨ Знаю</span>
                    <button class="btn-add-thought" data-level="know" style="background:#221b38; border:none; color:#b8a6ff; width:28px; height:28px; border-radius:50%; font-size:18px; cursor:pointer;">+</button>
                </div>
                <div class="thoughts-container" data-level="know"></div>
            </div>
        </div>

        <!-- Чувства -->
        <div class="two-col-grid">
            <div class="col-card">
                <div class="col-title">
                    <span>🚫 Вытолкнуть</span>
                    <button class="add-item-btn" data-category="push" style="background:#221b38; border:none; color:#b8a6ff; width:24px; height:24px; border-radius:50%; font-size:16px; cursor:pointer;">+</button>
                </div>
                <div class="items-container" data-category="push"></div>
            </div>
            <div class="col-card">
                <div class="col-title">
                    <span>🧲 Втянуть</span>
                    <button class="add-item-btn" data-category="pull" style="background:#221b38; border:none; color:#b8a6ff; width:24px; height:24px; border-radius:50%; font-size:16px; cursor:pointer;">+</button>
                </div>
                <div class="items-container" data-category="pull"></div>
            </div>
        </div>

        <!-- Действия -->
        <div class="two-col-grid">
            <div class="col-card">
                <div class="col-title">
                    <span>⚡ Сделать сейчас</span>
                    <button class="add-item-btn" data-category="now" style="background:#221b38; border:none; color:#b8a6ff; width:24px; height:24px; border-radius:50%; font-size:16px; cursor:pointer;">+</button>
                </div>
                <div class="items-container" data-category="now"></div>
            </div>
            <div class="col-card">
                <div class="col-title">
                    <span>⏳ Ждать (время/событие)</span>
                    <button class="add-item-btn" data-category="wait" style="background:#221b38; border:none; color:#b8a6ff; width:24px; height:24px; border-radius:50%; font-size:16px; cursor:pointer;">+</button>
                </div>
                <div class="items-container" data-category="wait"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления элемента -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3>➕ Новый элемент</h3>
            <div class="input-group">
                <label>Смайл</label>
                <input type="text" id="input-emoji" placeholder="Например: 💡" />
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="input-name" placeholder="Введите название" />
            </div>
            <div class="input-group" id="target-select-group" style="display:none;">
                <label>Куда</label>
                <select id="input-target"></select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="modal-save-btn">✅ Сохранить</button>
                <button class="btn btn-cancel" id="modal-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно перемещения мысли -->
    <div id="move-modal">
        <div class="move-box">
            <h4>📍 Переместить мысль</h4>
            <div class="move-grid" id="move-grid"></div>
            <button class="move-close" id="move-close-btn">✖ Закрыть</button>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ И СОХРАНЕНИЕ ==========
        let data = {
            desire: '',
            where: 'в уме',
            percent: 50,
            thoughts: [], // { id, emoji, name, level: 'think'|'believe'|'know' }
            pushItems: [], // { id, emoji, name }
            pullItems: [],
            nowItems: [],
            waitItems: []
        };
        let nextId = 1;

        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level4');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    data = { ...data, ...parsed };
                    if (data.thoughts && data.thoughts.length > 0) {
                        // ensure ids
                        data.thoughts.forEach(t => { if (!t.id) t.id = nextId++; });
                    }
                }
            } catch(e) {}
            // ensure counters
            data.thoughts.forEach(t => { if (t.id >= nextId) nextId = t.id + 1; });
        }

        function saveData() {
            localStorage.setItem('dreams_level4', JSON.stringify(data));
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            // Желание
            document.getElementById('desire-input').value = data.desire || '';
            document.getElementById('desire-where').value = data.where || 'в уме';
            document.getElementById('desire-percent').value = data.percent || 50;
            document.getElementById('percent-display').textContent = (data.percent || 50) + '%';

            // Мысли по уровням
            const levels = ['think', 'believe', 'know'];
            levels.forEach(level => {
                const container = document.querySelector(`.thoughts-container[data-level="${level}"]`);
                const items = data.thoughts.filter(t => t.level === level);
                container.innerHTML = '';
                if (items.length === 0) {
                    const empty = document.createElement('span');
                    empty.className = 'empty';
                    empty.textContent = 'пусто';
                    container.appendChild(empty);
                } else {
                    items.forEach(t => {
                        const tag = document.createElement('span');
                        tag.className = 'thought-tag';
                        tag.dataset.id = t.id;
                        tag.innerHTML = `<span class="emoji">${t.emoji || '🧠'}</span> <span class="name">${t.name || 'Мысль'}</span>`;
                        container.appendChild(tag);
                    });
                }
            });

            // Чувства и действия
            renderItems('push', data.pushItems);
            renderItems('pull', data.pullItems);
            renderItems('now', data.nowItems);
            renderItems('wait', data.waitItems);

            attachEvents();
        }

        function renderItems(category, items) {
            const container = document.querySelector(`.items-container[data-category="${category}"]`);
            container.innerHTML = '';
            if (items.length === 0) {
                const empty = document.createElement('span');
                empty.className = 'empty';
                empty.textContent = 'пусто';
                container.appendChild(empty);
            } else {
                items.forEach(item => {
                    const tag = document.createElement('span');
                    tag.className = 'item-tag';
                    tag.innerHTML = `
                        <span class="emoji">${item.emoji || '📌'}</span>
                        <span class="name">${item.name || 'Элемент'}</span>
                        <button class="del" data-id="${item.id}">✕</button>
                    `;
                    container.appendChild(tag);
                });
            }
        }

        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
        function attachEvents() {
            // Сохранение желания при вводе
            document.getElementById('desire-input').addEventListener('input', (e) => {
                data.desire = e.target.value;
                saveData();
            });
            document.getElementById('desire-where').addEventListener('change', (e) => {
                data.where = e.target.value;
                saveData();
            });
            document.getElementById('desire-percent').addEventListener('input', (e) => {
                data.percent = parseInt(e.target.value);
                document.getElementById('percent-display').textContent = data.percent + '%';
                saveData();
            });

            // Клик по мысли -> открыть меню перемещения
            document.querySelectorAll('.thought-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    const id = parseInt(tag.dataset.id);
                    openMoveModal(id);
                });
            });

            // Кнопки добавления мыслей
            document.querySelectorAll('.btn-add-thought').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const level = btn.dataset.level;
                    openAddModal('thought', level);
                });
            });

            // Кнопки добавления чувств/действий
            document.querySelectorAll('.add-item-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const category = btn.dataset.category;
                    openAddModal('item', category);
                });
            });

            // Кнопка добавления мысли из шапки
            document.getElementById('add-thought-btn').addEventListener('click', () => {
                // открыть добавление мысли в случайный уровень (или по умолчанию think)
                openAddModal('thought', 'think');
            });

            // Удаление элементов (чувств/действий)
            document.querySelectorAll('.item-tag .del').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    // найти и удалить
                    const categories = ['push', 'pull', 'now', 'wait'];
                    for (let cat of categories) {
                        const idx = data[cat + 'Items'].findIndex(item => item.id === id);
                        if (idx !== -1) {
                            data[cat + 'Items'].splice(idx, 1);
                            saveData();
                            render();
                            break;
                        }
                    }
                });
            });
        }

        // ========== МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ ==========
        const overlay = document.getElementById('modal-overlay');
        const inputEmoji = document.getElementById('input-emoji');
        const inputName = document.getElementById('input-name');
        const inputTarget = document.getElementById('input-target');
        const targetGroup = document.getElementById('target-select-group');
        const modalSave = document.getElementById('modal-save-btn');
        const modalClose = document.getElementById('modal-close-btn');

        let modalContext = { type: 'thought', target: 'think' }; // type: 'thought' or 'item', target: level or category

        function openAddModal(type, target) {
            modalContext = { type, target };
            inputEmoji.value = '';
            inputName.value = '';
            if (type === 'thought') {
                targetGroup.style.display = 'block';
                // заполнить варианты уровней
                inputTarget.innerHTML = `
                    <option value="think">🤔 Думаю</option>
                    <option value="believe">🙏 Верю</option>
                    <option value="know">✨ Знаю</option>
                `;
                // выбрать переданный уровень
                if (target) inputTarget.value = target;
            } else {
                targetGroup.style.display = 'none';
            }
            overlay.classList.add('open');
        }

        function closeAddModal() {
            overlay.classList.remove('open');
        }

        function saveModalItem() {
            const emoji = inputEmoji.value.trim() || '🧩';
            const name = inputName.value.trim() || 'Элемент';
            const id = nextId++;

            if (modalContext.type === 'thought') {
                const level = inputTarget.value || 'think';
                data.thoughts.push({ id, emoji, name, level });
                saveData();
                render();
                closeAddModal();
            } else {
                // item: push, pull, now, wait
                const category = modalContext.target;
                const itemsArray = data[category + 'Items'];
                if (itemsArray) {
                    itemsArray.push({ id, emoji, name });
                    saveData();
                    render();
                    closeAddModal();
                }
            }
        }

        modalSave.addEventListener('click', saveModalItem);
        modalClose.addEventListener('click', closeAddModal);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeAddModal(); });

        // ========== МОДАЛЬНОЕ ОКНО ПЕРЕМЕЩЕНИЯ МЫСЛИ ==========
        const moveModal = document.getElementById('move-modal');
        const moveGrid = document.getElementById('move-grid');
        const moveClose = document.getElementById('move-close-btn');
        let movingThoughtId = null;

        function openMoveModal(id) {
            movingThoughtId = id;
            moveGrid.innerHTML = '';
            const levels = [
                { value: 'think', label: '🤔 Думаю' },
                { value: 'believe', label: '🙏 Верю' },
                { value: 'know', label: '✨ Знаю' }
            ];
            levels.forEach(level => {
                const btn = document.createElement('button');
                btn.className = 'move-btn';
                btn.textContent = level.label;
                btn.addEventListener('click', () => {
                    const thought = data.thoughts.find(t => t.id === id);
                    if (thought) {
                        thought.level = level.value;
                        saveData();
                        render();
                        closeMoveModal();
                    }
                });
                moveGrid.appendChild(btn);
            });
            moveModal.classList.add('open');
        }

        function closeMoveModal() {
            moveModal.classList.remove('open');
            movingThoughtId = null;
        }

        moveClose.addEventListener('click', closeMoveModal);
        moveModal.addEventListener('click', (e) => { if (e.target === moveModal) closeMoveModal(); });

        // ========== КНОПКА ПЕРЕМЕШАТЬ ==========
        document.getElementById('shuffle-btn').addEventListener('click', () => {
            if (data.thoughts.length === 0) return alert('Сначала добавьте несколько мыслей!');
            const levels = ['think', 'believe', 'know'];
            data.thoughts.forEach(t => {
                const randomLevel = levels[Math.floor(Math.random() * levels.length)];
                t.level = randomLevel;
            });
            saveData();
            render();
        });

        // ========== КНОПКА СБРОСА ==========
        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('Очистить всю карту желаний?')) {
                data = {
                    desire: '', where: 'в уме', percent: 50,
                    thoughts: [], pushItems: [], pullItems: [], nowItems: [], waitItems: []
                };
                nextId = 1;
                saveData();
                render();
            }
        });

        // ========== ЗАПУСК ==========
        loadData();
        render();
        console.log('🟣🦅 Уровень 4: Карта Желаний загружена.');
    </script>
</body>
</html>
