<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Аффирмации</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; padding: 20px; touch-action: pan-y;
        }
        #app { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }

        h1 { text-align: center; font-size: 24px; color: #b8a6ff; margin-bottom: 20px; }

        .header-actions {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff;
            padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.2s; flex: 1; min-width: 80px; text-align: center;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-primary { background: #6f52c4; color: #fff; }
        .btn-shuffle { background: #e67e22; color: #fff; }

        /* Блок цели */
        .goal-block {
            background: #161127; border-radius: 24px; padding: 16px; margin-bottom: 20px;
            border: 1px solid #3a2f5a;
        }
        .goal-block label { font-size: 14px; font-weight: 600; color: #8f78e6; display: block; margin-bottom: 4px; }
        .goal-block input {
            width: 100%; background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 10px 12px; color: #fff; font-size: 16px; outline: none;
        }

        /* Уровни убеждений (сверху вниз: Знаю, Верю, Думаю) */
        .beliefs-section { margin-bottom: 20px; }
        .level-card {
            background: #100d1e; border-radius: 16px; padding: 12px; margin-bottom: 12px;
            border-left: 4px solid #6f52c4;
        }
        .level-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
        }
        .level-name { font-weight: 700; color: #ffffff; font-size: 16px; }
        .level-items { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
        .item-tag {
            background: #2a2348; border: 1px solid #4a3f6a; border-radius: 20px;
            padding: 4px 12px; display: flex; align-items: center; gap: 6px; cursor: pointer;
            transition: 0.2s; font-size: 14px;
        }
        .item-tag:active { transform: scale(0.95); background: #6f52c4; }
        .item-tag .emoji { font-size: 16px; }
        .item-tag .name { color: #fff; font-weight: 500; }
        .empty { color: #4a3f6a; font-size: 13px; padding: 4px 0; }

        /* Чувства и действия (две колонки) */
        .two-col-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        @media (max-width: 500px) { .two-col-grid { grid-template-columns: 1fr; } }
        .col-card {
            background: #100d1e; border-radius: 16px; padding: 12px; border: 1px solid #2a2248;
        }
        .col-title { font-weight: 700; color: #b8a6ff; font-size: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .col-items { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }

        /* Кнопки "+" в зонах */
        .btn-add {
            background: #221b38; border: none; color: #b8a6ff;
            width: 28px; height: 28px; border-radius: 50%; font-size: 18px; cursor: pointer;
        }
        .btn-add:active { background: #6f52c4; color: #fff; }

        /* Модальное окно добавления */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #b8a6ff; font-weight: 500; }
        .input-group input, .input-group select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 10px 12px; font-size: 15px; color: #fff; outline: none;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; }

        /* Модальное окно перемещения */
        #move-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 101;
        }
        #move-modal.open { display: flex; }
        .move-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 20px; width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 12px;
        }
        .move-box h4 { color: #ffffff; text-align: center; margin: 0; }
        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .move-btn {
            background: #221b38; border: 1px solid #3a2f5a; border-radius: 12px; padding: 10px;
            color: #b8a6ff; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .move-btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .move-close { background: #3a2f5a; border: none; border-radius: 20px; padding: 10px; color: #b8a6ff; cursor: pointer; }

        @media (max-width: 600px) { .two-col-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="app">
        <h1>🧠 Аффирмация</h1>

        <div class="header-actions">
            <button class="btn btn-primary" id="add-thought-btn">➕ Мысль</button>
            <button class="btn btn-shuffle" id="shuffle-btn">🌀 Перемешать</button>
            <button class="btn" id="reset-btn" style="background:#5a2a2a; color:#ff8a8a; flex:0.5;">✖</button>
        </div>

        <!-- Блок цели -->
        <div class="goal-block">
            <label>💡 Я получу...</label>
            <input type="text" id="goal-input" placeholder="Например: внутреннюю свободу" />
        </div>

        <!-- Уровни убеждений (сверху вниз) -->
        <div class="beliefs-section">
            <div class="level-card" data-level="know">
                <div class="level-header">
                    <span class="level-name">✨ Знаю</span>
                    <button class="btn-add" data-level="know">+</button>
                </div>
                <div class="level-items" data-level="know"></div>
            </div>
            <div class="level-card" data-level="believe">
                <div class="level-header">
                    <span class="level-name">🙏 Верю</span>
                    <button class="btn-add" data-level="believe">+</button>
                </div>
                <div class="level-items" data-level="believe"></div>
            </div>
            <div class="level-card" data-level="think">
                <div class="level-header">
                    <span class="level-name">🤔 Думаю</span>
                    <button class="btn-add" data-level="think">+</button>
                </div>
                <div class="level-items" data-level="think"></div>
            </div>
        </div>

        <!-- Чувства (отпускаю / притягиваю) -->
        <div class="two-col-grid">
            <div class="col-card">
                <div class="col-title">
                    <span>🚫 Отпускаю</span>
                    <button class="btn-add" data-category="release">+</button>
                </div>
                <div class="col-items" data-category="release"></div>
            </div>
            <div class="col-card">
                <div class="col-title">
                    <span>🧲 Притягиваю</span>
                    <button class="btn-add" data-category="attract">+</button>
                </div>
                <div class="col-items" data-category="attract"></div>
            </div>
        </div>

        <!-- Действия (делаю сейчас / жду) -->
        <div class="two-col-grid">
            <div class="col-card">
                <div class="col-title">
                    <span>⚡ Делаю сейчас</span>
                    <button class="btn-add" data-category="do">+</button>
                </div>
                <div class="col-items" data-category="do"></div>
            </div>
            <div class="col-card">
                <div class="col-title">
                    <span>⏳ Жду</span>
                    <button class="btn-add" data-category="wait">+</button>
                </div>
                <div class="col-items" data-category="wait"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно добавления элемента -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3>➕ Новый элемент</h3>
            <div class="input-group">
                <label>Смайл</label>
                <input type="text" id="input-emoji" placeholder="Например: 💡" />
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="input-name" placeholder="Введите название" />
            </div>
            <div class="input-group" id="target-select-group" style="display:block;">
                <label>Куда</label>
                <select id="input-target"></select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="modal-save-btn">✅ Сохранить</button>
                <button class="btn btn-cancel" id="modal-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно перемещения -->
    <div id="move-modal">
        <div class="move-box">
            <h4>📍 Переместить</h4>
            <div class="move-grid" id="move-grid"></div>
            <button class="move-close" id="move-close-btn">✖ Закрыть</button>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        // Категории и их типы
        const LEVELS = [
            { id: 'know', label: '✨ Знаю', type: 'belief' },
            { id: 'believe', label: '🙏 Верю', type: 'belief' },
            { id: 'think', label: '🤔 Думаю', type: 'belief' }
        ];
        const CATEGORIES = [
            { id: 'release', label: '🚫 Отпускаю', type: 'feeling' },
            { id: 'attract', label: '🧲 Притягиваю', type: 'feeling' },
            { id: 'do', label: '⚡ Делаю сейчас', type: 'action' },
            { id: 'wait', label: '⏳ Жду', type: 'action' }
        ];
        // Все доступные зоны для перемещения (плоский список)
        const ALL_ZONES = [
            ...LEVELS.map(l => ({ id: l.id, label: l.label, type: l.type })),
            ...CATEGORIES.map(c => ({ id: c.id, label: c.label, type: c.type }))
        ];

        // Состояние
        let data = {
            goal: '',
            items: [] // { id, emoji, name, zone: 'know'|'believe'|'think'|'release'|'attract'|'do'|'wait' }
        };
        let nextId = 1;

        // DOM-элементы
        const goalInput = document.getElementById('goal-input');
        const modal = document.getElementById('modal-overlay');
        const inputEmoji = document.getElementById('input-emoji');
        const inputName = document.getElementById('input-name');
        const inputTarget = document.getElementById('input-target');
        const modalSave = document.getElementById('modal-save-btn');
        const modalClose = document.getElementById('modal-close-btn');

        const moveModal = document.getElementById('move-modal');
        const moveGrid = document.getElementById('move-grid');
        const moveClose = document.getElementById('move-close-btn');

        // ========== СОХРАНЕНИЕ И ЗАГРУЗКА ==========
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level5');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    data.goal = parsed.goal || '';
                    data.items = parsed.items || [];
                    // проставим ID, если нет
                    data.items.forEach(item => { if (!item.id) item.id = nextId++; });
                }
            } catch(e) {}
            // убедимся, что ID уникальны
            data.items.forEach(item => { if (item.id >= nextId) nextId = item.id + 1; });
        }

        function saveData() {
            localStorage.setItem('dreams_level5', JSON.stringify({ goal: data.goal, items: data.items }));
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            // Цель
            goalInput.value = data.goal || '';

            // Отрисовка убеждений (Знаю, Верю, Думаю)
            LEVELS.forEach(level => {
                const container = document.querySelector(`.level-items[data-level="${level.id}"]`);
                const items = data.items.filter(item => item.zone === level.id);
                renderItems(container, items);
            });

            // Чувства и действия
            CATEGORIES.forEach(cat => {
                const container = document.querySelector(`.col-items[data-category="${cat.id}"]`);
                const items = data.items.filter(item => item.zone === cat.id);
                renderItems(container, items);
            });

            attachEvents();
        }

        function renderItems(container, items) {
            container.innerHTML = '';
            if (items.length === 0) {
                const empty = document.createElement('span');
                empty.className = 'empty';
                empty.textContent = 'пусто';
                container.appendChild(empty);
            } else {
                items.forEach(item => {
                    const tag = document.createElement('span');
                    tag.className = 'item-tag';
                    tag.dataset.id = item.id;
                    tag.innerHTML = `<span class="emoji">${item.emoji || '🧩'}</span> <span class="name">${item.name || 'Элемент'}</span>`;
                    container.appendChild(tag);
                });
            }
        }

        // ========== ОБРАБОТЧИКИ ==========
        function attachEvents() {
            // Цель
            goalInput.addEventListener('input', (e) => {
                data.goal = e.target.value;
                saveData();
            });

            // Клик по элементу -> открыть перемещение
            document.querySelectorAll('.item-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    const id = parseInt(tag.dataset.id);
                    openMoveModal(id);
                });
            });

            // Кнопки добавления (+)
            document.querySelectorAll('.btn-add').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    let zone = btn.dataset.level || btn.dataset.category;
                    openAddModal(zone);
                });
            });

            // Кнопка "➕ Мысль" в шапке
            document.getElementById('add-thought-btn').addEventListener('click', () => {
                // по умолчанию в уровень Думаю
                openAddModal('think');
            });
        }

        // ========== МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ ==========
        function openAddModal(preSelectZone = 'think') {
            inputEmoji.value = '';
            inputName.value = '';
            // Заполнить выпадающий список зон
            inputTarget.innerHTML = '';
            // Показываем все доступные зоны, кроме тех, которые уже заполнены? Нет, даем все варианты.
            ALL_ZONES.forEach(z => {
                const opt = document.createElement('option');
                opt.value = z.id;
                opt.textContent = z.label;
                if (z.id === preSelectZone) opt.selected = true;
                inputTarget.appendChild(opt);
            });
            modal.classList.add('open');
        }

        function closeAddModal() {
            modal.classList.remove('open');
        }

        function saveModalItem() {
            const emoji = inputEmoji.value.trim() || '🧩';
            const name = inputName.value.trim() || 'Элемент';
            const zone = inputTarget.value;
            if (!zone) return alert('Выберите зону!');

            const id = nextId++;
            data.items.push({ id, emoji, name, zone });
            saveData();
            render();
            closeAddModal();
        }

        modalSave.addEventListener('click', saveModalItem);
        modalClose.addEventListener('click', closeAddModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeAddModal(); });

        // ========== МОДАЛЬНОЕ ОКНО ПЕРЕМЕЩЕНИЯ ==========
        let movingItemId = null;

        function openMoveModal(id) {
            movingItemId = id;
            moveGrid.innerHTML = '';
            // Показать все зоны, кроме текущей (или можно все, но тогда не будет смысла)
            const currentItem = data.items.find(item => item.id === id);
            if (!currentItem) return;

            ALL_ZONES.forEach(z => {
                if (z.id === currentItem.zone) return; // не показывать текущую
                const btn = document.createElement('button');
                btn.className = 'move-btn';
                btn.textContent = z.label;
                btn.addEventListener('click', () => {
                    const item = data.items.find(it => it.id === id);
                    if (item) {
                        item.zone = z.id;
                        saveData();
                        render();
                        closeMoveModal();
                    }
                });
                moveGrid.appendChild(btn);
            });
            // если все зоны уже заняты? оставим пустым, но тогда кнопка закрытия работает.
            moveModal.classList.add('open');
        }

        function closeMoveModal() {
            moveModal.classList.remove('open');
            movingItemId = null;
        }

        moveClose.addEventListener('click', closeMoveModal);
        moveModal.addEventListener('click', (e) => { if (e.target === moveModal) closeMoveModal(); });

        // ========== КНОПКА ПЕРЕМЕШАТЬ ==========
        document.getElementById('shuffle-btn').addEventListener('click', () => {
            if (data.items.length === 0) return alert('Сначала добавьте элементы!');
            const zoneIds = ALL_ZONES.map(z => z.id);
            data.items.forEach(item => {
                const randomZone = zoneIds[Math.floor(Math.random() * zoneIds.length)];
                item.zone = randomZone;
            });
            saveData();
            render();
        });

        // ========== КНОПКА СБРОСА ==========
        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('Очистить все данные?')) {
                data = { goal: '', items: [] };
                nextId = 1;
                saveData();
                render();
            }
        });

        // ========== ЗАПУСК ==========
        loadData();
        render();
        console.log('🟣🦅 Уровень 5: Аффирмации загружена.');
    </script>
</body>
</html>
