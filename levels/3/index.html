<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Карта Видения</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; padding: 20px; touch-action: pan-y;
        }
        #app { max-width: 700px; margin: 0 auto; padding-bottom: 80px; }

        h1 { text-align: center; font-size: 26px; color: #b8a6ff; margin-bottom: 20px; }
        
        .header-actions {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 24px;
        }
        .btn {
            border: none; background: #2a2348; color: #b8a6ff;
            padding: 12px 24px; border-radius: 30px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; flex: 1; text-align: center; max-width: 200px;
        }
        .btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .btn-primary { background: #6f52c4; color: #fff; }
        .btn-shuffle { background: #e67e22; color: #fff; }

        /* Блоки категорий */
        .category-block {
            background: #100d1e; border-radius: 24px; padding: 16px; margin-bottom: 20px;
            border: 1px solid #2a2248;
        }
        .category-title {
            font-size: 18px; font-weight: 700; color: #ffffff; margin-bottom: 12px;
            border-bottom: 1px solid #2a2248; padding-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }

        /* Сетка ячеек внутри категории */
        .zone-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        @media (max-width: 500px) { .zone-grid { grid-template-columns: 1fr; } }

        .zone-card {
            background: #161127; border-radius: 16px; padding: 12px; border: 1px solid #3a2f5a;
        }
        .zone-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
        }
        .zone-name { font-size: 14px; font-weight: 600; color: #8f78e6; }
        .btn-add-item {
            background: #221b38; border: none; color: #b8a6ff; width: 28px; height: 28px;
            border-radius: 50%; font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .btn-add-item:active { background: #6f52c4; color: #fff; }

        /* Элементы (мысли) */
        .items-container { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
        .item-tag {
            background: #2a2348; border: 1px solid #4a3f6a; border-radius: 20px;
            padding: 6px 14px; display: flex; align-items: center; gap: 6px; cursor: pointer;
            transition: 0.2s; font-size: 14px;
        }
        .item-tag:active { transform: scale(0.95); background: #6f52c4; border-color: #8f78e6; }
        .item-emoji { font-size: 18px; }
        .item-name { color: #ffffff; font-weight: 500; }

        .empty-state { color: #4a3f6a; font-size: 13px; padding: 4px 0; }

        /* Модальное окно добавления */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #b8a6ff; font-weight: 500; }
        .input-group input, .input-group select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 12px 14px; font-size: 16px; color: #ffffff; outline: none;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; }

        /* Модальное окно перемещения */
        #move-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 101;
        }
        #move-modal.open { display: flex; }
        .move-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 20px; width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 12px;
        }
        .move-box h4 { color: #ffffff; text-align: center; margin: 0; }
        .move-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
        }
        .move-btn {
            background: #221b38; border: 1px solid #3a2f5a; border-radius: 12px; padding: 10px;
            color: #b8a6ff; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .move-btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; border-color: #6f52c4; }
        .move-close { background: #3a2f5a; border: none; border-radius: 20px; padding: 10px; color: #b8a6ff; cursor: pointer; }
        
        @media (max-width: 600px) { .zone-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="app">
        <h1>🧠 Карта Видения</h1>
        
        <div class="header-actions">
            <button class="btn btn-primary" id="add-random-btn">➕ Добавить</button>
            <button class="btn btn-shuffle" id="shuffle-btn">🌀 Перемешать</button>
            <button class="btn" id="reset-btn" style="background:#5a2a2a; color:#ff8a8a; flex:0.5;">✖</button>
        </div>

        <!-- Контейнер для блоков -->
        <div id="vision-container"></div>
    </div>

    <!-- Модальное окно добавления -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3>➕ Новая мысль</h3>
            <div class="input-group">
                <label>Смайл</label>
                <input type="text" id="input-emoji" placeholder="Например: 💡" />
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="input-name" placeholder="Например: Инсайт" />
            </div>
            <div class="input-group">
                <label>Зона</label>
                <select id="input-zone"></select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-primary" id="modal-save-btn">✅ Сохранить</button>
                <button class="btn btn-cancel" id="modal-close-btn">✖ Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно перемещения -->
    <div id="move-modal">
        <div class="move-box">
            <h4>📍 Переместить</h4>
            <div class="move-grid" id="move-grid"></div>
            <button class="move-close" id="move-close-btn">✖ Закрыть</button>
        </div>
    </div>

    <script>
        // Структура данных: 3 категории, внутри них ячейки
        const GROUPS = [
            {
                category: "💭 Видение",
                zones: ["придумываю", "в мыслях", "думаю", "верю", "знаю"]
            },
            {
                category: "🌊 В чувствах",
                zones: ["отталкиваю 🧲", "притягиваю 🧲"]
            },
            {
                category: "⚡ В действиях",
                zones: ["жду ⏳", "делаю 🔥"]
            }
        ];
        // Плоский список всех ячеек для удобства поиска
        const ALL_ZONES = GROUPS.flatMap(g => g.zones);

        // Данные
        let items = [];
        let selectedItemId = null;

        // DOM
        const container = document.getElementById('vision-container');
        const overlay = document.getElementById('modal-overlay');
        const inputEmoji = document.getElementById('input-emoji');
        const inputName = document.getElementById('input-name');
        const inputZone = document.getElementById('input-zone');
        const modalSave = document.getElementById('modal-save-btn');
        const modalClose = document.getElementById('modal-close-btn');

        const moveModal = document.getElementById('move-modal');
        const moveGrid = document.getElementById('move-grid');
        const moveClose = document.getElementById('move-close-btn');

        // --- ЗАГРУЗКА И СОХРАНЕНИЕ ---
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_vision_board');
                if (raw) items = JSON.parse(raw);
                if (!Array.isArray(items)) items = [];
            } catch { items = []; }
        }
        function saveData() {
            localStorage.setItem('dreams_vision_board', JSON.stringify(items));
        }

        // --- ОТРИСОВКА ---
        function render() {
            container.innerHTML = '';
            // Заполняем выпадающий список в модалке
            updateZoneSelect();

            GROUPS.forEach(group => {
                const block = document.createElement('div');
                block.className = 'category-block';
                
                const title = document.createElement('div');
                title.className = 'category-title';
                title.textContent = group.category;
                block.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'zone-grid';

                group.zones.forEach(zone => {
                    const zoneItems = items.filter(it => it.zone === zone);
                    
                    const card = document.createElement('div');
                    card.className = 'zone-card';
                    
                    const header = document.createElement('div');
                    header.className = 'zone-header';
                    header.innerHTML = `
                        <span class="zone-name">${zone}</span>
                        <button class="btn-add-item" data-zone="${zone}">+</button>
                    `;
                    card.appendChild(header);

                    const itemsContainer = document.createElement('div');
                    itemsContainer.className = 'items-container';
                    
                    if (zoneItems.length === 0) {
                        const empty = document.createElement('span');
                        empty.className = 'empty-state';
                        empty.textContent = 'пусто';
                        itemsContainer.appendChild(empty);
                    } else {
                        zoneItems.forEach(item => {
                            const tag = document.createElement('span');
                            tag.className = 'item-tag';
                            tag.dataset.id = item.id;
                            tag.innerHTML = `<span class="item-emoji">${item.emoji || '📌'}</span> <span class="item-name">${item.name || 'Мысль'}</span>`;
                            itemsContainer.appendChild(tag);
                        });
                    }
                    card.appendChild(itemsContainer);
                    grid.appendChild(card);
                });

                block.appendChild(grid);
                container.appendChild(block);
            });

            attachEvents();
        }

        // --- ОБРАБОТЧИКИ СОБЫТИЙ ---
        function attachEvents() {
            // Нажатие на "+" внутри ячейки
            document.querySelectorAll('.btn-add-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const zone = btn.dataset.zone;
                    openAddModal(zone);
                });
            });

            // Нажатие на сам элемент (открыть меню перемещения)
            document.querySelectorAll('.item-tag').forEach(tag => {
                tag.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(tag.dataset.id);
                    openMoveModal(id);
                });
            });
        }

        // --- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ ---
        function updateZoneSelect(selected = null) {
            inputZone.innerHTML = '';
            ALL_ZONES.forEach(z => {
                const opt = document.createElement('option');
                opt.value = z;
                opt.textContent = z;
                if (z === selected) opt.selected = true;
                inputZone.appendChild(opt);
            });
        }

        function openAddModal(preSelectZone = null) {
            inputEmoji.value = '🧩';
            inputName.value = '';
            updateZoneSelect(preSelectZone);
            overlay.classList.add('open');
        }

        function closeAddModal() {
            overlay.classList.remove('open');
        }

        function saveNewItem() {
            const emoji = inputEmoji.value.trim() || '🧩';
            const name = inputName.value.trim() || 'Мысль';
            const zone = inputZone.value;
            if (!zone) return alert('Выберите зону!');

            items.push({
                id: Date.now() + Math.random() * 1000, // простой уникальный ID
                emoji: emoji,
                name: name,
                zone: zone
            });
            saveData();
            render();
            closeAddModal();
        }

        modalSave.addEventListener('click', saveNewItem);
        modalClose.addEventListener('click', closeAddModal);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeAddModal(); });

        // --- МОДАЛЬНОЕ ОКНО ПЕРЕМЕЩЕНИЯ ---
        function openMoveModal(itemId) {
            selectedItemId = itemId;
            moveGrid.innerHTML = '';
            ALL_ZONES.forEach(z => {
                const btn = document.createElement('button');
                btn.className = 'move-btn';
                btn.textContent = z;
                btn.addEventListener('click', () => {
                    const item = items.find(it => it.id === itemId);
                    if (item) {
                        item.zone = z;
                        saveData();
                        render();
                        closeMoveModal();
                    }
                });
                moveGrid.appendChild(btn);
            });
            moveModal.classList.add('open');
        }

        function closeMoveModal() {
            moveModal.classList.remove('open');
            selectedItemId = null;
        }

        moveClose.addEventListener('click', closeMoveModal);
        moveModal.addEventListener('click', (e) => { if (e.target === moveModal) closeMoveModal(); });

        // --- КНОПКИ ВВЕРХУ ---
        document.getElementById('add-random-btn').addEventListener('click', () => {
            // Открыть модалку с рандомной зоной
            const randomZone = ALL_ZONES[Math.floor(Math.random() * ALL_ZONES.length)];
            openAddModal(randomZone);
        });

        document.getElementById('shuffle-btn').addEventListener('click', () => {
            if (items.length === 0) return alert('Сначала добавьте несколько мыслей!');
            items.forEach(item => {
                const randomZone = ALL_ZONES[Math.floor(Math.random() * ALL_ZONES.length)];
                item.zone = randomZone;
            });
            saveData();
            render();
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            if (confirm('Очистить всю карту видения?')) {
                items = [];
                saveData();
                render();
            }
        });

        // --- ЗАПУСК ---
        loadData();
        render();
        console.log('🟣🦅 Уровень 3: Карта Видения загружена.');
    </script>
</body>
</html>
