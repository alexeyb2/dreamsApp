<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Аффирмация-конструктор</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0814; color: #e0d6ff; font-family: system-ui, sans-serif;
            min-height: 100vh; padding: 20px; touch-action: pan-y;
        }
        #app { max-width: 600px; margin: 0 auto; padding-bottom: 80px; }

        h1 { text-align: center; font-size: 24px; color: #b8a6ff; margin-bottom: 20px; }

        /* Панель с желанием и процентом */
        .desire-panel {
            background: #161127; border-radius: 20px; padding: 16px; margin-bottom: 16px;
            border: 1px solid #3a2f5a;
        }
        .desire-panel label { font-weight: 600; color: #8f78e6; display: block; margin-bottom: 4px; }
        .desire-panel input[type="text"] {
            width: 100%; background: #1a1530; border: 1px solid #3a2f5a; border-radius: 12px;
            padding: 10px 12px; color: #fff; font-size: 16px; outline: none;
        }
        .desire-row {
            display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap;
        }
        .desire-row input[type="range"] { flex: 1; height: 6px; accent-color: #6f52c4; }
        .desire-row .percent { min-width: 40px; text-align: center; font-weight: bold; color: #b8a6ff; }

        /* Блок итоговой аффирмации */
        .affirmation-box {
            background: #100d1e; border-radius: 16px; padding: 16px; margin-bottom: 20px;
            border-left: 4px solid #ffcc00; min-height: 80px;
        }
        .affirmation-text {
            font-size: 16px; line-height: 1.6; color: #e0d6ff; white-space: pre-wrap;
        }
        .affirmation-text .highlight { color: #ffcc00; font-weight: 600; }

        /* Горизонтальные категории */
        .categories-row {
            display: flex; justify-content: space-around; gap: 10px; margin-bottom: 20px;
            padding: 12px 0; border-top: 1px solid #2a2248; border-bottom: 1px solid #2a2248;
        }
        .cat-item {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
            padding: 6px 12px; border-radius: 16px; transition: 0.2s; flex: 1;
        }
        .cat-item:active { background: #2a2348; }
        .cat-emoji { font-size: 28px; }
        .cat-label { font-size: 12px; font-weight: 600; color: #b8a6ff; margin-top: 4px; }

        /* Списки элементов (скрытые, доступны через клик) */
        .items-section { display: none; margin-bottom: 20px; }
        .items-section.active { display: block; }
        .items-container {
            background: #100d1e; border-radius: 16px; padding: 12px; border: 1px solid #2a2248;
            display: flex; flex-wrap: wrap; gap: 6px; min-height: 40px;
        }
        .item-tag {
            background: #2a2348; border: 1px solid #4a3f6a; border-radius: 20px;
            padding: 4px 12px; display: flex; align-items: center; gap: 6px; cursor: pointer;
            transition: 0.2s; font-size: 14px;
        }
        .item-tag:active { background: #6f52c4; border-color: #8f78e6; }
        .item-tag .emoji { font-size: 16px; }
        .item-tag .name { color: #fff; font-weight: 500; }
        .item-tag .del {
            background: transparent; border: none; color: #ff6b6b; cursor: pointer;
            margin-left: 4px; font-size: 14px; padding: 0 2px;
        }
        .empty { color: #4a3f6a; font-size: 13px; padding: 4px 0; }
        .add-btn {
            background: #221b38; border: none; color: #b8a6ff; width: 28px; height: 28px;
            border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .add-btn:active { background: #6f52c4; color: #fff; }

        /* Модальное окно добавления */
        #modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 100;
        }
        #modal-overlay.open { display: flex; }
        .modal-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 24px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 16px;
        }
        .modal-box h3 { color: #b8a6ff; text-align: center; margin-bottom: 4px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; color: #b8a6ff; font-weight: 500; }
        .input-group input, .input-group select {
            background: #1a1530; border: 1px solid #3a2f5a; border-radius: 16px;
            padding: 10px 12px; font-size: 15px; color: #fff; outline: none;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
        .btn-cancel { background: #3a2f5a; color: #b8a6ff; flex: 1; }

        /* Модальное окно перемещения */
        #move-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 101;
        }
        #move-modal.open { display: flex; }
        .move-box {
            background: #161127; border: 1px solid #3a2f5a; border-radius: 30px;
            padding: 20px; width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 12px;
        }
        .move-box h4 { color: #ffffff; text-align: center; margin: 0; }
        .move-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .move-btn {
            background: #221b38; border: 1px solid #3a2f5a; border-radius: 12px; padding: 10px;
            color: #b8a6ff; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .move-btn:active { transform: scale(0.95); background: #6f52c4; color: #fff; }
        .move-close { background: #3a2f5a; border: none; border-radius: 20px; padding: 10px; color: #b8a6ff; cursor: pointer; }

        @media (max-width: 500px) {
            .categories-row { flex-wrap: wrap; }
            .cat-item { min-width: 80px; }
            .items-section.active { display: block; }
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>🧠 Аффирмация</h1>

        <!-- Желание и процент -->
        <div class="desire-panel">
            <label>💡 Я получу...</label>
            <input type="text" id="goal-input" placeholder="Например: внутреннюю свободу" />
            <div class="desire-row">
                <span style="font-size:13px;">Вероятность:</span>
                <input type="range" id="percent-slider" min="0" max="100" value="70" />
                <span class="percent" id="percent-display">70%</span>
            </div>
        </div>

        <!-- Итоговая аффирмация -->
        <div class="affirmation-box">
            <div class="affirmation-text" id="affirmation-text">
                <span class="highlight">Я получу</span> ... <span class="highlight">70%</span>,<br>
                потому что <span class="highlight">я знаю</span>: ...<br>
                <span class="highlight">я убираю</span>: ...<br>
                <span class="highlight">я впускаю</span>: ...<br>
                <span class="highlight">я делаю</span>: ...
            </div>
        </div>

        <!-- Горизонтальные категории -->
        <div class="categories-row">
            <div class="cat-item" data-category="think">
                <span class="cat-emoji">🔵</span>
                <span class="cat-label">Мысли</span>
            </div>
            <div class="cat-item" data-category="feel">
                <span class="cat-emoji">🟢</span>
                <span class="cat-label">Чувства</span>
            </div>
            <div class="cat-item" data-category="act">
                <span class="cat-emoji">🔴</span>
                <span class="cat-label">Действия</span>
            </div>
        </div>

        <!-- Списки элементов (по умолчанию скрыты) -->
        <div class="items-section" id="section-think">
            <div class="items-container" id="container-think"></div>
            <button class="add-btn" id="add-think" style="margin-top:8px; width:100%; border-radius:20px; padding:8px;">➕ Добавить мысль</button>
        </div>
        <div class="items-section" id="section-feel">
            <div class="items-container" id="container-feel"></div>
            <button class="add-btn" id="add-feel" style="margin-top:8px; width:100%; border-radius:20px; padding:8px;">➕ Добавить чувство</button>
        </div>
        <div class="items-section" id="section-act">
            <div class="items-container" id="container-act"></div>
            <button class="add-btn" id="add-act" style="margin-top:8px; width:100%; border-radius:20px; padding:8px;">➕ Добавить действие</button>
        </div>
    </div>

    <!-- Модальное окно добавления -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title">➕ Новый элемент</h3>
            <div class="input-group">
                <label>Смайл</label>
                <input type="text" id="input-emoji" placeholder="Например: 💡" />
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="input-name" placeholder="Введите название" />
            </div>
            <div class="input-group" id="feel-type-group" style="display:none;">
                <label>Тип чувства</label>
                <select id="feel-type">
                    <option value="remove">Убираю</option>
                    <option value="attract">Впускаю</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn" id="modal-save-btn" style="background:#6f52c4; color:#fff; flex:1;">✅ Сохранить</button>
                <button class="btn btn-cancel" id="modal-close-btn">✖ Отмена</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно перемещения -->
    <div id="move-modal">
        <div class="move-box">
            <h4>📍 Переместить</h4>
            <div class="move-grid" id="move-grid"></div>
            <button class="move-close" id="move-close-btn">✖ Закрыть</button>
        </div>
    </div>

    <script>
        // ========== ДАННЫЕ ==========
        const CATEGORIES = {
            think: { label: 'Мысли', emoji: '🔵', prefix: 'я знаю' },
            feel: { label: 'Чувства', emoji: '🟢' }, // special: has sub-types remove/attract
            act: { label: 'Действия', emoji: '🔴', prefix: 'я делаю' }
        };

        // Состояние
        let data = {
            goal: '',
            percent: 70,
            items: [] // { id, emoji, name, category: 'think'|'feel'|'act', feelType: 'remove'|'attract' (only for feel) }
        };
        let nextId = 1;
        let activeCategory = null; // для открытия секции

        // DOM элементы
        const goalInput = document.getElementById('goal-input');
        const percentSlider = document.getElementById('percent-slider');
        const percentDisplay = document.getElementById('percent-display');
        const affirmationText = document.getElementById('affirmation-text');

        const sections = {
            think: document.getElementById('section-think'),
            feel: document.getElementById('section-feel'),
            act: document.getElementById('section-act')
        };
        const containers = {
            think: document.getElementById('container-think'),
            feel: document.getElementById('container-feel'),
            act: document.getElementById('container-act')
        };
        const addButtons = {
            think: document.getElementById('add-think'),
            feel: document.getElementById('add-feel'),
            act: document.getElementById('add-act')
        };
        const catItems = document.querySelectorAll('.cat-item');

        // Модалки
        const modal = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const inputEmoji = document.getElementById('input-emoji');
        const inputName = document.getElementById('input-name');
        const feelTypeGroup = document.getElementById('feel-type-group');
        const feelTypeSelect = document.getElementById('feel-type');
        const modalSave = document.getElementById('modal-save-btn');
        const modalClose = document.getElementById('modal-close-btn');

        const moveModal = document.getElementById('move-modal');
        const moveGrid = document.getElementById('move-grid');
        const moveClose = document.getElementById('move-close-btn');

        let modalContext = { category: 'think', feelType: 'remove' }; // для добавления
        let movingItemId = null;

        // ========== СОХРАНЕНИЕ И ЗАГРУЗКА ==========
        function loadData() {
            try {
                const raw = localStorage.getItem('dreams_level6');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    data.goal = parsed.goal || '';
                    data.percent = parsed.percent || 70;
                    data.items = parsed.items || [];
                    data.items.forEach(item => { if (!item.id) item.id = nextId++; });
                }
            } catch(e) {}
            data.items.forEach(item => { if (item.id >= nextId) nextId = item.id + 1; });
        }

        function saveData() {
            localStorage.setItem('dreams_level6', JSON.stringify({ goal: data.goal, percent: data.percent, items: data.items }));
        }

        // ========== ОТРИСОВКА ==========
        function render() {
            // Желание
            goalInput.value = data.goal || '';
            percentSlider.value = data.percent;
            percentDisplay.textContent = data.percent + '%';

            // Отрисовка контейнеров
            ['think', 'feel', 'act'].forEach(cat => {
                const container = containers[cat];
                const items = data.items.filter(item => item.category === cat);
                container.innerHTML = '';
                if (items.length === 0) {
                    const empty = document.createElement('span');
                    empty.className = 'empty';
                    empty.textContent = 'пусто';
                    container.appendChild(empty);
                } else {
                    items.forEach(item => {
                        const tag = document.createElement('span');
                        tag.className = 'item-tag';
                        tag.dataset.id = item.id;
                        tag.innerHTML = `
                            <span class="emoji">${item.emoji || '🧩'}</span>
                            <span class="name">${item.name || 'Элемент'}</span>
                            <button class="del" data-id="${item.id}">✕</button>
                        `;
                        container.appendChild(tag);
                    });
                }
            });

            // Обновление аффирмации
            updateAffirmation();

            attachEvents();
        }

        function updateAffirmation() {
            const goal = data.goal || '...';
            const percent = data.percent;
            const thinks = data.items.filter(i => i.category === 'think').map(i => i.name).join(', ');
            const feelsRemove = data.items.filter(i => i.category === 'feel' && i.feelType === 'remove').map(i => i.name);
            const feelsAttract = data.items.filter(i => i.category === 'feel' && i.feelType === 'attract').map(i => i.name);
            const acts = data.items.filter(i => i.category === 'act').map(i => i.name).join(', ');

            let text = `<span class="highlight">Я получу</span> ${goal} <span class="highlight">${percent}%</span>`;

            if (thinks) {
                text += `,<br>потому что <span class="highlight">я знаю</span>: ${thinks}`;
            }
            if (feelsRemove.length) {
                text += `,<br><span class="highlight">я убираю</span>: ${feelsRemove.join(', ')}`;
            }
            if (feelsAttract.length) {
                text += `,<br><span class="highlight">я впускаю</span>: ${feelsAttract.join(', ')}`;
            }
            if (acts) {
                text += `,<br><span class="highlight">я делаю</span>: ${acts}`;
            }

            affirmationText.innerHTML = text || 'Начните добавлять элементы...';
        }

        // ========== ОБРАБОТЧИКИ ==========
        function attachEvents() {
            // Сохранение цели и процента
            goalInput.addEventListener('input', (e) => {
                data.goal = e.target.value;
                saveData();
                render();
            });
            percentSlider.addEventListener('input', (e) => {
                data.percent = parseInt(e.target.value);
                saveData();
                render();
            });

            // Клик по категории (открыть секцию)
            catItems.forEach(el => {
                el.addEventListener('click', () => {
                    const cat = el.dataset.category;
                    toggleSection(cat);
                });
            });

            // Клик по элементу -> переместить
            document.querySelectorAll('.item-tag').forEach(tag => {
                tag.addEventListener('click', (e) => {
                    // если клик на кнопку удаления - не открывать перемещение
                    if (e.target.classList.contains('del')) return;
                    const id = parseInt(tag.dataset.id);
                    openMoveModal(id);
                });
            });

            // Удаление элемента
            document.querySelectorAll('.item-tag .del').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = parseInt(btn.dataset.id);
                    const idx = data.items.findIndex(item => item.id === id);
                    if (idx !== -1) {
                        data.items.splice(idx, 1);
                        saveData();
                        render();
                    }
                });
            });

            // Кнопки добавления
            addButtons.think.addEventListener('click', () => openAddModal('think'));
            addButtons.feel.addEventListener('click', () => openAddModal('feel'));
            addButtons.act.addEventListener('click', () => openAddModal('act'));
        }

        function toggleSection(cat) {
            // Скрыть все секции
            Object.keys(sections).forEach(key => {
                sections[key].classList.remove('active');
            });
            // Если кликнули на уже активную, то просто закрываем? или оставляем открытой?
            if (activeCategory === cat) {
                activeCategory = null;
                return;
            }
            sections[cat].classList.add('active');
            activeCategory = cat;
        }

        // ========== МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ ==========
        function openAddModal(category) {
            modalContext.category = category;
            modalTitle.textContent = `➕ Добавить ${CATEGORIES[category]?.label || 'элемент'}`;
            inputEmoji.value = '';
            inputName.value = '';
            // Для чувств показываем выбор типа
            if (category === 'feel') {
                feelTypeGroup.style.display = 'block';
                feelTypeSelect.value = 'remove'; // по умолчанию убираю
            } else {
                feelTypeGroup.style.display = 'none';
            }
            modal.classList.add('open');
        }

        function closeAddModal() {
            modal.classList.remove('open');
        }

        function saveModalItem() {
            const emoji = inputEmoji.value.trim() || '🧩';
            const name = inputName.value.trim() || 'Элемент';
            const category = modalContext.category;
            const feelType = category === 'feel' ? feelTypeSelect.value : null;

            if (!name) return alert('Введите название!');

            const id = nextId++;
            const newItem = { id, emoji, name, category };
            if (feelType) newItem.feelType = feelType;
            data.items.push(newItem);
            saveData();
            render();
            closeAddModal();
        }

        modalSave.addEventListener('click', saveModalItem);
        modalClose.addEventListener('click', closeAddModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeAddModal(); });

        // ========== МОДАЛЬНОЕ ОКНО ПЕРЕМЕЩЕНИЯ ==========
        function openMoveModal(id) {
            movingItemId = id;
            const item = data.items.find(i => i.id === id);
            if (!item) return;
            moveGrid.innerHTML = '';
            // Доступные категории
            const categories = ['think', 'feel', 'act'];
            categories.forEach(cat => {
                if (cat === item.category) return; // не показывать текущую
                const btn = document.createElement('button');
                btn.className = 'move-btn';
                btn.textContent = CATEGORIES[cat].emoji + ' ' + CATEGORIES[cat].label;
                btn.addEventListener('click', () => {
                    const targetItem = data.items.find(i => i.id === id);
                    if (targetItem) {
                        // если перемещаем в чувства, нужно установить тип по умолчанию?
                        if (cat === 'feel' && !targetItem.feelType) {
                            targetItem.feelType = 'remove'; // по умолчанию убираю
                        } else if (cat !== 'feel') {
                            delete targetItem.feelType;
                        }
                        targetItem.category = cat;
                        saveData();
                        render();
                        closeMoveModal();
                    }
                });
                moveGrid.appendChild(btn);
            });
            moveModal.classList.add('open');
        }

        function closeMoveModal() {
            moveModal.classList.remove('open');
            movingItemId = null;
        }

        moveClose.addEventListener('click', closeMoveModal);
        moveModal.addEventListener('click', (e) => { if (e.target === moveModal) closeMoveModal(); });

        // ========== ЗАПУСК ==========
        loadData();
        render();
        console.log('🟣🦅 Уровень 6: Аффирмация-конструктор загружена.');
    </script>
</body>
</html>
